function getFastenerSpec(key) {
  return FASTENER_SPECS.find(s => s.key === key) || FASTENER_SPECS.find(s => s.key === 'M5');
}

// Return a NEW BufferGeometry where vertices within `eps` mm of each other
// collapse to a single shared vertex. Used only for the EdgesGeometry pass
// on CSG results — the visual mesh keeps its original (possibly duplicated)
// vertices, but the welded copy lets EdgesGeometry's angle threshold cleanly
// reject coplanar seams that would otherwise be flagged as boundary edges.
// eps=0.02 mm is generous enough to catch the small drift CSG output leaves
// at union seams while still well below any meaningful printer-resolution
// feature size.
function weldGeometryForEdges(geo, eps = 0.02) {
  const pos = geo.attributes.position;
  if (!pos) return geo;
  const verts = pos.array;
  const N = pos.count;
  const buckets = new Map();
  const remap = new Int32Array(N);
  const newPos = [];
  const inv = 1 / eps;
  for (let i = 0; i < N; i++) {
    const x = verts[i*3], y = verts[i*3+1], z = verts[i*3+2];
    const key = Math.round(x*inv) + '|' + Math.round(y*inv) + '|' + Math.round(z*inv);
    let bucketIdx = buckets.get(key);
    if (bucketIdx === undefined) {
      bucketIdx = newPos.length / 3;
      newPos.push(x, y, z);
      buckets.set(key, bucketIdx);
    }
    remap[i] = bucketIdx;
  }
  let newIndex;
  if (geo.index) {
    const oldIdx = geo.index.array;
    newIndex = new Uint32Array(oldIdx.length);
    for (let i = 0; i < oldIdx.length; i++) newIndex[i] = remap[oldIdx[i]];
  } else {
    newIndex = new Uint32Array(N);
    for (let i = 0; i < N; i++) newIndex[i] = remap[i];
  }
  const out = new THREE.BufferGeometry();
  out.setAttribute('position', new THREE.Float32BufferAttribute(newPos, 3));
  out.setIndex(new THREE.BufferAttribute(newIndex, 1));
  return out;
}

// Concatenate BufferGeometries by expanding indices and stacking attributes.
// We can't depend on three's BufferGeometryUtils (only in addons), so this is
// the minimum-viable replacement for multi-part fastener meshes.
function _mergeBufferGeometries(geos) {
  const posOut = [], normOut = [];
  for (const g of geos) {
    if (!g.attributes.position) continue;
    if (!g.attributes.normal) g.computeVertexNormals();
    const p = g.attributes.position.array;
    const n = g.attributes.normal.array;
    if (g.index) {
      const idx = g.index.array;
      for (let i = 0; i < idx.length; i++) {
        const k = idx[i] * 3;
        posOut.push(p[k], p[k + 1], p[k + 2]);
        normOut.push(n[k], n[k + 1], n[k + 2]);
      }
    } else {
      for (let i = 0; i < p.length; i++) posOut.push(p[i]);
      for (let i = 0; i < n.length; i++) normOut.push(n[i]);
    }
  }
  const out = new THREE.BufferGeometry();
  out.setAttribute('position', new THREE.Float32BufferAttribute(posOut, 3));
  out.setAttribute('normal',   new THREE.Float32BufferAttribute(normOut, 3));
  return out;
}

// Build the geometry for a fastener — root cylinder + helical thread + head.
// All mesh-local: bottom of shaft at y = 0, head sits on top.
//
// THREADS: A real ISO/UNC thread has a triangular cross-section spiralling
// around the shaft at the spec's pitch. We approximate with a TubeGeometry
// helix: a smoothly-rounded rib sitting on a minor-diameter cylinder, the
// rib's centerline at (rMinor + rMajor)/2 and rib radius (rMajor - rMinor)/2.
// This is a printable thread profile (similar to a rounded-Whitworth or
// Acme-style) that's also CSG-cuttable so the user can group it as a
// negative to make threaded holes.
// Manually build a closed-manifold threaded shaft. Each (i = axial step,
// j = angular step) sample places a vertex at radius r(θ, z), where r
// varies with the local "thread phase" — distance to the nearest helical
// crest line — to produce a sharp triangular V-thread cross-section. The
// last column wraps to the first (no duplicate seam) so the mesh has no
// open edges except the two end caps, which we close with triangle fans.
// Result: a watertight manifold with real ISO-style triangular threads
// that CSG can subtract to produce a real threaded hole.
function buildThreadedShaftGeo(rMinor, rMajor, pitch, length, segPerTurn = 24, axialStepsPerPitch = 6) {
  const halfPitch = pitch / 2;
  const totalAxialSteps = Math.max(8, Math.ceil((length / pitch) * axialStepsPerPitch));
  const N = segPerTurn;
  const positions = [];
  const indices = [];
  for (let i = 0; i <= totalAxialSteps; i++) {
    const z = (i / totalAxialSteps) * length;
    for (let j = 0; j < N; j++) {
      const theta = (j / N) * 2 * Math.PI;
      // Thread phase = signed axial distance to the helical crest at this θ
      let phase = (z - theta * pitch / (2 * Math.PI)) % pitch;
      if (phase >  halfPitch) phase -= pitch;
      else if (phase < -halfPitch) phase += pitch;
      const r = rMajor - (rMajor - rMinor) * Math.abs(phase) / halfPitch;
      positions.push(r * Math.cos(theta), z, r * Math.sin(theta));
    }
  }
  // Lateral triangles, wrapping in θ
  for (let i = 0; i < totalAxialSteps; i++) {
    for (let j = 0; j < N; j++) {
      const jN = (j + 1) % N;
      const a = i * N + j;
      const b = i * N + jN;
      const c = (i + 1) * N + j;
      const d = (i + 1) * N + jN;
      indices.push(a, c, b);
      indices.push(b, c, d);
    }
  }
  // Top cap (z = length) — wind so normal points +y (outward from the top)
  const topCenter = positions.length / 3;
  positions.push(0, length, 0);
  const topRing = totalAxialSteps * N;
  for (let j = 0; j < N; j++) {
    const jN = (j + 1) % N;
    indices.push(topRing + jN, topRing + j, topCenter);
  }
  // Bottom cap (z = 0) — wind so normal points −y (outward from the bottom)
  const botCenter = positions.length / 3;
  positions.push(0, 0, 0);
  for (let j = 0; j < N; j++) {
    const jN = (j + 1) % N;
    indices.push(j, jN, botCenter);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

// Hollow threaded sleeve — the OUTER surface is a smooth cylinder that
// hugs the inside wall of a clean cylindrical CSG cut, the INNER surface
// is the helical thread profile. Used as a non-CSG visualization sitting
// inside a smoothly-cut threaded hole so the user can still see the
// helical pattern without ever feeding the (non-manifold-ish) helix into
// the boolean engine. Open top and bottom — the hole stays see-through.
function buildThreadShellGeo(rMinor, rMajor, rOuter, pitch, length, segPerTurn = 18, axialStepsPerPitch = 4) {
  const halfPitch = pitch / 2;
  const totalAxialSteps = Math.max(8, Math.ceil((length / pitch) * axialStepsPerPitch));
  const N = segPerTurn;
  const positions = [];
  const indices = [];
  // Inner ring (helical thread profile)  + outer ring (smooth cyl)
  // for each axial slice.
  for (let i = 0; i <= totalAxialSteps; i++) {
    const z = (i / totalAxialSteps) * length;
    for (let j = 0; j < N; j++) {
      const theta = (j / N) * 2 * Math.PI;
      let phase = (z - theta * pitch / (2 * Math.PI)) % pitch;
      if (phase >  halfPitch) phase -= pitch;
      else if (phase < -halfPitch) phase += pitch;
      const rIn = rMajor - (rMajor - rMinor) * Math.abs(phase) / halfPitch;
      positions.push(rIn * Math.cos(theta), z, rIn * Math.sin(theta));
    }
    for (let j = 0; j < N; j++) {
      const theta = (j / N) * 2 * Math.PI;
      positions.push(rOuter * Math.cos(theta), z, rOuter * Math.sin(theta));
    }
  }
  const sliceVerts = 2 * N;
  // Inner wall — wind so normal faces INWARD (toward the axis); that's the
  // surface the user is looking at from outside down through the hole.
  for (let i = 0; i < totalAxialSteps; i++) {
    for (let j = 0; j < N; j++) {
      const jN = (j + 1) % N;
      const a = i * sliceVerts + j;
      const b = i * sliceVerts + jN;
      const c = (i + 1) * sliceVerts + j;
      const d = (i + 1) * sliceVerts + jN;
      indices.push(a, b, c);
      indices.push(b, d, c);
    }
  }
  // Outer wall — wind so normal faces OUTWARD (away from axis); flush
  // against the smooth CSG cut wall.
  for (let i = 0; i < totalAxialSteps; i++) {
    for (let j = 0; j < N; j++) {
      const jN = (j + 1) % N;
      const a = i * sliceVerts + N + j;
      const b = i * sliceVerts + N + jN;
      const c = (i + 1) * sliceVerts + N + j;
      const d = (i + 1) * sliceVerts + N + jN;
      indices.push(a, c, b);
      indices.push(b, c, d);
    }
  }
  // Top annular cap (z = length) — connects inner ring to outer ring,
  // normal pointing +Y (out of the hole opening at the top).
  const topInnerBase = totalAxialSteps * sliceVerts;
  const topOuterBase = topInnerBase + N;
  for (let j = 0; j < N; j++) {
    const jN = (j + 1) % N;
    indices.push(topInnerBase + j,  topOuterBase + j,  topInnerBase + jN);
    indices.push(topInnerBase + jN, topOuterBase + j,  topOuterBase + jN);
  }
  // Bottom annular cap (z = 0) — normal pointing −Y (into the body).
  for (let j = 0; j < N; j++) {
    const jN = (j + 1) % N;
    indices.push(j,      jN,     N + j);
    indices.push(jN,     N + jN, N + j);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

// Helper — bake a CSG.subtract into a fresh BufferGeometry. Used to carve
// recesses (hex socket, Phillips cross) into the head before merging with
// the rest of the bolt parts.
function _csgSubtractGeo(baseGeo, subGeos) {
  if (typeof CSG === 'undefined') return baseGeo;
  try {
    const matTmp = new THREE.MeshBasicMaterial();
    const baseMesh = new THREE.Mesh(baseGeo, matTmp);
    baseMesh.updateMatrixWorld(true);
    let result = baseMesh;
    for (const sg of subGeos) {
      const sm = new THREE.Mesh(sg, matTmp);
      sm.updateMatrixWorld(true);
      result = CSG.subtract(result, sm);
      result.updateMatrixWorld(true);
    }
    const out = result.geometry.clone();
    out.applyMatrix4(result.matrixWorld);
    out.computeVertexNormals();
    return out;
  } catch (err) {
    console.warn('CSG subtract failed for fastener head:', err);
    return baseGeo;
  }
}

function buildFastenerGeometry(body) {
  const spec = getFastenerSpec(body.size);
  if (!spec) return null;
  const length  = body.length || (spec.d * 4);
  const headType = body.headType || 'hex';
  const fit = body.fit || 'tight';
  const clearance = FASTENER_FIT_CLEARANCE[fit] || 0;
  const pitch = spec.p;
  const rMajor = (spec.d / 2) + clearance;
  const rMinor = Math.max(0.4, (spec.d / 2) - 0.5413 * pitch + clearance * 0.4);
  const rHex = spec.af / Math.sqrt(3);
  const rCap = spec.d * 0.85;
  const rRound = spec.d * 0.95;
  const rFlat = spec.d * 0.95;
  const rShaft = spec.d / 2;

  const parts = [];
  // Threaded shaft — single closed-manifold mesh built by hand so CSG can
  // subtract it cleanly to produce a real threaded hole.
  const threadedGeo = buildThreadedShaftGeo(rMinor, rMajor, pitch, length);
  parts.push(threadedGeo);

  // Build the head as its own geometry (so we can CSG-subtract recesses
  // without affecting the threads).
  let headGeo = null;
  if (headType === 'hex') {
    const headH = spec.d * 0.65;
    headGeo = new THREE.CylinderGeometry(rHex, rHex, headH, 6);
    headGeo.rotateY(Math.PI / 6);
    headGeo.translate(0, length + headH / 2, 0);
  } else if (headType === 'phillips') {
    const headH = spec.d * 0.65;
    headGeo = new THREE.CylinderGeometry(rRound, rRound, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
    // Cross slot via CSG.subtract — two crossed boxes recessed into top
    const slotW = rRound * 1.6, slotT = rRound * 0.20;
    const slotD = headH * 0.45;
    const slotY = length + headH - slotD / 2 + 0.02;
    const s1 = new THREE.BoxGeometry(slotW, slotD, slotT); s1.translate(0, slotY, 0);
    const s2 = new THREE.BoxGeometry(slotT, slotD, slotW); s2.translate(0, slotY, 0);
    headGeo = _csgSubtractGeo(headGeo, [s1, s2]);
  } else if (headType === 'cap') {
    const headH = spec.d;
    headGeo = new THREE.CylinderGeometry(rCap, rCap, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
    // Hex socket via CSG.subtract — recessed hexagonal hole on top
    const socketR = rCap * 0.55;
    const socketH = headH * 0.55;
    const socket = new THREE.CylinderGeometry(socketR, socketR, socketH, 6);
    socket.rotateY(Math.PI / 6);
    socket.translate(0, length + headH - socketH / 2 + 0.02, 0);
    headGeo = _csgSubtractGeo(headGeo, [socket]);
  } else if (headType === 'flat') {
    const headH = spec.d * 0.55;
    headGeo = new THREE.CylinderGeometry(rFlat, rShaft, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
    // Phillips cross via CSG.subtract — flat heads are typically Phillips
    const slotW = rFlat * 1.5, slotT = rFlat * 0.18;
    const slotD = headH * 0.5;
    const slotY = length + headH - slotD / 2 + 0.02;
    const s1 = new THREE.BoxGeometry(slotW, slotD, slotT); s1.translate(0, slotY, 0);
    const s2 = new THREE.BoxGeometry(slotT, slotD, slotW); s2.translate(0, slotY, 0);
    headGeo = _csgSubtractGeo(headGeo, [s1, s2]);
  }
  if (headGeo) parts.push(headGeo);

  const merged = _mergeBufferGeometries(parts);
  // Required for raycaster picking — without these the bolt mesh's bounding
  // sphere is undefined and click events miss.
  merged.computeBoundingBox();
  merged.computeBoundingSphere();
  return merged;
}

// CSG mesh helper — for fasteners, build a clean threaded mesh with the
// fit clearance baked into the shaft radii so the cut hole is correctly
// sized (slightly oversized for FDM print tolerances). For other bodies,
// the visual mesh IS already CSG-friendly.
function buildFastenerCSGMesh(body) {
  const spec = getFastenerSpec(body.size);
  if (!spec) return body.mesh || null;
  const length  = body.length || (spec.d * 4);
  const headType = body.headType || 'hex';
  const fit = body.fit || 'tight';
  const clearance = FASTENER_FIT_CLEARANCE[fit] || 0;
  const pitch = spec.p;
  const rMajor = (spec.d / 2) + clearance;
  const rMinor = Math.max(0.4, (spec.d / 2) - 0.5413 * pitch + clearance * 0.4);
  const rHex   = spec.af / Math.sqrt(3) + clearance;
  const rCap   = spec.d * 0.85 + clearance;
  const rRound = spec.d * 0.95 + clearance;
  const rFlat  = spec.d * 0.95 + clearance;

  const parts = [];
  // Smooth-cylinder envelope at the major-clearance radius. The helical
  // mesh — even at low density + welded — confuses CSG once a body already
  // has a helical cut: the second subtract was returning the input
  // basically unchanged, so the previous hole disappeared and the new one
  // never got cut. Visible threads on the hole INTERIOR are restored
  // separately via a non-CSG thread-shell body inserted by
  // processThreadMarks; the CSG engine itself only ever sees plain
  // cylinders, so compound cuts on the same body stay reliable.
  const SHAFT_SEG = 32;
  const threadedGeo = new THREE.CylinderGeometry(rMajor, rMajor, length, SHAFT_SEG);
  threadedGeo.translate(0, length / 2, 0);
  parts.push(threadedGeo);
  let headGeo = null;
  if (headType === 'hex') {
    const headH = spec.d * 0.65;
    headGeo = new THREE.CylinderGeometry(rHex, rHex, headH, 6);
    headGeo.rotateY(Math.PI / 6);
    headGeo.translate(0, length + headH / 2, 0);
  } else if (headType === 'phillips') {
    const headH = spec.d * 0.65;
    headGeo = new THREE.CylinderGeometry(rRound, rRound, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
  } else if (headType === 'cap') {
    const headH = spec.d;
    headGeo = new THREE.CylinderGeometry(rCap, rCap, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
  } else if (headType === 'flat') {
    const headH = spec.d * 0.55;
    headGeo = new THREE.CylinderGeometry(rFlat, spec.d / 2 + clearance, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
  }
  if (headGeo) parts.push(headGeo);
  const merged = _mergeBufferGeometries(parts);
  merged.computeBoundingBox();
  merged.computeBoundingSphere();
  const mesh = new THREE.Mesh(merged, new THREE.MeshBasicMaterial());
  // Source of truth = body fields, not body.mesh — the mesh may not exist yet
  // for a body freshly pushed into doc.bodies (e.g. a thread-mark hole being
  // CSG-subtracted before the render pass has had a chance to instantiate it).
  if (body.mesh) {
    mesh.position.copy(body.mesh.position);
    mesh.rotation.copy(body.mesh.rotation);
    mesh.scale.copy(body.mesh.scale);
  } else {
    mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    const r = body.rotation || { x: 0, y: 0, z: 0 };
    mesh.rotation.set(
      THREE.MathUtils.degToRad(r.x || 0),
      THREE.MathUtils.degToRad(r.y || 0),
      THREE.MathUtils.degToRad(r.z || 0)
    );
  }
  mesh.updateMatrixWorld(true);
  return mesh;
}

// Merge one thread shell's triangles into the given body's geometry,
// using the spec stored on the body. Returns true on success. Body must
// already have a valid BufferGeometry — this only ADDS the shell, it
// does not produce the underlying cut hole.
function _mergeOneShellInto(body, spec) {
  if (!body || !(body.geometry instanceof THREE.BufferGeometry)) return false;
  const tempShellBody = {
    type: 'threadShell',
    size: spec.size,
    length: spec.length,
    fit: spec.fit,
    x: spec.x, y: spec.y, z: spec.z,
    rotation: spec.rotation,
  };
  const tempMesh = buildBodyMesh(tempShellBody);
  if (!tempMesh) return false;
  tempMesh.updateMatrixWorld(true);
  const shellGeo = tempMesh.geometry.clone();
  shellGeo.applyMatrix4(tempMesh.matrixWorld);
  const prevGeo = body.geometry;
  body.geometry = _mergeBufferGeometries([body.geometry, shellGeo]);
  body.geometry.computeVertexNormals();
  // Critical: keep body.mesh.geometry in lockstep with body.geometry.
  // The next CSG operation (next thread cut in the same batch, a later
  // bevel, etc.) goes through getCSGMesh → _cleanedCSGInputMesh which
  // reads body.mesh.geometry. Without this re-sync that's the PRE-merge
  // reference, so the new boolean uses a stale input and silently drops
  // every shell merged since the last viewer.rebuildBodies pass — exactly
  // why only the last of N batch marks showed threads.
  if (body.mesh) {
    body.mesh.geometry = body.geometry;
    if (prevGeo && prevGeo !== body.geometry) prevGeo.dispose();
  }
  tempMesh.geometry.dispose();
  return true;
}

// Re-apply every stored shell spec onto a body whose geometry was just
// reassigned by a CSG rebuild. Called from rebuildGroupGeometry and
// _ensureGroupGeometry so editing the source sketch (or ungrouping)
// doesn't silently strip the helical thread visual the user added.
function _remergeStoredShells(body) {
  if (!body || !Array.isArray(body._mergedShells) || !body._mergedShells.length) return;
  for (const spec of body._mergedShells) _mergeOneShellInto(body, spec);
}

// Will rendering this body produce ANYTHING visible? Catches the cases
// _ensureGroupGeometry calls 'success' but actually returns a degenerate
// result — empty geometry, zero-volume bounding sphere, NaN positions.
// Returns { ok, reason }. Used as a sanity gate after a CSG rebuild.
function _isBodyRenderable(body) {
  if (body.hidden) return { ok: true, reason: 'hidden' };
  if (body.type === 'group' || body.type === 'combined') {
    if (!(body.geometry instanceof THREE.BufferGeometry)) {
      return { ok: false, reason: 'no BufferGeometry on the group' };
    }
    const pos = body.geometry.attributes?.position;
    if (!pos || pos.count === 0) {
      return { ok: false, reason: 'geometry has zero positions' };
    }
    // NaN check — CSG can produce NaN-laced output that has positions but
    // doesn't render. Sample the first triangle's vertices.
    const a = pos.array;
    for (let i = 0; i < Math.min(9, a.length); i++) {
      if (!isFinite(a[i])) return { ok: false, reason: 'geometry contains NaN positions' };
    }
    // Bounding sphere with finite, non-zero radius means the geometry
    // actually occupies space.
    body.geometry.computeBoundingSphere();
    const bs = body.geometry.boundingSphere;
    if (!bs || !isFinite(bs.radius) || bs.radius < 1e-4) {
      return { ok: false, reason: 'bounding sphere is degenerate (radius=' + (bs?.radius) + ')' };
    }
    return { ok: true, reason: 'renderable' };
  }
  // For non-group bodies the build path is parametric (sketch, primitive
  // dims) so we trust buildBodyMesh; a non-null mesh means renderable.
  return { ok: true, reason: 'parametric' };
}

// Re-derive a group / combined body's baked BufferGeometry from its
// children. Used on ungroup when the save dropped intermediate-level
// geometries to keep the doc size bounded. Recursively walks: nested
// group children get rebuilt first so when we run CSG at THIS level
// every child mesh is renderable. Primitives just rebuild via the
// normal buildBodyMesh path. Returns true on success, false if CSG
// is unavailable or the children list is empty.
//
// NOTE: this can't recover thread-shell triangle merges (those were
// concatenated into the parent's geometry, not added as a child).
// Ungrouping a body that had merged shells will return the cuts but
// not the helical thread visualisation — the user can re-thread if
// they need the visual back. Live with this for now; the alternative
// is keeping every level's geometry in the save, which is what was
// blowing out the file size in the first place.
function _ensureGroupGeometry(body) {
  if (body.geometry instanceof THREE.BufferGeometry) return true;
  if (body.type !== 'group' && body.type !== 'combined') return false;
  if (typeof CSG === 'undefined') return false;
  if (!Array.isArray(body.children) || !body.children.length) return false;
  // Recurse first so every nested group has geometry before we touch CSG.
  for (const c of body.children) {
    if ((c.type === 'group' || c.type === 'combined') &&
        !(c.geometry instanceof THREE.BufferGeometry)) {
      _ensureGroupGeometry(c);
    }
  }
  const meshes = body.children.map(c => ({ child: c, mesh: buildBodyMesh(c) }))
                              .filter(m => m.mesh);
  if (!meshes.length) return false;
  const positives = meshes.filter(m => m.child.op !== 'subtract').map(m => m.mesh);
  const negatives = meshes.filter(m => m.child.op === 'subtract').map(m => m.mesh);
  if (!positives.length) return false;
  try {
    viewer && viewer.scene && viewer.scene.updateMatrixWorld(true);
    let result = positives[0]; positives[0].updateMatrixWorld(true);
    for (let i = 1; i < positives.length; i++) {
      positives[i].updateMatrixWorld(true);
      result = CSG.union(result, positives[i]);
    }
    for (const n of negatives) {
      n.updateMatrixWorld(true);
      result = CSG.subtract(result, n);
    }
    result.updateMatrixWorld(true);
    const geo = result.geometry.clone();
    geo.applyMatrix4(result.matrixWorld);
    geo.computeVertexNormals();
    body.geometry = geo;
    // Re-merge stored thread shells onto the freshly-baked geometry so
    // ungroup of a threaded body keeps the helical thread visual.
    _remergeStoredShells(body);
    return true;
  } catch (err) {
    console.warn('_ensureGroupGeometry CSG rebuild failed:', err);
    return false;
  }
}

function getCSGMesh(body) {
  if (body.type === 'fastener') return buildFastenerCSGMesh(body);
  // CSG groups carry baked-in geometry from a previous boolean. That output
  // tends to have welded-but-not-quite-coincident vertices around cut seams
  // and the occasional zero-area triangle, both of which destabilise the
  // BSP tree on the NEXT subtract — that's what kept blowing the body apart
  // when a second thread mark was placed on an already-cut bracket.
  // Hand CSG a cleaned-up clone so each round starts from manifold-ish input.
  if (body.type === 'group' || body.type === 'combined') {
    return _cleanedCSGInputMesh(body);
  }
  return body.mesh;
}

// Build a Mesh whose geometry is a welded + degenerate-stripped clone of the
// body's baked CSG geometry. The original body.mesh stays untouched (it's
// what the user sees in the viewport); this is purely a transient input for
// the boolean engine. The cleaned mesh inherits the source mesh's world
// transform so positioning still works.
function _cleanedCSGInputMesh(body) {
  if (!body.mesh?.geometry) return body.mesh;
  const src = body.mesh.geometry;
  // Weld coincident vertices first. 0.005 mm is well below any printable
  // feature size; CSG output drift across union/subtract seams sits in
  // that range, so welding collapses it without erasing real corners.
  let cleaned = weldGeometryForEdges(src, 0.005);
  // Drop triangles whose 3 vertices are too close to colinear / coincident
  // to form a non-degenerate face. CSG.js's BSP build divides by triangle
  // area; degenerates cause NaN normals and the wedge-spray artifacts.
  cleaned = _stripDegenerateTriangles(cleaned, 1e-6);
  cleaned.computeVertexNormals();
  const mesh = new THREE.Mesh(cleaned, new THREE.MeshBasicMaterial());
  mesh.position.copy(body.mesh.position);
  mesh.rotation.copy(body.mesh.rotation);
  mesh.scale.copy(body.mesh.scale);
  mesh.updateMatrixWorld(true);
  return mesh;
}

// Drop triangles whose 2× signed area is below epsAreaMm² (these are the
// degenerate slivers a boolean engine spits out around cut boundaries).
function _stripDegenerateTriangles(geo, epsArea) {
  const pos = geo.attributes.position;
  const idx = geo.index;
  if (!pos || !idx) return geo;
  const a = idx.array;
  const v = pos.array;
  const keep = [];
  const ax = new THREE.Vector3(), bx = new THREE.Vector3(), cx = new THREE.Vector3();
  const e1 = new THREE.Vector3(), e2 = new THREE.Vector3(), cr = new THREE.Vector3();
  for (let i = 0; i < a.length; i += 3) {
    const ia = a[i] * 3, ib = a[i + 1] * 3, ic = a[i + 2] * 3;
    ax.set(v[ia],     v[ia + 1], v[ia + 2]);
    bx.set(v[ib],     v[ib + 1], v[ib + 2]);
    cx.set(v[ic],     v[ic + 1], v[ic + 2]);
    e1.subVectors(bx, ax);
    e2.subVectors(cx, ax);
    cr.crossVectors(e1, e2);
    // |cross| = 2 × triangle area
    if (cr.lengthSq() < epsArea) continue;
    keep.push(a[i], a[i + 1], a[i + 2]);
  }
  if (keep.length === a.length) return geo; // nothing to strip
  const out = new THREE.BufferGeometry();
  out.setAttribute('position', pos);
  out.setIndex(new THREE.BufferAttribute(new Uint32Array(keep), 1));
  return out;
}

function build2DProfilePoints(kind, r) {
  const raw = [];
  if (kind === 'hexagon' || kind === 'pentagon' || kind === 'octagon') {
    const N = kind === 'hexagon' ? 6 : kind === 'pentagon' ? 5 : 8;
    // Pentagon points up; hex/oct have a flat side at the bottom
    const phase = (kind === 'pentagon') ? Math.PI / 2 : Math.PI / 2 + Math.PI / N;
    for (let i = 0; i < N; i++) {
      const t = phase + (i * 2 * Math.PI) / N;
      raw.push({ x: Math.cos(t), y: Math.sin(t) });
    }
  } else if (kind === 'star') {
    // 5-point star — alternating outer and inner vertices
    const N = 5;
    const inner = 0.42;
    const phase = Math.PI / 2; // tip up
    for (let i = 0; i < N * 2; i++) {
      const t = phase + (i * Math.PI) / N;
      const rr = (i % 2 === 0) ? 1 : inner;
      raw.push({ x: Math.cos(t) * rr, y: Math.sin(t) * rr });
    }
  } else if (kind === 'heart') {
    // Classic parametric heart curve.  x = 16 sin³t,  y = 13 cos t − 5 cos 2t − 2 cos 3t − cos 4t
    const N = 80;
    for (let i = 0; i < N; i++) {
      const t = 2 * Math.PI - (i / N) * 2 * Math.PI; // CCW
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
      raw.push({ x, y });
    }
  } else if (kind === 'teardrop') {
    // Round bottom, pointed tip at top. Tangent lines from the tip onto a
    // circle give the smooth body, then the two tangents meet at the tip.
    const rb = 0.55, cx0 = 0, cy0 = -0.10;
    const tip = { x: 0, y: 1 };
    const dx = tip.x - cx0, dy = tip.y - cy0;
    const D = Math.hypot(dx, dy);
    const phi = Math.atan2(dy, dx);
    const alpha = Math.acos(rb / D);
    const tA = phi + alpha;
    let aStart = phi - alpha;
    let aEnd = tA;
    if (aEnd > aStart) aEnd -= 2 * Math.PI;
    const N = 60;
    for (let i = 0; i <= N; i++) {
      const a = aStart + (i / N) * (aEnd - aStart);
      raw.push({ x: cx0 + Math.cos(a) * rb, y: cy0 + Math.sin(a) * rb });
    }
    raw.push({ x: tip.x, y: tip.y });
  }
  if (!raw.length) return [];
  // Normalize: center on origin, then scale each axis independently so the
  // shape's bbox is exactly [-r, r] × [-r, r]. This matches the "rectangle"
  // metaphor — the axis values map directly to the bbox, not a circumscribed
  // circle.
  let minX = +Infinity, maxX = -Infinity, minY = +Infinity, maxY = -Infinity;
  for (const p of raw) {
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.y > maxY) maxY = p.y;
  }
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const sx = (maxX - minX) > 1e-9 ? (2 * r) / (maxX - minX) : 1;
  const sy = (maxY - minY) > 1e-9 ? (2 * r) / (maxY - minY) : 1;
  return raw.map(p => ({ x: (p.x - cx) * sx, y: (p.y - cy) * sy }));
}

// THREE.Shape version — used by buildBodyMesh's ExtrudeGeometry.
function build2DProfileShape(kind, r) {
  const pts = build2DProfilePoints(kind, r);
  if (!pts.length) return null;
  const shape = new THREE.Shape();
  shape.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) shape.lineTo(pts[i].x, pts[i].y);
  shape.closePath();
  return shape;
}

function addPrimitive(kind) {
  pushUndo();
  // Default size lands on a clean number in the active unit AND fits the
  // default grid spacing: 1.00 in (25.4 mm) when units = inches, 25 mm in mm mode.
  const u = doc.units === 'in' ? 25.4 : 25;
  const r = u / 2;
  let body = null;
  if (kind === 'cube')          body = { id: doc.nextBodyId++, type: 'cube',     w: u, h: u, d: u };
  // Sphere uses w/h/d so the user can stretch it into an oval (ellipsoid).
  else if (kind === 'sphere')   body = { id: doc.nextBodyId++, type: 'sphere',   w: u, h: u, d: u };
  else if (kind === 'cylinder') body = { id: doc.nextBodyId++, type: 'cylinder', w: u, h: u, d: u };
  else if (kind === 'cone')     body = { id: doc.nextBodyId++, type: 'cone',     w: u, h: u, d: u };
  else if (kind === 'torus')    body = { id: doc.nextBodyId++, type: 'torus',    w: u, h: u * 0.26, d: u };
  else if (kind === 'pyramid')  body = { id: doc.nextBodyId++, type: 'pyramid',  w: u, h: u, d: u };
  // N-sided polygon prisms (hex/pent/oct) and profile-extruded fancy shapes
  // (star/heart/teardrop) all use the cube-style {w, h, d} schema so the
  // student can stretch each axis independently — same as a rectangle.
  else if (kind === 'hexagon')  body = { id: doc.nextBodyId++, type: 'hexagon',  w: u, h: u, d: u };
  else if (kind === 'pentagon') body = { id: doc.nextBodyId++, type: 'pentagon', w: u, h: u, d: u };
  else if (kind === 'octagon')  body = { id: doc.nextBodyId++, type: 'octagon',  w: u, h: u, d: u };
  else if (kind === 'star')     body = { id: doc.nextBodyId++, type: 'star',     w: u, h: u * 0.5, d: u };
  else if (kind === 'heart')    body = { id: doc.nextBodyId++, type: 'heart',    w: u, h: u * 0.5, d: u };
  else if (kind === 'teardrop') body = { id: doc.nextBodyId++, type: 'teardrop', w: u, h: u * 0.5, d: u };
  if (!body) return;
  body.x = body.y = body.z = 0;
  body.op = 'add';
  doc.bodies.push(body);
  doc.selection = { kind: 'body', id: body.id };
  viewer.rebuildBodies();
  renderTree();
  renderProps();
  setStatus(`Added ${kind}`);
}

// Add a threaded fastener with the chosen head type, size, length, and fit.
// fit ∈ 'tight' (= matched bolt, no clearance), 'normal' (+0.1mm radial),
// 'loose' (+0.25mm radial) — used when the fastener is grouped as a negative
// to subtract a printable threaded hole.
function addFastener(headType, size, length, fit) {
  pushUndo();
  const spec = getFastenerSpec(size);
  const len = (typeof length === 'number' && length > 0) ? length : (spec.d * 4);
  const body = {
    id: doc.nextBodyId++,
    type: 'fastener',
    headType: headType || 'hex',
    size: spec.key,
    length: len,
    fit: fit || 'tight',
    x: 0, y: 0, z: 0,
    op: 'add',
  };
  doc.bodies.push(body);
  doc.selection = { kind: 'body', id: body.id };
  viewer.rebuildBodies();
  renderTree();
  renderProps();
  setStatus(`Added ${spec.label} ${FASTENER_HEAD_LABELS[body.headType]} (${fmtUL(len)})`);
}

// Open the fastener picker dialog — head type, size, length, fit all at once.
// Convert every Thread mark in the active sketch into:
//   (a) a real threaded hole (negative headless fastener, auto-grouped with
//       the sketch's source body so CSG actually carves the helix), and
//   (b) optionally a positive matching bolt at the same location so the
//       student can see what the hole accepts.
// The mark itself is left in the sketch as a reference. Re-running on a
// sketch that's already been processed is a no-op for the mark (idempotent
// — bodies are recreated each time, so undo the call if you don't like the
// result).
// Per-mark dialog — triggered when the user clicks a Thread mark in
// 3D. Configures and immediately materialises just that one mark, leaving
// other marks untouched so each can be a different thread size.
// Re-clicking an already-materialised mark offers delete-and-replace
// instead of stacking new CSG ops at the same spot (which produced the
// "deterioration" the user reported when fiddling with settings).
function openThreadedHoleForMark(sketchId, markId) {
  const sketch = doc.sketches.find(s => s.id === sketchId);
  if (!sketch) return;
  const mark = (sketch.entities || []).find(e => e.id === markId && e.type === 'threadMark');
  if (!mark) return;

  // Pre-fill from the mark's existing settings if it's already materialised,
  // otherwise use sensible defaults. One dialog handles both create + edit.
  const isEdit = !!mark._materialised;
  const prev = mark._settings || {};
  const defDepthUnits = doc.units === 'in' ? 0.5 : 12;
  const curSize     = prev.size     || 'M5';
  const curDepthUL  = (typeof prev.depth === 'number') ? toUnit(prev.depth) : defDepthUnits;
  const curFit      = prev.fit      || 'loose';
  const curHead     = prev.boltHead || 'hex';
  const curPlaceBolt = (prev.placeBolt !== undefined) ? !!prev.placeBolt : true;

  const u = unitLabel();
  const sizeOpts = FASTENER_SPECS.map(s =>
    `<option value="${s.key}"${s.key === curSize ? ' selected' : ''}>${s.label} · pitch ${s.p.toFixed(2)} mm (${s.system})</option>`
  ).join('');
  // Head type options for the visualizer bolt only. The hole itself is always
  // headless (cutting a head into the body wouldn't make a usable threaded hole).
  const headOpts = ['hex', 'phillips', 'cap', 'flat'].map(k =>
    `<option value="${k}"${k === curHead ? ' selected' : ''}>${FASTENER_HEAD_LABELS[k]}</option>`
  ).join('');
  const fitOpts = [
    ['tight',  'Tight — actual size'],
    ['normal', 'Normal — +0.1 mm clearance'],
    ['loose',  'Loose — +0.25 mm clearance (FDM-friendly)'],
  ].map(([k, label]) => `<option value="${k}"${k === curFit ? ' selected' : ''}>${label}</option>`).join('');

  openModal({
    title: isEdit ? 'Adjust threaded hole' : 'Threaded hole at this mark',
    body: `<p>${isEdit
              ? 'Change any setting and Save to rebuild this hole. The old hole + bolt are removed first so the body returns to its previous state, then re-cut with the new settings.'
              : `Configure thread size and depth for this mark. Other marks in <b>${sketch.name || 'this sketch'}</b> stay untouched.`}</p>
           <div class="field" style="margin-top:8px">
             <label>Thread size</label>
             <select id="th1-size">${sizeOpts}</select>
           </div>
           <div class="field">
             <label>Depth (${u})</label>
             <input id="th1-depth" type="number" value="${curDepthUL}" min="0.1" step="0.5"/>
           </div>
           <div class="field">
             <label>Fit</label>
             <select id="th1-fit">${fitOpts}</select>
           </div>
           <label class="field" style="margin-top:6px">
             <input type="checkbox" id="th1-bolt"${curPlaceBolt ? ' checked' : ''}/>
             <span>Show matching visualizer bolt</span>
           </label>
           <div class="field" id="th1-head-row">
             <label>Bolt head type</label>
             <select id="th1-head">${headOpts}</select>
             <p style="color:var(--ink-soft);font-size:11px;margin:4px 0 0">Only affects the visualizer bolt — the hole itself stays headless.</p>
           </div>`,
    confirmText: isEdit ? 'Save changes' : undefined,
    onConfirm: () => {
      const size = $('th1-size').value;
      const depthVal = parseFloat($('th1-depth').value);
      const depth = depthVal > 0 ? fromUnit(depthVal) : 0;
      const fit = $('th1-fit').value || 'loose';
      const placeBolt = $('th1-bolt').checked;
      const boltHead = $('th1-head').value || 'hex';
      if (depth <= 0) { showHint('Depth must be positive.'); return; }
      // Edit path: peel the previous hole/bolt before re-running so we don't
      // stack another CSG cut on the body (that was the "deterioration" bug).
      if (mark._materialised) deleteMaterialisedThreadMark(mark);
      processThreadMarks(sketch, [mark], { size, depth, fit, placeBolt, boltHead });
    },
  });
  // Wire the visualizer-bolt checkbox to grey out the head-type row when off,
  // so the UI makes clear that head only matters when the bolt is visible.
  setTimeout(() => {
    const cb = $('th1-bolt'); const headRow = $('th1-head-row');
    if (!cb || !headRow) return;
    const sync = () => { headRow.style.opacity = cb.checked ? '1' : '0.4'; $('th1-head').disabled = !cb.checked; };
    cb.addEventListener('change', sync);
    sync();
  }, 0);
}

// Wipe the bodies created by an earlier processThreadMarks call for
// this single mark. The hole was auto-grouped into the parent body
// (consumed by CSG) so we can't surgically remove just the hole — we
// undo back to the snapshot taken before processing. That's what
// pushUndo was for. Easiest reliable path: trigger one undo step.
// Walk every top-level group's children tree, find the cloned hole that
// matches mark._holeBodyId, and splice it out. Also null the geometry of
// EVERY group on the path from the top-level body down to (and including)
// the group that held the hole — so the next _ensureGroupGeometry pass
// regenerates the chain via CSG without the cut. Returns the top-level
// body whose tree was modified, or null if no match.
//
// NOTE: bevel ops on this body that happened AFTER the thread cut don't
// have children-tracked parameters; rebuilding the chain via CSG will
// silently lose them. Documented at the dialog level.
// Walk every nested level of a body and clear out _mergedShells. When the
// CSG rebuild path (_remergeStoredShells) runs after a Remove threads it
// reads these per-body lists; stale entries from previous thread cycles
// at deep nest levels then get re-merged as hollow helical tubes inside
// the rebuilt geometry. Clearing them all up-front makes the rebuild
// produce a clean solid.
function _clearAllMergedShellsRecursive(body) {
  if (!body) return;
  if (Array.isArray(body._mergedShells)) body._mergedShells = [];
  if (Array.isArray(body.children)) {
    for (const c of body.children) _clearAllMergedShellsRecursive(c);
  }
}

// Walk every nested level of a body and remove any 'headless fastener' /
// op=subtract child — those are thread-cutter cylinders left behind by
// older threading cycles whose marks don't track them with _holeBodyId
// anymore. Recursive belt-and-braces during Remove threads so old
// remnants don't survive the rebuild as visible voids.
function _stripStaleThreadCuttersRecursive(group) {
  if (!Array.isArray(group.children)) return false;
  let touched = false;
  for (let i = group.children.length - 1; i >= 0; i--) {
    const c = group.children[i];
    if (c.type === 'fastener' && c.headType === 'none' && c.op === 'subtract') {
      group.children.splice(i, 1);
      touched = true;
      continue;
    }
    if ((c.type === 'group' || c.type === 'combined') && _stripStaleThreadCuttersRecursive(c)) {
      touched = true;
    }
  }
  if (touched) group.geometry = null;
  return touched;
}

function _stripMarkHoleFromTree(mark) {
  if (mark._holeBodyId == null) return null;
  const visit = (group) => {
    if (!Array.isArray(group.children)) return false;
    for (let i = 0; i < group.children.length; i++) {
      const c = group.children[i];
      if (c.id === mark._holeBodyId) {
        group.children.splice(i, 1);
        group.geometry = null;
        return true;
      }
      if ((c.type === 'group' || c.type === 'combined') && visit(c)) {
        group.geometry = null;
        return true;
      }
    }
    return false;
  };
  for (const b of doc.bodies) {
    if ((b.type === 'group' || b.type === 'combined') && visit(b)) return b;
  }
  return null;
}

function deleteMaterialisedThreadMark(mark, opts = {}) {
  // Drop the visualizer bolt + standalone thread shell. mark._boltBodyId
  // is sometimes stale across sessions (older brackets created before the
  // _threadMarkRef tagging didn't record it). Fall back to a sweep across
  // doc.bodies looking for any fastener whose _threadMarkRef points at
  // this mark — that catches the bolts the user still sees on screen even
  // when the bookkeeping id is missing.
  const drop = new Set([mark._boltBodyId, mark._threadShellBodyId].filter(Boolean));
  for (const b of doc.bodies) {
    if (b.type === 'fastener' && b._threadMarkRef && b._threadMarkRef.markId === mark.id) {
      drop.add(b.id);
    }
    if (b.type === 'threadShell' && b._threadMarkRef && b._threadMarkRef.markId === mark.id) {
      drop.add(b.id);
    }
  }
  if (drop.size) doc.bodies = doc.bodies.filter(b => !drop.has(b.id));
  // Remove this mark's entry from the parent's _mergedShells so a future
  // rebuild re-merges only the shells for marks that are still active.
  if (mark._mergedShellInBodyId != null) {
    const parent = doc.bodies.find(b => b.id === mark._mergedShellInBodyId);
    if (parent && Array.isArray(parent._mergedShells)) {
      parent._mergedShells = parent._mergedShells.filter(s => s.markId !== mark.id);
    }
  }
  // The actual hole CUT on the parent's geometry is NOT peeled here.
  // The previous design called undo() to pop the CSG cut off, but undo
  // pops whatever's on top of the stack — if the user did ANY edit
  // between threading and rebuild (move, autosave, anything), undo
  // restores unrelated state and the bracket disappears. Re-threading
  // a mark at the same settings is idempotent (CSG-subtracting the same
  // cylinder leaves the same hole); going LARGER envelops the old cut;
  // going SMALLER leaves the old hole visible. Documented trade-off,
  // not a vanishing-body bug.
  delete mark._materialised;
  delete mark._boltBodyId;
  delete mark._holeBodyId;
  delete mark._threadShellBodyId;
  delete mark._mergedShellInBodyId;
  delete mark._settings;
  // Caller can opt out of mid-flight rendering during batch operations
  // (Remove threads runs N of these in a row before the geometries get
  // re-derived; rendering between iterations tries to draw groups whose
  // _stripMarkHoleFromTree just nulled the geometry on, and three.js
  // throws 'cannot read isBufferGeometry of null' before we ever reach
  // the rebuild step).
  if (opts.skipRender) return;
  if (viewer) viewer.rebuildBodies();
  if (viewer) viewer.updateSketchOverlay();
  renderTree(); renderProps();
}

function openThreadedHolesDialog() {
  if (doc.mode !== '3d') {
    showHint('Switch to 3D first, then click Thd Holes.');
    return;
  }
  const sketch = doc.sketches.find(s => s.id === doc.activeSketchId);
  if (!sketch) { showHint('Open a sketch with Thread marks first.'); return; }
  const allMarks = (sketch.entities || []).filter(e => e.type === 'threadMark');
  if (!allMarks.length) {
    showHint('Place Thread marks in the sketch (Thread tool in 2D) before running this.');
    return;
  }
  const freshMarks = allMarks.filter(m => !m._materialised);
  const doneMarks  = allMarks.filter(m =>  m._materialised);
  if (!freshMarks.length && doneMarks.length) {
    // All marks done — single, clear action: strip the cuts off the body
    // so the student can adjust mark positions in 2D (or just re-run with
    // different size/depth) and re-thread fresh. The two-option dialog we
    // had before was confusing the workflow more than it helped.
    openModal({
      title: 'Remove existing threads?',
      body: `<p>All ${doneMarks.length} mark${doneMarks.length === 1 ? '' : 's'} in <b>${sketch.name || 'this sketch'}</b> already have threaded holes.</p>
             <p>This will:</p>
             <ul style="margin:6px 0 6px 20px;padding:0;color:var(--ink-soft);font-size:13px">
               <li>Strip the thread holes back off the body.</li>
               <li>Remove every visualizer bolt placed by the thread tool.</li>
               <li>Reset each mark in the sketch so you can re-thread fresh.</li>
             </ul>
             <p>Then:</p>
             <ul style="margin:6px 0 6px 20px;padding:0;color:var(--ink-soft);font-size:13px">
               <li>Switch to 2D if you want to move or delete the mark positions.</li>
               <li>Click <b>Thd Holes</b> again to re-cut with new size / depth / fit / head.</li>
             </ul>
             <p style="color:var(--ink-soft);font-size:12px;margin-top:8px">
               Note: if you've added bevels (rounded / chamfered edges) since the threads went in, those bevels will be lost — the original shape comes back without them. Re-apply bevels after re-threading if you need them.
             </p>`,
      confirmText: 'Remove threads & rebuild',
      onConfirm: () => {
        // Snapshot BEFORE any mutation. If the rebuild path can't
        // reproduce a renderable body, we restore this so the bracket
        // never disappears on the user, even when CSG fails.
        const preOpSnapshot = snapshotDoc();
        pushUndo();
        const touchedRoots = new Set();
        const strippedRootIds = new Set();
        for (const m of doneMarks) {
          const root = _stripMarkHoleFromTree(m);
          if (root) { touchedRoots.add(root); strippedRootIds.add(root.id); }
          // skipRender — we'll do ONE rebuild at the end. Without this,
          // every iteration tries to render bodies whose group geometry
          // is currently null (just stripped, not yet re-derived) and
          // three.js throws on isBufferGeometry of null.
          deleteMaterialisedThreadMark(m, { skipRender: true });
        }
        // Belt-and-braces sweep across every top-level body for stale
        // headless-fastener cutters from older thread cycles whose
        // _holeBodyId bookkeeping is gone, AND wipe _mergedShells at
        // every nested level so the rebuild doesn't re-add the helical
        // thread tubes as floating fragments inside the solid.
        for (const b of doc.bodies) {
          if ((b.type !== 'group' && b.type !== 'combined') || !Array.isArray(b.children)) continue;
          if (_stripStaleThreadCuttersRecursive(b)) touchedRoots.add(b);
          _clearAllMergedShellsRecursive(b);
        }
        // Belt-and-braces bolt sweep: catch any leftover thread-mark
        // visualizer. Three layers of matching so an older bracket
        // whose bookkeeping is partial still gets fully cleaned:
        //   (1) per-mark _boltBodyId (cleared in deleteMaterialisedThreadMark)
        //   (2) _threadMarkRef tag pointing at any mark in this sketch
        //   (3) POSITION match — any fastener / threadShell within ~30 mm
        //       of a mark's expected shaft position. Catches the visualizer
        //       bolts on brackets created before _threadMarkRef tagging.
        const sketchMarkIds = new Set((sketch.entities || [])
          .filter(e => e.type === 'threadMark')
          .map(e => e.id));
        // Compute expected world positions for every mark in this sketch
        // (the markWorld point itself — fasteners typically sit within
        // depth of this; 30 mm is generous enough to catch them at any
        // realistic depth without flagging manual fasteners across the
        // bracket).
        const POS_MATCH_MM = 30;
        const markPositions = [];
        if (sketch.plane && typeof makePlaneMatrix === 'function') {
          const planeM = makePlaneMatrix(sketch.plane);
          for (const e of (sketch.entities || [])) {
            if (e.type !== 'threadMark') continue;
            markPositions.push(new THREE.Vector3(e.cx, e.cy, 0).applyMatrix4(planeM));
          }
        }
        const nearAnyMark = (b) => {
          if (typeof b.x !== 'number') return false;
          const p = new THREE.Vector3(b.x, b.y, b.z);
          for (const mp of markPositions) {
            if (p.distanceTo(mp) < POS_MATCH_MM) return true;
          }
          return false;
        };
        doc.bodies = doc.bodies.filter(b => {
          const isVisualType = (b.type === 'fastener' || b.type === 'threadShell');
          if (!isVisualType) return true;
          if (b._threadMarkRef && sketchMarkIds.has(b._threadMarkRef.markId)) return false;
          if (nearAnyMark(b)) return false;
          return true;
        });
        // Re-derive geometry for every top-level body whose tree was
        // modified. _ensureGroupGeometry walks bottom-up and rebuilds
        // each chain link that we nulled.
        let rebuildFailed = false;
        const failedIds = [];
        for (const root of touchedRoots) {
          let ok = false;
          try { ok = _ensureGroupGeometry(root); }
          catch (err) {
            console.error(`Remove threads: _ensureGroupGeometry threw on body id=${root.id}:`, err);
          }
          const renderable = _isBodyRenderable(root);
          if (!ok || !renderable.ok) {
            rebuildFailed = true;
            failedIds.push(root.id);
            console.error(`Remove threads: rebuild failed for body id=${root.id} — ensureOk=${ok}, ${renderable.reason}`);
          }
        }
        if (rebuildFailed) {
          // Safety net: bring the bracket back. Better to fail loudly
          // with the body intact than silently leave the user staring
          // at a blank canvas.
          applySnapshot(preOpSnapshot);
          if (viewer) viewer.rebuildBodies();
          renderTree(); renderProps();
          showHint(`Couldn't rebuild the body without the threads (id ${failedIds.join(', ')}). The bracket has been restored to exactly how it was before. If you've added bevels since threading, try undoing those first, then remove threads, then re-bevel.`);
          setStatus('⚠ Thread removal aborted — bracket restored. See console for details.');
          return;
        }
        if (viewer) viewer.rebuildBodies();
        renderTree(); renderProps();
        flushAutosave();
        setStatus(`Removed thread cuts from ${doneMarks.length} mark${doneMarks.length === 1 ? '' : 's'}. Marks are still in the sketch — click Thd Holes again to re-cut with new settings.`);
      },
    });
    return;
  }
  // Default settings come from the LAST materialised mark if there is one,
  // so a batch on a sketch that already has some threads pre-fills with
  // matching values instead of the dialog's static M5 / loose defaults.
  const seed = doneMarks[doneMarks.length - 1]?._settings || {};
  const u = unitLabel();
  const defDepthUL = (typeof seed.depth === 'number') ? toUnit(seed.depth) : (doc.units === 'in' ? 0.5 : 12);
  const curSize  = seed.size     || 'M5';
  const curFit   = seed.fit      || 'loose';
  const curHead  = seed.boltHead || 'hex';
  const curBolt  = (seed.placeBolt !== undefined) ? !!seed.placeBolt : true;
  const sizeOpts = FASTENER_SPECS.map(s =>
    `<option value="${s.key}"${s.key === curSize ? ' selected' : ''}>${s.label} · pitch ${s.p.toFixed(2)} mm (${s.system})</option>`
  ).join('');
  const headOpts = ['hex', 'phillips', 'cap', 'flat'].map(k =>
    `<option value="${k}"${k === curHead ? ' selected' : ''}>${FASTENER_HEAD_LABELS[k]}</option>`
  ).join('');
  const fitOpts = [
    ['tight',  'Tight — actual size'],
    ['normal', 'Normal — +0.1 mm clearance'],
    ['loose',  'Loose — +0.25 mm clearance (FDM-friendly)'],
  ].map(([k, label]) => `<option value="${k}"${k === curFit ? ' selected' : ''}>${label}</option>`).join('');
  const titleCount = freshMarks.length;
  const doneNote = doneMarks.length
    ? `<p style="color:var(--ink-soft);font-size:12px;margin-top:0">Skipping ${doneMarks.length} already-threaded mark${doneMarks.length === 1 ? '' : 's'} (click an existing mark in 3D to adjust it individually).</p>`
    : '';
  openModal({
    title: `Threaded holes (${titleCount} new mark${titleCount === 1 ? '' : 's'})`,
    body: `<p>For each fresh mark in <b>${sketch.name || 'this sketch'}</b>, cut a threaded hole and place a matching visualizer bolt. All ${titleCount} get the same settings — adjust individual marks later by clicking each one in 3D.</p>
           ${doneNote}
           <div class="field" style="margin-top:8px">
             <label>Thread size</label>
             <select id="th-size">${sizeOpts}</select>
           </div>
           <div class="field">
             <label>Depth (${u})</label>
             <input id="th-depth" type="number" value="${defDepthUL}" min="0.1" step="0.5"/>
           </div>
           <div class="field">
             <label>Fit</label>
             <select id="th-fit">${fitOpts}</select>
           </div>
           <label class="field" style="margin-top:6px">
             <input type="checkbox" id="th-bolt"${curBolt ? ' checked' : ''}/>
             <span>Place a matching visualizer bolt at each mark</span>
           </label>
           <div class="field" id="th-head-row">
             <label>Bolt head type</label>
             <select id="th-head">${headOpts}</select>
             <p style="color:var(--ink-soft);font-size:11px;margin:4px 0 0">Only affects the visualizer bolts — the holes themselves are always headless.</p>
           </div>
           <div class="hint">The hole's axis is the sketch plane's normal. Each bolt sits with head flush on the sketch plane, shaft pointing into the body.</div>`,
    confirmText: `Cut ${titleCount} hole${titleCount === 1 ? '' : 's'}`,
    onConfirm: () => {
      const size = $('th-size').value;
      const depthVal = parseFloat($('th-depth').value);
      const depth = depthVal > 0 ? fromUnit(depthVal) : 0;
      const fit = $('th-fit').value || 'loose';
      const placeBolt = $('th-bolt').checked;
      const boltHead = $('th-head').value || 'hex';
      if (depth <= 0) { showHint('Depth must be positive.'); return; }
      processThreadMarks(sketch, freshMarks, { size, depth, fit, placeBolt, boltHead });
    },
  });
  setTimeout(() => {
    const cb = $('th-bolt'); const headRow = $('th-head-row');
    if (!cb || !headRow) return;
    const sync = () => { headRow.style.opacity = cb.checked ? '1' : '0.4'; $('th-head').disabled = !cb.checked; };
    cb.addEventListener('change', sync);
    sync();
  }, 0);
}

function processThreadMarks(sketch, marks, opts) {
  pushUndo();
  const planeM = makePlaneMatrix(sketch.plane);
  const n = new THREE.Vector3(...sketch.plane.n).normalize();
  // The hole goes INTO the body — opposite to the plane normal.
  const holeAxis = n.clone().negate();
  // Hole origin (where the fastener's shaft bottom sits = y=0 in fastener
  // local) is at depth below the sketch plane along holeAxis.
  // Fastener is modelled with shaft bottom at y=0 and head on top, so its
  // local +Y direction is from tip → head. We want +Y to point along +n
  // (out of the body) and bottom-of-shaft to be at (mark world position) +
  // holeAxis × depth.
  const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), n);
  const euler = new THREE.Euler().setFromQuaternion(q, 'XYZ');
  const rotDeg = {
    x: THREE.MathUtils.radToDeg(euler.x),
    y: THREE.MathUtils.radToDeg(euler.y),
    z: THREE.MathUtils.radToDeg(euler.z),
  };
  const hasParent = !!sketch.sourceBodyId;
  const newSelection = [];
  // Track auto-group outcomes so we can surface partial failures clearly
  // — previously CSG failures were silent inside groupSelected and the
  // user just saw orphan headless cutters piling up in the tree.
  let groupedOk = 0;
  let groupedFail = 0;
  for (const m of marks) {
    const markWorld = new THREE.Vector3(m.cx, m.cy, 0).applyMatrix4(planeM);
    // The shaft bottom (local y=0) needs to be at markWorld + holeAxis * depth.
    // Mesh origin = shaft bottom, so body.x/y/z = that point.
    const shaftBottom = markWorld.clone().add(holeAxis.clone().multiplyScalar(opts.depth));
    // Headless negative — the actual cut tool. Length = depth so the
    // thread fully occupies the hole.
    const hole = {
      id: doc.nextBodyId++,
      type: 'fastener',
      headType: 'none',
      size: opts.size,
      length: opts.depth,
      fit: opts.fit,
      x: shaftBottom.x, y: shaftBottom.y, z: shaftBottom.z,
      rotation: { ...rotDeg },
      op: 'subtract',
    };
    doc.bodies.push(hole);
    m._holeBodyId = hole.id; // bookkeeping for "already materialised" check
    // Re-resolve the parent body each iteration — earlier auto-groups
    // consume the previous parent and produce a new group whose id is
    // now stored on sketch.sourceBodyId (groupSelected updates that for
    // us). Without this lookup, the second mark would try to group with
    // a dead body id.
    const parentNow = sketch.sourceBodyId
      ? doc.bodies.find(b => b.id === sketch.sourceBodyId)
      : null;
    if (parentNow && typeof CSG !== 'undefined') {
      doc.multiSelectedBodies = [parentNow.id, hole.id];
      groupSelected(true);
      // groupSelected silently returns early when CSG throws — the hole
      // body then remains in doc.bodies as a leftover negative. Detect
      // that here so we can warn AND skip the shell-merge step (no
      // parent geometry was actually updated, merging triangles onto
      // the old bracket geometry would just paste a floating thread
      // sleeve into the scene).
      if (doc.bodies.some(b => b.id === hole.id)) {
        groupedFail++;
        console.warn(`Thread mark auto-group failed (CSG) at mark cx=${m.cx.toFixed(3)}, cy=${m.cy.toFixed(3)} — hole id=${hole.id} stayed as a standalone negative.`);
      } else {
        groupedOk++;
      }
    } else if (hasParent && parentNow == null) {
      groupedFail++;
      console.warn(`Thread mark could not find parent body id=${sketch.sourceBodyId} (the previous group consumed it but sourceBodyId wasn't repointed).`);
    }
    // Thread shell visualisation. The shell is a hollow sleeve with a
    // helical thread profile on its inner surface — sits inside the cleanly-
    // cut cylindrical hole so the user sees the spiraling thread pattern
    // when looking down through the opening. We MERGE the shell's triangles
    // directly into the parent group's geometry instead of registering a
    // separate body: it shouldn't be a tree row the user can lose track of
    // or move independently, and it doesn't go through CSG so this is just
    // a triangle-list concatenation — cheap, no boolean engine involved,
    // can't blow up the body.
    const parentAfterCut = sketch.sourceBodyId
      ? doc.bodies.find(b => b.id === sketch.sourceBodyId)
      : null;
    if (parentAfterCut && parentAfterCut.geometry) {
      const shellSpec = {
        size: opts.size,
        length: opts.depth,
        fit: opts.fit,
        x: shaftBottom.x, y: shaftBottom.y, z: shaftBottom.z,
        rotation: { ...rotDeg },
      };
      const ok = _mergeOneShellInto(parentAfterCut, shellSpec);
      if (ok) {
        // Persist the spec so any later CSG rebuild (rebuildGroupGeometry
        // off a face-sketch Done, _ensureGroupGeometry on ungroup, an undo
        // restore) can re-merge the shells onto the freshly-baked
        // geometry. Tag the spec with markId so a single-mark peel can
        // remove only that mark's shell entry instead of nuking the
        // whole list.
        parentAfterCut._mergedShells = parentAfterCut._mergedShells || [];
        parentAfterCut._mergedShells.push({ ...shellSpec, markId: m.id });
        m._mergedShellInBodyId = parentAfterCut.id;
      }
    } else {
      // No parent body (the sketch is freestanding) — fall back to a
      // standalone shell body so the user still gets a thread visual.
      const shell = {
        id: doc.nextBodyId++,
        type: 'threadShell',
        size: opts.size,
        length: opts.depth,
        fit: opts.fit,
        x: shaftBottom.x, y: shaftBottom.y, z: shaftBottom.z,
        rotation: { ...rotDeg },
        op: 'add',
        _threadMarkRef: { sketchId: sketch.id, markId: m.id },
      };
      doc.bodies.push(shell);
      m._threadShellBodyId = shell.id;
    }
    if (opts.placeBolt) {
      // Matching bolt: head bottom flush on sketch plane at the mark, shaft
      // points into the body along holeAxis = same orientation as the hole
      // but with a real head (hex by default). Length matches depth.
      const spec = getFastenerSpec(opts.size);
      const shaftLen = opts.depth;
      // Bolt body origin (shaft bottom) should land at shaftBottom too.
      const bolt = {
        id: doc.nextBodyId++,
        type: 'fastener',
        headType: opts.boltHead || 'hex',
        size: opts.size,
        length: shaftLen,
        fit: 'tight',
        x: shaftBottom.x, y: shaftBottom.y, z: shaftBottom.z,
        rotation: { ...rotDeg },
        op: 'add',
        // Tagged so the tree can label it as a thread-mark companion and
        // so a tree-eye toggle on the bolt can sync mark._settings.placeBolt.
        _threadMarkRef: { sketchId: sketch.id, markId: m.id },
      };
      doc.bodies.push(bolt);
      m._boltBodyId = bolt.id; // bookkeeping for "already materialised" check
      newSelection.push(bolt.id);
    }
    m._materialised = true;
    // Persist the chosen settings on the mark so re-opening the dialog
    // pre-fills with what's actually there (not the defaults).
    m._settings = {
      size: opts.size,
      depth: opts.depth,
      fit: opts.fit,
      placeBolt: !!opts.placeBolt,
      boltHead: opts.boltHead || 'hex',
    };
  }
  // After the loop, the active group (if any) IS the new parent. Select
  // it so undo/visual feedback land on the visible body.
  if (hasParent) {
    const finalGroup = doc.bodies.find(b => b.id === sketch.sourceBodyId);
    if (finalGroup) {
      doc.selection = { kind: 'body', id: finalGroup.id };
      doc.multiSelectedBodies = [finalGroup.id, ...newSelection];
    }
  }
  viewer.rebuildBodies();
  renderTree(); renderProps();
  let summary;
  if (!hasParent) {
    summary = `Built ${marks.length} threaded hole${marks.length === 1 ? '' : 's'}${opts.placeBolt ? ' + visualizer bolts' : ''} — drop them as Negative inside a body and group to cut`;
  } else if (groupedFail === 0) {
    summary = `Built ${marks.length} threaded hole${marks.length === 1 ? '' : 's'}${opts.placeBolt ? ' + visualizer bolts' : ''} (auto-grouped)`;
  } else {
    summary = `Built ${marks.length} marks — ${groupedOk} auto-grouped, ${groupedFail} couldn't (CSG failed; orphan negatives left in tree, see console). Try smaller depth/fit or simpler body.`;
    console.warn(`Thread-mark batch: ${groupedFail} of ${marks.length} cuts did not auto-group. The body's existing CSG output is likely too noisy for another subtract — undo, simplify (fewer prior bevels / cuts), and retry.`);
  }
  setStatus(summary);
  flushAutosave();
}

function openFastenerDialog() {

  const sizeOpts = FASTENER_SPECS.map(s =>
    `<option value="${s.key}"${s.key === 'M5' ? ' selected' : ''}>${s.label} · pitch ${s.p.toFixed(2)} mm (${s.system})</option>`
  ).join('');
  const headOpts = FASTENER_HEAD_TYPES.map(t =>
    `<label class="fastener-head-opt">
       <input type="radio" name="fastener-head" value="${t}"${t === 'hex' ? ' checked' : ''}/>
       ${FASTENER_HEAD_LABELS[t]}
     </label>`
  ).join('');
  const defLen = doc.units === 'in' ? 1 : 25;
  openModal({
    title: 'Add a threaded fastener',
    body: `<p>Pick a head type, thread size, length, and fit. Use <b>Loose</b> when you plan to group it as a negative to cut a printable threaded hole.</p>
           <h4 style="margin-top:12px">Head type</h4>
           <div id="fastener-head-grid">${headOpts}</div>
           <div class="field" style="margin-top:10px">
             <label>Thread size</label>
             <select id="fastener-size">${sizeOpts}</select>
           </div>
           <div class="field">
             <label>Length (${u})</label>
             <input id="fastener-length" type="number" value="${defLen}" min="0.1" step="0.5"/>
           </div>
           <div class="field">
             <label>Fit</label>
             <select id="fastener-fit">
               <option value="tight" selected>Tight — actual bolt size</option>
               <option value="normal">Normal — +0.1 mm clearance for printed holes</option>
               <option value="loose">Loose — +0.25 mm clearance for FDM printed holes</option>
             </select>
           </div>
           <div class="hint">Tip: drop a Loose fastener inside a body, set its <b>Operation</b> to Negative, then Group → printable threaded hole.</div>`,
    onConfirm: () => {
      const head = document.querySelector('input[name="fastener-head"]:checked')?.value || 'hex';
      const size = $('fastener-size').value;

}

// Insert a closed-polyline pre-made shape (hexagon, pentagon, octagon, star,
// heart, teardrop) into the active sketch, centered on the visible origin.
// Sized to match grid spacing so swapping with the rect/circle defaults feels
// natural. Used by the 2D toolbar's shape-2d dropdown.
function insert2DShape(kind) {
  if (!doc.sketch || doc.mode !== '2d') {
    showHint('Open a sketch first (or click + Sketch) to insert a 2D shape.');
    return;
  }
  pushUndo();
  const u = doc.units === 'in' ? 25.4 : 25;
  const r = u / 2;
  const ptsLocal = build2DProfilePoints(kind, r);
  if (!ptsLocal.length) return;
  // Place at the sketch view's current center (so it lands on-screen even
  // when the user has panned away from the origin).
  let cx = 0, cy = 0;
  if (sketchEng && sketchEng.svg) {
    const rect = sketchEng.svg.getBoundingClientRect();
    if (rect.width > 10 && rect.height > 10) {
      const c = sketchEng.screenToWorld(rect.width / 2, rect.height / 2);
      cx = c[0];
      cy = c[1];
    }
  }
  const points = ptsLocal.map(p => ({ x: p.x + cx, y: p.y + cy }));
  const ent = {
    id: doc.sketch.nextId++,
    type: 'polyline',
    points,
    closed: true,
  };
  doc.sketch.entities.push(ent);
  doc.selection = { kind: 'sketch', id: ent.id };
  doc.multiSelectedSketch = [ent.id];
  if (sketchEng) sketchEng.render();
  renderTree();
  renderProps();
  if (viewer) viewer.updateSketchOverlay();
  setStatus(`Added ${kind} to sketch`);
}

// Pan and zoom the 2D sketch view so the projected body silhouette is centered
// and fills ~60% of the canvas. Used when entering a sketch — esp. Sketch on Face.
function fitSketchViewToBodies() {
  if (!sketchEng) return;
  // Only fit the view to projected body silhouettes when this sketch is
  // pinned to a body (Sketch-on-Face). A free sketch shouldn't show body
  // outlines, so don't try to center on them either.
  if (!doc.bodies.length || !doc.sketch?.plane || !doc.sketch.sourceBodyId) {
    // Center on origin at default zoom
    sketchEng.view.panX = 0;
    sketchEng.view.panY = 0;
    sketchEng.view.pxPerMm = 4;
    sketchEng.render();
    return;
  }
  const segs = projectBodiesOntoPlane(doc.sketch.plane);
  if (!segs.length) { sketchEng.render(); return; }

  let minX = +Infinity, minY = +Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const s of segs) {
    minX = Math.min(minX, s.p1.x, s.p2.x);
    minY = Math.min(minY, s.p1.y, s.p2.y);
    maxX = Math.max(maxX, s.p1.x, s.p2.x);
    maxY = Math.max(maxY, s.p1.y, s.p2.y);
  }
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const bw = Math.max(maxX - minX, 0.001);
  const bh = Math.max(maxY - minY, 0.001);

  const rect = sketchEng.svg.getBoundingClientRect();
  if (rect.width < 10 || rect.height < 10) { sketchEng.render(); return; }
  const fillFraction = 0.65;
  const zoomX = (rect.width * fillFraction) / bw;
  const zoomY = (rect.height * fillFraction) / bh;
  sketchEng.view.pxPerMm = clamp(Math.min(zoomX, zoomY), 0.5, 80);
  // Pan so the body's projected center sits at canvas center
  sketchEng.view.panX = -cx * sketchEng.view.pxPerMm;
  sketchEng.view.panY = cy * sketchEng.view.pxPerMm; // SVG y is flipped vs sketch y
  $('zoom-display').textContent = Math.round(sketchEng.view.pxPerMm * 25) + '%';
  sketchEng.render();
}

// Create a new sketch on the given plane and switch to 2D editing it.
// Project a body's bbox onto a sketch plane and return the bounding rectangle
// in sketch (u, v) coordinates — used as the implicit face boundary for v2
// region subdivision.
function computeFaceBoundary(bbox, plane, body) {
  const o = new THREE.Vector3(...plane.origin);
  const u = new THREE.Vector3(...plane.u);
  const v = new THREE.Vector3(...plane.v);
  // If the body is a GROUP (sphere with cuts auto-merged, etc.), recursively
  // hunt down the largest positive curved child and use its silhouette as the
  // boundary — otherwise we'd fall through to the bbox-rect fallback and lose
  // the curved outline. Handles nested groups (group containing a group).
  if (body && body.type === 'group' && Array.isArray(body.children)) {
    const score = (c) => (c.r || 0) + (c.tube || 0) + (c.w || 0) / 2 + (c.h || 0) / 2;
    const findCurvedDeep = (kids, accumOffset) => {
      let best = null, bestScore = -1, bestOffset = null;
      for (const child of kids) {
        if (child.op === 'subtract') continue;
        const off = {
          x: accumOffset.x + (child.x || 0),
          y: accumOffset.y + (child.y || 0),
          z: accumOffset.z + (child.z || 0),
        };
        if (child.type === 'sphere' || child.type === 'torus') {
          const s = score(child);
          if (s > bestScore) { best = child; bestScore = s; bestOffset = off; }
        } else if (child.type === 'group' && Array.isArray(child.children)) {
          const nested = findCurvedDeep(child.children, off);
          if (nested && score(nested.child) > bestScore) {
            best = nested.child;
            bestScore = score(nested.child);
            bestOffset = nested.offset;
          }
        }
      }
      return best ? { child: best, offset: bestOffset } : null;
    };
    const found = findCurvedDeep(body.children, {
      x: body.x || 0, y: body.y || 0, z: body.z || 0,
    });
    if (found) {
      const primary = found.child;
      const off = found.offset;
      const ghost = JSON.parse(JSON.stringify(primary));
      const halfH = (primary.h || 0) / 2;
      ghost.mesh = { position: new THREE.Vector3(off.x, halfH + off.y, off.z) };
      const r = Math.max(primary.w || 0, primary.h || 0, primary.d || 0) / 2 || 1;
      const c = ghost.mesh.position;
      const childBbox = new THREE.Box3(
        new THREE.Vector3(c.x - r, c.y - r, c.z - r),
        new THREE.Vector3(c.x + r, c.y + r, c.z + r),
      );
      return computeFaceBoundary(childBbox, plane, ghost);
    }
  }
  // For spheres / torus the orthogonal silhouette on an axis-aligned plane is
  // an ellipse (or circle when the body is uniform). Use the body's w/h/d to
  // compute semi-axes against the plane's u and v vectors.
  if (body && (body.type === 'sphere' || body.type === 'torus')) {
    const cWorld = (body.mesh && body.mesh.position)
      ? body.mesh.position.clone()
      : new THREE.Vector3(body.x || 0, ((body.h || 0) / 2) + (body.y || 0), body.z || 0);
    const local = cWorld.clone().sub(o);
    const halfW = (body.w || 0) / 2;
    const halfH = (body.h || 0) / 2;
    const halfD = (body.d || 0) / 2;
    const rx = Math.abs(u.x) * halfW + Math.abs(u.y) * halfH + Math.abs(u.z) * halfD;
    const ry = Math.abs(v.x) * halfW + Math.abs(v.y) * halfH + Math.abs(v.z) * halfD;
    if (Math.abs(rx - ry) < 1e-3) {
      return { type: 'circle', cx: local.dot(u), cy: local.dot(v), r: rx };
    }
    return { type: 'ellipse', cx: local.dot(u), cy: local.dot(v), rx, ry };
  }
  const corners = [
    new THREE.Vector3(bbox.min.x, bbox.min.y, bbox.min.z),
    new THREE.Vector3(bbox.max.x, bbox.min.y, bbox.min.z),
    new THREE.Vector3(bbox.min.x, bbox.max.y, bbox.min.z),
    new THREE.Vector3(bbox.max.x, bbox.max.y, bbox.min.z),
    new THREE.Vector3(bbox.min.x, bbox.min.y, bbox.max.z),
    new THREE.Vector3(bbox.max.x, bbox.min.y, bbox.max.z),
    new THREE.Vector3(bbox.min.x, bbox.max.y, bbox.max.z),
    new THREE.Vector3(bbox.max.x, bbox.max.y, bbox.max.z),
  ];
  let umin = Infinity, umax = -Infinity, vmin = Infinity, vmax = -Infinity;
  for (const c of corners) {
    const local = c.clone().sub(o);
    const us = local.dot(u);
    const vs = local.dot(v);
    if (us < umin) umin = us; if (us > umax) umax = us;
    if (vs < vmin) vmin = vs; if (vs > vmax) vmax = vs;
  }
  if (umax - umin < 0.01 || vmax - vmin < 0.01) return null;
  return { type: 'rect', x: umin, y: vmin, w: umax - umin, h: vmax - vmin };
}

function createSketchOnPlane(plane, opts = {}) {
  pushUndo();
  const id = doc.nextSketchId++;
  const name = plane.kind === 'face' ? `Face Sketch ${id}` : `${plane.name || 'Sketch'} ${id}`;
  const sk = { id, plane, entities: [], nextId: 1, name };
  if (opts.boundary)     sk.boundary     = opts.boundary;
  if (opts.sourceBodyId) sk.sourceBodyId = opts.sourceBodyId;
  doc.sketches.push(sk);
  doc.activeSketchId = id;
  doc.selection = null;
  doc.multiSelectedSketch = [];
  setMode('2d');
  // Fit view to the projected bodies — defer 2 frames so the SVG layout is
  // finalized after display:block flips on. Single frame isn't always enough.
  requestAnimationFrame(() => requestAnimationFrame(fitSketchViewToBodies));
  renderTree();
  renderProps();
  setStatus(`Sketching on ${name} — draw a profile, then switch back to 3D and Extrude or Combine.`);
}

// True if the picked face point sits on a smoothly curved surface — sphere
// or torus everywhere, cylinder/cone lateral wall (not the flat caps).
// On a tessellated curve, every triangle's normal points slightly differently
// from its neighbors, so using that normal for a sketch plane gives a
// perceptibly slanted plane. We detect these and route to a flat reference plane.
function isFaceOnCurvedSurface(body, hit) {
  if (!body || !hit) return false;
  if (body.type === 'sphere' || body.type === 'torus') return true;
  if (body.type === 'cylinder' || body.type === 'cone') {
    // The flat caps have a normal aligned with world ±Y. Anything else is
    // a side triangle on the curved lateral wall.
    const nLocal = hit.face.normal.clone();
    const nWorld = nLocal.transformDirection(hit.object.matrixWorld).normalize();
    return Math.abs(nWorld.y) < 0.95;
  }
  // Cube fillet: when the radius is large enough, lateral edges become
  // smoothly curved. Picking a triangle on that round corner is also bad.
  if (body.type === 'cube' && body.filletRadius > 0) {
    const nLocal = hit.face.normal.clone();
    const nWorld = nLocal.transformDirection(hit.object.matrixWorld).normalize();
    // A flat face on a cube has a normal aligned with one cardinal axis.
    const axes = [Math.abs(nWorld.x), Math.abs(nWorld.y), Math.abs(nWorld.z)];
    const maxA = Math.max(...axes);
    return maxA < 0.97; // not aligned → on a rounded corner
  }
  // Group bodies (sphere with cuts, etc.) — if any positive child is curved,
  // the merged surface is curved too. Recurse into nested groups so a
  // sphere-with-tunnel that gets cut a SECOND time (creating a group
  // containing a group) still triggers the plane chooser.
  if (body.type === 'group' && Array.isArray(body.children)) {
    const walk = (kids) => {
      for (const child of kids) {
        if (child.op === 'subtract') continue;
        if (child.type === 'sphere' || child.type === 'torus') return true;
        if (child.type === 'cylinder' || child.type === 'cone') return true;
        if (child.type === 'group' && Array.isArray(child.children)) {
          if (walk(child.children)) return true;
        }
      }
      return false;
    };
    if (walk(body.children)) return true;
  }
  return false;
}

// When the user tries to "Sketch on Face" of a sphere/cone/cylinder lateral
// surface, we don't have a sensible flat plane. Pop a chooser so they pick
// one of the three principal reference planes — and remember the body so its
// silhouette becomes the implicit boundary on the new sketch.
// Build a sketch plane tangent to one of the 6 faces of a body's bbox
// (axis ∈ 'x'|'y'|'z', sign ∈ +1|-1). Used by the bbox-face picker that
// replaced the old Top/Front/Right modal so students can sketch on any side.
function finishCurvedBodySketchOnSide(body, axis, sign) {
  if (!body || !body.mesh) return;
  const bbox = new THREE.Box3().setFromObject(body.mesh);
  if (bbox.isEmpty()) return;
  const center = bbox.getCenter(new THREE.Vector3());
  const FUDGE = 0.05;
  let plane;
  // For each side: origin sits at the bbox extreme along the axis (slightly
  // outside via FUDGE), normal points outward, and (u, v) form a sensible
  // 2D frame. v always points "up" in the sketch view when possible.
  if (axis === 'y' && sign === +1) plane = {
    origin: [center.x, bbox.max.y + FUDGE, center.z],
    u: [1, 0, 0], v: [0, 0, -1], n: [0, 1, 0],
    kind: 'reference', name: 'Top (+Y)',
  };
  else if (axis === 'y' && sign === -1) plane = {
    origin: [center.x, bbox.min.y - FUDGE, center.z],
    u: [1, 0, 0], v: [0, 0, 1], n: [0, -1, 0],
    kind: 'reference', name: 'Bottom (−Y)',
  };
  else if (axis === 'z' && sign === +1) plane = {
    origin: [center.x, center.y, bbox.max.z + FUDGE],
    u: [1, 0, 0], v: [0, 1, 0], n: [0, 0, 1],
    kind: 'reference', name: 'Front (+Z)',
  };
  else if (axis === 'z' && sign === -1) plane = {
    origin: [center.x, center.y, bbox.min.z - FUDGE],
    u: [-1, 0, 0], v: [0, 1, 0], n: [0, 0, -1],
    kind: 'reference', name: 'Back (−Z)',
  };
  else if (axis === 'x' && sign === +1) plane = {
    origin: [bbox.max.x + FUDGE, center.y, center.z],
    u: [0, 0, -1], v: [0, 1, 0], n: [1, 0, 0],
    kind: 'reference', name: 'Right (+X)',
  };
  else plane = {
    origin: [bbox.min.x - FUDGE, center.y, center.z],
    u: [0, 0, 1], v: [0, 1, 0], n: [-1, 0, 0],
    kind: 'reference', name: 'Left (−X)',
  };
  const boundary = computeFaceBoundary(bbox, plane, body);
  createSketchOnPlane(plane, { boundary, sourceBodyId: body.id });
}

// Enter "pick a face" mode in 3D
function startSketchOnFace() {
  if (!doc.bodies.length) {
    showHint('Add a 3D body first, then sketch on its face.');

  if (doc.mode !== '3d') setMode('3d');
