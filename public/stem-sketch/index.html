  // and the user sees their stale-but-correct shape instead of a blank.
  const firstPosMesh = meshOf(positives[0]);
  if (!firstPosMesh) {
    console.warn(
      `rebuildGroupGeometry: group id=${group.id} preserved its existing geometry — ` +
      `couldn't build a mesh for the first positive child (id=${positives[0]?.id}, type=${positives[0]?.type}). ` +
      `Likely the source sketch is empty or self-intersecting.`);
    return;
  }
  try {
    let result = firstPosMesh;
    for (let i = 1; i < positives.length; i++) {
      const m = meshOf(positives[i]); if (m) result = CSG.union(result, m);
    }
    for (const n of negatives) {
      const m = meshOf(n); if (m) result = CSG.subtract(result, m);
    }
    result.updateMatrixWorld(true);
    const baked = result.geometry.clone();
    baked.applyMatrix4(result.matrixWorld);
    baked.computeVertexNormals();
    // Only commit the rebuild if it produced a non-empty geometry. CSG
    // can return a Mesh whose geometry has zero positions when the inputs
    // didn't actually intersect the way the original ops needed — that
    // would render as a vanished body without this guard.
    if (baked.attributes?.position?.count > 0) {
      group.geometry = baked;
      // Re-merge any thread shells the user had merged into this body.
      // Without this the rebuild silently drops the helical thread visual
      // every time the user opens / exits a face sketch.
      _remergeStoredShells(group);
    } else {
      console.warn(`rebuildGroupGeometry: CSG produced an empty result for group id=${group.id}; keeping previous geometry.`);
    }
  } catch (err) {
    console.error(`rebuildGroupGeometry failed for group id=${group.id}:`, err);
  }
}

// After a sketch is edited (e.g. after returning to 3D), find every extrude
// body that came from this sketch — top-level OR nested inside a group's
// children — and rebuild it from the current sketch state. Bodies that were
// extruded from a specific region get their region re-detected by centroid
// match; bodies that were extruded from the whole sketch get rebuilt from
// the whole (updated) sketch. For each affected group, also re-run the CSG
// so the boolean reflects the new geometry.
function rebuildExtrudesForSketch(sketchId) {
  const sketch = doc.sketches.find(s => s.id === sketchId);
  if (!sketch) return;
  // Only top-level extrudes or extrudes that are IMMEDIATE children of a
  // top-level group are eligible. Walking the full tree + rebuilding
  // every ancestor on the chain meant clicking Done on a sketch buried
  // 4 layers deep in a bevel/thread bracket fired 4 sequential CSG
  // subtracts and locked the main thread for tens of seconds — see the
  // freeze the user reported on 2026-06-04. A deeper edit propagation
  // path needs to be async (web worker / yielding) before it's safe
  // here; for now keep Done snappy and accept that deeply-nested
  // extrude edits don't cascade.
  const dependents = []; // { body, parentGroup | null }
  for (const b of doc.bodies) {
    if (b.type === 'extrude' && b.sourceSketchId === sketchId) {
      dependents.push({ body: b, parentGroup: null });
    } else if (b.type === 'group' && Array.isArray(b.children)) {
      for (const c of b.children) {
        if (c.type === 'extrude' && c.sourceSketchId === sketchId) {
          dependents.push({ body: c, parentGroup: b });
        }
      }
    }
  }
  if (!dependents.length) return;
  const newRegions = computeSketchRegions(sketch);
  const groupsToRebuild = new Set();
  for (const { body, parentGroup } of dependents) {
    if (body.regionCentroid) {
      if (!newRegions.length) continue;
      let bestRegion = null, bestDist = Infinity;
      for (const r of newRegions) {
        const c = regionCentroidOf(r);
        if (!c) continue;
        const d = Math.hypot(c.x - body.regionCentroid.x, c.y - body.regionCentroid.y);
        if (d < bestDist) { bestDist = d; bestRegion = r; }
      }
      if (bestRegion) {
        body.sketch = regionToSyntheticSketch(bestRegion, sketch);
        body.regionCentroid = regionCentroidOf(bestRegion);
        if (parentGroup) groupsToRebuild.add(parentGroup);
      }
    } else {
      const sketchCopy = JSON.parse(JSON.stringify(sketch));
      sketchCopy.entities = (sketchCopy.entities || []).filter(e => !e.construction && e.type !== 'dimension');
      if (sketchCopy.entities.length) {
        body.sketch = sketchCopy;
        if (parentGroup) groupsToRebuild.add(parentGroup);
      }
    }
  }
  for (const g of groupsToRebuild) rebuildGroupGeometry(g);
  if (viewer) viewer.rebuildBodies();
}

// True when a single point is inside a closed entity's interior.
function pointInsideEntity(p, ent) {
  if (ent.type === 'rect') {
    return p.x >= ent.x && p.x <= ent.x + ent.w &&
           p.y >= ent.y && p.y <= ent.y + ent.h;
  }
  if (ent.type === 'circle') {
    return Math.hypot(p.x - ent.cx, p.y - ent.cy) < ent.r;
  }
  if (ent.type === 'polyline' && ent.closed && ent.points.length >= 3) {
    return pointInPolygon(p.x, p.y, ent.points);
  }
  return false;
}

// All entity vertices inside the outer entity? Cheap "fully inside" test.
function entityFullyInside(inner, outer) {
  if (inner === outer) return false;
  const pts = entityKeyPoints(inner);
  if (!pts.length) return false;
  for (const p of pts) if (!pointInsideEntity(p, outer)) return false;
  return true;
}

// Convert a closed entity into a THREE.Path (used as a hole on a Shape).
function entityToHolePath(ent) {
  if (ent.type === 'rect') {
    const p = new THREE.Path();
    p.moveTo(ent.x, ent.y);
    p.lineTo(ent.x + ent.w, ent.y);
    p.lineTo(ent.x + ent.w, ent.y + ent.h);
    p.lineTo(ent.x, ent.y + ent.h);
    p.closePath();
    return p;
  }
  if (ent.type === 'circle') {
    const p = new THREE.Path();
    p.absarc(ent.cx, ent.cy, ent.r, 0, Math.PI * 2, false);
    return p;
  }
  if (ent.type === 'polyline' && ent.closed && ent.points.length >= 3) {
    const p = new THREE.Path();
    p.moveTo(ent.points[0].x, ent.points[0].y);
    for (let i = 1; i < ent.points.length; i++) p.lineTo(ent.points[i].x, ent.points[i].y);
    p.closePath();
    return p;
  }
  return null;
}

function sketchToShape(sketch) {
  // Builds the largest closed entity as the OUTER shape, then attaches every
  // other closed entity that's fully inside it as a hole. Lets the user draw
  // an outline + holes (circles, rects, polylines) and extrude all in one go.
  if (!sketch || !sketch.entities.length) return null;
  const candidates = sketch.entities.filter(e => !e.construction);
  if (!candidates.length) return null;
  // Prefer the largest single closed entity if one exists
  let best = null, bestArea = 0;
  for (const e of candidates) {
    const a = entityArea(e);
    if (a > bestArea) { best = e; bestArea = a; }
  }
  const addHolesTo = (shape, outerEnt) => {
    for (const e of candidates) {
      if (e === outerEnt) continue;
      if (e.type !== 'rect' && e.type !== 'circle' &&
          !(e.type === 'polyline' && e.closed)) continue;
      if (!entityFullyInside(e, outerEnt)) continue;
      const hole = entityToHolePath(e);
      if (hole) shape.holes.push(hole);
    }
  };
  if (best && bestArea > 0) {
    let s = null;
    if (best.type === 'rect') {
      s = new THREE.Shape();
      s.moveTo(best.x, best.y);
      s.lineTo(best.x + best.w, best.y);
      s.lineTo(best.x + best.w, best.y + best.h);
      s.lineTo(best.x, best.y + best.h);
      s.closePath();
    } else if (best.type === 'circle') {
      s = new THREE.Shape();
      s.absarc(best.cx, best.cy, best.r, 0, Math.PI * 2, false);
    } else if (best.type === 'polyline' && best.closed && best.points.length >= 3) {
      s = new THREE.Shape();
      s.moveTo(best.points[0].x, best.points[0].y);
      for (let i = 1; i < best.points.length; i++) s.lineTo(best.points[i].x, best.points[i].y);
      s.closePath();
    }
    if (s) { addHolesTo(s, best); return s; }
  }
  // No single closed entity — try to assemble open polylines into a closed loop
  const chain = chainOpenPolylinesToClosedLoop(candidates);
  if (chain && chain.length >= 3) {
    const s = new THREE.Shape();
    s.moveTo(chain[0].x, chain[0].y);
    for (let i = 1; i < chain.length; i++) s.lineTo(chain[i].x, chain[i].y);
    s.closePath();
    // Synthesize a pseudo-entity so we can reuse the "fully inside" test for holes
    const pseudoOuter = { type: 'polyline', closed: true, points: chain };
    addHolesTo(s, pseudoOuter);
    return s;
  }
  return null;
}

// Walk through all open polylines and try to chain them end-to-end into a
// closed loop. Forgiving endpoint tolerance, extends from both head and tail
// of the working chain, and finds the closed sub-loop with the largest area.
function chainOpenPolylinesToClosedLoop(entities) {
  const segs = [];
  for (const e of entities) {
    if (e.type === 'polyline' && !e.closed && e.points.length >= 2) {
      segs.push({ pts: e.points.map(p => ({ x: p.x, y: p.y })) });
    }
  }
  if (!segs.length) return null;
  const TOL = 2.0; // mm — generous enough for free-hand endpoints
  const d = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  let bestChain = null, bestArea = 0;
  for (let seed = 0; seed < segs.length; seed++) {
    const used = new Set([seed]);
    const chain = segs[seed].pts.slice();
    let progress = true;
    while (progress) {
      progress = false;
      // Try to extend from the tail
      const tail = chain[chain.length - 1];
      for (let i = 0; i < segs.length; i++) {
        if (used.has(i)) continue;
        const sp = segs[i].pts;
        if (d(tail, sp[0]) < TOL) {
          for (let k = 1; k < sp.length; k++) chain.push(sp[k]);
          used.add(i); progress = true; break;
        }
        if (d(tail, sp[sp.length - 1]) < TOL) {
          for (let k = sp.length - 2; k >= 0; k--) chain.push(sp[k]);
          used.add(i); progress = true; break;
        }
      }
      if (progress) continue;
      // Then try to extend from the head
      const head = chain[0];
      for (let i = 0; i < segs.length; i++) {
        if (used.has(i)) continue;
        const sp = segs[i].pts;
        if (d(head, sp[sp.length - 1]) < TOL) {
          for (let k = sp.length - 2; k >= 0; k--) chain.unshift(sp[k]);
          used.add(i); progress = true; break;
        }
        if (d(head, sp[0]) < TOL) {
          for (let k = 1; k < sp.length; k++) chain.unshift(sp[k]);
          used.add(i); progress = true; break;
        }
      }
    }
    // Did this seed yield a closed loop?
    if (chain.length >= 3 && d(chain[0], chain[chain.length - 1]) < TOL) {
      const closed = chain.slice(0, -1); // drop duplicate closing vertex
      // Shoelace area to compare against other candidate loops
      let a = 0;
      for (let i = 0; i < closed.length; i++) {
        const p = closed[i], q = closed[(i + 1) % closed.length];
        a += p.x * q.y - q.x * p.y;
      }
      const area = Math.abs(a) / 2;
      if (area > bestArea) { bestChain = closed; bestArea = area; }
    }
  }
  return bestChain;
}

function entityArea(e) {
  if (e.type === 'rect') return e.w * e.h;
  if (e.type === 'circle') return Math.PI * e.r * e.r;
  if (e.type === 'polyline') {
    if (!e.closed || e.points.length < 3) return 0;
    // Shoelace
    let a = 0;
    for (let i = 0; i < e.points.length; i++) {
      const p = e.points[i], q = e.points[(i + 1) % e.points.length];
      a += p.x * q.y - q.x * p.y;
    }
    return Math.abs(a) / 2;
  }
  return 0;
}

// ---------- 4. Bridge ----------
let sketchEng, viewer;

// ==================================================================
// Undo / redo
// Snapshots the parts of doc that represent geometry: sketches, bodies, and
// the id counters. Selection / mode / units / grid are NOT undoable. Group
// bodies serialize their CSG result so undo doesn't have to re-run the boolean.
// ==================================================================
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 60;

// Encode a TypedArray's raw bytes as base64. ~10–100× faster than
// Array.from + JSON.stringify on number arrays, and ~3× smaller in JSON
// (no per-number digit/comma overhead). Chunked to avoid the apply()
// arg-count overflow on big buffers.
function _typedArrayToBase64(typedArr) {
  const u8 = new Uint8Array(typedArr.buffer, typedArr.byteOffset, typedArr.byteLength);
  let bin = '';
  const CHUNK = 0x8000;
  for (let i = 0; i < u8.length; i += CHUNK) {
    bin += String.fromCharCode.apply(null, u8.subarray(i, i + CHUNK));
  }
  return btoa(bin);
}
function _base64ToBytes(b64) {
  const bin = atob(b64);
  const u8 = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  return u8;
}
// Per-BufferGeometry serialization cache. Autosave fires every time the
// debounce window expires while editing, and re-encoding a multi-MB
// geometry to base64 takes 1-3 s on a CSG-heavy bracket — that was the
// "edits don't land for seconds" lag during 2D sketch editing. The cache
// is keyed on the BufferGeometry instance, so it only invalidates when
// the geometry is genuinely replaced (e.g. by a CSG op assigning a new
// instance to body.geometry). A WeakMap lets disposed geometries get
// garbage collected normally.
const _geomSerializationCache = new WeakMap();
function _serializeGeometry(g) {
  if (!g) return null;
  const cached = _geomSerializationCache.get(g);
  if (cached) return cached;
  // Binary format (default for fresh saves). _bin:1 lets the loader pick
  // the right path. Plain number arrays are still understood for legacy
  // designs saved before this change.
  const out = { _bin: 1, position: _typedArrayToBase64(g.attributes.position.array) };
  if (g.attributes.normal) out.normal = _typedArrayToBase64(g.attributes.normal.array);
  if (g.index) {
    out.index = _typedArrayToBase64(g.index.array);
    // Tag the integer width so the loader picks Uint16/Uint32 correctly.
    out.indexBytes = g.index.array.BYTES_PER_ELEMENT;
  }
  _geomSerializationCache.set(g, out);
  return out;
}
function _deserializeGeometry(d) {
  if (!d) return null;
  const g = new THREE.BufferGeometry();
  if (d._bin) {
    const pb = _base64ToBytes(d.position);
    const pos = new Float32Array(pb.buffer, pb.byteOffset, pb.byteLength / 4);
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    if (d.normal) {
      const nb = _base64ToBytes(d.normal);
      const nor = new Float32Array(nb.buffer, nb.byteOffset, nb.byteLength / 4);
      g.setAttribute('normal', new THREE.BufferAttribute(nor, 3));
    }
    if (d.index) {
      const ib = _base64ToBytes(d.index);
      const stride = d.indexBytes || 4;
      const Ctor = stride === 2 ? Uint16Array : Uint32Array;
      const idx = new Ctor(ib.buffer, ib.byteOffset, ib.byteLength / stride);
      g.setIndex(new THREE.BufferAttribute(idx, 1));
    }
    if (!d.normal) g.computeVertexNormals();
    return g;
  }

  if (bounds) return true;
  // INTERIOR MATCH: every segment lies inside (or on the boundary of) the
  // region. Catches entities that approximate the region with slightly
  // different sample points than the planar-arrangement nodes — without this,
  // the original sketch lines would survive the extrude and "float" in 3D.
  for (const s of segs) {
    const m = { x: (s.a.x + s.b.x) / 2, y: (s.a.y + s.b.y) / 2 };
    const aOk = onBoundary(s.a) || inside(s.a);
    const bOk = onBoundary(s.b) || inside(s.b);
    const mOk = onBoundary(m)   || inside(m);
    if (!aOk || !bOk || !mOk) return false;
  }
  return true;
}

function commitExtrudeFromGizmo(region, sketch, lengthMm, direction, opOverride) {
  if (!region || !sketch || lengthMm <= 0) return;
  pushUndo();
  const synth = regionToSyntheticSketch(region, sketch);
  // Operation is whatever the user picked on the tooltip toggle. The drag
  // direction still affects which way the extrude grows: a Cut should grow
  // INTO the body (use the direction that points toward it).
  const userOp = opOverride || getExtrudeTooltipOp();
  const op = userOp || ((direction < 0 && sketch.boundary) ? 'subtract' : 'add');
  const body = {
    id: doc.nextBodyId++, type: 'extrude',
    sketch: synth,
    plane: JSON.parse(JSON.stringify(sketch.plane)),
    height: lengthMm,
    x: 0, y: 0, z: 0,
    op,
    // Live re-extrude metadata — used by rebuildExtrudesForSketch to find
    // the same region after the user edits the source sketch and switches
    // back to 3D. Centroid match within ~5mm finds the updated region.
    sourceSketchId: sketch.id,
    regionCentroid: regionCentroidOf(region),
  };
  doc.bodies.push(body);
  doc.selection = { kind: 'body', id: body.id };
  doc.selectedRegions = [];
  // Note: source sketch entities are NOT consumed any more — keeping them
  // visible lets the user re-enter the sketch and edit the shape, with the
  // extrusion auto-rebuilding when they switch back to 3D.
  if (viewer) {
    viewer.clearExtrudePreview();
    viewer.rebuildBodies(); // also refreshes regions + extrude gizmo
    viewer.updateSketchOverlay(); // refresh 3D sketch lines
  }
  hideExtrudeTooltip();

  // Auto-group with the parent body the sketch was started on (when known).
  // This skips the manual shift-click + Group step that's a pain in dense scenes.
  const parent = sketch.sourceBodyId
    ? doc.bodies.find(b => b.id === sketch.sourceBodyId)
    : null;
  if (parent && typeof CSG !== 'undefined') {
    doc.multiSelectedBodies = [parent.id, body.id];
    groupSelected(true); // already snapshotted at the top of this function
    // Re-point the sketch at the new group so the next extrude on this
    // sketch can auto-group with the (now combined) body too.
    if (doc.selection?.kind === 'body') {
      const sk = doc.sketches.find(s => s.id === sketch.id);
      if (sk) sk.sourceBodyId = doc.selection.id;
    }
    setStatus(op === 'subtract'
      ? `Cut a region from the body (${fmtUL(lengthMm)} deep)`
      : `Added a region to the body (${fmtUL(lengthMm)} tall)`);
  } else {
    renderTree(); renderProps();
    setStatus(op === 'subtract'
      ? `Negative extrude (${fmtUL(lengthMm)}) — click Group to cut`
      : `Extruded region to ${fmtUL(lengthMm)}`);
  }
}

// Extrude tooltip input: typed length commits on Enter
(function wireExtrudeTooltipInput() {
  const ready = () => {
    const inp = document.getElementById('extrude-input');
    if (!inp) { setTimeout(ready, 50); return; }
    inp.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        const v = parseFloat(inp.value);
        if (!isFinite(v) || v <= 0) return;
        const lenMm = fromUnit(v);
        const st = viewer?.extrudeState;
        if (!st || !st.region) return;
        const dir = st.direction || 1;
        commitExtrudeFromGizmo(st.region, st.sketch, lenMm, dir);
      } else if (ev.key === 'Escape') {
        hideExtrudeTooltip();
        if (viewer) viewer.clearExtrudePreview();
      }
    });
    inp.addEventListener('input', (ev) => {
      // Live-preview while user types
      const v = parseFloat(inp.value);
      const st = viewer?.extrudeState;
      if (!st || !st.region) return;
      if (isFinite(v) && v > 0 && viewer) {
        viewer.updateExtrudePreview(fromUnit(v), st.direction || 1);
      } else if (viewer) {
        viewer.clearExtrudePreview();
      }
    });
    // Wire the Add/Cut toggle buttons. Either button switches the operation
    // and re-renders the live preview color (blue = add, red = cut).
    const tg = document.getElementById('extrude-op-toggle');
    if (tg) {
      tg.querySelectorAll('button').forEach(b => {
        b.addEventListener('mousedown', (ev) => {
          // mousedown so the Three.js canvas doesn't steal focus first
          ev.preventDefault();
          ev.stopPropagation();
          setExtrudeTooltipOp(b.dataset.op);
        });
        b.addEventListener('click', (ev) => { ev.stopPropagation(); });
      });
    }
    // Done button — commit the current length + op + direction to a body
    const doneBtn = document.getElementById('extrude-done-btn');
    if (doneBtn) {
      doneBtn.addEventListener('mousedown', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const v = parseFloat(inp.value);
        if (!isFinite(v) || v <= 0) {
          // Try the last drag length if the input is empty
          const st = viewer?.extrudeState;
          const fallback = st && st.length > 0 ? st.length : 0;
          if (fallback <= 0) return;
          const dir = st.direction || 1;
          commitExtrudeFromGizmo(st.region, st.sketch, fallback, dir);
          return;
        }
        const lenMm = fromUnit(v);
        const st = viewer?.extrudeState;
        if (!st || !st.region) return;
        commitExtrudeFromGizmo(st.region, st.sketch, lenMm, st.direction || 1);
      });
    }
    // Through — set length to "all the way through the target body" and commit
    const throughBtn = document.getElementById('extrude-through-btn');
    if (throughBtn) {
      throughBtn.addEventListener('mousedown', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const st = viewer?.extrudeState;
        if (!st || !st.region || !st.sketch) return;
        const depth = computeThroughDepth(st.sketch);
        if (!(depth > 0)) {
          showHint('Could not compute through-depth — no target body found.');
          return;
        }
        // Force op to subtract so commitExtrudeFromGizmo doesn't fall back.
        setExtrudeTooltipOp('subtract');
        commitExtrudeFromGizmo(st.region, st.sketch, depth, -1, 'subtract');
      });
    }
    // Cancel — close tooltip without creating a body
    const cancelBtn = document.getElementById('extrude-cancel-btn');
    if (cancelBtn) {
      cancelBtn.addEventListener('mousedown', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        hideExtrudeTooltip();
        if (viewer) viewer.clearExtrudePreview();
      });
    }
  };
  ready();
})();

// Offset distance input — typing locks the distance; clearing returns to
// cursor-driven distance. Enter commits and blurs; Esc clears the override.
(function wireOffsetInput() {
  const ready = () => {
    const input = document.getElementById('offset-input');
    if (!input) { setTimeout(ready, 50); return; }
    const apply = () => {
      const om = sketchEng?.offsetMode;
      if (!om) return;
      const v = parseFloat(input.value);
      if (isFinite(v) && v > 0) om.typedOverride = fromUnit(v);
      else om.typedOverride = null;
      // Recompute preview with new distance
      const cw = sketchEng.cursorWorld;
      sketchEng._updateOffsetPreview(cw.x, cw.y);
      sketchEng.render();
    };
    input.addEventListener('input', apply);
    input.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        apply(); // lock typedOverride first so preview is at typed distance
        // Place the copy right now — same logic as a canvas click.
        const om = sketchEng?.offsetMode;
        if (om?.preview) {
          pushUndo();
          const copy = JSON.parse(JSON.stringify(om.preview));
          copy.id = doc.sketch.nextId++;
          doc.sketch.entities.push(copy);
          doc.selection = { kind: 'sketch', id: copy.id };
          om.lastEnt = om.preview;
          om.preview = null;
          const cw = sketchEng.cursorWorld;
          sketchEng._updateOffsetPreview(cw.x, cw.y);
          renderTree(); renderProps(); sketchEng.render();
          setStatus('Offset copy placed — type, click, or Esc to finish.');
        }
        input.blur();
      } else if (ev.key === 'Escape') {
        ev.preventDefault();
        const om = sketchEng?.offsetMode;
        if (om) om.typedOverride = null;
        input.value = '';
        input.blur();
      }
    });
    input.addEventListener('pointerdown', (ev) => ev.stopPropagation());
    input.addEventListener('mousedown',   (ev) => ev.stopPropagation());
  };
  ready();
})();

// Shape-tooltip inputs (rect W/H or circle R) — same UX as the offset input.
// Typing locks the dimension; Enter commits the shape; Esc clears the lock.
(function wireShapeTooltipInputs() {
  const ready = () => {
    const inp1 = document.getElementById('shape-tooltip-input-1');
    const inp2 = document.getElementById('shape-tooltip-input-2');
    if (!inp1 || !inp2) { setTimeout(ready, 50); return; }
    const apply = () => {
      if (!sketchEng?.draft) return;
      const v1 = parseFloat(inp1.value);
      const v2 = parseFloat(inp2.value);
      sketchEng.typedDim1 = (isFinite(v1) && v1 > 0) ? fromUnit(v1) : null;
      sketchEng.typedDim2 = (isFinite(v2) && v2 > 0) ? fromUnit(v2) : null;
      // Recompute draft size with the new locks
      const cw = sketchEng.cursorWorld || { x: 0, y: 0 };
      const start = sketchEng.dragStart;
      if (start) {
        const dx = cw.x - start.wx, dy = cw.y - start.wy;
        if (sketchEng.draft.type === 'rect') {
          let w = dx, h = dy;
          if (sketchEng.typedDim1 != null) w = (Math.sign(w) || 1) * sketchEng.typedDim1;
          if (sketchEng.typedDim2 != null) h = (Math.sign(h) || 1) * sketchEng.typedDim2;
          sketchEng.draft.x = w >= 0 ? start.wx : start.wx + w;
          sketchEng.draft.y = h >= 0 ? start.wy : start.wy + h;
          sketchEng.draft.w = Math.abs(w);
          sketchEng.draft.h = Math.abs(h);
        } else if (sketchEng.draft.type === 'circle') {
          sketchEng.draft.r = sketchEng.typedDim1 != null
            ? sketchEng.typedDim1
            : Math.hypot(dx, dy);
        }
      }
      sketchEng.render();
    };
    const handleKey = (inp) => (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        apply();
        // Commit the shape now
        if (sketchEng?._commitShapeDraft) sketchEng._commitShapeDraft();
        inp.blur();
      } else if (ev.key === 'Escape') {
        ev.preventDefault();
        if (sketchEng) { sketchEng.typedDim1 = null; sketchEng.typedDim2 = null; }
        inp.value = '';
        inp.blur();
      } else if (ev.key === 'Tab' && inp === inp1) {
        // Tab from W to H without leaving the tooltip
        ev.preventDefault();
        inp2.focus(); inp2.select();
      }
    };
    inp1.addEventListener('input', apply);
    inp2.addEventListener('input', apply);
    inp1.addEventListener('keydown', handleKey(inp1));
    inp2.addEventListener('keydown', handleKey(inp2));
    [inp1, inp2].forEach(i => {
      i.addEventListener('pointerdown', (ev) => ev.stopPropagation());
      i.addEventListener('mousedown',   (ev) => ev.stopPropagation());
    });
  };
  ready();
})();

function extrudeCurrentSketch() {
  // If regions are picked, extrude each picked region as its own body.
  // Otherwise fall back to whole-sketch extrude (largest closed shape / chain loop).
  const picked = (doc.selectedRegions || []).slice();
  // Resolve every picked region back to its source sketch so we can build bodies
  const allRegions = [];
  for (const s of doc.sketches) {
    for (const r of computeSketchRegions(s)) allRegions.push({ region: r, sketch: s });
  }
  const regionJobs = picked
    .map(id => allRegions.find(x => x.region.id === id))
    .filter(Boolean);

  if (!regionJobs.length && !doc.sketch.entities.length) {
    showHint('Draw something in 2D first, then extrude it.');
    return;
  }
  const u = unitLabel();
  const defaultH = doc.units === 'in' ? 0.5 : 10;
  const usingRegions = regionJobs.length > 0;
  openModal({
    title: usingRegions
      ? `Extrude ${regionJobs.length} region${regionJobs.length === 1 ? '' : 's'}`
      : 'Extrude sketch',
    body: `<p>${usingRegions
             ? 'Push the picked region(s) into 3D by giving them a height.'
             : 'Push the sketch into 3D by giving it a height.'}</p>
           <div class="field"><label>Height (${u})</label><input id="ex-h" type="number" value="${defaultH}" min="0.01" step="0.5"/></div>
           <div class="field"><label>Operation</label>
             <select id="ex-op">
               <option value="add">Positive (add solid)</option>
               <option value="subtract">Negative (cut — pair with Combine)</option>
             </select>
           </div>
           <div class="hint">Tip: extrude a sketch-on-face as Negative, then click <b>Combine</b> in the toolbar to cut a hole through the body.</div>`,
    onConfirm: () => {
      const v = parseFloat(document.getElementById('ex-h').value);
      const op = document.getElementById('ex-op').value;
      if (!(v > 0)) return;
      pushUndo();
      const h = fromUnit(v);
      let lastBodyId = null;
      if (usingRegions) {
        for (const job of regionJobs) {
          const synth = regionToSyntheticSketch(job.region, job.sketch);
          const body = {
            id: doc.nextBodyId++, type: 'extrude',
            sketch: synth,
            plane: JSON.parse(JSON.stringify(job.sketch.plane)),
            height: h,
            x: 0, y: 0, z: 0,
            op,
            // Live re-extrude metadata so editing the source sketch can
            // rebuild this body on 2D→3D switch.
            sourceSketchId: job.sketch.id,
            regionCentroid: regionCentroidOf(job.region),
          };
          doc.bodies.push(body);
          lastBodyId = body.id;
          // Source entities are NOT consumed any more — keeping them in the
          // sketch lets the user re-enter and edit the shape, with the
          // extrusion auto-rebuilding via setMode('3d').
        }
        doc.selectedRegions = [];
        setStatus(op === 'subtract'
          ? `${regionJobs.length} negative extrude(s) (${fmtUL(h)}) — click Combine to cut`
          : `Extruded ${regionJobs.length} region(s) to ${fmtUL(h)}`);
      } else {
        const sketchCopy = JSON.parse(JSON.stringify(doc.sketch));
        sketchCopy.entities = sketchCopy.entities.filter(e => !e.construction);
        const body = {
          id: doc.nextBodyId++, type: 'extrude',
          sketch: sketchCopy,
          plane: JSON.parse(JSON.stringify(doc.sketch.plane)),
          height: h,
          x: 0, y: 0, z: 0,
          op,
          // Mark as belonging to this sketch so the silhouette projection
          // can suppress duplicates while the user edits the sketch.
          sourceSketchId: doc.sketch.id,
        };
        doc.bodies.push(body);
        lastBodyId = body.id;
        setStatus(op === 'subtract'
          ? `Negative extrude (${fmtUL(h)}) — click Combine to cut`
          : `Extruded sketch to ${fmtUL(h)}`);
      }
      if (lastBodyId != null) doc.selection = { kind: 'body', id: lastBodyId };
      setMode('3d');
      renderTree();
      renderProps();
    },
  });
}

// ==================================================================
// Pre-made 2D profiles — used by both the 3D primitive builder
// (extruded into a prism) and the 2D sketch shape dropdown
// (inserted as a closed polyline).
// `r` is the size budget — every profile fits inside a circle of
// radius `r` so swapping shapes feels consistent.
// ==================================================================

// Sample points for a profile of the given kind. Output is centered on origin
// and fits exactly in a square bounding box of side 2r ([-r, r] on both axes).
// Each axis is normalized independently — same metaphor as a rectangle, where
// w and d control the bbox and the shape stretches to fit. Default w=d gives
// a "natural square" version of the shape.
// Used both to build THREE.Shape (3D extrude) and to insert a closed polyline
// into a 2D sketch.
// ==================================================================
// Threaded fasteners — bolts and screws
// All dimensions stored in mm (imperial sizes pre-converted from inches).
// Head types: hex, phillips, cap (socket cap), flat (countersunk).
// ==================================================================
// d = nominal (major) diameter in mm. af = head size across-flats (hex)

];
const FASTENER_HEAD_TYPES = ['hex', 'phillips', 'cap', 'flat', 'none'];

  none: 'Headless (threaded shaft only — for cut-out holes)',
