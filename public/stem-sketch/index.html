      // segments (cpOut/cpIn) and dense tessellated polylines (>10 pts =
      // arcs/circles) are skipped — per-tessellation labels would be 40+
      // tiny pills. Dense polylines fall back to a single perimeter label.
      const n = ent.points.length;
      const dense = n > 10;
      if (!dense) {
        const segCount = ent.closed ? n : n - 1;
        for (let i = 0; i < segCount; i++) {
          const p1 = ent.points[i], p2 = ent.points[(i + 1) % n];
          // Skip curved edges — "length" of a bezier isn't a single number
          // the user can dimension by typing.
          if (p1.cpOut || p2.cpIn) continue;
          const lenMm = Math.hypot(p2.x - p1.x, p2.y - p1.y);
          if (lenMm < 1e-3) continue;
          const [s1x, s1y] = eng.worldToScreen(p1.x, p1.y);
          const [s2x, s2y] = eng.worldToScreen(p2.x, p2.y);
          const mx = (s1x + s2x) / 2, my = (s1y + s2y) / 2;
          const dx = s2x - s1x, dy = s2y - s1y;
          const segLen = Math.hypot(dx, dy) || 1;
          // Perpendicular offset, pushed to whichever side reads as "outside"
          // the shape so labels don't cover the fill area.
          const nx = -dy / segLen, ny = dx / segLen;
          const off = 16;
          const lx = mx + nx * off;
          const ly = my + ny * off;
          s += `<text class="dim-label" x="${lx}" y="${ly + 4}" text-anchor="middle">${fmtUL(lenMm)}</text>`;
        }
      } else {
        // Dense (arc / tessellated curve) — show overall perimeter once.
        let perim = 0;
        for (let i = 0; i < n - 1; i++) perim += Math.hypot(ent.points[i+1].x - ent.points[i].x, ent.points[i+1].y - ent.points[i].y);
        if (ent.closed) perim += Math.hypot(ent.points[0].x - ent.points[n-1].x, ent.points[0].y - ent.points[n-1].y);
        const bb = entityBBox(ent);
        if (bb && perim > 0) {
          const [cx, cy] = eng.worldToScreen((bb.minX + bb.maxX) / 2, bb.maxY);
          s += `<text class="dim-label" x="${cx}" y="${cy - 10}" text-anchor="middle">${fmtUL(perim)}</text>`;
        }
      }
    }
    // Vertex handles — only when a single entity is selected (or being drawn).
    // Multi-select hides individual handles in favour of one combined bbox
    // drawn later in the render pass, so the selection reads as ONE component.
    //
    // Dense polylines (arcs = 49 pts, tessellated circles/shapes = 64 pts)
    // would spam the view with handles at every tessellation vertex. Treat
    // anything with > 10 points as a smooth curve: open → first + last only,
    // closed → suppress entirely (the bbox handles do the work). User-drawn
    // polylines with ≤10 vertices keep their per-vertex handles.
    if (singleSelected || preview) {
      const n = ent.points.length;
      const dense = n > 10;
      if (!dense) {
        for (const p of ent.points) {
          const [sx, sy] = eng.worldToScreen(p.x, p.y);
          s += `<rect class="entity-handle${(p.cpOut || p.cpIn) ? ' has-curve' : ''}" x="${sx-3}" y="${sy-3}" width="6" height="6"/>`;
        }
      } else if (!ent.closed) {
        // Smooth open curve → only show its two endpoints
        for (const idx of [0, n - 1]) {
          const p = ent.points[idx];
          const [sx, sy] = eng.worldToScreen(p.x, p.y);
          s += `<rect class="entity-handle" x="${sx-3}" y="${sy-3}" width="6" height="6"/>`;
        }
      }
      // Closed dense polyline → no per-vertex handles (bbox controls all motion)
    }
    return s;
  }
  if (ent.type === 'threadMark') {
    // Hole-center marker: circle + crosshair, drawn in orange so it stands
    // apart from regular geometry. Rendered as a feature, not exported.
    const [cx, cy] = eng.worldToScreen(ent.cx, ent.cy);
    const r = 8;
    const stroke = selected ? '#e8732a' : '#ff9a3e';
    let s = `<g class="thread-mark" data-thread-id="${ent.id}">`;
    s += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${stroke}" stroke-width="1.6"/>`;
    s += `<line x1="${cx - r - 3}" y1="${cy}" x2="${cx + r + 3}" y2="${cy}" stroke="${stroke}" stroke-width="1.4"/>`;
    s += `<line x1="${cx}" y1="${cy - r - 3}" x2="${cx}" y2="${cy + r + 3}" stroke="${stroke}" stroke-width="1.4"/>`;
    if (selected) {
      s += `<rect class="entity-handle" x="${cx-3}" y="${cy-3}" width="6" height="6"/>`;
    }
    s += `</g>`;
    return s;
  }
  if (ent.type === 'dimension') {
    // Leader-style annotation (e.g. circle radius): single line from outside
    // (p2, label end) to a feature point (p1, arrow head), with the label
    // sitting just past p2. No extension lines, no second arrow.
    if (ent.leader) {
      const [px, py] = eng.worldToScreen(ent.p1.x, ent.p1.y);
      const [tx, ty] = eng.worldToScreen(ent.p2.x, ent.p2.y);
      const stroke = selected ? '#2c64ff' : '#5d6376';
      const sw = selected ? 1.6 : 1.1;
      let s = '';
      s += `<line stroke="${stroke}" stroke-width="${sw}" x1="${tx}" y1="${ty}" x2="${px}" y2="${py}" marker-end="url(#dim-arrow)"/>`;
      const ldx = tx - px, ldy = ty - py;
      const llen = Math.hypot(ldx, ldy) || 1;
      const offX = (ldx / llen) * 4, offY = (ldy / llen) * 4;
      const anchor = ldx > 1 ? 'start' : (ldx < -1 ? 'end' : 'middle');
      s += `<text x="${tx + offX}" y="${ty + offY + 4}" text-anchor="${anchor}" font-size="13" font-weight="600" fill="${stroke}" stroke="white" stroke-width="3" paint-order="stroke">${ent.label ?? ''}</text>`;
      return s;
    }
    // Engineering dimension: extension lines at each picked point, a parallel
    // dimension line offset perpendicular by ent.off mm, and the measurement
    // text on the dimension line.
    const dx = ent.p2.x - ent.p1.x, dy = ent.p2.y - ent.p1.y;
    const len = Math.hypot(dx, dy);
    if (len < 1e-3) return '';
    const ux = dx / len, uy = dy / len;          // unit along p1→p2
    const nx = -uy, ny = ux;                      // perpendicular
    const off = ent.off ?? 8;
    // Dimension line endpoints (offset perpendicular)
    const a = { x: ent.p1.x + nx * off, y: ent.p1.y + ny * off };
    const b = { x: ent.p2.x + nx * off, y: ent.p2.y + ny * off };
    const [ax, ay] = eng.worldToScreen(a.x, a.y);
    const [bx, by] = eng.worldToScreen(b.x, b.y);
    // Extension lines from picked points OUT to slightly past the dim line
    const ext = off + 2;
    const e1a = { x: ent.p1.x + nx * 1, y: ent.p1.y + ny * 1 };
    const e1b = { x: ent.p1.x + nx * ext, y: ent.p1.y + ny * ext };
    const e2a = { x: ent.p2.x + nx * 1, y: ent.p2.y + ny * 1 };
    const e2b = { x: ent.p2.x + nx * ext, y: ent.p2.y + ny * ext };
    const [e1ax, e1ay] = eng.worldToScreen(e1a.x, e1a.y);
    const [e1bx, e1by] = eng.worldToScreen(e1b.x, e1b.y);
    const [e2ax, e2ay] = eng.worldToScreen(e2a.x, e2a.y);
    const [e2bx, e2by] = eng.worldToScreen(e2b.x, e2b.y);
    const stroke = selected ? '#2c64ff' : '#5d6376';
    const sw = selected ? 1.6 : 1.1;
    let s = '';
    s += `<line stroke="${stroke}" stroke-width="${sw}" x1="${e1ax}" y1="${e1ay}" x2="${e1bx}" y2="${e1by}"/>`;
    s += `<line stroke="${stroke}" stroke-width="${sw}" x1="${e2ax}" y1="${e2ay}" x2="${e2bx}" y2="${e2by}"/>`;
    s += `<line stroke="${stroke}" stroke-width="${sw}" x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" marker-start="url(#dim-arrow)" marker-end="url(#dim-arrow)"/>`;
    const mx = (ax + bx) / 2, my = (ay + by) / 2;
    s += `<text x="${mx}" y="${my - 4}" text-anchor="middle" font-size="13" font-weight="600" fill="${stroke}" stroke="white" stroke-width="3" paint-order="stroke">${ent.label ?? fmtUL(len)}</text>`;
    return s;
  }
  return '';
}

// ---------- 3. Viewer3D ----------
function createGizmoArrow(axis, color) {
  const group = new THREE.Group();
  if (axis !== 'y') return group; // X/Z axes intentionally not shown — XZ moves via direct drag
  // Tiny dark cone — placed above the body's top, like Tinkercad's lift handle.
  // Position is set by updateGizmo (just above the bbox top).
  const cone = new THREE.Mesh(
    new THREE.ConeGeometry(1.6, 4, 16),
    new THREE.MeshBasicMaterial({ color: 0x1f2540, transparent: true, opacity: 0.85, depthTest: false }),
  );
  cone.position.y = 2; // small offset above the gizmo origin
  cone.userData.gizmoAxis = 'y';
  cone.renderOrder = 1000;
  group.add(cone);
  return group;
}
function createGizmo() {
  // Only the vertical (Y) arrow is shown — XZ movement is intuitive via direct
  // body drag on the ground plane, so the other two arrows are noise.
  const g = new THREE.Group();
  g.add(createGizmoArrow('y', 0x38a169));
  g.visible = false;
  return g;
}
// Build a Three.js Matrix4 that transforms sketch coords (sx, sy, sz) into world.
// sketch X-axis → plane.u, sketch Y → plane.v, sketch Z → plane.n, then translate by origin.
function makePlaneMatrix(plane) {
  const u = new THREE.Vector3(...plane.u);
  const v = new THREE.Vector3(...plane.v);
  const n = new THREE.Vector3(...plane.n);
  const o = new THREE.Vector3(...plane.origin);
  const M = new THREE.Matrix4();
  M.makeBasis(u, v, n);
  M.setPosition(o);
  return M;
}

// Walk a body and collect every cylindrical hole made by a negative-extrude
// child whose sketch contains a circle. Returns {center, axis, radius} per
// hole, all in current WORLD coordinates (current body transform applied).
// Used by the fastener "Place on face" workflow to snap a bolt to a hole's
// center axis when the user clicks anywhere on a face the hole pokes
// through.
function findHoleCylindersInBody(body) {
  if (!body) return [];
  const out = [];
  const mw = body.mesh ? body.mesh.matrixWorld.clone() : new THREE.Matrix4();
  const mwNormal = new THREE.Matrix3().getNormalMatrix(mw);
  const walk = (kids, parentIsCut) => {
    if (!Array.isArray(kids)) return;
    for (const child of kids) {
      const cumCut = parentIsCut || child.op === 'subtract';
      if (child.type === 'group' || child.type === 'combined') {
        walk(child.children, cumCut);
        continue;
      }
      if (!cumCut) continue;
      if (child.type !== 'extrude' || !child.sketch || !child.plane) continue;
      const planeMat = makePlaneMatrix(child.plane);
      const axisLocal = new THREE.Vector3(...child.plane.n).normalize();
      for (const ent of (child.sketch.entities || [])) {
        if (ent.type !== 'circle' || !(ent.r > 0)) continue;
        const centerLocal = new THREE.Vector3(ent.cx, ent.cy, 0).applyMatrix4(planeMat);
        centerLocal.x += (child.x || 0);
        centerLocal.y += (child.y || 0);
        centerLocal.z += (child.z || 0);
        const center = centerLocal.applyMatrix4(mw);
        const axis = axisLocal.clone().applyMatrix3(mwNormal).normalize();
        out.push({ center, axis, radius: ent.r });
      }
    }
  };
  walk(body.children, body.op === 'subtract');
  return out;
}

// Given a world-space point and a world-space normal, build a plane definition with
// a sensible (u, v) basis: v = projected world-up, u = v × n.
function planeFromFace(originVec, normalVec) {
  const n = normalVec.clone().normalize();
  const worldUp = new THREE.Vector3(0, 1, 0);
  let v;
  if (Math.abs(n.dot(worldUp)) > 0.95) {
    // Plane is nearly horizontal — use −Z as the "up" direction in the sketch
    v = new THREE.Vector3(0, 0, -1);
    if (n.y < 0) v.negate(); // looking up at ceiling: flip sketch Y
  } else {
    v = worldUp.clone().sub(n.clone().multiplyScalar(worldUp.dot(n))).normalize();
  }
  const u = new THREE.Vector3().crossVectors(v, n).normalize();
  return {
    origin: originVec.toArray(),
    u: u.toArray(),
    v: v.toArray(),
    n: n.toArray(),
    kind: 'face',
    name: 'Face sketch',
  };
}

// Project the sharp edges of every 3D body onto a sketch plane.
// Returns segments in sketch (u, v) coords with z = perpendicular distance from
// the plane (used to mark in-plane edges as solid vs. off-plane as dashed).
// Uses THREE.EdgesGeometry so groups/CSG-merged bodies expose interior step
// edges — the orthographic-drawing look.
// Canvas-based technical-drawing edge extraction. Renders the body's mesh
// to an offscreen target with a normal-output shader, then walks the
// pixel buffer to find boundaries (silhouette) and crease lines (where
// surface normals change abruptly). Robust against CSG mesh artifacts
// because it operates in image space — fan triangulations and unwelded
// vertices don't affect the rendered pixels.
//
// Caches the offscreen renderer + render target so repeated calls during
// a sketch session don't re-allocate WebGL resources.
const _edgeRender = {
  renderer: null,
  target: null,
  scene: null,
  camera: null,
  material: null,
  meshCache: new WeakMap(), // body.mesh → cached segments + plane signature
};

function _ensureEdgeRenderer(W, H) {
  if (!_edgeRender.renderer) {
    // Share the main renderer's WebGL context to avoid spinning up a
    // second one (Chromebooks already cap us at ~16 contexts per tab).
    if (!viewer?.renderer) return null;
    _edgeRender.renderer = viewer.renderer;
    _edgeRender.material = new THREE.ShaderMaterial({
      side: THREE.DoubleSide,
      // R, G = camera-space normal X, Y (the projection-plane components).
      // B = linear depth (0 at near, 1 at far) — lets the edge detector
      // spot height steps where two coplanar surfaces meet at different
      // depths (e.g., column top sitting on base plate top).
      // A = on-surface flag.
      // Uniform names prefixed with u_ to avoid colliding with three.js
      // built-ins (cameraNear/cameraFar are reserved in some shader chunks
      // and conflicts produce silent blank output).
      vertexShader: `
        varying vec3 vN;
        varying float vDepth;
        uniform float u_camNear;
        uniform float u_camFar;
        void main() {
          vec4 viewPos = modelViewMatrix * vec4(position, 1.0);
          vN = normalize(normalMatrix * normal);
          vDepth = (-viewPos.z - u_camNear) / (u_camFar - u_camNear);
          gl_Position = projectionMatrix * viewPos;
        }
      `,
      fragmentShader: `
        varying vec3 vN;
        varying float vDepth;
        void main() {
          gl_FragColor = vec4(vN.x * 0.5 + 0.5, vN.y * 0.5 + 0.5, clamp(vDepth, 0.0, 1.0), 1.0);
        }
      `,
      uniforms: {
        u_camNear: { value: 0.1 },
        u_camFar:  { value: 1000.0 },
      },
    });
    _edgeRender.scene = new THREE.Scene();
    _edgeRender.scene.background = new THREE.Color(0x000000);
    _edgeRender.camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 1000);
  }
  if (!_edgeRender.target || _edgeRender.target.width !== W || _edgeRender.target.height !== H) {
    if (_edgeRender.target) _edgeRender.target.dispose();
    _edgeRender.target = new THREE.WebGLRenderTarget(W, H, {
      minFilter: THREE.NearestFilter,
      magFilter: THREE.NearestFilter,
      format: THREE.RGBAFormat,
      type: THREE.UnsignedByteType,
    });
  }
  return _edgeRender;
}

function projectBodyEdgesViaCanvas(body, plane, planeMInv, segments) {
  if (!body.mesh?.geometry || !viewer?.renderer) return;

  // Per-body cache: if the plane signature + mesh identity haven't changed,
  // reuse the previously-computed segments instead of re-rendering.
  const planeSig = plane.origin.join(',') + '|' + plane.n.join(',') + '|' + plane.u.join(',');
  let cache = _edgeRender.meshCache.get(body.mesh);
  if (cache && cache.planeSig === planeSig) {
    for (const s of cache.segments) segments.push(s);
    return;
  }

  // Compute the body's projected bbox on the sketch plane so the camera
  // fits it tightly with a small margin.
  viewer.scene.updateMatrixWorld(true);
  const wbb = new THREE.Box3().setFromObject(body.mesh);
  if (wbb.isEmpty()) return;
  const corners = [
    new THREE.Vector3(wbb.min.x, wbb.min.y, wbb.min.z),
    new THREE.Vector3(wbb.max.x, wbb.min.y, wbb.min.z),
    new THREE.Vector3(wbb.max.x, wbb.max.y, wbb.min.z),
    new THREE.Vector3(wbb.min.x, wbb.max.y, wbb.min.z),
    new THREE.Vector3(wbb.min.x, wbb.min.y, wbb.max.z),
    new THREE.Vector3(wbb.max.x, wbb.min.y, wbb.max.z),
    new THREE.Vector3(wbb.max.x, wbb.max.y, wbb.max.z),
    new THREE.Vector3(wbb.min.x, wbb.max.y, wbb.max.z),
  ];
  let pMinX = Infinity, pMaxX = -Infinity, pMinY = Infinity, pMaxY = -Infinity;
  let pMinZ = Infinity, pMaxZ = -Infinity;
  for (const c of corners) {
    const p = c.clone().applyMatrix4(planeMInv);
    if (p.x < pMinX) pMinX = p.x; if (p.x > pMaxX) pMaxX = p.x;
    if (p.y < pMinY) pMinY = p.y; if (p.y > pMaxY) pMaxY = p.y;
    if (p.z < pMinZ) pMinZ = p.z; if (p.z > pMaxZ) pMaxZ = p.z;
  }
  const spanX = pMaxX - pMinX;
  const spanY = pMaxY - pMinY;
  if (spanX < 0.01 || spanY < 0.01) return;
  const margin = Math.max(spanX, spanY) * 0.04;
  pMinX -= margin; pMaxX += margin;
  pMinY -= margin; pMaxY += margin;
  const finalSpanX = pMaxX - pMinX;
  const finalSpanY = pMaxY - pMinY;

  // Pick render resolution — square texture, sized by the body's span so
  // 1 px ≈ 0.1 mm in world units. Capped at 1024 to stay reasonable.
  const targetMmPerPx = 0.1;
  const idealSize = Math.max(finalSpanX, finalSpanY) / targetMmPerPx;
  const W = Math.min(1024, Math.max(256, Math.ceil(idealSize / 64) * 64));
  const H = W;
  const er = _ensureEdgeRenderer(W, H);
  if (!er) return;

  // Build camera oriented along plane.n looking at the body.
  const planeOrigin = new THREE.Vector3(...plane.origin);
  const planeNormal = new THREE.Vector3(...plane.n).normalize();
  const planeU = new THREE.Vector3(...plane.u).normalize();
  const planeV = new THREE.Vector3(...plane.v).normalize();
  const cu = (pMinX + pMaxX) / 2;
  const cv = (pMinY + pMaxY) / 2;
  const camTarget = planeOrigin.clone()
    .add(planeU.clone().multiplyScalar(cu))
    .add(planeV.clone().multiplyScalar(cv));
  // Camera sits well behind the body along +n, large enough to cover any
  // body depth. Render through to the far back.
  const camDist = (pMaxZ - pMinZ) * 4 + 200;
  er.camera.left   = -finalSpanX / 2;
  er.camera.right  =  finalSpanX / 2;
  er.camera.top    =  finalSpanY / 2;
  er.camera.bottom = -finalSpanY / 2;
  er.camera.near = 0.1;
  er.camera.far  = camDist * 4;
  er.camera.position.copy(camTarget).add(planeNormal.clone().multiplyScalar(camDist));
  er.camera.up.copy(planeV);
  er.camera.lookAt(camTarget);
  er.camera.updateProjectionMatrix();
  er.camera.updateMatrixWorld(true);

  // Update shader uniforms with the current camera's near/far so the
  // depth channel actually represents 0..1 across this body's depth range.
  er.material.uniforms.u_camNear.value = er.camera.near;
  er.material.uniforms.u_camFar.value  = er.camera.far;

  // Swap our temp mesh in. Reuse the body's geometry directly (don't
  // clone — too expensive) but use our normal-output shader.
  while (er.scene.children.length) er.scene.remove(er.scene.children[0]);
  const tempMesh = new THREE.Mesh(body.mesh.geometry, er.material);
  tempMesh.applyMatrix4(body.mesh.matrixWorld);
  er.scene.add(tempMesh);

  // Render to the offscreen target.
  const oldTarget = er.renderer.getRenderTarget();
  const oldAutoClear = er.renderer.autoClear;
  er.renderer.setRenderTarget(er.target);
  er.renderer.autoClear = true;
  er.renderer.clear(true, true, false);
  er.renderer.render(er.scene, er.camera);
  er.renderer.setRenderTarget(oldTarget);
  er.renderer.autoClear = oldAutoClear;

  // Read back the pixel data.
  const pixels = new Uint8Array(W * H * 4);
  er.renderer.readRenderTargetPixels(er.target, 0, 0, W, H, pixels);

  // Edge detection: silhouette (background neighbor) OR crease (normal
  // X/Y differs significantly) OR step (depth differs significantly,
  // catches height transitions where two coplanar surfaces stack like
  // column-on-base). Walk 4-connected neighbors.
  const edgeMask = new Uint8Array(W * H);
  const NORMAL_DIFF_THRESHOLD = 48; // out of 255 per channel (R+G)
  const DEPTH_DIFF_THRESHOLD  = 6;  // out of 255 (blue channel = linear depth)
  const isOnSurface = (idx) => pixels[idx + 3] >= 128; // alpha test
  for (let y = 1; y < H - 1; y++) {
    for (let x = 1; x < W - 1; x++) {
      const i = (y * W + x) * 4;
      if (!isOnSurface(i)) continue;
      const r = pixels[i], g = pixels[i + 1], b = pixels[i + 2];
      const ni = [
        ((y - 1) * W + x) * 4, ((y + 1) * W + x) * 4,
        (y * W + (x - 1)) * 4, (y * W + (x + 1)) * 4,
      ];
      let edge = false;
      for (const k of ni) {
        if (!isOnSurface(k)) { edge = true; break; }
        const dn = Math.abs(pixels[k] - r) + Math.abs(pixels[k + 1] - g);
        if (dn > NORMAL_DIFF_THRESHOLD) { edge = true; break; }
        const dd = Math.abs(pixels[k + 2] - b);
        if (dd > DEPTH_DIFF_THRESHOLD) { edge = true; break; }
      }
      if (edge) edgeMask[y * W + x] = 1;
    }
  }

  // Convert edge pixels back to plane-local 2D world coords. Emit chains
  // of consecutive edge pixels as line segments along each row + column
  // so the renderer doesn't get a million single-pixel segments.
  const px2u = (px) => pMinX + (px / W) * finalSpanX;
  // readRenderTargetPixels delivers row 0 at the BOTTOM of the texture
  // (WebGL convention). Map py=0 → pMinY so the output isn't flipped.
  const px2v = (py) => pMinY + (py / H) * finalSpanY;
  const out = [];
  // Horizontal runs
  for (let y = 0; y < H; y++) {
    let runStart = -1;
    for (let x = 0; x < W; x++) {
      const on = edgeMask[y * W + x];
      if (on && runStart < 0) runStart = x;
      else if (!on && runStart >= 0) {
        if (x - runStart >= 2) {
          out.push({
            p1: { x: px2u(runStart),       y: px2v(y), z: 0 },
            p2: { x: px2u(x - 1),          y: px2v(y), z: 0 },
            dz1: 0, dz2: 0,
          });
        }
        runStart = -1;
      }
    }
    if (runStart >= 0 && W - runStart >= 2) {
      out.push({
        p1: { x: px2u(runStart), y: px2v(y), z: 0 },
        p2: { x: px2u(W - 1),    y: px2v(y), z: 0 },
        dz1: 0, dz2: 0,
      });
    }
  }
  // Vertical runs
  for (let x = 0; x < W; x++) {
    let runStart = -1;
    for (let y = 0; y < H; y++) {
      const on = edgeMask[y * W + x];
      if (on && runStart < 0) runStart = y;
      else if (!on && runStart >= 0) {
        if (y - runStart >= 2) {
          out.push({
            p1: { x: px2u(x), y: px2v(runStart), z: 0 },
            p2: { x: px2u(x), y: px2v(y - 1),    z: 0 },
            dz1: 0, dz2: 0,
          });
        }
        runStart = -1;
      }
    }
    if (runStart >= 0 && H - runStart >= 2) {
      out.push({
        p1: { x: px2u(x), y: px2v(runStart), z: 0 },
        p2: { x: px2u(x), y: px2v(H - 1),    z: 0 },
        dz1: 0, dz2: 0,
      });
    }
  }

  // Cache and emit.
  _edgeRender.meshCache.set(body.mesh, { planeSig, segments: out });
  for (const s of out) segments.push(s);
}

function projectBodiesOntoPlane(plane) {
  const segments = [];
  if (typeof viewer === 'undefined' || !viewer) return segments;
  const planeMInv = makePlaneMatrix(plane).clone().invert();
  viewer.scene.updateMatrixWorld(true);

  const projPoint = (vlocal, mw) => {
    const w = vlocal.clone().applyMatrix4(mw);
    const s = w.applyMatrix4(planeMInv);
    return { x: s.x, y: s.y, z: s.z };
  };

  // For a group body (sphere with cuts merged via CSG, etc.) projecting the
  // CSG result through EdgesGeometry produces a fan of broken triangulation
  // edges that's confusing in 2D. Instead recurse into the children and
  // render each as if it were a standalone body — positives become solid
  // outlines, negatives (the cuts) come through as dashed.
  const projectChildAsStandalone = (child, parentOffset) => {
    if (!child) return;
    const ghost = JSON.parse(JSON.stringify(child));
    // Synthesize a temporary mesh so the existing code paths work
    const matWorld = new THREE.Matrix4().makeTranslation(
      (child.x || 0) + (parentOffset?.x || 0),
      (child.y || 0) + (parentOffset?.y || 0),
      (child.z || 0) + (parentOffset?.z || 0),
    );
    if (child.type === 'sphere') {
      const halfH = (child.h || 0) / 2;
      ghost.mesh = {
        position: new THREE.Vector3(
          (child.x || 0) + (parentOffset?.x || 0),
          halfH + (child.y || 0) + (parentOffset?.y || 0),
          (child.z || 0) + (parentOffset?.z || 0),
        ),
        matrixWorld: matWorld,
        geometry: null,
      };
      const cLocal = ghost.mesh.position.clone().applyMatrix4(planeMInv);
      const halfW = (child.w || 0) / 2;
      const halfD = (child.d || 0) / 2;
      const uW = new THREE.Vector3(...plane.u);
      const vW = new THREE.Vector3(...plane.v);
      const rx = Math.abs(uW.x) * halfW + Math.abs(uW.y) * halfH + Math.abs(uW.z) * halfD;
      const ry = Math.abs(vW.x) * halfW + Math.abs(vW.y) * halfH + Math.abs(vW.z) * halfD;
      const N = 48;
      for (let i = 0; i < N; i++) {
        const t1 = (i / N) * 2 * Math.PI;
        const t2 = ((i + 1) / N) * 2 * Math.PI;
        const p1 = { x: cLocal.x + Math.cos(t1) * rx, y: cLocal.y + Math.sin(t1) * ry, z: cLocal.z };
        const p2 = { x: cLocal.x + Math.cos(t2) * rx, y: cLocal.y + Math.sin(t2) * ry, z: cLocal.z };
        segments.push({ p1, p2, dz1: p1.z, dz2: p2.z });
      }
      return;
    }
    // Cylinder / cone — primitives with circular cross-section along Y.
    // Project the top and bottom rims as ellipses (orthogonal projection of a
    // circle onto an arbitrary plane is an ellipse) plus two silhouette
    // tangent lines along the side. Without this, a cylindrical cut would
    // fall back to the generic bbox projection — a misleading rectangle.
    if (child.type === 'cylinder' || child.type === 'cone') {
      const halfH = (child.h || 0) / 2;
      const cx_w = (child.x || 0) + (parentOffset?.x || 0);
      const cy_w = halfH + (child.y || 0) + (parentOffset?.y || 0);
      const cz_w = (child.z || 0) + (parentOffset?.z || 0);
      const halfW = (child.w || 0) / 2;
      const halfD = (child.d || 0) / 2;
      const projWorld = (v) => {
        const s = v.clone().applyMatrix4(planeMInv);
        return { x: s.x, y: s.y, z: s.z };
      };
      const N = 48;
      const yBot = cy_w - halfH;
      const yTop = cy_w + halfH;
      // For a cone, top radius collapses to ~0
      const rBotW = halfW, rBotD = halfD;
      const rTopW = child.type === 'cone' ? 0 : halfW;
      const rTopD = child.type === 'cone' ? 0 : halfD;
      const ring = (yLevel, rW, rD) => {
        const pts = [];
        for (let i = 0; i < N; i++) {
          const t = (i / N) * 2 * Math.PI;
          pts.push(new THREE.Vector3(cx_w + Math.cos(t) * rW, yLevel, cz_w + Math.sin(t) * rD));
        }
        return pts;
      };
      const bot = ring(yBot, rBotW, rBotD).map(projWorld);
      const top = ring(yTop, rTopW, rTopD).map(projWorld);
      for (let i = 0; i < N; i++) {
        const a = bot[i], b = bot[(i + 1) % N];
        segments.push({ p1: a, p2: b, dz1: a.z, dz2: b.z });
        if (child.type !== 'cone') {
          const c = top[i], d = top[(i + 1) % N];
          segments.push({ p1: c, p2: d, dz1: c.z, dz2: d.z });
        }
      }
      // Silhouette tangents — perpendicular to view, along the cylinder axis
      const viewN = new THREE.Vector3(...plane.n);
      const axis = new THREE.Vector3(0, 1, 0);
      const tangent = new THREE.Vector3().crossVectors(axis, viewN);
      if (tangent.lengthSq() > 1e-6) {
        tangent.normalize();
        // Scale by avg radius
        const rAvg = (halfW + halfD) / 2;
        tangent.multiplyScalar(rAvg);
        for (const sgn of [+1, -1]) {
          const sw = new THREE.Vector3(cx_w + sgn * tangent.x, yBot, cz_w + sgn * tangent.z);
          const ew = new THREE.Vector3(
            cx_w + (child.type === 'cone' ? 0 : sgn * tangent.x),
            yTop,
            cz_w + (child.type === 'cone' ? 0 : sgn * tangent.z),
          );
          const sa = projWorld(sw), sb = projWorld(ew);
          segments.push({ p1: sa, p2: sb, dz1: sa.z, dz2: sb.z });
        }
      }
      return;
    }
    // Extrude bodies (the most common cut shape from the gizmo) — build the
    // prism geometry on the fly and project its edges. Without this the cut
    // tunnels were invisible in the 2D view, hiding "what's been removed".
    if (child.type === 'extrude' && child.sketch && child.plane) {
      const shape = sketchToShape(child.sketch);
      if (shape) {
        const tmpGeo = new THREE.ExtrudeGeometry(shape, {
          depth: child.height || 1,
          bevelEnabled: false,
          curveSegments: 32,
        });
        if (child.op === 'subtract') tmpGeo.translate(0, 0, -(child.height || 1));
        const planeMChild = makePlaneMatrix(child.plane);
        tmpGeo.applyMatrix4(planeMChild);
        // Apply parent group's offset
        if (parentOffset) {
          tmpGeo.translate(parentOffset.x || 0, parentOffset.y || 0, parentOffset.z || 0);
        }
        try {
          const ee = new THREE.EdgesGeometry(tmpGeo, 25);
          const pos = ee.attributes?.position;
          if (pos && pos.count >= 2) {
            const va = new THREE.Vector3(), vb = new THREE.Vector3();
            const MIN_LEN = 0.25;
            for (let i = 0; i < pos.count; i += 2) {
              va.fromBufferAttribute(pos, i);
              vb.fromBufferAttribute(pos, i + 1);
              const p1 = { ...va.clone().applyMatrix4(planeMInv) };
              const p2 = { ...vb.clone().applyMatrix4(planeMInv) };
              const sa = { x: p1.x, y: p1.y, z: p1.z };
              const sb = { x: p2.x, y: p2.y, z: p2.z };
              if (Math.hypot(sa.x - sb.x, sa.y - sb.y) < MIN_LEN) continue;
              segments.push({ p1: sa, p2: sb, dz1: sa.z, dz2: sb.z });
            }
          }
          ee.dispose();
        } catch (_) {}
        tmpGeo.dispose();
        // SILHOUETTE TANGENT LINES for any smooth profile — a cylinder (or
        // any extrude with a curved profile that gets stored as a many-
        // segment polyline) has no sharp lateral edges, so EdgesGeometry
        // catches only the rim circles. Walk the profile and find vertices
        // where adjacent segment normals straddle the view direction —
        // those are the silhouette points; draw a line through each along
        // the extrude axis.
        const ents = (child.sketch.entities || []).filter(e => !e.construction);
        let profilePts = null;
        if (ents.length === 1) {
          const e = ents[0];
          if (e.type === 'circle' && e.r > 0) {
            const Nc = 64;
            profilePts = [];
            for (let i = 0; i < Nc; i++) {
              const t = (i / Nc) * 2 * Math.PI;
              profilePts.push({ x: e.cx + Math.cos(t) * e.r, y: e.cy + Math.sin(t) * e.r });
            }
          } else if (e.type === 'polyline' && e.closed && e.points && e.points.length >= 4) {
            profilePts = e.points;
          }
        }
        if (profilePts) {
          const planeUChild = new THREE.Vector3(...child.plane.u);
          const planeVChild = new THREE.Vector3(...child.plane.v);
          const depth = child.height || 0;
          const zEnd = (child.op === 'subtract') ? -depth : depth;
          const viewN = new THREE.Vector3(...plane.n);
          const N = profilePts.length;
          // Outward 2D normal of segment i, dotted with view normal in world.
          const segDot = new Array(N);
          for (let i = 0; i < N; i++) {
            const a = profilePts[i];
            const b = profilePts[(i + 1) % N];
            const nx2D = (b.y - a.y);
            const ny2D = -(b.x - a.x);
            const len = Math.hypot(nx2D, ny2D) || 1;
            const nWorld = planeUChild.clone().multiplyScalar(nx2D / len)
              .add(planeVChild.clone().multiplyScalar(ny2D / len));
            segDot[i] = nWorld.dot(viewN);
          }
          for (let i = 0; i < N; i++) {
            const prev = segDot[(i - 1 + N) % N];
            const curr = segDot[i];
            // Sign change between segments (i-1) and i → vertex i is on the
            // silhouette. Strict (* < 0) skips zero-crossings exactly on
            // axis-aligned planes, which is fine: those are face-on views and
            // don't have a meaningful lateral silhouette.
            if (prev * curr >= 0) continue;
            const p = profilePts[i];
            const sw = new THREE.Vector3(p.x, p.y, 0).applyMatrix4(planeMChild);
            const ew = new THREE.Vector3(p.x, p.y, zEnd).applyMatrix4(planeMChild);
            if (parentOffset) {
              const off = new THREE.Vector3(parentOffset.x || 0, parentOffset.y || 0, parentOffset.z || 0);
              sw.add(off); ew.add(off);
            }
            const sa = sw.applyMatrix4(planeMInv);
            const sb = ew.applyMatrix4(planeMInv);
            segments.push({
              p1: { x: sa.x, y: sa.y, z: sa.z },
              p2: { x: sb.x, y: sb.y, z: sb.z },
              dz1: sa.z, dz2: sb.z,
            });
          }
        }
      }
      return;
    }
    // Fastener — render as a cylinder silhouette (top & bottom rims plus
    // two parallel side tangent lines), positioned at the bolt's world spot.
    // Without this, a screw cut into a body is invisible from a sketch on
    // another face of that body.
    if (child.type === 'fastener') {
      const spec = getFastenerSpec(child.size);
      if (!spec) return;
      const fit = child.fit || 'tight';
      const clearance = FASTENER_FIT_CLEARANCE[fit] || 0;
      const r = (spec.d / 2) + clearance;
      const lengthBolt = child.length || (spec.d * 4);
      const cx = (child.x || 0) + (parentOffset?.x || 0);
      const cy = (child.y || 0) + (parentOffset?.y || 0);
      const cz = (child.z || 0) + (parentOffset?.z || 0);
      // Bolt shaft is along the world Y axis from y=cy to y=cy+lengthBolt.
      // Bottom rim — circle in XZ at y=cy
      const N = 36;
      const ringWorld = (yLevel) => {
        const out = [];
        for (let i = 0; i < N; i++) {
          const t = (i / N) * 2 * Math.PI;
          out.push(new THREE.Vector3(cx + Math.cos(t) * r, yLevel, cz + Math.sin(t) * r));
        }
        return out;
      };
      const projWorld = (v) => {
        const s = v.clone().applyMatrix4(planeMInv);
        return { x: s.x, y: s.y, z: s.z };
      };
      const bot = ringWorld(cy).map(projWorld);
      const top = ringWorld(cy + lengthBolt).map(projWorld);
      for (let i = 0; i < N; i++) {
        const a = bot[i], b = bot[(i + 1) % N];
        segments.push({ p1: a, p2: b, dz1: a.z, dz2: b.z });
        const c = top[i], d = top[(i + 1) % N];
        segments.push({ p1: c, p2: d, dz1: c.z, dz2: d.z });
      }
      // Silhouette tangent lines along the cylinder for the current view —
      // two parallel lines marking the bolt's sides.
      const viewN = new THREE.Vector3(...plane.n);
      const axis = new THREE.Vector3(0, 1, 0);
      // Find perpendicular-to-axis direction that's also in the view plane:
      // bolt-tangent-direction = axis × viewN, normalized
      const tangent = new THREE.Vector3().crossVectors(axis, viewN);
      if (tangent.lengthSq() > 1e-6) {
        tangent.normalize().multiplyScalar(r);
        for (const sgn of [+1, -1]) {
          const sw = new THREE.Vector3(cx + sgn * tangent.x, cy, cz + sgn * tangent.z);
          const ew = new THREE.Vector3(cx + sgn * tangent.x, cy + lengthBolt, cz + sgn * tangent.z);
          const sa = projWorld(sw), sb = projWorld(ew);
          segments.push({ p1: sa, p2: sb, dz1: sa.z, dz2: sb.z });
        }
      }
      return;
    }
    // For other primitives, draw a faint bbox outline as a rough "ghost"
    if (typeof child.w === 'number' && typeof child.h === 'number' && typeof child.d === 'number') {
      const cx = (child.x || 0) + (parentOffset?.x || 0);
      const cy = (child.y || 0) + (parentOffset?.y || 0);
      const cz = (child.z || 0) + (parentOffset?.z || 0);
      const halfW = child.w / 2, halfD = child.d / 2;
      // Use child.h/2 for cube etc. (cube mesh is centered) — close enough
      const yMin = cy, yMax = cy + child.h;
      const corners = [
        new THREE.Vector3(cx - halfW, yMin, cz - halfD),
        new THREE.Vector3(cx + halfW, yMin, cz - halfD),
        new THREE.Vector3(cx + halfW, yMax, cz - halfD),
        new THREE.Vector3(cx - halfW, yMax, cz - halfD),
        new THREE.Vector3(cx - halfW, yMin, cz + halfD),
        new THREE.Vector3(cx + halfW, yMin, cz + halfD),
        new THREE.Vector3(cx + halfW, yMax, cz + halfD),
        new THREE.Vector3(cx - halfW, yMax, cz + halfD),
      ];
      const proj = corners.map(c => {
        const s = c.clone().applyMatrix4(planeMInv);
        return { x: s.x, y: s.y, z: s.z };
      });
      const ee = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
      for (const [a, b] of ee) {
        segments.push({ p1: proj[a], p2: proj[b], dz1: proj[a].z, dz2: proj[b].z });
      }
    }
  };

  for (const body of doc.bodies) {
    if (!body.mesh) continue;
    // Group bodies — same path as primitives. EdgesGeometry on the merged
    // CSG mesh. The user's insight: primitive face-sketches work cleanly
    // with the EdgesGeometry path, so groups should use it too instead of
    // the child-walking logic that kept producing original-bbox outlines.
    if (false && body.type === 'group' && Array.isArray(body.children)) {
      // Compute the GROUP's bbox in plane-local 2D so we can clip negative
      // children to where they actually remove material. A 2-inch cylinder
      // cut through a 1-inch sphere should only show the 1 inch that was
      // actually removed — the over-extrusion is invisible material.
      const wbb = new THREE.Box3().setFromObject(body.mesh);
      const cornersW = [
        new THREE.Vector3(wbb.min.x, wbb.min.y, wbb.min.z),
        new THREE.Vector3(wbb.max.x, wbb.min.y, wbb.min.z),
        new THREE.Vector3(wbb.max.x, wbb.max.y, wbb.min.z),
        new THREE.Vector3(wbb.min.x, wbb.max.y, wbb.min.z),
        new THREE.Vector3(wbb.min.x, wbb.min.y, wbb.max.z),
        new THREE.Vector3(wbb.max.x, wbb.min.y, wbb.max.z),
        new THREE.Vector3(wbb.max.x, wbb.max.y, wbb.max.z),
        new THREE.Vector3(wbb.min.x, wbb.max.y, wbb.max.z),
      ];
      let pMinX = Infinity, pMaxX = -Infinity, pMinY = Infinity, pMaxY = -Infinity;
      for (const c of cornersW) {
        const s = c.applyMatrix4(planeMInv);
        if (s.x < pMinX) pMinX = s.x;
        if (s.x > pMaxX) pMaxX = s.x;
        if (s.y < pMinY) pMinY = s.y;
        if (s.y > pMaxY) pMaxY = s.y;
      }
      const parentAabb = { minX: pMinX, maxX: pMaxX, minY: pMinY, maxY: pMaxY };
      // Walk the tree. For each child we render its silhouette explicitly.
      // Negative (cut) children are tagged so the SVG renderer can dash them —
      // and are clipped to the parent body's projected AABB so the
      // over-extrusion poking out of the body is hidden.
      const walk = (kids, offset, parentIsCut) => {
        for (const child of kids) {
          const childIsCut = parentIsCut || child.op === 'subtract';
          const off = {
            x: offset.x + (child.x || 0),
            y: offset.y + (child.y || 0),
            z: offset.z + (child.z || 0),
          };
          if (child.type === 'group' && Array.isArray(child.children)) {
            walk(child.children, off, childIsCut);
            continue;
          }
          // Skip ALL positive (additive) children. They were the starting
          // material — their projections give the body's original (pre-cut)
          // bbox outline, which the user perceives as "the cube I started
          // with that doesn't exist anymore." The CUT children, after
          // clipping to the body's actual projected AABB, trace the visible
          // carved silhouette themselves.
          if (!childIsCut) continue;
          const before = segments.length;
          projectChildAsStandalone(child, offset);
          if (childIsCut) {
            // Clip to parent AABB and tag as cut. Drop segments whose midpoint
            // lies outside the parent's projected silhouette — that's the
            // over-extrusion the user said shouldn't be visible.
            const kept = [];
            for (let k = before; k < segments.length; k++) {
              const s = segments[k];
              const mx = (s.p1.x + s.p2.x) / 2;
              const my = (s.p1.y + s.p2.y) / 2;
              const PAD = 0.5; // mm tolerance so segments touching the bbox edge stay
              if (mx < parentAabb.minX - PAD || mx > parentAabb.maxX + PAD ||
                  my < parentAabb.minY - PAD || my > parentAabb.maxY + PAD) continue;
              s._cut = true;
              kept.push(s);
            }
            // Replace tail of segments[] with the kept ones
            segments.length = before;
            for (const s of kept) segments.push(s);
          }
        }
      };
      walk(body.children, { x: body.x || 0, y: body.y || 0, z: body.z || 0 }, false);
      continue;
    }
    // Smooth-surface bodies have no real edges — skip EdgesGeometry entirely
    // and let the silhouette code below render a clean circle/annulus.
    const skipEdges = body.type === 'sphere' || body.type === 'torus';
    let usedEdges = false;
    // For CSG groups, route to the canvas-based edge extraction (works in
    // image space — robust against fan triangulations and unwelded
    // vertices that defeat EdgesGeometry on CSG output).
    const isCSG = body.type === 'group' || body.type === 'combined';
    if (isCSG) {
      projectBodyEdgesViaCanvas(body, plane, planeMInv, segments);
      usedEdges = true;
    } else if (!skipEdges) try {
      const edges = new THREE.EdgesGeometry(body.mesh.geometry, 25);
      const pos = edges.attributes?.position;
      if (pos && pos.count >= 2) {
        usedEdges = true;
        const mw = body.mesh.matrixWorld;
        const va = new THREE.Vector3(), vb = new THREE.Vector3();
        const MIN_LEN = 0.25;
        for (let i = 0; i < pos.count; i += 2) {
          va.fromBufferAttribute(pos, i);
          vb.fromBufferAttribute(pos, i + 1);
          const p1 = projPoint(va, mw);
          const p2 = projPoint(vb, mw);
          const len2D = Math.hypot(p1.x - p2.x, p1.y - p2.y);
          if (len2D < MIN_LEN) continue;
          segments.push({ p1, p2, dz1: p1.z, dz2: p2.z });
        }
      }
      edges.dispose();
    } catch(_) {}

    // For smooth-surface bodies (sphere, torus) the orthogonal silhouette is
    // a circle (or annulus) — always render this so the silhouette stays
    // in sync with the dashed boundary circle in computeFaceBoundary.
    if (body.type === 'sphere' || body.type === 'torus') {
      const cLocal = body.mesh.position.clone().applyMatrix4(planeMInv);
      // Ellipse semi-axes from the body's w/h/d projected onto plane (u, v).
      const halfW = (body.w || 0) / 2;
      const halfH = (body.h || 0) / 2;
      const halfD = (body.d || 0) / 2;
      const uW = new THREE.Vector3(...plane.u);
      const vW = new THREE.Vector3(...plane.v);
      const rx = Math.abs(uW.x) * halfW + Math.abs(uW.y) * halfH + Math.abs(uW.z) * halfD;
      const ry = Math.abs(vW.x) * halfW + Math.abs(vW.y) * halfH + Math.abs(vW.z) * halfD;
      const N = 48;
      for (let i = 0; i < N; i++) {
        const t1 = (i / N) * 2 * Math.PI;
        const t2 = ((i + 1) / N) * 2 * Math.PI;
        const p1 = { x: cLocal.x + Math.cos(t1) * rx, y: cLocal.y + Math.sin(t1) * ry, z: cLocal.z };
        const p2 = { x: cLocal.x + Math.cos(t2) * rx, y: cLocal.y + Math.sin(t2) * ry, z: cLocal.z };
        segments.push({ p1, p2, dz1: p1.z, dz2: p2.z });
      }
      continue;
    }
    // Fallback for smooth bodies (spheres / cylinders without sharp edges):
    // project the bounding box so they still show up as a context outline.
    if (!usedEdges) {
      if (!body.mesh.geometry.boundingBox) body.mesh.geometry.computeBoundingBox();
      const bb = body.mesh.geometry.boundingBox;
      if (!bb) continue;
      const cornersLocal = [
        new THREE.Vector3(bb.min.x, bb.min.y, bb.min.z),
        new THREE.Vector3(bb.max.x, bb.min.y, bb.min.z),
        new THREE.Vector3(bb.max.x, bb.max.y, bb.min.z),
        new THREE.Vector3(bb.min.x, bb.max.y, bb.min.z),
        new THREE.Vector3(bb.min.x, bb.min.y, bb.max.z),
        new THREE.Vector3(bb.max.x, bb.min.y, bb.max.z),
        new THREE.Vector3(bb.max.x, bb.max.y, bb.max.z),
        new THREE.Vector3(bb.min.x, bb.max.y, bb.max.z),
      ];
      const proj = cornersLocal.map(c => projPoint(c, body.mesh.matrixWorld));
      const ee = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
      for (const [a, b] of ee) segments.push({ p1: proj[a], p2: proj[b], dz1: proj[a].z, dz2: proj[b].z });
    }
  }
  return segments;
}

// Snap a value to the grid spacing if grid snapping is enabled
function snapVal(v) {
  if (!doc.grid?.snap) return v;
  const s = doc.grid.spacing || 1;
  return Math.round(v / s) * s;
}

function projectRayOnAxis(ray, axisOrigin, axisDir) {
  const w = axisOrigin.clone().sub(ray.origin);
  const u = axisDir.dot(w);
  const v = ray.direction.dot(w);
  const b = axisDir.dot(ray.direction);
  const denom = 1 - b * b;
  if (Math.abs(denom) < 1e-9) return 0;
  return (b * v - u) / denom;
}

class Viewer3D {
  constructor(canvas) {
    this.canvas = canvas;
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0xffffff);

    this.camera = new THREE.PerspectiveCamera(45, 1, 0.1, 5000);
    this.target = new THREE.Vector3(0, 0, 0);
    this.spherical = new THREE.Spherical(220, 1.05, 0.85);
    this.updateCamera();

    this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
    this.renderer.setPixelRatio(window.devicePixelRatio);
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // Release the WebGL context on iframe unload / page hide. Without this,
    // Chrome caps active contexts per process (~16) and dev-mode HMR refreshes
    // accumulate orphaned contexts until new ones can't be created.
    this._teardown = () => {
      try { this.renderer.dispose(); } catch (_) {}
      try { this.renderer.forceContextLoss(); } catch (_) {}
    };
    window.addEventListener('beforeunload', this._teardown);
    window.addEventListener('pagehide', this._teardown);

    // lighting
    const amb = new THREE.AmbientLight(0xffffff, 0.38); this.scene.add(amb);
    const dir = new THREE.DirectionalLight(0xffffff, 1.05);
    dir.position.set(120, 220, 160);
    dir.castShadow = true;
    dir.shadow.mapSize.set(1024, 1024);
    dir.shadow.camera.left = -300; dir.shadow.camera.right = 300;
    dir.shadow.camera.top = 300; dir.shadow.camera.bottom = -300;
    this.scene.add(dir);
    const dir2 = new THREE.DirectionalLight(0xb0c5ff, 0.22);
    dir2.position.set(-150, 80, -120); this.scene.add(dir2);

    // Workplane visuals — a sized grid + border, rebuilt when doc.grid.size changes
    this.workplaneGroup = new THREE.Group();
    this.scene.add(this.workplaneGroup);
    // Ground plane that catches shadows (large, separate from the workplane visual)
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(2000, 2000),
      new THREE.ShadowMaterial({ opacity: 0.12 })
    );
    ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; this.scene.add(ground);
    this.rebuildWorkplane();

    // axes hint
    const ax = new THREE.AxesHelper(20); this.scene.add(ax);

    this.bodyGroup = new THREE.Group();
    this.scene.add(this.bodyGroup);

    this.sketchGroup = new THREE.Group();
    this.sketchGroup.position.y = 0.05; // hover above ground to avoid z-fight
    this.scene.add(this.sketchGroup);

    // Pickable region overlays (sit slightly above sketches so they hit-test first)
    this.regionGroup = new THREE.Group();
    this.scene.add(this.regionGroup);

    // Single push/pull arrow shown when one region is selected. Drag direction
    // determines outcome: dragging away from the face extrudes positive (add),
    // dragging into the body cuts (subtract — only when sketch is on a face).
    this.extrudeArrows = new THREE.Group();
    this.extrudeArrows.visible = false;
    this.scene.add(this.extrudeArrows);
    {
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(2.4, 7, 18),
        new THREE.MeshBasicMaterial({
          color: 0x4f7cff, transparent: true, opacity: 0.95, depthTest: false,
        })
      );
      cone.userData.extrudeArrow = 'pos';
      cone.renderOrder = 1100;
      const hit = new THREE.Mesh(
        new THREE.CylinderGeometry(5, 5, 14, 12),
        new THREE.MeshBasicMaterial({ visible: false, depthTest: false })
      );
      hit.userData.extrudeArrow = 'pos';
      hit.renderOrder = 1099;
      const g = new THREE.Group();
      g.add(cone); g.add(hit);
      g.userData.extrudeArrow = 'pos';
      this.extrudeArrows.add(g);
    }
    this.extrudePreview = null; // translucent body shown during drag

    // Articulation joint pins — small amber cylinders at each joint origin
    // oriented along the joint axis. Rebuilt by updateJointGizmos().
    this.jointGizmos = new THREE.Group();
    this.scene.add(this.jointGizmos);

    // Transform gizmo (3 colored arrows) — placed at the selected body's center
    this.gizmo = createGizmo();
    this.scene.add(this.gizmo);
    this.alignWidget = null; // built on demand when alignMode is on
    this.resizeHandles = null; // built when a single primitive is selected
    this.rotateHandles = null; // 3 colored arc handles around the selected body
    this.raycaster = new THREE.Raycaster();

    this.bind();
    this.resize();
    this.loop();
  }

  updateCamera() {
    const offset = new THREE.Vector3().setFromSpherical(this.spherical);
    this.camera.position.copy(this.target).add(offset);
    this.camera.lookAt(this.target);
  }

  bind() {
    let dragKind = null, lastX = 0, lastY = 0;
    const gizmoState = { active: false, axis: null, startVals: null, axisDir: null, startT: 0, axisOrigin: null };
    const resizeState = { active: false, body: null, axis: null, sign: null, axisOrigin: null, startT: 0, startDims: null, startPos: null, uniform: false };
    const rotateState = { active: false, axis: null, plane: null, center: null, startAngle: 0, startRots: null, ids: null };
    const computeAxisAngle = (ax, local) => {
      if (ax === 'x') return Math.atan2(local.z, local.y);
      if (ax === 'y') return -Math.atan2(local.z, local.x);
      return Math.atan2(local.y, local.x);
    };
    // Direct body drag — armed on body click, activates after small mouse delta.
    // Default mode is XZ ground-plane drag; Alt held → Y-axis drag.
    const bodyDrag = {
      armed: false, active: false, mode: null, alt: false,
      ids: null, startVals: null,
      startMouse: null, startWorld: null,
      planeY: 0, axisDir: null, anchor: null, startT: 0,
    };
    // Ctrl+drag on empty space = box select
    const boxSel = { active: false, startX: 0, startY: 0, additive: false };
    const extrudeState = {
      active: false, direction: 0, region: null, sketch: null,
      origin: null, axis: null, startT: 0, length: 0,
    };
    this.extrudeState = extrudeState; // expose for tooltip handlers below
    const ndc = (e) => {
      const r = this.canvas.getBoundingClientRect();
      return new THREE.Vector2(((e.clientX - r.left) / r.width) * 2 - 1,
                               -((e.clientY - r.top) / r.height) * 2 + 1);
    };

    this.canvas.addEventListener('pointerdown', (e) => {
      // Thread mark — click a mark in 3D to open the per-mark thread
      // dialog. The hit-disc is invisible but raycastable; tagged with
      // userData.kind === 'threadMark'.
      if (e.button === 0 && doc.mode === '3d' && !doc.faceMode && !doc.curvedPickBody &&
          !doc.mirrorMode && !doc.alignMode && !doc.cutMode && !doc.jointPickStage) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const markTargets = [];
        this.sketchGroup.traverse(o => { if (o.userData?.kind === 'threadMark') markTargets.push(o); });
        if (markTargets.length) {
          const markHits = this.raycaster.intersectObjects(markTargets, false);
          if (markHits.length > 0) {
            const ud = markHits[0].object.userData;
            openThreadedHoleForMark(ud.sketchId, ud.markId);
            return;
          }
        }
      }
      // Curved-body bbox face picker — 6 clickable face overlays around the
      // body's bounding box. Click one to sketch on that side. Click empty
      // space to cancel.
      if (doc.curvedPickBody && e.button === 0) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        if (this.bboxFacePickGroup) {
          const hits = this.raycaster.intersectObjects(this.bboxFacePickGroup.children, false);
          if (hits.length > 0) {
            const meta = hits[0].object.userData;
            const body = doc.bodies.find(b => b.id === doc.curvedPickBody);
            this.clearBboxFacePicker();
            doc.curvedPickBody = null;
            doc.faceMode = false;
            this.canvas.style.cursor = '';
            if (body) finishCurvedBodySketchOnSide(body, meta.axis, meta.sign);
            return;
          }
        }
        // Click off the picker faces — cancel
        this.clearBboxFacePicker();
        doc.curvedPickBody = null;
        doc.faceMode = false;
        this.canvas.style.cursor = '';
        setStatus('Sketch on Face cancelled.');
        return;
      }
      // Mirror plane picker — click a translucent plane to mirror across it
      if (doc.mirrorMode && e.button === 0) {
        if (this.mirrorPicker) {
          this.raycaster.setFromCamera(ndc(e), this.camera);
          const targets = [];
          this.mirrorPicker.traverse(o => { if (o.userData.mirrorPlane) targets.push(o); });
          const hits = this.raycaster.intersectObjects(targets, false);
          if (hits.length > 0) {
            const plane = hits[0].object.userData.mirrorPlane;
            mirror3DBody(plane);
            exitMirrorPick(`Mirrored across ${plane.toUpperCase()} plane`);
            return;
          }
        }
        // Click off the picker → cancel
        exitMirrorPick('Mirror cancelled.');
        return;
      }
      // Boolean cut mode — pick target body, then tool body to subtract
      if (doc.cutMode && e.button === 0) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const hits = this.raycaster.intersectObjects(this.bodyGroup.children, false);
        if (!hits.length) return;
        const pickedId = hits[0].object.userData.bodyId;
        if (doc.cutMode.stage === 'target') {
          doc.cutMode.targetId = pickedId;
          doc.cutMode.stage = 'tool';
          doc.selection = { kind: 'body', id: pickedId };
          doc.multiSelectedBodies = [pickedId];
          renderTree(); renderProps();
          setStatus('Cut — now click the TOOL body (what to subtract). Esc to cancel.');
          return;
        }
        if (doc.cutMode.stage === 'tool') {
          if (pickedId === doc.cutMode.targetId) {
            showHint('Pick a DIFFERENT body to subtract from the target.');
            return;
          }
          performBooleanCut(doc.cutMode.targetId, pickedId);
          return;
        }
        return;
      }
      // Bevel-pick mode (Fillet workflow). Each click ADDS one edge to a
      // running selection set so the user can bevel many edges in one
      // operation; click empty space (or Enter) to finish and open the
      // dialog, Esc to cancel.
      if (doc.bevelPickMode && e.button === 0) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const hits = this.raycaster.intersectObjects(this.bodyGroup.children, false)
          .filter(h => {
            const b = doc.bodies.find(x => x.id === h.object.userData.bodyId);
            if (!b) return true;
            if (b.type === 'threadShell') return false;
            if (b.type === 'fastener' && b._threadMarkRef) return false;
            return true;
          });
        if (!hits.length) {
          // Empty-space click: if anything is selected, finish; else cancel.
          if (doc.bevelSelected.length) {
            const sels = doc.bevelSelected.slice();
            doc.bevelSelected = [];
            _clearBevelHighlight();
            doc.bevelPickMode = false;
            this.canvas.style.cursor = '';
            openBevelDialog(sels);
          } else {
            doc.bevelPickMode = false;
            this.canvas.style.cursor = '';
            setStatus('Fillet cancelled');
          }
          return;
        }
        const hit = hits[0];
        const body = doc.bodies.find(b => b.id === hit.object.userData.bodyId);
        if (!body) return;
        const allEdges = _buildBevelEdgeIndex(body.mesh);
        // Double-click → select every edge around the face the user clicked
        // on. Detected by timing — two clicks on the same body within 380 ms
        // count as a face-loop request, no extra UI surface needed.
        const now = (typeof performance !== 'undefined' ? performance.now() : Date.now());
        const isDouble = (this._lastBevelClickBody === body.id) &&
                         (now - (this._lastBevelClickTime || 0) < 380);
        this._lastBevelClickTime = now;
        this._lastBevelClickBody = body.id;
        if (isDouble) {
          _selectFaceLoopFromHit(body, hit, allEdges);
          return;
        }
        const seed = _pickClosestSegment(allEdges, hit.point, body.mesh);
        if (!seed) {
          showHint('No usable edge near that click — try clicking closer to a corner.');
          return;
        }
        // Expand the picked segment to the full straight edge chain so the
        // bevel covers the whole edge instead of one tessellation sliver.
        const fullEdge = expandToFullStraightEdge(seed, allEdges);
        // Toggle behaviour — if the picked edge matches one already in the
        // selection, REMOVE it instead of ignoring the click. Lets the user
        // recover from a mispick without dropping the rest of the batch.
        // Match tolerance bumped to 0.2 mm so a re-click that lands on a
        // slightly different tessellation seam still matches the previous
        // pick of the same physical edge.
        const POS_TOL = 0.2;
        const existingIdx = doc.bevelSelected.findIndex(s => {
          if (s.bodyId !== body.id) return false;
          const aMatch = s.edge.p1.distanceTo(fullEdge.p1) < POS_TOL &&
                         s.edge.p2.distanceTo(fullEdge.p2) < POS_TOL;
          const bMatch = s.edge.p1.distanceTo(fullEdge.p2) < POS_TOL &&
                         s.edge.p2.distanceTo(fullEdge.p1) < POS_TOL;
          return aMatch || bMatch;
        });
        if (existingIdx >= 0) {
          doc.bevelSelected.splice(existingIdx, 1);
          _renderBevelHighlight();
          const n = doc.bevelSelected.length;
          setStatus(n
            ? `Fillet — removed that edge (${n} still selected). Click more, click empty space / press Enter to apply, Esc to cancel.`
            : `Fillet — selection cleared. Click an edge to start, Esc to cancel.`);
          return;
        }
        const kind = classifyBevelEdge(fullEdge, body);
        doc.bevelSelected.push({ bodyId: body.id, edge: fullEdge, kind });
        _renderBevelHighlight();
        setStatus(`Fillet — ${doc.bevelSelected.length} edge${doc.bevelSelected.length === 1 ? '' : 's'} selected. Click more, click an edge again to deselect, or click empty space / press Enter to apply.`);
        return;
      }
      // Face-pick mode (Sketch on Face workflow)
      if (doc.faceMode && e.button === 0) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const allHits = this.raycaster.intersectObjects(this.bodyGroup.children, false);
        // Skip visualizer overlays (thread shells + thread-mark visualizer bolts)
        // so a click on a body that already has threads picks the BODY's face,
        // not the shell sitting inside the hole — otherwise the sketch plane
        // gets built off the shell's small helical surface and the projection
        // looks empty.
        const hits = allHits.filter(h => {
          const b = doc.bodies.find(x => x.id === h.object.userData.bodyId);
          if (!b) return true;
          if (b.type === 'threadShell') return false;
          if (b.type === 'fastener' && b._threadMarkRef) return false;
          return true;
        });
        if (hits.length > 0) {
          const hit = hits[0];
          const sourceBody = doc.bodies.find(b => b.id === hit.object.userData.bodyId);
          // Fastener-placement variant: seat the bolt with the bottom of its
          // head face flush against the picked face, shaft perpendicular into
          // the body. Skips the sketch-on-face flow entirely.
          if (doc.fastenerPlaceTarget) {
            const fb = doc.bodies.find(b => b.id === doc.fastenerPlaceTarget);
            doc.fastenerPlaceTarget = null;
            doc.faceMode = false;
            this.canvas.style.cursor = '';
            if (fb && fb.type === 'fastener') {
              const nLocal = hit.face.normal.clone();
              const nWorld = nLocal.transformDirection(hit.object.matrixWorld).normalize();
              // Cylinder/hole detection: walk the picked body's negative
              // children for circular holes whose axis is perpendicular to
              // the picked face. If the click sits inside (or near) one of
              // those holes, snap the seat point to the hole's axis-on-face
              // intersection — that's "perfectly centered" placement.
              let seatPoint = hit.point.clone();
              let snapAxis = nWorld.clone();
              let snappedToHole = false;
              const cylinders = findHoleCylindersInBody(sourceBody);
              let best = null;
              for (const cyl of cylinders) {
                // Need cylinder axis (anti-)parallel to face normal to be
                // a hole on THIS face.
                const dot = cyl.axis.dot(nWorld);
                if (Math.abs(dot) < 0.92) continue;
                // Cylinder-axis intersection with the face plane through
                // hit.point: hit.point lies in plane (P - hit.point)·nWorld = 0.
                // P = cyl.center + t * cyl.axis  →  t = ((hit.point − cyl.center)·nWorld) / (cyl.axis·nWorld)
                const t = hit.point.clone().sub(cyl.center).dot(nWorld) / dot;
                const onFace = cyl.center.clone().add(cyl.axis.clone().multiplyScalar(t));
                const perpDist = hit.point.distanceTo(onFace);
                // Click must fall within the hole's radius (small slack for
                // edge-of-hole picks).
                if (perpDist > cyl.radius + 0.5) continue;
                if (!best || perpDist < best.perpDist) best = { cyl, onFace, perpDist, dot };
              }
              if (best) {
                seatPoint = best.onFace;
                // Axis points OUT of the face (so the head sits on the +axis
                // side and the shaft drops into the hole along -axis).
                snapAxis = (best.dot >= 0 ? best.cyl.axis.clone() : best.cyl.axis.clone().negate()).normalize();
                snappedToHole = true;
              }
              // Fastener is modeled with shaft bottom at y=0, head sitting on
              // top; head BOTTOM face is at y = shaft length. We want that
              // point flush against seatPoint with the head sticking out
              // along +snapAxis (so the shaft goes in along -snapAxis).
              const shaftLen = fb.length || 0;
              const q = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), snapAxis);
              const euler = new THREE.Euler().setFromQuaternion(q, 'XYZ');
              pushUndo();
              fb.rotation = {
                x: THREE.MathUtils.radToDeg(euler.x),
                y: THREE.MathUtils.radToDeg(euler.y),
                z: THREE.MathUtils.radToDeg(euler.z),
              };
              const origin = seatPoint.clone().sub(snapAxis.clone().multiplyScalar(shaftLen));
              fb.x = origin.x; fb.y = origin.y; fb.z = origin.z;
              this.rebuildBodies();
              renderProps();
              setStatus(snappedToHole ? 'Fastener seated — centered on hole' : 'Fastener seated on face');
            }
            return;
          }
          // Decide if the picked surface is FLAT or CURVED. On curved surfaces
          // a tessellated triangle's normal would produce a slanted sketch
          // plane — show the bbox 6-face picker instead.
          const isCurvedFace = isFaceOnCurvedSurface(sourceBody, hit);
          if (isCurvedFace) {
            doc.curvedPickBody = sourceBody.id;
            this.canvas.style.cursor = 'crosshair';
            this.buildBboxFacePicker(sourceBody);
            setStatus('Click any of the 6 highlighted bbox faces to sketch on that side. Click empty space to cancel.');
            return;
          }
          const normalLocal = hit.face.normal.clone();
          const normalWorld = normalLocal.transformDirection(hit.object.matrixWorld).normalize();
          const bbox = new THREE.Box3().setFromObject(hit.object);
          const bodyCenter = bbox.getCenter(new THREE.Vector3());
          // Verify the face normal points OUT of the body. The earlier
          // bodyCenter heuristic was wrong for asymmetric bodies — on
          // this bracket the bbox center sits inside the bosses, so the
          // base plate's top face read as "inward" and the plane flipped
          // upside down. Instead, probe a short distance along the
          // proposed normal and cast a ray back toward hit.point: if we
          // hit body geometry between the probe and the surface we
          // started on, we were inside the body and the normal needs to
          // flip. Robust to convex and non-convex shapes alike.
          const probeDist = Math.max(1, bbox.getSize(new THREE.Vector3()).length() * 0.01);
          const probe = hit.point.clone().add(normalWorld.clone().multiplyScalar(probeDist));
          const tester = new THREE.Raycaster(probe, normalWorld.clone().negate(), 0, probeDist * 2);
          const testerHits = tester.intersectObject(hit.object, false);
          // If the nearest hit going back toward the surface lands
          // noticeably SHORTER than probeDist, there's body material
          // between us and the click point → we probed INTO the body →
          // normal was inward → flip. The 0.5×probeDist threshold
          // tolerates the probe ending right at the surface (no hit
          // returned for a coincident plane) without false positives.
          if (testerHits.length && testerHits[0].distance < probeDist * 0.5) {
            normalWorld.negate();
          }
          const dist = bodyCenter.clone().sub(hit.point).dot(normalWorld);
          const planeOrigin = bodyCenter.clone().sub(normalWorld.clone().multiplyScalar(dist));
          const plane = planeFromFace(planeOrigin, normalWorld);
          const boundary = computeFaceBoundary(bbox, plane, sourceBody);
          createSketchOnPlane(plane, { boundary, sourceBodyId: hit.object.userData.bodyId });
          doc.faceMode = false;
          this.canvas.style.cursor = '';
          return;
        }
        return;
      }
      // Align mode — handle picks an alignment axis/kind. Clicking on a handle
      // stays in align mode (so you can chain multiple axes); clicking anywhere
      // else exits.
      if (doc.alignMode && e.button === 0) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const hs = [];
        if (this.alignWidget) this.alignWidget.traverse(o => { if (o.userData.alignAxis) hs.push(o); });
        const hits = this.raycaster.intersectObjects(hs, false);
        if (hits.length > 0) {
          const h = hits[0].object.userData;
          alignBodies(`${h.alignAxis}-${h.alignKind}`);
          // Rebuild widget at the new (post-align) bbox; stay in align mode

          return;

        exitAlignMode();

      }

      if (doc.jointPickStage && e.button === 0) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const hits = this.raycaster.intersectObjects(this.bodyGroup.children, false);
        if (!hits.length) {
          showHint('Click on a body.');
          return;
        }
        const pickedId = hits[0].object.userData.bodyId;
        if (doc.jointPickStage === 'bodyA') {
          doc.jointDraft.bodyA = pickedId;
          doc.jointPickStage = 'bodyB';
          doc.selection = { kind: 'body', id: pickedId };
          doc.multiSelectedBodies = [pickedId];
          renderTree(); renderProps();
          setStatus('Joint — click the second body (B). Esc to cancel.');
          return;
        }
        if (doc.jointPickStage === 'bodyB') {
          if (pickedId === doc.jointDraft.bodyA) {
            showHint('Pick a DIFFERENT body for B.');
            return;
          }
          doc.jointDraft.bodyB = pickedId;
          doc.jointPickStage = 'axis';
          doc.multiSelectedBodies = [doc.jointDraft.bodyA, doc.jointDraft.bodyB];
          renderTree(); renderProps();
          setStatus('Joint — click near an edge of either body to set the hinge axis. Esc to cancel.');
          return;
        }
        if (doc.jointPickStage === 'axis') {
          // Picking constrained to the two chosen bodies — clicks on others ignored.
          const { bodyA, bodyB } = doc.jointDraft;
          if (pickedId !== bodyA && pickedId !== bodyB) {
            showHint('Click on body A or body B, near the edge that should be the hinge axis.');
            return;
          }
          const body = doc.bodies.find(b => b.id === pickedId);
          const edge = findClosestBodyEdge(body, this.raycaster.ray);

            showHint('Could not find an edge there — try a sharp corner or straight edge.');

        lastX = e.clientX; lastY = e.clientY;
        this.canvas.setPointerCapture(e.pointerId);
        return;

      if (e.button === 0 && doc.panMode) {
        dragKind = 'pan';
        lastX = e.clientX; lastY = e.clientY;
        this.canvas.setPointerCapture(e.pointerId);
        return;
      }
      // Left-button + orbit modifier (Ctrl/Cmd, Space, Alt, or orbit-mode toggle) → orbit
      if (e.button === 0 && (e.ctrlKey || e.metaKey || e.altKey || doc.spaceHeld || doc.orbitMode)) {

        return;

          const handles = [];
          this.resizeHandles.traverse(o => { if (o.userData.resizeAxis) handles.push(o); });
          const hits = this.raycaster.intersectObjects(handles, false);
          if (hits.length > 0 && doc.selection?.kind === 'body') {
            const hh = hits[0].object.userData;
            const bodyH = doc.bodies.find(b => b.id === doc.selection.id);
            if (bodyH && bodyH.locked) {
              showHint('Body is locked. Unlock it in the tree to resize.');
              e.stopPropagation();
              return;
            }
            if (bodyH) {
              pushUndo();
              resizeState.active = true;
              resizeState.body = bodyH;
              resizeState.axis = hh.resizeAxis;
              resizeState.sign = hh.resizeSign;
              resizeState.uniform = e.shiftKey;
              resizeState.startDims = {
                w: bodyH.w, h: bodyH.h, d: bodyH.d, r: bodyH.r,
                tube: bodyH.tube, height: bodyH.height,
              };
              resizeState.startPos = { x: bodyH.x || 0, y: bodyH.y || 0, z: bodyH.z || 0 };
              const axisDir = hh.resizeAxis === 'x' ? new THREE.Vector3(1, 0, 0)
                            : hh.resizeAxis === 'y' ? new THREE.Vector3(0, 1, 0)
                            :                         new THREE.Vector3(0, 0, 1);
              resizeState.axisDir = axisDir;
              resizeState.axisOrigin = hits[0].object.position.clone();
              resizeState.startT = projectRayOnAxis(this.raycaster.ray, resizeState.axisOrigin, axisDir);
              this.canvas.setPointerCapture(e.pointerId);
              e.stopPropagation();
              return;
            }
          }
        }

        // 0b. Rotation handles
        if (this.rotateHandles && doc.selection?.kind === 'body') {
          const handles = [];
          this.rotateHandles.traverse(o => { if (o.userData.rotateAxis) handles.push(o); });
          const hits = this.raycaster.intersectObjects(handles, false);
          if (hits.length > 0) {
            const ax = hits[0].object.userData.rotateAxis;
            const ids = doc.multiSelectedBodies?.length ? doc.multiSelectedBodies : [doc.selection.id];
            if (ids.some(id => doc.bodies.find(b => b.id === id)?.locked)) {
              showHint('One or more selected bodies are locked.');
              e.stopPropagation();
              return;
            }
            pushUndo();
            rotateState.active = true;
            rotateState.axis = ax;
            rotateState.center = (this.rotateHandles.userData.bodyCenter || this.rotateHandles.position).clone();
            rotateState.ids = [...ids];
            rotateState.startRots = {};
            for (const id of ids) {
              const b = doc.bodies.find(x => x.id === id);
              if (b) rotateState.startRots[id] = { ...(b.rotation || { x: 0, y: 0, z: 0 }) };
            }
            const normal = ax === 'x' ? new THREE.Vector3(1, 0, 0)
                          : ax === 'y' ? new THREE.Vector3(0, 1, 0)
                          :              new THREE.Vector3(0, 0, 1);
            rotateState.plane = new THREE.Plane(normal, -normal.dot(rotateState.center));
            const point = new THREE.Vector3();
            if (this.raycaster.ray.intersectPlane(rotateState.plane, point)) {
              const local = point.clone().sub(rotateState.center);
              rotateState.startAngle = computeAxisAngle(ax, local);
            } else {
              rotateState.startAngle = 0;
            }
            this.canvas.setPointerCapture(e.pointerId);
            e.stopPropagation();
            return;
          }
        }

        // 1. Gizmo arrows (only when not shift-clicking)
        if (!e.shiftKey && this.gizmo.visible) {
          const arrows = [];
          this.gizmo.traverse(o => { if (o.userData.gizmoAxis) arrows.push(o); });
          const hits = this.raycaster.intersectObjects(arrows, false);
          if (hits.length > 0 && doc.selection?.kind === 'body') {
            const axis = hits[0].object.userData.gizmoAxis;
            const giIds = doc.multiSelectedBodies?.length ? doc.multiSelectedBodies : [doc.selection.id];
            if (giIds.some(id => doc.bodies.find(b => b.id === id)?.locked)) {
              showHint('Body is locked. Unlock it in the tree to move.');
              e.stopPropagation();
              return;
            }
            pushUndo();
            gizmoState.active = true;
            gizmoState.axis = axis;
            gizmoState.axisDir = axis === 'x' ? new THREE.Vector3(1,0,0)
                                : axis === 'y' ? new THREE.Vector3(0,1,0)
                                :                new THREE.Vector3(0,0,1);
            // Freeze the axis origin at drag start — gizmo will move with the body, but the
            // math must use the original origin so projection stays consistent.
            gizmoState.axisOrigin = this.gizmo.position.clone();
            gizmoState.startT = projectRayOnAxis(this.raycaster.ray, gizmoState.axisOrigin, gizmoState.axisDir);
            // Capture starting position for every selected body so they all move together
            gizmoState.startVals = {};
            const ids = doc.multiSelectedBodies?.length ? doc.multiSelectedBodies : [doc.selection.id];
            for (const id of ids) {
              const b = doc.bodies.find(x => x.id === id);
              if (b) gizmoState.startVals[id] = b[axis] || 0;
            }
            this.canvas.setPointerCapture(e.pointerId);
            e.stopPropagation();
            return;
          }
        }
        // 1.4 Extrude push/pull arrow — drag direction determines positive
        // (push out, add) vs. negative (push in, cut into body). Single arrow.
        if (this.extrudeArrows.visible && !e.shiftKey) {
          const hits = this.raycaster.intersectObject(this.extrudeArrows, true);
          if (hits.length > 0) {
            const meta = this.extrudeArrows.userData;
            extrudeState.active = true;
            extrudeState.direction = 1; // updated on drag based on sign of delta
            extrudeState.region = meta.region;
            extrudeState.sketch = meta.sketch;
            extrudeState.origin = meta.center.clone();
            extrudeState.axis = meta.normal.clone();
            extrudeState.startT = projectRayOnAxis(this.raycaster.ray, extrudeState.origin, extrudeState.axis);
            extrudeState.length = 0;
            this.canvas.setPointerCapture(e.pointerId);
            showExtrudeTooltip();
            updateExtrudeTooltipText(0, this.extrudeArrows.position);
            e.stopPropagation();
            return;
          }
        }
        // 1.5 Region selection (translucent sketch patches sit above bodies and
        // hit-test first so a region on a face wins over the face itself).
        const regionHits = this.raycaster.intersectObjects(this.regionGroup.children, false);
        if (regionHits.length > 0) {
          // Prefer the smallest-area region when several are coplanar at this
          // hit point — this lets the user click a square drawn inside a
          // sphere/cube boundary and actually pick the square, not the
          // surrounding boundary.
          let best = regionHits[0];
          let bestArea = best.object.userData.regionArea ?? Infinity;
          const d0 = best.distance;
          for (let i = 1; i < regionHits.length; i++) {
            const h = regionHits[i];
            // Only compare hits that landed on essentially the same plane
            if (Math.abs(h.distance - d0) > 0.5) continue;
            const a = h.object.userData.regionArea ?? Infinity;
            if (a < bestArea) { best = h; bestArea = a; }
          }
          const regionId = best.object.userData.regionId;
          if (e.shiftKey) {
            const idx = doc.selectedRegions.indexOf(regionId);
            if (idx >= 0) doc.selectedRegions.splice(idx, 1);
            else doc.selectedRegions.push(regionId);
          } else {
            doc.selectedRegions = [regionId];
            doc.selection = { kind: 'region', id: regionId };
            doc.multiSelectedBodies = [];
            this.updateGizmo();
          }
          this.updateRegions();
          this.updateExtrudeGizmo();
          renderTree(); renderProps();
          setStatus(`${doc.selectedRegions.length} region${doc.selectedRegions.length === 1 ? '' : 's'} selected — drag the arrow to push or pull`);
          return;
        }
        // 2. Body selection
        const bodyHits = this.raycaster.intersectObjects(this.bodyGroup.children, false);
        if (bodyHits.length > 0) {
          const bodyId = bodyHits[0].object.userData.bodyId;
          const body = doc.bodies.find(b => b.id === bodyId);
          if (e.shiftKey) {
            // Toggle in multi-selection
            const idx = doc.multiSelectedBodies.indexOf(bodyId);
            if (idx >= 0) doc.multiSelectedBodies.splice(idx, 1);
            else doc.multiSelectedBodies.push(bodyId);
          } else {
            // Replace; auto-include other bodies in the same group
