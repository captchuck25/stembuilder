            bestD = d; clickedOrig = ent; simplePoly = poly;
            clickedSegIdx = i; clickedT = t;
          }
        }
      }
      if (!clickedOrig) {
        showHint('Click directly on a line, rect edge, or circle to trim it.');
        return;
      }

      // 2. Compute cumulative arc-length parameters along the simple polyline.
      const n = simplePoly.points.length;
      const segCount = simplePoly.closed ? n : n - 1;
      const segLens = [];
      for (let i = 0; i < segCount; i++) {
        const a = simplePoly.points[i], b = simplePoly.points[(i + 1) % n];
        segLens.push(Math.hypot(b.x - a.x, b.y - a.y));
      }
      const cumLens = [0];
      for (let i = 0; i < segCount; i++) cumLens.push(cumLens[i] + segLens[i]);
      const totalLen = cumLens[segCount];
      if (totalLen < 1e-6) {
        showHint('Entity too small to trim.');
        return;
      }
      const clickedS = cumLens[clickedSegIdx] + clickedT * segLens[clickedSegIdx];

      // 3. Find intersections of the whole polyline with all OTHER entities.
      //    Construction lines count as cutters — if a line physically crosses
      //    a dashed reference, that crossing IS a valid trim bracket.
      const intersections = []; // each: { s, x, y }
      for (const other of doc.sketch.entities) {
        if (other.id === clickedOrig.id) continue;
        const oSegs = entityToSegments(other);
        if (!oSegs.length) continue;
        for (let i = 0; i < segCount; i++) {
          const a = simplePoly.points[i], b = simplePoly.points[(i + 1) % n];
          for (const os of oSegs) {
            const hit = segmentIntersection(a, b, os.a, os.b);
            if (!hit) continue;
            const s = cumLens[i] + hit.t * segLens[i];
            // Skip an intersection that sits exactly at the click point
            if (Math.abs(s - clickedS) < 1e-3) continue;
            intersections.push({ s, x: hit.x, y: hit.y });
          }
        }
      }

      pushUndo();

      if (intersections.length === 0) {
        // No crossings anywhere. For user-drawn polylines, fall back to the
        // v1 behavior of removing just the clicked segment so the tool still
        // does *something* useful for cleanup. For rects/circles, do nothing
        // — removing a single tessellated micro-segment would just leave a
        // confusing barely-open shape.
        if (clickedOrig.type === 'polyline'
            && clickedOrig.points.length === simplePoly.points.length) {
          const orig = clickedOrig;
          const clone = (pts) => ({
            ...JSON.parse(JSON.stringify(orig)),
            id: doc.sketch.nextId++, points: pts, closed: false,
          });
          if (orig.closed) {
            orig.points = orig.points.slice(clickedSegIdx + 1)
              .concat(orig.points.slice(0, clickedSegIdx + 1));
            orig.closed = false;
          } else {
            const left = orig.points.slice(0, clickedSegIdx + 1);
            const right = orig.points.slice(clickedSegIdx + 1);
            const idx = doc.sketch.entities.indexOf(orig);
            doc.sketch.entities.splice(idx, 1);
            if (left.length >= 2) doc.sketch.entities.push(clone(left));
            if (right.length >= 2) doc.sketch.entities.push(clone(right));
          }
          doc.selection = null; doc.multiSelectedSketch = [];
          renderTree(); renderProps(); this.render();
          setStatus('Trimmed segment (no crossings found)');
        } else {
          showHint('No crossings found — overlap this with another shape, then trim.');
        }
        return;
      }

      // 4. Bracket the click with the nearest intersections on each side.
      intersections.sort((a, b) => a.s - b.s);
      let leftInt = null, rightInt = null;
      for (const it of intersections) {
        if (it.s < clickedS - 1e-6) leftInt = it;
        else if (it.s > clickedS + 1e-6 && !rightInt) rightInt = it;
      }
      if (simplePoly.closed) {
        // Circular wrap: if no intersection before/after the click in linear
        // s-space, use the last/first one (cyclic neighbours).
        if (!leftInt)  leftInt  = intersections[intersections.length - 1];
        if (!rightInt) rightInt = intersections[0];
      } else {
        // Open polyline: missing brackets fall back to the polyline endpoints.
        if (!leftInt)  leftInt  = { s: 0,        x: simplePoly.points[0].x,     y: simplePoly.points[0].y     };
        if (!rightInt) rightInt = { s: totalLen, x: simplePoly.points[n - 1].x, y: simplePoly.points[n - 1].y };
      }

      // 5. Build the resulting polyline(s) by removing the bracketed arc.
      const baseProps = {
        type: 'polyline',
        construction: clickedOrig.construction || false,
        groupId: clickedOrig.groupId,
      };
      const cloneWithPoints = (pts, closed) => ({
        ...baseProps, points: pts, closed, id: doc.sketch.nextId++,
      });
      const results = [];

      if (simplePoly.closed) {
        // Closed → open. Kept arc goes from rightInt forward to leftInt.
        // If leftInt.s < rightInt.s, the kept arc wraps through totalLen → 0.
        const keptWraps = leftInt.s < rightInt.s;
        const inKept = (si) => keptWraps
          ? (si > rightInt.s + 1e-6 || si < leftInt.s - 1e-6)
          : (si > rightInt.s + 1e-6 && si < leftInt.s - 1e-6);
        const vertsKept = [];
        for (let i = 0; i < n; i++) {
          const si = cumLens[i];
          if (!inKept(si)) continue;
          let dist = si - rightInt.s;
          if (dist < 0) dist += totalLen;
          vertsKept.push({ x: simplePoly.points[i].x, y: simplePoly.points[i].y, dist });
        }
        vertsKept.sort((a, b) => a.dist - b.dist);
        const pts = [{ x: rightInt.x, y: rightInt.y }];
        for (const v of vertsKept) pts.push({ x: v.x, y: v.y });
        pts.push({ x: leftInt.x, y: leftInt.y });
        if (pts.length >= 2) results.push(cloneWithPoints(pts, false));
      } else {
        // Open → up to two open polylines flanking the removed arc.
        const leftPts = [];
        for (let i = 0; i < n; i++) {
          if (cumLens[i] < leftInt.s - 1e-6) {
            leftPts.push({ x: simplePoly.points[i].x, y: simplePoly.points[i].y });
          }
        }
        if (leftInt.s > 1e-6) leftPts.push({ x: leftInt.x, y: leftInt.y });
        const rightPts = [];
        if (rightInt.s < totalLen - 1e-6) rightPts.push({ x: rightInt.x, y: rightInt.y });
        for (let i = 0; i < n; i++) {
          if (cumLens[i] > rightInt.s + 1e-6) {
            rightPts.push({ x: simplePoly.points[i].x, y: simplePoly.points[i].y });
          }
        }
        if (leftPts.length >= 2)  results.push(cloneWithPoints(leftPts, false));
        if (rightPts.length >= 2) results.push(cloneWithPoints(rightPts, false));
      }

      // 6. Replace the original entity with the trim result(s).
      const origIdx = doc.sketch.entities.indexOf(clickedOrig);
      doc.sketch.entities.splice(origIdx, 1);
      for (const r of results) doc.sketch.entities.push(r);

      doc.selection = null; doc.multiSelectedSketch = [];
      renderTree(); renderProps(); this.render();
      setStatus(`Trimmed at ${intersections.length === 1 ? '1 crossing' : `${intersections.length} crossings`}`);
      return;
    }

    // Eraser — click an entity to delete it
    if (this.tool === 'eraser') {
      const hit = this.hitTest(wx, wy);
      if (hit) {
        pushUndo();
        doc.sketch.entities = doc.sketch.entities.filter(e => e.id !== hit.id);
        if (doc.selection?.id === hit.id) doc.selection = null;
        setStatus('Deleted shape');
        renderTree(); renderProps(); this.render();
      }
      return;
    }

    // Arc tool — click start, click end, then move to shape the bulge, click to commit
    if (this.tool === 'arc') {
      if (!this.activeArc) {
        this.activeArc = { start: { x: px, y: py }, end: null };
        setStatus('Arc: click the end point');
      } else if (!this.activeArc.end) {
        this.activeArc.end = { x: px, y: py };
        setStatus('Arc: move the mouse to shape the arc, click to finish');
      } else {
        const arc = arcFromThreePoints(this.activeArc.start, { x: px, y: py }, this.activeArc.end);
        if (arc) {
          pushUndo();
          arc.id = doc.sketch.nextId++;
          doc.sketch.entities.push(arc);
          doc.selection = { kind: 'sketch', id: arc.id };
          renderTree(); renderProps();
        }
        this.activeArc = null;
        setStatus('Arc added');
      }
      this.render();
      return;
    }

    // Polyline (Line) tool — click-based, not drag-based
    if (this.tool === 'line' || this.tool === 'construction') {
      // Use the snapped/axis-snapped cursor that onMove already computed
      const usePx = this.cursorWorld.x !== undefined ? this.cursorWorld.x : px;
      const usePy = this.cursorWorld.y !== undefined ? this.cursorWorld.y : py;
      if (!this.activeLine) {
        this.activeLine = {
          id: doc.sketch.nextId++, type: 'polyline',
          points: [{ x: px, y: py }],
          closed: false,
          construction: this.tool === 'construction',
        };
        this.cursorWorld = { x: px, y: py };
        // If the first click landed on an existing entity's feature (endpoint,
        // midpoint, edge, intersection), remember the segment direction so
        // we can offer a perpendicular snap on the next click.
        this.activeLine.perpRef = this._findRefSegment(px, py);
        this.updateLengthOverlay();
      } else {
        const first = this.activeLine.points[0];
        const tolMm = 6 / this.view.pxPerMm;
        if (this.activeLine.points.length >= 2 &&
            Math.hypot(usePx - first.x, usePy - first.y) < tolMm) {
          // close the loop
          this.activeLine.closed = true;
          this.finalizeLine(true);
        } else {
          // add a new vertex (use axis-snapped position from onMove)
          this.activeLine.points.push({ x: usePx, y: usePy });
        }
      }
      // Drag-to-curve: holding mouse and dragging this click will shape a Bezier handle
      if (this.activeLine) {
        this.curveDrag = { idx: this.activeLine.points.length - 1, sx: e.clientX, sy: e.clientY, dragging: false };
        this.dragMode = 'curve-drag';
      }
      this.render();
      return;
    }

    // Dimension tool — click two points (snap-aware) to drop a permanent
    // distance label. The picked points are the actual entity points if a
    // snap matched (endpoint, corner, etc.), otherwise the raw cursor.
    if (this.tool === 'thread-mark') {
      // Drop a thread-hole center mark. In 3D the "Thd Holes" action turns
      // every mark in the active sketch into a real threaded hole + (opt.)
      // matching bolt at a chosen size + depth.
      pushUndo();
      const mark = {
        id: doc.sketch.nextId++,
        type: 'threadMark',
        cx: px, cy: py,
      };
      doc.sketch.entities.push(mark);
      doc.selection = { kind: 'sketch', id: mark.id };
      setStatus('Thread mark placed — switch to 3D and click "Thd Holes" to turn marks into real threaded holes.');
      this.render(); renderTree(); renderProps();
      return;
    }

    if (this.tool === 'dimension') {
      if (!this.activeDim) {
        this.activeDim = { p1: { x: px, y: py } };
        setStatus('Dimension — click the second point');
      } else {
        pushUndo();
        const p1 = this.activeDim.p1;
        const p2 = { x: px, y: py };
        const dim = {
          id: doc.sketch.nextId++,
          type: 'dimension',
          p1, p2,
          // Default offset: 8 mm perpendicular off the dimension line.
          // Stored as a signed distance so the label can sit on either side.
          off: 8,
        };
        doc.sketch.entities.push(dim);
        this.activeDim = null;
        setStatus(`Added dimension: ${fmtUL(Math.hypot(p2.x - p1.x, p2.y - p1.y))}`);
        this.render();
        renderTree();
      }
      this.render();
      return;
    }

    // Rect / Circle two-click drawing flow (also supports drag-release):
    //   1st click  → place start, enter 'draw' mode, show shape tooltip
    //   move       → draft sized by cursor; tooltip shows live W×H or R
    //   2nd click  → commit at current cursor position (place mode)
    //   OR release after dragging → commit (drag-and-release also works)
    //   Type + Enter → commit at typed value(s)
    if (this.tool === 'rect' || this.tool === 'circle') {
      // Second click while a placement is pending → commit now.
      if (this.draft && this.dragMode === 'shape-place') {
        this._commitShapeDraft();
        return;
      }
      // First click → create draft, enter draw mode.
      this.typedDim1 = null;
      this.typedDim2 = null;
      if (this.tool === 'rect') {
        this.draft = { id: doc.sketch.nextId++, type: 'rect', x: px, y: py, w: 0, h: 0 };
      } else {
        this.draft = { id: doc.sketch.nextId++, type: 'circle', cx: px, cy: py, r: 0 };
      }
      this.dragMode = 'draw';
      this.dragStart = { wx: px, wy: py, sx: e.clientX, sy: e.clientY };
      showShapeTooltip(this.draft.type);
      updateShapeTooltip(this.draft, e.clientX, e.clientY);
      setStatus(this.draft.type === 'rect'
        ? 'Move to size, click to place. Type W (Tab H) + Enter to lock dimensions. Esc to cancel.'
        : 'Move to size, click to place. Type R + Enter to lock radius. Esc to cancel.');
    }
  }

  // Commit the current rect/circle draft into doc.sketch.entities, then
  // tear down the draw/place mode + tooltip. No-op if no draft.
  _commitShapeDraft() {
    if (!this.draft) return;
    const d = this.draft;
    const ok = (d.type === 'rect' && Math.abs(d.w) > 0.05 && Math.abs(d.h) > 0.05) ||
               (d.type === 'circle' && d.r > 0.05);
    if (ok) {
      // Rect with negative w/h was drawn up/left — normalise.
      if (d.type === 'rect') {
        if (d.w < 0) { d.x += d.w; d.w = -d.w; }
        if (d.h < 0) { d.y += d.h; d.h = -d.h; }
      }
      pushUndo();
      doc.sketch.entities.push(d);
      doc.selection = { kind: 'sketch', id: d.id };
      doc.multiSelectedSketch = [d.id];
      setStatus(`Added ${d.type}`);
      renderTree(); renderProps();
    }
    this.draft = null;
    this.dragMode = null;
    this.dragStart = null;
    this.typedDim1 = null;
    this.typedDim2 = null;
    hideShapeTooltip();
    this.render();
  }

  onMove(e) {
    const [wx, wy] = this.pointerWorld(e);
    this.cursorWorld = { x: wx, y: wy };
    $('cursor-coords').textContent = `${fmtU(wx)}, ${fmtU(wy)} ${unitLabel()}`;

    // Mirror axis-pick preview — let the snap engine help line up the axis
    // with endpoints/edges, and trigger a re-render so the preview line
    // follows the cursor.
    if (this.mirrorAxis) {
      this.snap = this.computeSnap(wx, wy);
      this.scheduleRender();
      return;
    }

    // 2D box-select rectangle update — track drag direction:
    //   Left → right (current x > start x): "window" mode, solid blue, picks
    //     entities fully inside the box.
    //   Right → left (current x < start x): "crossing" mode, dashed green,
    //     picks any entity touched by the box.
    if (this.boxSel) {
      const ov = $('box-select');
      const ca = $('canvas-area').getBoundingClientRect();
      const x = Math.min(this.boxSel.startX, e.clientX) - ca.left;
      const y = Math.min(this.boxSel.startY, e.clientY) - ca.top;
      const w = Math.abs(e.clientX - this.boxSel.startX);
      const h = Math.abs(e.clientY - this.boxSel.startY);
      const crossing = e.clientX < this.boxSel.startX;
      if (ov) {
        ov.style.left = x + 'px'; ov.style.top = y + 'px';
        ov.style.width = w + 'px'; ov.style.height = h + 'px';
        ov.classList.toggle('crossing', crossing);
      }
      return;
    }

    // Node vertex drag: move a polyline point to a new position
    if (this.dragMode === 'node-move-pending' || this.dragMode === 'node-move') {
      const ns = this.nodeMoveState;
      if (!ns) { this.dragMode = null; return; }
      if (this.dragMode === 'node-move-pending') {
        if (Math.hypot(e.clientX - ns.startX, e.clientY - ns.startY) < 5) return;
        pushUndo();
        this.dragMode = 'node-move';
      }
      const ent = doc.sketch.entities.find(e2 => e2.id === ns.entId);
      if (ent) {
        const p = ent.points[ns.pointIdx];
        const snap = this.computeSnap(wx, wy, ent.id);
        p.x = snap ? snap.x : wx;
        p.y = snap ? snap.y : wy;
        this.snap = snap;
      }
      this.scheduleRender();
      return;
    }

    // Upgrade move-pending to move once drag threshold is crossed
    if (this.dragMode === 'move-pending') {
      if (Math.hypot(e.clientX - this.dragStart.sx, e.clientY - this.dragStart.sy) < 5) return;
      pushUndo();
      this.dragMode = 'move';
    }

    // Select-tool cp-drag: dragging an existing Bezier control handle
    if (this.dragMode === 'cp-drag' && this.cpDrag) {
      const ent = doc.sketch.entities.find(e => e.id === this.cpDrag.entId);
      const pt  = ent?.points[this.cpDrag.pointIdx];
      if (pt) {
        const delta = { dx: wx - pt.x, dy: wy - pt.y };
        pt[this.cpDrag.type] = delta;
      }
      this.scheduleRender();
      return;
    }

    // Bezier curve-drag: user is holding mouse after placing a line point to shape a handle
    if (this.dragMode === 'curve-drag' && this.curveDrag && this.activeLine) {
      const screenDist = Math.hypot(e.clientX - this.curveDrag.sx, e.clientY - this.curveDrag.sy);
      if (screenDist > 4) {
        this.curveDrag.dragging = true;
        const pt = this.activeLine.points[this.curveDrag.idx];
        if (pt) { pt.cpOut = { dx: wx - pt.x, dy: wy - pt.y }; pt.cpIn = { dx: -(wx - pt.x), dy: -(wy - pt.y) }; }
      }
      this.scheduleRender();
      return;
    }

    // Live preview during arc drawing
    if (this.tool === 'arc' && this.activeArc && !this.dragMode) {
      this.snap = this.computeSnap(wx, wy);
      this.scheduleRender();
      return;
    }

    // Live preview during polyline drawing — repaint to show segment to cursor
    if ((this.tool === 'line' || this.tool === 'construction') && this.activeLine && !this.dragMode) {
      const snap = this.computeSnap(wx, wy);
      let px = snap ? snap.x : wx, py = snap ? snap.y : wy;
      const last = this.activeLine.points[this.activeLine.points.length - 1];
      const STRONG = new Set(['endpoint','intersection','midpoint','face-corner','origin','center']);
      const isStrong = snap && STRONG.has(snap.kind);
      // Perpendicular snap — when the FIRST segment is being drawn and the
      // start point lies on a reference entity's segment, snap to the exact
      // perpendicular direction if the cursor is within ~7° of it.
      let perpHit = null;
      if (!isStrong && this.activeLine.perpRef && this.activeLine.points.length === 1) {
        const ref = this.activeLine.perpRef;
        const ndx = px - last.x, ndy = py - last.y;
        const nlen = Math.hypot(ndx, ndy);
        if (nlen > 0.5) {
          const dot = Math.abs((ref.dir.x * ndx + ref.dir.y * ndy) / nlen);
          if (dot < 0.12) { // < ~7° from perpendicular
            const perpDir = { x: -ref.dir.y, y: ref.dir.x };
            const proj = ndx * perpDir.x + ndy * perpDir.y;
            perpHit = { x: last.x + perpDir.x * proj, y: last.y + perpDir.y * proj };
          }
        }
      }
      if (isStrong) {
        this.snap = snap;
      } else if (perpHit) {
        px = perpHit.x; py = perpHit.y;
        this.snap = { x: px, y: py, kind: 'perpendicular' };
      } else if (e.shiftKey) {
        const ddx = Math.abs(px - last.x), ddy = Math.abs(py - last.y);
        if (ddx >= ddy) py = last.y; else px = last.x;
        this.snap = { x: px, y: py, kind: 'axis' };
      } else {
        const axis = this.axisSnap(last.x, last.y, px, py);
        if (axis) { px = axis.x; py = axis.y; this.snap = { x: px, y: py, kind: 'axis' }; }
        else this.snap = snap;
      }
      this.cursorWorld = { x: px, y: py };
      // Update length and angle inputs with current preview (only when not focused)
      const li = $('length-input'), ai = $('angle-input');
      const len = Math.hypot(px - last.x, py - last.y);
      const ang = Math.atan2(py - last.y, px - last.x) * 180 / Math.PI;
      if (li && document.activeElement !== li) li.value = fmtU(len);
      if (ai && document.activeElement !== ai) ai.value = fmt(ang);
      const lu = $('length-unit'); if (lu) lu.textContent = unitLabel();
      this.scheduleRender();
      return;
    }

    // continuous snap preview when drawing or hovering with a creation tool
    if (this.dragMode === 'pan') {
      this.view.panX = this.dragStart.panX + (e.clientX - this.dragStart.sx);
      this.view.panY = this.dragStart.panY + (e.clientY - this.dragStart.sy);
      this.scheduleRender();
      return;
    }

    if ((this.dragMode === 'draw' || this.dragMode === 'shape-place') && this.draft) {
      const start = this.dragStart;
      const snap = this.computeSnap(wx, wy);
      let px = snap ? snap.x : wx, py = snap ? snap.y : wy;
      // axis snap
      const axis = this.axisSnap(start.wx, start.wy, px, py);
      if (axis) { px = axis.x; py = axis.y; }
      this.snap = snap || (axis ? { x: px, y: py, kind: 'axis' } : null);

      if (this.draft.type === 'rect') {
        let w = px - start.wx, h = py - start.wy;
        if (e.shiftKey) { // square
          const m = Math.max(Math.abs(w), Math.abs(h));
          w = Math.sign(w || 1) * m; h = Math.sign(h || 1) * m;
        }
        // Typed-distance overrides: keep cursor direction, lock magnitude.
        if (this.typedDim1 != null && this.typedDim1 > 0) {
          w = (Math.sign(w) || 1) * this.typedDim1;
        }
        if (this.typedDim2 != null && this.typedDim2 > 0) {
          h = (Math.sign(h) || 1) * this.typedDim2;
        }
        this.draft.x = w >= 0 ? start.wx : start.wx + w;
        this.draft.y = h >= 0 ? start.wy : start.wy + h;
        this.draft.w = Math.abs(w);
        this.draft.h = Math.abs(h);
      } else if (this.draft.type === 'circle') {
        let r = Math.hypot(px - start.wx, py - start.wy);
        if (this.typedDim1 != null && this.typedDim1 > 0) r = this.typedDim1;
        this.draft.r = r;
      }
      updateShapeTooltip(this.draft, e.clientX, e.clientY);
      this.scheduleRender();
      return;
    }

    // Bbox-handle resize drag — recompute geometry from snapshot every frame
    // (otherwise repeated scale-around-anchor applications compound).
    if (this.dragMode === 'bbox-resize' && this.bboxResize) {
      const s = this.bboxResize;
      const ent = doc.sketch.entities.find(en => en.id === s.entId);
      if (ent) {
        restoreEntityFromSnapshot(ent, s.snapshot);
        // Honour grid snap + feature snap on the cursor before computing the
        // scale factors. Without this the dragged corner lands on whatever
        // raw pixel the cursor is over, ignoring the user's grid setting.
        let gx = wx, gy = wy;
        const snapHit = this.computeSnap(wx, wy, s.entId);
        if (snapHit) { gx = snapHit.x; gy = snapHit.y; this.snap = snapHit; }
        else if (doc.grid?.snap && doc.grid.spacing > 0) {
          const step = doc.grid.spacing;
          gx = Math.round(wx / step) * step;
          gy = Math.round(wy / step) * step;
          this.snap = { x: gx, y: gy, kind: 'grid' };
        } else {
          this.snap = null;
        }
        // fx = how much the original anchor→grab x-vector should stretch to
        //      match the cursor's new x-distance from the anchor. Same for fy.
        let fx = Math.abs(s.origVecX) > 1e-6 ? (gx - s.anchor.x) / s.origVecX : 1;
        let fy = Math.abs(s.origVecY) > 1e-6 ? (gy - s.anchor.y) / s.origVecY : 1;
        // Edge handles only stretch their own axis.
        if (s.handle === 'n' || s.handle === 's') fx = 1;
        if (s.handle === 'e' || s.handle === 'w') fy = 1;
        // Shift held on a corner → uniform scale (preserve aspect ratio).
        if (e.shiftKey && s.handle !== 'n' && s.handle !== 's' && s.handle !== 'e' && s.handle !== 'w') {
          const absF = Math.min(Math.abs(fx), Math.abs(fy));
          fx = Math.sign(fx) * absF || absF;
          fy = Math.sign(fy) * absF || absF;
        }
        // Clamp very small factors so geometry doesn't degenerate to a point.
        const MIN = 0.02;
        if (fx !== 1 && Math.abs(fx) < MIN) fx = (fx < 0 ? -MIN : MIN);
        if (fy !== 1 && Math.abs(fy) < MIN) fy = (fy < 0 ? -MIN : MIN);
        scaleEntityAround(ent, s.anchor, fx, fy);
        this.scheduleRender();
      }
      return;
    }

    if (this.dragMode === 'move' && doc.selection?.kind === 'sketch') {
      const snap = this.computeSnap(wx, wy, doc.selection.id);
      let px = snap ? snap.x : wx, py = snap ? snap.y : wy;
      const dx = px - this.dragStart.wx, dy = py - this.dragStart.wy;
      // Move every entity in the multi-selection (including group members)
      for (const s of (this.dragStart.starts || [])) {
        const ent = doc.sketch.entities.find(x => x.id === s.id);
        if (ent) moveEntity(ent, s.snap, dx, dy);
      }
      this.snap = snap;
      this.scheduleRender();
      renderProps();
      return;
    }

    // Repeat-offset mode: update preview as mouse moves + reposition the
    // floating distance tooltip near the cursor.
    if (this.offsetMode) {
      this._updateOffsetPreview(wx, wy);
      updateOffsetTooltip(this.offsetMode.d, e.clientX, e.clientY);
      this.scheduleRender();
      return;
    }

    // hover: show snap markers on every creation / measurement / modify tool
    // so the user sees endpoint/midpoint/intersection/edge feedback before
    // they click — same as during active drawing.
    const HOVER_SNAP_TOOLS = new Set([
      'rect', 'circle', 'line', 'construction', 'arc',
      'dimension', 'eraser', 'trim', 'extend',
    ]);
    if (HOVER_SNAP_TOOLS.has(this.tool)) {
      this.snap = this.computeSnap(wx, wy);
      this.scheduleRender();
    } else if (this.snap) {
      this.snap = null;
      this.scheduleRender();
    }
  }

  // Rect/circle dialogs — typed-dimension workflow when user clicks without dragging
  openRectDialogAt(start) {
    const u = unitLabel();
    const def = doc.units === 'in' ? 1 : 25;
    openModal({
      title: 'Rectangle (typed)',
      body: `<p>Place a rectangle starting at the click point. Type its size.</p>
             <div class="field"><label>Width (${u})</label><input id="rd-w" type="number" value="${def}" min="0.01" step="0.5"/></div>
             <div class="field"><label>Height (${u})</label><input id="rd-h" type="number" value="${def}" min="0.01" step="0.5"/></div>`,
      onConfirm: () => {
        const w = fromUnit(parseFloat($('rd-w').value));
        const h = fromUnit(parseFloat($('rd-h').value));
        if (!(w > 0) || !(h > 0)) return;
        const ent = { id: doc.sketch.nextId++, type: 'rect', x: start.x, y: start.y, w, h };
        doc.sketch.entities.push(ent);
        doc.selection = { kind: 'sketch', id: ent.id };
        doc.multiSelectedSketch = [ent.id];
        this.render(); renderTree(); renderProps();
        setStatus(`Added ${fmtUL(w)} × ${fmtUL(h)} rectangle`);
      },
    });
  }
  openCircleDialogAt(center) {
    const u = unitLabel();
    const def = doc.units === 'in' ? 0.5 : 10;
    openModal({
      title: 'Circle (typed)',
      body: `<p>Place a circle centered at the click point. Type its radius.</p>
             <div class="field"><label>Radius (${u})</label><input id="cd-r" type="number" value="${def}" min="0.01" step="0.5"/></div>`,
      onConfirm: () => {
        const r = fromUnit(parseFloat($('cd-r').value));
        if (!(r > 0)) return;
        const ent = { id: doc.sketch.nextId++, type: 'circle', cx: center.x, cy: center.y, r };
        doc.sketch.entities.push(ent);
        doc.selection = { kind: 'sketch', id: ent.id };
        doc.multiSelectedSketch = [ent.id];
        this.render(); renderTree(); renderProps();
        setStatus(`Added circle r = ${fmtUL(r)}`);
      },
    });
  }

  onUp(e) {
    try { this.svg.releasePointerCapture(e.pointerId); } catch(_) {}

    // Finalize bbox resize drag — snapshot done in onDown via pushUndo
    if (this.dragMode === 'bbox-resize') {
      this.dragMode = null;
      this.bboxResize = null;
      renderProps();
      this.render();
      return;
    }

    // Finalize node vertex drag (or toggle selection on pure click)
    if (this.dragMode === 'node-move' || this.dragMode === 'node-move-pending') {
      const ns = this.nodeMoveState;
      if (this.dragMode === 'node-move-pending' && ns?.wasSel) {
        // Pure click on already-selected node → deselect it
        this.selectedNode = null;
      }
      this.nodeMoveState = null;
      this.dragMode = null;
      this.updateNodeActions();
      renderProps();
      this.render();
      return;
    }

    // Finalize entity move-pending (click without drag → no move, just selection)
    if (this.dragMode === 'move-pending') {
      this.dragMode = null;
      this.dragStart = null;
      renderProps();
      this.render();
      return;
    }

    // Finalize cp-drag (select-tool Bezier handle drag)
    if (this.dragMode === 'cp-drag' && this.cpDrag) {
      this.cpDrag = null;
      this.dragMode = null;
      renderProps();
      this.render();
      return;
    }

    // Finalize Bezier curve-drag
    if (this.dragMode === 'curve-drag' && this.curveDrag) {
      if (!this.curveDrag.dragging && this.activeLine) {
        // Just a click, not a drag — clear any cp that may have been accidentally set
        const pt = this.activeLine.points[this.curveDrag.idx];
        if (pt) { delete pt.cpOut; delete pt.cpIn; }
      }
      this.curveDrag = null;
      this.dragMode = null;
      this.render();
      return;
    }

    // Resolve 2D box-select on release. Drag direction picks the semantics:
    //   L→R window: every entity FULLY inside the box is selected.
    //   R→L crossing: every entity TOUCHED by the box (any segment crosses
    //     or any point is inside) is selected.
    if (this.boxSel) {
      const r = this.svg.getBoundingClientRect();
      const sx1 = Math.min(this.boxSel.startX, e.clientX) - r.left;
      const sy1 = Math.min(this.boxSel.startY, e.clientY) - r.top;
      const sx2 = Math.max(this.boxSel.startX, e.clientX) - r.left;
      const sy2 = Math.max(this.boxSel.startY, e.clientY) - r.top;
      const crossing = e.clientX < this.boxSel.startX;
      const ov = $('box-select');
      if (ov) { ov.classList.remove('show'); ov.classList.remove('crossing'); }
      const additive = this.boxSel.additive;
      this.boxSel = null;
      const [wx1, wy1] = this.screenToWorld(sx1, sy1);
      const [wx2, wy2] = this.screenToWorld(sx2, sy2);
      const wMinX = Math.min(wx1, wx2), wMaxX = Math.max(wx1, wx2);
      const wMinY = Math.min(wy1, wy2), wMaxY = Math.max(wy1, wy2);
      if ((sx2 - sx1) < 4 && (sy2 - sy1) < 4) {
        if (!additive) { doc.selection = null; doc.multiSelectedSketch = []; }
        renderProps(); this.render();
        return;
      }
      const picked = [];
      for (const ent of doc.sketch.entities) {
        if (crossing) {
          if (entityCrossesRect(ent, wMinX, wMinY, wMaxX, wMaxY)) picked.push(ent.id);
        } else {
          const pts = entityKeyPoints(ent);
          let allInside = pts.length > 0;
          for (const p of pts) {
            if (p.x < wMinX || p.x > wMaxX || p.y < wMinY || p.y > wMaxY) { allInside = false; break; }
          }
          if (allInside) picked.push(ent.id);
        }
      }
      if (additive) {
        for (const id of picked) if (!doc.multiSelectedSketch.includes(id)) doc.multiSelectedSketch.push(id);
      } else {
        doc.multiSelectedSketch = picked;
      }
      doc.selection = picked.length ? { kind: 'sketch', id: picked[picked.length - 1] } : null;
      renderProps(); this.render();
      setStatus(`${picked.length} shape${picked.length === 1 ? '' : 's'} selected (${crossing ? 'crossing' : 'window'})`);
      return;
    }

    if (this.dragMode === 'draw' && this.draft) {
      // If the user dragged significantly, commit the shape on release.
      // Otherwise switch to 'shape-place' — the draft stays alive, the
      // tooltip stays visible, cursor continues to drive its size, and a
      // second click (or Enter on a typed value) commits.
      const dragDist = Math.hypot(e.clientX - (this.dragStart?.sx || 0),
                                  e.clientY - (this.dragStart?.sy || 0));
      if (dragDist > 5) {
        this._commitShapeDraft();
        return;
      }
      // No drag — enter placement mode (click-move-click flow).
      this.dragMode = 'shape-place';
      this.render();
      return;
    }
    this.dragMode = null;
    this.dragStart = null;
    this.snap = null;
    this.render();
  }

  render(skipDimsForDraft = false) {
    const r = this.rect();
    const w = r.width, h = r.height;
    let svg = '';

    // SVG <defs> — small filled-arrow marker for dimension lines
    svg += `<defs>
      <marker id="dim-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#5d6376"/>
      </marker>
    </defs>`;

    // Hit rect — guarantees pointer events register everywhere on the canvas
    svg += `<rect x="0" y="0" width="${w}" height="${h}" fill="white" pointer-events="all"/>`;

    // Grid — spacing from doc.grid.spacing (in mm). Major every 5 minor lines.
    // Clamp to ±size/2 so the grid only fills the workplane.
    const step = doc.grid.spacing;
    const majorN = 5;
    const minPxBetween = 4;
    const visStep = step * this.view.pxPerMm < minPxBetween ? step * Math.ceil(minPxBetween / (step * this.view.pxPerMm)) : step;
    const visHalfX = Math.ceil((w / 2 + Math.abs(this.view.panX)) / this.view.pxPerMm / visStep) * visStep;
    const visHalfY = Math.ceil((h / 2 + Math.abs(this.view.panY)) / this.view.pxPerMm / visStep) * visStep;
    const wpHalf = doc.grid.size / 2;
    const halfX = Math.min(visHalfX, wpHalf);
    const halfY = Math.min(visHalfY, wpHalf);
    // Y-extent of grid lines along the X-grid (vertical lines): clamp to [-halfY, halfY] in world coords
    const [, gyTop] = this.worldToScreen(0, halfY);
    const [, gyBot] = this.worldToScreen(0, -halfY);
    const [gxL] = this.worldToScreen(-halfX, 0);
    const [gxR] = this.worldToScreen(halfX, 0);
    for (let x = -halfX; x <= halfX + 1e-6; x += visStep) {
      const [sx] = this.worldToScreen(x, 0);
      const idx = Math.round(x / visStep);
      const major = idx % majorN === 0;
      svg += `<line class="grid-line ${major ? 'major' : ''}" x1="${sx}" y1="${gyTop}" x2="${sx}" y2="${gyBot}"/>`;
    }
    for (let y = -halfY; y <= halfY + 1e-6; y += visStep) {
      const [, sy] = this.worldToScreen(0, y);
      const idx = Math.round(y / visStep);
      const major = idx % majorN === 0;
      svg += `<line class="grid-line ${major ? 'major' : ''}" x1="${gxL}" y1="${sy}" x2="${gxR}" y2="${sy}"/>`;
    }
    // Workplane border — clearer "edge of the work area"
    if (wpHalf > 0) {
      const [bx1, by1] = this.worldToScreen(-wpHalf, wpHalf);
      const [bx2, by2] = this.worldToScreen(wpHalf, -wpHalf);
      svg += `<rect class="workplane-border" x="${bx1}" y="${by1}" width="${bx2 - bx1}" height="${by2 - by1}"/>`;
    }
    // Axes
    const [oX, oY] = this.worldToScreen(0, 0);
    svg += `<line class="axis" x1="0" y1="${oY}" x2="${w}" y2="${oY}"/>`;
    svg += `<line class="axis" x1="${oX}" y1="0" x2="${oX}" y2="${h}"/>`;
    svg += `<circle class="origin" cx="${oX}" cy="${oY}" r="3"/>`;

    // Body silhouettes — only show the projected 3D body outlines when the
    // sketch was started ON a body face (Sketch-on-Face workflow). A free
    // sketch made by picking a reference plane should be a clean canvas
    // with only what the user actually drew in it.
    if (doc.bodies.length && doc.sketch?.plane && doc.sketch.sourceBodyId) {
      const segs = projectBodiesOntoPlane(doc.sketch.plane);
      // Edges with both endpoints near z=0 lie ON the sketch plane → highlight
      const onPlaneTol = 0.5; // mm
      for (const seg of segs) {
        const [sx1, sy1] = this.worldToScreen(seg.p1.x, seg.p1.y);
        const [sx2, sy2] = this.worldToScreen(seg.p2.x, seg.p2.y);
        const inPlane = Math.abs(seg.dz1) < onPlaneTol && Math.abs(seg.dz2) < onPlaneTol;
        const cls = ['body-outline'];
        if (inPlane) cls.push('in-plane');
        if (seg._cut) cls.push('cut'); // dashed — shows interior holes/cuts
        svg += `<line class="${cls.join(' ')}" x1="${sx1}" y1="${sy1}" x2="${sx2}" y2="${sy2}"/>`;
      }
    }

    // Fillet pick mode — draw a ring around every selectable corner so the
    // student can SEE where they can pick, plus a filled dot at each one
    // they've already picked. Done in screen space so the ring stays the
    // same size at any zoom.
    if (doc.filletPickMode) {
      const corners = _enumerateFilletableCorners();
      for (const c of corners) {
        const [sx, sy] = this.worldToScreen(c.x, c.y);
        const picked = doc.filletSelectedCorners.some(p =>
          p.entityId === c.entityId && p.vertexIdx === c.vertexIdx);
        // Outer ring shows the pickable target; inner dot only when picked.
        svg += `<circle cx="${sx}" cy="${sy}" r="6" fill="none" stroke="${picked ? '#ff9000' : 'rgba(80,120,200,0.55)'}" stroke-width="1.5"/>`;
        if (picked) {
          svg += `<circle cx="${sx}" cy="${sy}" r="3.5" fill="#ff9000"/>`;
        }
      }
    }

    // Face boundary outline (only when sketching on a body face) — drawn as a
    // faint dashed silhouette so the body's perimeter is visible while
    // sketching. Cubes/extrudes get a rectangle; spheres/tori get a circle.
    const fb = doc.sketch?.boundary;
    if (fb && fb.type === 'rect') {
      const [bx1, by1] = this.worldToScreen(fb.x, fb.y);
      const [bx2, by2] = this.worldToScreen(fb.x + fb.w, fb.y + fb.h);
      const left = Math.min(bx1, bx2), top = Math.min(by1, by2);
      const w = Math.abs(bx2 - bx1), h = Math.abs(by2 - by1);
      svg += `<rect x="${left}" y="${top}" width="${w}" height="${h}" fill="none" stroke="rgba(140,160,200,0.55)" stroke-width="1.5" stroke-dasharray="6 4"/>`;
    } else if (fb && fb.type === 'circle') {
      const [cx, cy] = this.worldToScreen(fb.cx, fb.cy);
      const r = fb.r * this.view.pxPerMm;
      svg += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="rgba(140,160,200,0.55)" stroke-width="1.5" stroke-dasharray="6 4"/>`;
    } else if (fb && fb.type === 'ellipse') {
      const [cx, cy] = this.worldToScreen(fb.cx, fb.cy);
      const rx = fb.rx * this.view.pxPerMm;
      const ry = fb.ry * this.view.pxPerMm;
      svg += `<ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="none" stroke="rgba(140,160,200,0.55)" stroke-width="1.5" stroke-dasharray="6 4"/>`;
    }
    // Entities
    const multiCount = doc.multiSelectedSketch?.length || 0;
    for (const ent of doc.sketch.entities) {
      // Global "hide construction lines" toggle — drop them at render time.
      if (doc.hideConstruction && ent.construction) continue;
      const isSelected = doc.multiSelectedSketch?.includes(ent.id) ||
                         (doc.selection?.kind === 'sketch' && doc.selection.id === ent.id);
      // Single-selected (no multi-select) gets clickable dim pills
      const isSingle = isSelected && multiCount <= 1;
      svg += renderEntitySVG(ent, this, isSelected, false, isSingle);
    }
    // Multi-selection: no group bbox — the per-entity 'selected' stroke
    // alone signals which shapes are in the selection.
    void multiCount;
    if (this.draft) {
      svg += renderEntitySVG(this.draft, this, false, true);
    }

    // Mirror axis preview — orange dashed line from the first click point to
    // the cursor (or its snapped position), with X markers at both ends.
    if (this.mirrorAxis) {
      const a = this.mirrorAxis.start;
      const cur = this.snap || this.cursorWorld;
      if (a && cur) {
        const [ax, ay] = this.worldToScreen(a.x, a.y);
        const [bx, by] = this.worldToScreen(cur.x, cur.y);
        // Extend the axis a bit past both clicks so users can see what they
        // would actually be mirroring across.
        const dx = bx - ax, dy = by - ay;
        const len = Math.hypot(dx, dy) || 1;
        const ex = (dx / len) * 60, ey = (dy / len) * 60;
        svg += `<line x1="${ax - ex}" y1="${ay - ey}" x2="${bx + ex}" y2="${by + ey}" stroke="#ff9a3e" stroke-width="1.4" stroke-dasharray="6 4" opacity="0.75"/>`;
        svg += `<circle cx="${ax}" cy="${ay}" r="4" fill="#ff9a3e"/>`;
        if (cur && (Math.hypot(bx - ax, by - ay) > 1)) {
          svg += `<circle cx="${bx}" cy="${by}" r="4" fill="none" stroke="#ff9a3e" stroke-width="1.5"/>`;
        }
      }
    }
    if (this.activeArc) {
      // Markers at the committed endpoints (start, and end if set)
      const markers = [this.activeArc.start];
      if (this.activeArc.end) markers.push(this.activeArc.end);
      for (const m of markers) {
        const [sx, sy] = this.worldToScreen(m.x, m.y);
        svg += `<rect class="entity-handle" x="${sx-3}" y="${sy-3}" width="6" height="6"/>`;
      }
      const cur = this.snap ? this.snap : (this.cursorWorld || this.activeArc.start);
      if (this.activeArc.end) {
        // Both endpoints set — cursor controls the bulge of the arc through start, cur, end
        const arc = arcFromThreePoints(this.activeArc.start, cur, this.activeArc.end);
        if (arc && arc.points.length > 1) {
          const ptsStr = arc.points.map(p => this.worldToScreen(p.x, p.y).join(',')).join(' ');
          svg += `<polyline class="entity preview" points="${ptsStr}" fill="none" stroke-dasharray="5 4"/>`;
        } else {
          // Cursor collinear with chord — show the straight chord as a fallback preview
          const [sx1, sy1] = this.worldToScreen(this.activeArc.start.x, this.activeArc.start.y);
          const [sx2, sy2] = this.worldToScreen(this.activeArc.end.x, this.activeArc.end.y);
          svg += `<line class="entity preview" x1="${sx1}" y1="${sy1}" x2="${sx2}" y2="${sy2}" stroke-dasharray="5 4"/>`;
        }
        // Faint guide chord between the two endpoints to anchor the eye
        const [cx1, cy1] = this.worldToScreen(this.activeArc.start.x, this.activeArc.start.y);
        const [cx2, cy2] = this.worldToScreen(this.activeArc.end.x, this.activeArc.end.y);
        svg += `<line x1="${cx1}" y1="${cy1}" x2="${cx2}" y2="${cy2}" stroke="rgba(180,180,180,0.5)" stroke-dasharray="2 4" stroke-width="1"/>`;
      } else {
        // Only start set — preview chord to cursor
        const [sx1, sy1] = this.worldToScreen(this.activeArc.start.x, this.activeArc.start.y);
        const [sx2, sy2] = this.worldToScreen(cur.x, cur.y);
        svg += `<line class="entity preview" x1="${sx1}" y1="${sy1}" x2="${sx2}" y2="${sy2}" stroke-dasharray="5 4"/>`;
      }
    }
    if (this.activeLine) {
      // committed segments so far
      svg += renderEntitySVG(this.activeLine, this, false, true);
      // Bezier control-point handles for the in-progress polyline
      for (const p of this.activeLine.points) {
        const [px, py] = this.worldToScreen(p.x, p.y);
        if (p.cpOut) {
          const [ox, oy] = this.worldToScreen(p.x + p.cpOut.dx, p.y + p.cpOut.dy);
          svg += `<line class="cp-arm" x1="${px}" y1="${py}" x2="${ox}" y2="${oy}"/>`;
          svg += `<circle class="cp-handle" cx="${ox}" cy="${oy}" r="4"/>`;
        }
        if (p.cpIn) {
          const [ix, iy] = this.worldToScreen(p.x + p.cpIn.dx, p.y + p.cpIn.dy);
          svg += `<line class="cp-arm" x1="${px}" y1="${py}" x2="${ix}" y2="${iy}"/>`;
          svg += `<circle class="cp-handle" cx="${ix}" cy="${iy}" r="4"/>`;
        }
      }
      // preview segment from last vertex to cursor (skip during curve-drag)
      if (this.dragMode !== 'curve-drag') {
        const last = this.activeLine.points[this.activeLine.points.length - 1];
        const cur = this.snap ? this.snap : this.cursorWorld;
        const [sx1, sy1] = this.worldToScreen(last.x, last.y);
        const [sx2, sy2] = this.worldToScreen(cur.x, cur.y);
        // Highlight the preview in green when we're snapped perpendicular
        // to the reference segment — visual confirmation for the user.
        const perpCls = (this.snap?.kind === 'perpendicular') ? ' perpendicular' : '';
        svg += `<line class="entity preview${perpCls}" x1="${sx1}" y1="${sy1}" x2="${sx2}" y2="${sy2}" stroke-dasharray="5 4"/>`;
        const dx = cur.x - last.x, dy = cur.y - last.y;
        const len = Math.hypot(dx, dy);
        svg += `<text class="dim-label" x="${(sx1 + sx2) / 2}" y="${(sy1 + sy2) / 2 - 8}" text-anchor="middle">${fmtUL(len)}</text>`;
      }
    }

    // Bezier handles for the currently selected polyline
    if (doc.selection?.kind === 'sketch') {
      const selEnt = doc.sketch.entities.find(e => e.id === doc.selection.id);
      if (selEnt && selEnt.type === 'polyline') {
        for (const p of selEnt.points) {
          const [px, py] = this.worldToScreen(p.x, p.y);
          if (p.cpOut) {
            const [ox, oy] = this.worldToScreen(p.x + p.cpOut.dx, p.y + p.cpOut.dy);
            svg += `<line class="cp-arm" x1="${px}" y1="${py}" x2="${ox}" y2="${oy}"/>`;
            svg += `<circle class="cp-handle" cx="${ox}" cy="${oy}" r="5"/>`;
          }
          if (p.cpIn) {
            const [ix, iy] = this.worldToScreen(p.x + p.cpIn.dx, p.y + p.cpIn.dy);
            svg += `<line class="cp-arm" x1="${px}" y1="${py}" x2="${ix}" y2="${iy}"/>`;
            svg += `<circle class="cp-handle" cx="${ix}" cy="${iy}" r="5"/>`;
          }
        }
        // Ring around the node-selected vertex
        if (this.selectedNode?.entId === selEnt.id) {
          const p = selEnt.points[this.selectedNode.pointIdx];
          if (p) {
            const [sx, sy] = this.worldToScreen(p.x, p.y);
            svg += `<circle class="node-selected-ring" cx="${sx}" cy="${sy}" r="7"/>`;
          }
        }
      } else if (this.selectedNode) {
        // Entity changed — clear stale node selection
        this.selectedNode = null;
        this.updateNodeActions();
      }
    } else if (this.selectedNode) {
      this.selectedNode = null;
      this.updateNodeActions();
    }

    // Offset preview (dashed ghost of the next copy to be placed). Multi-
    // source offset draws one ghost per source.
    if (this.offsetMode) {
      const previews = this.offsetMode.previews?.length
        ? this.offsetMode.previews
        : (this.offsetMode.preview ? [this.offsetMode.preview] : []);
      for (const p of previews) {
        if (p) svg += renderEntitySVG(p, this, false, true);
      }
    }

    // Snap marker — distinct visual + label per kind so the user can tell at
    // a glance what they're locking onto.
    if (this.snap) {
      const [sx, sy] = this.worldToScreen(this.snap.x, this.snap.y);
      let label = '';
      if (this.snap.kind === 'endpoint' || this.snap.kind === 'origin' || this.snap.kind === 'face-corner') {
        svg += `<rect class="snap-marker" x="${sx-6}" y="${sy-6}" width="12" height="12"/>`;
        label = this.snap.kind === 'origin' ? 'origin' : 'endpoint';
      } else if (this.snap.kind === 'center') {
        // Concentric-circle "center" symbol, the universal CAD convention
        svg += `<circle class="snap-marker" cx="${sx}" cy="${sy}" r="7" fill="none"/>`;
        svg += `<circle class="snap-marker" cx="${sx}" cy="${sy}" r="2"/>`;
        label = 'center';
      } else if (this.snap.kind === 'intersection') {
        // X mark — universal CAD "intersection" symbol
        svg += `<line class="snap-marker" x1="${sx-7}" y1="${sy-7}" x2="${sx+7}" y2="${sy+7}"/>`;
        svg += `<line class="snap-marker" x1="${sx-7}" y1="${sy+7}" x2="${sx+7}" y2="${sy-7}"/>`;
        label = 'intersection';
      } else if (this.snap.kind === 'perpendicular') {
        // Right-angle bracket — universal "perpendicular" symbol
        svg += `<polyline class="snap-marker" points="${sx-7},${sy-1} ${sx-7},${sy+7} ${sx+1},${sy+7}" fill="none"/>`;
        label = 'perpendicular';
      } else if (this.snap.kind === 'midpoint' || this.snap.kind === 'face-mid') {
        // Triangle pointing up — universal "midpoint" symbol in CAD
        svg += `<polygon class="snap-marker" points="${sx},${sy-7} ${sx+7},${sy+5} ${sx-7},${sy+5}"/>`;
        label = 'midpoint';
      } else if (this.snap.kind === 'edge') {
        svg += `<circle class="snap-marker" cx="${sx}" cy="${sy}" r="5"/>`;
        label = 'edge';
      } else if (this.snap.kind === 'face-edge' || this.snap.kind === 'axis') {
        svg += `<circle class="snap-marker" cx="${sx}" cy="${sy}" r="5"/>`;
      } else {
        svg += `<circle class="snap-marker" cx="${sx}" cy="${sy}" r="4"/>`;
      }
      if (label) {
        svg += `<text class="snap-marker-label" x="${sx + 10}" y="${sy - 8}">${label}</text>`;
      }
    }

    this.svg.innerHTML = svg;
  }
}

function entityKeyPoints(ent) {
  if (ent.type === 'rect') {
    return [
      { x: ent.x, y: ent.y },
      { x: ent.x + ent.w, y: ent.y },
      { x: ent.x, y: ent.y + ent.h },
      { x: ent.x + ent.w, y: ent.y + ent.h },
      { x: ent.x + ent.w / 2, y: ent.y + ent.h / 2 }, // center
    ];
  }
  if (ent.type === 'circle') {
    return [{ x: ent.cx, y: ent.cy }];
  }
  if (ent.type === 'polyline') {
    const n = ent.points.length;
    // Dense polylines (arcs, beziers, tessellated curves) only expose their
    // true endpoints — not every interior tessellation vertex. Otherwise
    // dragging along an arc lights up "endpoint" snap on every micro-segment.
    const dense = n > 10;
    if (dense) {
      if (ent.closed) return [];
      return [
        { x: ent.points[0].x, y: ent.points[0].y },
        { x: ent.points[n - 1].x, y: ent.points[n - 1].y },
      ];
    }
    return ent.points.map(p => ({ x: p.x, y: p.y }));
  }
  return [];
}

// Build an arc polyline through three points (start, on-arc, end)
function arcFromThreePoints(p1, p2, p3) {
  const ax = p1.x, ay = p1.y, bx = p2.x, by = p2.y, cx_ = p3.x, cy_ = p3.y;
  const d = 2 * (ax * (by - cy_) + bx * (cy_ - ay) + cx_ * (ay - by));
  if (Math.abs(d) < 1e-9) return null; // collinear
  const cx = ((ax*ax + ay*ay) * (by - cy_) + (bx*bx + by*by) * (cy_ - ay) + (cx_*cx_ + cy_*cy_) * (ay - by)) / d;
  const cy = ((ax*ax + ay*ay) * (cx_ - bx) + (bx*bx + by*by) * (ax - cx_) + (cx_*cx_ + cy_*cy_) * (bx - ax)) / d;
  const r = Math.hypot(cx - ax, cy - ay);
  const norm = (a) => ((a % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
  const a1 = norm(Math.atan2(ay - cy, ax - cx));
  const a2 = norm(Math.atan2(by - cy, bx - cx));
  const a3 = norm(Math.atan2(cy_ - cy, cx_ - cx));
  // CCW sweep if a2 is between a1 and a3 going CCW
  const ab = norm(a2 - a1), ac = norm(a3 - a1);
  const ccw = ab <= ac;
  const N = 48;
  const points = [];
  let span = ccw ? norm(a3 - a1) : norm(a1 - a3);
  if (span < 0.01) span = 2 * Math.PI;
  for (let i = 0; i <= N; i++) {
    const t = ccw ? a1 + (i / N) * span : a1 - (i / N) * span;
    points.push({ x: cx + Math.cos(t) * r, y: cy + Math.sin(t) * r });
  }
  return { type: 'polyline', points, closed: false };
}

// ─── Bezier curve helpers ────────────────────────────────────────────────────

// Tessellate a cubic Bezier into N+1 world-coord points
function cubicBezierPoints(p0, c1, c2, p1, N = 16) {
  const pts = [];
  for (let i = 0; i <= N; i++) {
    const t = i / N, mt = 1 - t;
    pts.push({
      x: mt*mt*mt*p0.x + 3*mt*mt*t*c1.x + 3*mt*t*t*c2.x + t*t*t*p1.x,
      y: mt*mt*mt*p0.y + 3*mt*mt*t*c1.y + 3*mt*t*t*c2.y + t*t*t*p1.y,
    });
  }
  return pts;
}

// Build the SVG path `d` attribute for a polyline, using cubic Bezier when points have `cp`
function polylineToPathD(points, closed, eng) {
  if (!points || points.length < 2) return '';
  const [x0, y0] = eng.worldToScreen(points[0].x, points[0].y);
  let d = `M ${x0} ${y0}`;
  const n = points.length;
  const segCount = closed ? n : n - 1;
  for (let i = 0; i < segCount; i++) {
    const p0 = points[i], p1 = points[(i + 1) % n];
    const [ex, ey] = eng.worldToScreen(p1.x, p1.y);
    if (!p0.cpOut && !p1.cpIn) {
      d += ` L ${ex} ${ey}`;
    } else {
      const c1wx = p0.cpOut ? p0.x + p0.cpOut.dx : p0.x;
      const c1wy = p0.cpOut ? p0.y + p0.cpOut.dy : p0.y;
      const c2wx = p1.cpIn  ? p1.x + p1.cpIn.dx  : p1.x;
      const c2wy = p1.cpIn  ? p1.y + p1.cpIn.dy  : p1.y;
      const [sc1x, sc1y] = eng.worldToScreen(c1wx, c1wy);
      const [sc2x, sc2y] = eng.worldToScreen(c2wx, c2wy);
      d += ` C ${sc1x} ${sc1y} ${sc2x} ${sc2y} ${ex} ${ey}`;
    }
  }
  if (closed) d += ' Z';
  return d;
}

// Mirror an entity across an axis through the origin
// Reflect a single (x, y) point across the line through (ax, ay) → (bx, by).
function reflectPointAcrossLine(x, y, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const L2 = dx * dx + dy * dy;
  if (L2 < 1e-12) return { x, y };
  const t = ((x - ax) * dx + (y - ay) * dy) / L2;
  const fx = ax + t * dx, fy = ay + t * dy;
  return { x: 2 * fx - x, y: 2 * fy - y };
}

// Mirror an entity across an arbitrary line a→b. Returns a fresh entity with
// a new id. Rect → polyline (mirrored rect is no longer axis-aligned). Circle
// stays a circle (only its center moves). Polylines mirror every point + any
// bezier control offsets; winding is reversed so the front-facing side stays
// consistent after the reflection inverts the orientation.
function mirrorEntityAcrossLine(ent, ax, ay, bx, by) {
  if (ent.type === 'rect') {
    const corners = [
      { x: ent.x,         y: ent.y },
      { x: ent.x + ent.w, y: ent.y },
      { x: ent.x + ent.w, y: ent.y + ent.h },
      { x: ent.x,         y: ent.y + ent.h },
    ].map(p => reflectPointAcrossLine(p.x, p.y, ax, ay, bx, by));
    corners.reverse(); // preserve winding after reflection
    return {
      id: doc.sketch.nextId++,
      type: 'polyline',
      closed: true,
      construction: !!ent.construction,
      points: corners,
    };
  }
  if (ent.type === 'circle') {
    const c = reflectPointAcrossLine(ent.cx, ent.cy, ax, ay, bx, by);
    return {
      id: doc.sketch.nextId++,
      type: 'circle',
      cx: c.x, cy: c.y, r: ent.r,
      construction: !!ent.construction,
    };
  }
  if (ent.type === 'polyline') {
    const points = ent.points.map(p => {
      const np = reflectPointAcrossLine(p.x, p.y, ax, ay, bx, by);
      // Reflect control-point offsets in WORLD space, then re-express as
      // offsets from the reflected anchor.
      if (p.cpOut) {
        const wo = reflectPointAcrossLine(p.x + p.cpOut.dx, p.y + p.cpOut.dy, ax, ay, bx, by);
        np.cpOut = { dx: wo.x - np.x, dy: wo.y - np.y };
      }
      if (p.cpIn) {
        const wi = reflectPointAcrossLine(p.x + p.cpIn.dx, p.y + p.cpIn.dy, ax, ay, bx, by);
        np.cpIn = { dx: wi.x - np.x, dy: wi.y - np.y };
      }
      return np;
    });
    points.reverse(); // mirror flips winding; reverse to keep CCW
    // After reversing, swap cpIn ↔ cpOut at each point so the incoming /
    // outgoing handles still bracket the correct neighbouring segment.
    for (const p of points) {
      const tmp = p.cpIn;
      p.cpIn = p.cpOut;
      p.cpOut = tmp;
    }
    return {
      id: doc.sketch.nextId++,
      type: 'polyline',
      closed: !!ent.closed,
      construction: !!ent.construction,
      points,
    };
  }
  return null;
}

function mirrorEntity(ent, axis) {
  // axis: 'x' (mirror across X axis → flip y) | 'y' (mirror across Y axis → flip x)
  const flipX = axis === 'y';
  const flipY = axis === 'x';
  const m = JSON.parse(JSON.stringify(ent));
  m.id = doc.sketch.nextId++;
  if (m.type === 'rect') {
    if (flipX) m.x = -(m.x + m.w);
    if (flipY) m.y = -(m.y + m.h);
  } else if (m.type === 'circle') {
    if (flipX) m.cx = -m.cx;
    if (flipY) m.cy = -m.cy;
  } else if (m.type === 'polyline') {
    m.points = m.points.map(p => {
      const np = { x: flipX ? -p.x : p.x, y: flipY ? -p.y : p.y };
      if (p.cpOut) np.cpOut = { dx: flipX ? -p.cpOut.dx : p.cpOut.dx, dy: flipY ? -p.cpOut.dy : p.cpOut.dy };
      if (p.cpIn)  np.cpIn  = { dx: flipX ? -p.cpIn.dx  : p.cpIn.dx,  dy: flipY ? -p.cpIn.dy  : p.cpIn.dy  };
      return np;
    });
    if (flipX !== flipY) m.points.reverse(); // preserve winding
  }
  return m;
}

function pointSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const L2 = dx * dx + dy * dy;
  if (L2 === 0) return Math.hypot(px - ax, py - ay);
  const t = clamp(((px - ax) * dx + (py - ay) * dy) / L2, 0, 1);
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function entityHit(ent, wx, wy, tol) {
  if (ent.type === 'threadMark') {
    // ~5 mm click target on top of the marker
    return Math.hypot(wx - ent.cx, wy - ent.cy) < Math.max(tol, 5);
  }
  if (ent.type === 'rect') {
    return wx >= ent.x - tol && wx <= ent.x + ent.w + tol &&
           wy >= ent.y - tol && wy <= ent.y + ent.h + tol;
  }
  if (ent.type === 'circle') {
    return Math.abs(Math.hypot(wx - ent.cx, wy - ent.cy) - ent.r) < tol ||
           Math.hypot(wx - ent.cx, wy - ent.cy) < ent.r;
  }
  if (ent.type === 'polyline') {
    const n = ent.points.length;
    if (n < 2) return false;
    const hasCurve = ent.points.some(p => p.cpOut || p.cpIn);
    if (!hasCurve) {
      for (let i = 0; i < n - 1; i++) {
        if (pointSegDist(wx, wy, ent.points[i].x, ent.points[i].y, ent.points[i+1].x, ent.points[i+1].y) < tol) return true;
      }
      if (ent.closed) {
        if (pointSegDist(wx, wy, ent.points[n-1].x, ent.points[n-1].y, ent.points[0].x, ent.points[0].y) < tol) return true;
      }
    } else {
      // Tessellate Bezier curves for accurate hit testing
      const segs = entityToSegments(ent);
      for (const s of segs) {
        if (pointSegDist(wx, wy, s.a.x, s.a.y, s.b.x, s.b.y) < tol) return true;
      }
    }
    // Interior click on a closed polyline (filled blue region) — the visible
    // fill should be clickable, not just the outline. Construction lines are
    // never filled, so don't hit-test their interior.
    if (ent.closed && !ent.construction) {
      const pts = hasCurve ? entityToSegments(ent).map(s => s.a) : ent.points;
      if (pts.length >= 3 && pointInPolygon(wx, wy, pts)) return true;
    }
    return false;
  }
  return false;
}

// True if any part of the entity touches the axis-aligned rectangle
// [minX, minY, maxX, maxY]. Used by R→L crossing box-select. Tests in order:
//   1. Any entity vertex inside the rect
//   2. Any entity segment crossing a rect edge
//   3. (Closed entities only) The rect's center inside the entity
function entityCrossesRect(ent, minX, minY, maxX, maxY) {
  if (!ent || ent.construction === undefined && !ent.points && !ent.r && !ent.w) return false;
  const bb = entityBBox(ent);
  if (bb) {
    if (bb.maxX < minX || bb.minX > maxX || bb.maxY < minY || bb.minY > maxY) return false;
  }
  const segs = entityToSegments(ent);
  if (!segs.length) return false;
  const inside = (p) => p.x >= minX && p.x <= maxX && p.y >= minY && p.y <= maxY;
  const rectEdges = [
    [{ x: minX, y: minY }, { x: maxX, y: minY }],
    [{ x: maxX, y: minY }, { x: maxX, y: maxY }],
    [{ x: maxX, y: maxY }, { x: minX, y: maxY }],
    [{ x: minX, y: maxY }, { x: minX, y: minY }],
  ];
  for (const s of segs) {
    if (inside(s.a) || inside(s.b)) return true;
    for (const [r1, r2] of rectEdges) {
      if (segmentIntersection(s.a, s.b, r1, r2)) return true;
    }
  }
  // Rect center inside a closed shape (e.g. drawing a small box entirely
  // inside a star) — also counts as crossing.
  const isClosed = (ent.type === 'rect' || ent.type === 'circle' ||
                    (ent.type === 'polyline' && ent.closed));
  if (isClosed && !ent.construction) {
    const cxR = (minX + maxX) / 2, cyR = (minY + maxY) / 2;
    if (ent.type === 'rect') {
      if (cxR >= ent.x && cxR <= ent.x + ent.w && cyR >= ent.y && cyR <= ent.y + ent.h) return true;
    } else if (ent.type === 'circle') {
      if (Math.hypot(cxR - ent.cx, cyR - ent.cy) < ent.r) return true;
    } else if (ent.type === 'polyline') {
      const hasCurve = ent.points.some(p => p.cpOut || p.cpIn);
      const pts = hasCurve ? entityToSegments(ent).map(s => s.a) : ent.points;
      if (pts.length >= 3 && pointInPolygon(cxR, cyR, pts)) return true;
    }
  }
  return false;
}

// Ray-casting point-in-polygon test. pts is an array of {x, y} forming a
// closed polygon (the closing edge from pts[n-1] to pts[0] is implicit).
function pointInPolygon(px, py, pts) {
  let inside = false;
  const n = pts.length;
  for (let i = 0, j = n - 1; i < n; j = i++) {
    const xi = pts[i].x, yi = pts[i].y;
    const xj = pts[j].x, yj = pts[j].y;
    const denom = yj - yi;
    if (denom === 0) continue;
    if (((yi > py) !== (yj > py)) &&
        (px < (xj - xi) * (py - yi) / denom + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

function moveEntity(ent, start, dx, dy) {
  if (ent.type === 'rect') { ent.x = start.x + dx; ent.y = start.y + dy; }
  if (ent.type === 'circle') { ent.cx = start.cx + dx; ent.cy = start.cy + dy; }
  if (ent.type === 'polyline') {
    ent.points = start.points.map(p => {
      const np = { x: p.x + dx, y: p.y + dy };
      if (p.cpOut) np.cpOut = { ...p.cpOut }; // relative handles — no offset needed
      if (p.cpIn)  np.cpIn  = { ...p.cpIn  };
      return np;
    });
  }
}

// Bounding box of any 2D entity. For curved polylines, samples the tessellated
// form so the bbox reflects the actual rendered curve, not just the control pts.
function entityBBox(ent) {
  if (!ent) return null;
  if (ent.type === 'threadMark') {
    return { minX: ent.cx, minY: ent.cy, maxX: ent.cx, maxY: ent.cy };
  }
  if (ent.type === 'rect') {
    return { minX: ent.x, minY: ent.y, maxX: ent.x + ent.w, maxY: ent.y + ent.h };
  }
  if (ent.type === 'circle') {
    return { minX: ent.cx - ent.r, minY: ent.cy - ent.r, maxX: ent.cx + ent.r, maxY: ent.cy + ent.r };
  }
  if (ent.type === 'polyline' && ent.points && ent.points.length) {
    const hasCurve = ent.points.some(p => p.cpOut || p.cpIn);
    let pts = ent.points;
    if (hasCurve) {
      const segs = entityToSegments(ent);
      pts = [];
      for (const s of segs) { pts.push(s.a); pts.push(s.b); }
    }
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const p of pts) {
      if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
      if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
    }
    return { minX, minY, maxX, maxY };
  }
  return null;
}

// Rescale an entity around its bbox centroid so the given dim ('w' | 'h' | 'd')
// becomes newValue. For circles, w/h/d all map to diameter (uniform scale).
function setEntityDim(ent, dim, newValue) {
  // Special case: a single-segment line — its dim is "length", not w/h.
  // First endpoint stays, second endpoint moves along the same direction.
  if (dim === 'len' && ent.type === 'polyline' && ent.points.length === 2 && !ent.closed && newValue > 0) {
    const p1 = ent.points[0], p2 = ent.points[1];
    const dx = p2.x - p1.x, dy = p2.y - p1.y;
    const oldLen = Math.hypot(dx, dy);
    if (oldLen < 1e-6) return false;
    const f = newValue / oldLen;
    ent.points[1] = { x: p1.x + dx * f, y: p1.y + dy * f };
    return true;
  }
  const bb = entityBBox(ent);
  if (!bb || !(newValue > 0)) return false;
  const oldW = bb.maxX - bb.minX, oldH = bb.maxY - bb.minY;
  if ((dim === 'w' || dim === 'd') && oldW < 1e-6) return false;
  if (dim === 'h' && oldH < 1e-6) return false;
  let fx = 1, fy = 1;
  if (dim === 'w') fx = newValue / oldW;
  else if (dim === 'h') fy = newValue / oldH;
  else if (dim === 'd') fx = fy = newValue / oldW;
  const cx = (bb.minX + bb.maxX) / 2, cy = (bb.minY + bb.maxY) / 2;
  if (ent.type === 'rect') {
    const nw = ent.w * fx, nh = ent.h * fy;
    ent.x = cx - nw / 2; ent.y = cy - nh / 2;
    ent.w = nw; ent.h = nh;
  } else if (ent.type === 'circle') {
    const f = (dim === 'h') ? fy : fx;
    ent.r *= f;
  } else if (ent.type === 'polyline') {
    ent.points = ent.points.map(p => {
      const np = { x: cx + (p.x - cx) * fx, y: cy + (p.y - cy) * fy };
      if (p.cpIn)  np.cpIn  = { dx: p.cpIn.dx  * fx, dy: p.cpIn.dy  * fy };
      if (p.cpOut) np.cpOut = { dx: p.cpOut.dx * fx, dy: p.cpOut.dy * fy };
      return np;
    });
  }
  return true;
}

// Open the inline dimension editor — positions an HTML <input> over the
// clicked SVG pill so the user can type the new value right where they see it.
// Enter or blur commits; Esc cancels.
function openInlineDimEdit(entId, dim, pillElement) {
  // Group W/H edit — entId == -1 means "the current multi-selection". We
  // scale every selected entity around the selection's combined centroid.
  if (entId === -1 && (dim === 'group-w' || dim === 'group-h')) {
    const bb = selectionGroupBBox();
    if (!bb) return;
    const current = toUnit(dim === 'group-h' ? (bb.maxY - bb.minY) : (bb.maxX - bb.minX));
    return openInlineDimEditGroup(dim, current, pillElement);
  }
  const ent = doc.sketch.entities.find(e => e.id === entId);
  if (!ent) return;
  let current;
  if (dim === 'len' && ent.type === 'polyline' && ent.points.length === 2) {
    const p1 = ent.points[0], p2 = ent.points[1];
    current = toUnit(Math.hypot(p2.x - p1.x, p2.y - p1.y));
  } else {
    const bb = entityBBox(ent);
    if (!bb) return;
    current = toUnit(dim === 'h' ? (bb.maxY - bb.minY) : (bb.maxX - bb.minX));
  }
  const overlay = document.getElementById('dim-edit-overlay');
  const input = document.getElementById('dim-edit-input');
  const unit = document.getElementById('dim-edit-unit');
  if (!overlay || !input || !unit) return;
  unit.textContent = unitLabel();
  input.value = current.toFixed(3);
  // Position the overlay's center on the pill's center, in canvas-area local coords
  const cArea = document.getElementById('canvas-area').getBoundingClientRect();
  const r = pillElement.getBoundingClientRect();
  overlay.style.left = (r.left + r.width / 2 - cArea.left) + 'px';
  overlay.style.top  = (r.top + r.height / 2 - cArea.top) + 'px';
  overlay.dataset.entId = String(entId);
  overlay.dataset.dim = dim;
  overlay.classList.add('show');
  // Defer focus so the parent click doesn't immediately blur the input
  setTimeout(() => { input.focus(); input.select(); }, 0);
}

function commitInlineDimEdit() {
  const overlay = document.getElementById('dim-edit-overlay');
  if (!overlay || !overlay.classList.contains('show')) return;
  const input = document.getElementById('dim-edit-input');
  const entId = parseInt(overlay.dataset.entId, 10);
  const dim = overlay.dataset.dim;
  overlay.classList.remove('show');
  if (!Number.isFinite(entId) || !dim) return;
  const v = parseFloat(input.value);
  if (!isFinite(v) || v <= 0) return;
  // Group W/H — scale the whole multi-selection around its combined centroid.
  if (entId === -1 && (dim === 'group-w' || dim === 'group-h')) {
    const bb = selectionGroupBBox();
    if (!bb) return;
    const oldW = bb.maxX - bb.minX, oldH = bb.maxY - bb.minY;
    const newVal = fromUnit(v);
    const fx = dim === 'group-w' ? (oldW > 1e-6 ? newVal / oldW : 1) : 1;
    const fy = dim === 'group-h' ? (oldH > 1e-6 ? newVal / oldH : 1) : 1;
    if (fx === 1 && fy === 1) return;
    const cx = (bb.minX + bb.maxX) / 2, cy = (bb.minY + bb.maxY) / 2;
    pushUndo();
    for (const id of (doc.multiSelectedSketch || [])) {
      const e = doc.sketch.entities.find(x => x.id === id);
      if (!e) continue;
      scaleSketchEntity(e, { x: cx, y: cy }, fx, fy);
    }
    if (sketchEng) sketchEng.render();
    renderProps();
    setStatus(`Scaled selection — ${dim === 'group-w' ? 'width' : 'height'} = ${fmtUL(newVal)}`);
    return;
  }
  const ent = doc.sketch.entities.find(e => e.id === entId);
  if (!ent) return;
  pushUndo();
  if (setEntityDim(ent, dim, fromUnit(v))) {
    if (typeof sketchEng !== 'undefined' && sketchEng) sketchEng.render();
    if (typeof renderProps === 'function') renderProps();
    if (typeof renderTree === 'function') renderTree();
    const label = dim === 'd' ? 'diameter' : (dim === 'w' ? 'width' : 'height');
    setStatus(`Set ${label} to ${fmtUL(fromUnit(v))}`);
  }
}

// Combined bounding box across every entity in the current multi-selection.
// Returns null if the selection is empty or all entities are dimensionless.
function selectionGroupBBox() {
  const ids = doc.multiSelectedSketch || [];
  if (!ids.length) return null;
  let mn = { x: Infinity, y: Infinity }, mx = { x: -Infinity, y: -Infinity };
  for (const id of ids) {
    const ent = doc.sketch.entities.find(e => e.id === id);
    if (!ent) continue;
    const bb = entityBBox(ent);
    if (!bb) continue;
    if (bb.minX < mn.x) mn.x = bb.minX;
    if (bb.minY < mn.y) mn.y = bb.minY;
    if (bb.maxX > mx.x) mx.x = bb.maxX;
    if (bb.maxY > mx.y) mx.y = bb.maxY;
  }
  if (!isFinite(mn.x)) return null;
  return { minX: mn.x, minY: mn.y, maxX: mx.x, maxY: mx.y };
}

// Opens the inline editor for a synthetic group target. Same UX as the
// per-entity editor; commit logic in commitInlineDimEdit branches on entId.
function openInlineDimEditGroup(dim, currentInUnits, pillElement) {
  const overlay = document.getElementById('dim-edit-overlay');
  const input = document.getElementById('dim-edit-input');
  const unit = document.getElementById('dim-edit-unit');
  if (!overlay || !input || !unit) return;
  unit.textContent = unitLabel();
  input.value = currentInUnits.toFixed(3);
  const cArea = document.getElementById('canvas-area').getBoundingClientRect();
  const r = pillElement.getBoundingClientRect();
  overlay.style.left = (r.left + r.width / 2 - cArea.left) + 'px';
  overlay.style.top  = (r.top + r.height / 2 - cArea.top) + 'px';
  overlay.dataset.entId = '-1';
  overlay.dataset.dim = dim;
  overlay.classList.add('show');
  setTimeout(() => { input.focus(); input.select(); }, 0);
}

function cancelInlineDimEdit() {
  const overlay = document.getElementById('dim-edit-overlay');
  if (overlay) overlay.classList.remove('show');
}

// Opposite corner / edge midpoint that stays fixed when dragging this handle.
function anchorForHandle(handle, bb) {
  const cx = (bb.minX + bb.maxX) / 2, cy = (bb.minY + bb.maxY) / 2;
  switch (handle) {
    case 'nw': return { x: bb.maxX, y: bb.minY };
    case 'ne': return { x: bb.minX, y: bb.minY };
    case 'sw': return { x: bb.maxX, y: bb.maxY };
    case 'se': return { x: bb.minX, y: bb.maxY };
    case 'n':  return { x: cx,      y: bb.minY };
    case 's':  return { x: cx,      y: bb.maxY };
    case 'e':  return { x: bb.minX, y: cy      };
    case 'w':  return { x: bb.maxX, y: cy      };
  }
  return { x: cx, y: cy };
}

// Scale entity geometry around an arbitrary anchor point (not necessarily the
// centroid). Used by the bbox-handle drag. Must be called on a fresh snapshot
// of the entity each frame because it mutates in place.
function scaleEntityAround(ent, anchor, fx, fy) {
  if (ent.type === 'rect') {
    const oldMinX = ent.x, oldMinY = ent.y;
    const oldMaxX = ent.x + ent.w, oldMaxY = ent.y + ent.h;
    const nMinX = anchor.x + (oldMinX - anchor.x) * fx;
    const nMaxX = anchor.x + (oldMaxX - anchor.x) * fx;
    const nMinY = anchor.y + (oldMinY - anchor.y) * fy;
    const nMaxY = anchor.y + (oldMaxY - anchor.y) * fy;
    ent.x = Math.min(nMinX, nMaxX);
    ent.y = Math.min(nMinY, nMaxY);
    ent.w = Math.abs(nMaxX - nMinX);
    ent.h = Math.abs(nMaxY - nMinY);
  } else if (ent.type === 'circle') {
    // Circles can't become ellipses — use the average factor uniformly
    const f = (Math.abs(fx) + Math.abs(fy)) / 2;
    ent.cx = anchor.x + (ent.cx - anchor.x) * f;
    ent.cy = anchor.y + (ent.cy - anchor.y) * f;
    ent.r *= f;
  } else if (ent.type === 'polyline') {
    ent.points = ent.points.map(p => {
      const np = {
        x: anchor.x + (p.x - anchor.x) * fx,
        y: anchor.y + (p.y - anchor.y) * fy,
      };
      if (p.cpIn)  np.cpIn  = { dx: p.cpIn.dx  * fx, dy: p.cpIn.dy  * fy };
      if (p.cpOut) np.cpOut = { dx: p.cpOut.dx * fx, dy: p.cpOut.dy * fy };
      return np;
    });
  }
}

// Restore an entity's geometric fields from a snapshot (used during bbox drag).
function restoreEntityFromSnapshot(target, snap) {
  if (target.type === 'rect') {
    target.x = snap.x; target.y = snap.y; target.w = snap.w; target.h = snap.h;
  } else if (target.type === 'circle') {
    target.cx = snap.cx; target.cy = snap.cy; target.r = snap.r;
  } else if (target.type === 'polyline') {
    target.points = JSON.parse(JSON.stringify(snap.points));
  }
}

// Build a clickable dimension pill in SVG. cx/cy = pill center (screen coords).
function dimEditPill(cx, cy, text, entId, dim) {
  const w = Math.max(38, text.length * 7 + 14);
  const h = 18;
  const x = cx - w / 2;
  const y = cy - h / 2;
  return `<g class="dim-edit" data-ent-id="${entId}" data-dim="${dim}"><rect class="dim-edit-bg" x="${x}" y="${y}" width="${w}" height="${h}" rx="4"/><text class="dim-edit-text" x="${cx}" y="${cy + 4}" text-anchor="middle">${text}</text></g>`;
}

// Position a dim pill OUTSIDE one edge of the bbox so it never overlaps the
// shape (or the midpoint snap marker on a thin line). gap = 8px clearance
// + half the pill's actual width so the pill's nearest edge is always 8px
// from the bbox edge, regardless of label length.
function dimEditPillOutside(side, bX, bY, bW, bH, text, entId, dim) {
  const pw = Math.max(38, text.length * 7 + 14);
  const ph = 18;
  const gap = 8;
  let cx, cy;
  if (side === 'bottom')      { cx = bX + bW / 2;          cy = bY + bH + gap + ph / 2; }
  else if (side === 'top')    { cx = bX + bW / 2;          cy = bY - gap - ph / 2; }
  else if (side === 'right')  { cx = bX + bW + gap + pw/2; cy = bY + bH / 2; }
  else /* 'left' */           { cx = bX - gap - pw / 2;    cy = bY + bH / 2; }
  return dimEditPill(cx, cy, text, entId, dim);
}

// Render the 8 bbox handles (corners + edge midpoints) for a single-selected
// entity. Returns the SVG string. ent + screen bbox coords are passed in.
function bboxHandlesSVG(entId, bX, bY, bW, bH, hasW, hasH) {
  const SZ = 8;
  const handle = (cx, cy, h) => `<rect class="bbox-handle h-${h}" data-handle="${h}" data-ent-id="${entId}" x="${cx - SZ/2}" y="${cy - SZ/2}" width="${SZ}" height="${SZ}" rx="1"/>`;
  let s = '';
  // Edge midpoints only when that axis has nonzero extent
  if (hasW) s += handle(bX + bW / 2, bY,         'n');
  if (hasW) s += handle(bX + bW / 2, bY + bH,    's');
  if (hasH) s += handle(bX,          bY + bH / 2,'w');
  if (hasH) s += handle(bX + bW,     bY + bH / 2,'e');
  // Corners only when BOTH axes are nonzero (corners stretch both)
  if (hasW && hasH) {
    s += handle(bX,         bY,         'nw');
    s += handle(bX + bW,    bY,         'ne');
    s += handle(bX,         bY + bH,    'sw');
    s += handle(bX + bW,    bY + bH,    'se');
  }
  return s;
}

function renderEntitySVG(ent, eng, selected = false, preview = false, singleSelected = false) {
  const constructionCls = ent.construction ? ' construction' : '';
  const cls = `entity${constructionCls}${selected ? ' selected' : ''}${preview ? ' preview' : ''}`;
  if (ent.type === 'rect') {
    const [x1, y1] = eng.worldToScreen(ent.x, ent.y + ent.h);
    const w = ent.w * eng.view.pxPerMm, h = ent.h * eng.view.pxPerMm;
    let s = `<rect class="${cls}" x="${x1}" y="${y1}" width="${w}" height="${h}"/>`;
    if (singleSelected) {
      // No dashed bbox — the rect's own outline already IS the bbox. Just
      // the 8 resize handles + W/H dim pills labelling the edges.
      s += bboxHandlesSVG(ent.id, x1, y1, w, h, ent.w > 1e-6, ent.h > 1e-6);
      s += dimEditPillOutside('bottom', x1, y1, w, h, fmtUL(ent.w), ent.id, 'w');
      s += dimEditPillOutside('right',  x1, y1, w, h, fmtUL(ent.h), ent.id, 'h');
    } else if (selected || preview) {
      // Multi-select / preview: plain non-clickable text
      const [cx, cy] = eng.worldToScreen(ent.x + ent.w / 2, ent.y);
      const [, by] = eng.worldToScreen(ent.x + ent.w, ent.y + ent.h / 2);
      const [bx] = eng.worldToScreen(ent.x + ent.w, 0);
      s += `<text class="dim-label" x="${cx}" y="${cy + 14}" text-anchor="middle">${fmtUL(ent.w)}</text>`;
      s += `<text class="dim-label" x="${bx + 8}" y="${by + 4}">${fmtUL(ent.h)}</text>`;
    }
    return s;
  }
  if (ent.type === 'circle') {
    const [cx, cy] = eng.worldToScreen(ent.cx, ent.cy);
    const r = ent.r * eng.view.pxPerMm;
    let s = `<circle class="${cls}" cx="${cx}" cy="${cy}" r="${r}"/>`;
    if (singleSelected) {
      // No square-around-the-circle dashed bbox (looked bulky and didn't
      // match the shape). Diameter pill sits just above the circle; the 4
      // cardinal handles ride on the circle itself so resize still works.
      const bX = cx - r, bY = cy - r, bW = 2 * r, bH = 2 * r;
      s += bboxHandlesSVG(ent.id, bX, bY, bW, bH, ent.r > 1e-6, ent.r > 1e-6);
      s += dimEditPillOutside('top', bX, bY, bW, bH, `⌀ ${fmtUL(ent.r * 2)}`, ent.id, 'd');
    } else if (selected || preview) {
      s += `<text class="dim-label" x="${cx}" y="${cy - r - 6}" text-anchor="middle">⌀ ${fmtUL(ent.r * 2)}</text>`;
    }
    return s;
  }
  if (ent.type === 'polyline') {
    const hasCurve = ent.points.some(p => p.cpOut || p.cpIn);
    let s = '';
    if (hasCurve) {
      const d = polylineToPathD(ent.points, ent.closed, eng);
      s += `<path class="${cls}" d="${d}"${ent.closed ? '' : ' fill="none"'}/>`;
    } else if (ent.closed) {
      const ptsStr = ent.points.map(p => eng.worldToScreen(p.x, p.y).join(',')).join(' ');
      s += `<polygon class="${cls}" points="${ptsStr}"/>`;
    } else {
      const ptsStr = ent.points.map(p => eng.worldToScreen(p.x, p.y).join(',')).join(' ');
      s += `<polyline class="${cls}" points="${ptsStr}" fill="none"/>`;
    }
    // Single straight line (2 points, open, no curve handles) → minimal UI:
    //   endpoints (drawn by the vertex-handle pass below), a small midpoint
    //   marker, and a clickable length label perpendicular to the line. No
    //   bbox, no W/H pills, no corner handles.
    const isSimpleLine = singleSelected && !ent.closed && ent.points.length === 2 && !hasCurve;
    if (isSimpleLine) {
      const p1 = ent.points[0], p2 = ent.points[1];
      const [s1x, s1y] = eng.worldToScreen(p1.x, p1.y);
      const [s2x, s2y] = eng.worldToScreen(p2.x, p2.y);
      const mx = (s1x + s2x) / 2, my = (s1y + s2y) / 2;
      // Midpoint marker — same triangle as the midpoint snap, just smaller
      s += `<polygon class="entity-handle midpoint" points="${mx},${my-5} ${mx+5},${my+4} ${mx-5},${my+4}"/>`;
      // Length label, offset perpendicular to the line so it never sits over
      // the midpoint marker.
      const lenMm = Math.hypot(p2.x - p1.x, p2.y - p1.y);
      const dx = s2x - s1x, dy = s2y - s1y;
      const len = Math.hypot(dx, dy) || 1;
      // Choose perpendicular that points "up" in screen y so labels are above
      const nx = -dy / len, ny = dx / len;
      const sign = ny < 0 ? 1 : -1;
      const off = 18;
      const lx = mx + nx * off * sign;
      const ly = my + ny * off * sign;
      s += dimEditPill(lx, ly, fmtUL(lenMm), ent.id, 'len');
    } else if (singleSelected) {
      // No bbox / W-H pills. Instead label each STRAIGHT edge of the polyline
      // with its own length, drawn perpendicular to that segment. Curve
