            doc.multiSelectedBodies = [bodyId];
            if (body?.bodyGroupId != null) {
              for (const b of doc.bodies) {
                if (b.bodyGroupId === body.bodyGroupId && b.id !== bodyId) {
                  doc.multiSelectedBodies.push(b.id);
                }
              }
            }
          }
          doc.selection = { kind: 'body', id: bodyId };
          doc.selectedRegions = [];
          this.updateGizmo();
          this.updateRegions();
          this.updateExtrudeGizmo();
          renderTree(); renderProps();
          // Arm a potential direct drag on the body (XZ default, Alt = Y axis)
          // — but only if no locked body is in the selection.
          const dragLocked = doc.multiSelectedBodies.some(id =>
            doc.bodies.find(b => b.id === id)?.locked);
          if (!e.shiftKey && !dragLocked) {
            bodyDrag.armed = true;
            bodyDrag.alt = e.altKey;
            bodyDrag.ids = [...doc.multiSelectedBodies];
            bodyDrag.startVals = {};
            for (const id of bodyDrag.ids) {
              const b = doc.bodies.find(x => x.id === id);
              if (b) bodyDrag.startVals[id] = { x: b.x || 0, y: b.y || 0, z: b.z || 0 };
            }
            bodyDrag.startMouse = { x: e.clientX, y: e.clientY };
            bodyDrag.anchorMesh = body.mesh;
            this.canvas.setPointerCapture(e.pointerId);
          }
          return;
        } else {
          // Empty-area click → start a box-select (additive with Shift)
          boxSel.active = true;
          boxSel.startX = e.clientX;
          boxSel.startY = e.clientY;
          boxSel.additive = e.shiftKey;
          const ov = $('box-select');
          const ca = $('canvas-area').getBoundingClientRect();
          ov.style.left = (e.clientX - ca.left) + 'px';
          ov.style.top = (e.clientY - ca.top) + 'px';
          ov.style.width = '0px';
          ov.style.height = '0px';
          ov.classList.add('show');
          if (!e.shiftKey) {
            doc.selection = null;
            doc.multiSelectedBodies = [];
            doc.selectedRegions = [];
            this.updateGizmo();
            this.updateRegions();
            this.updateExtrudeGizmo();
            renderTree(); renderProps();
          }
          this.canvas.setPointerCapture(e.pointerId);
          return;
        }
      }
    });
    this.canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    this.canvas.addEventListener('pointermove', (e) => {
      // Rotation-handle drag — rotate body around the axis
      if (rotateState.active) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const point = new THREE.Vector3();
        if (this.raycaster.ray.intersectPlane(rotateState.plane, point)) {
          const local = point.clone().sub(rotateState.center);
          let cur = computeAxisAngle(rotateState.axis, local);
          let delta = cur - rotateState.startAngle;
          while (delta > Math.PI) delta -= 2 * Math.PI;
          while (delta < -Math.PI) delta += 2 * Math.PI;
          let dDeg = delta * 180 / Math.PI;
          for (const id of rotateState.ids) {
            const b = doc.bodies.find(x => x.id === id);
            if (!b) continue;
            b.rotation = b.rotation || { x: 0, y: 0, z: 0 };
            let v = (rotateState.startRots[id]?.[rotateState.axis] || 0) + dDeg;
            if (doc.grid?.snap) v = Math.round(v / 15) * 15; // snap to 15° increments when snap is on
            b.rotation[rotateState.axis] = v;
          }
          this.rebuildBodies();
          this.updateGizmo();
          renderProps();
        }
        return;
      }

      // Resize-handle drag — change body dimensions
      if (resizeState.active && resizeState.body) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const t = projectRayOnAxis(this.raycaster.ray, resizeState.axisOrigin, resizeState.axisDir);
        const delta = t - resizeState.startT;
        applyResize(resizeState, delta);
        this.rebuildBodies();
        this.updateGizmo();
        this.buildResizeHandles();
        renderProps();
        showDimLabels(resizeState.body);
        return;
      }

      // Box-select rectangle update — track drag direction:
      //   L→R window: solid blue rect, must FULLY enclose a body to pick it.
      //   R→L crossing: dashed green rect, ANY body touched by the rect is
      //   picked. Matches AutoCAD-style selection semantics.
      if (boxSel.active) {
        const ov = $('box-select');
        const ca = $('canvas-area').getBoundingClientRect();
        const x = Math.min(boxSel.startX, e.clientX) - ca.left;
        const y = Math.min(boxSel.startY, e.clientY) - ca.top;
        const w = Math.abs(e.clientX - boxSel.startX);
        const h = Math.abs(e.clientY - boxSel.startY);
        const crossing = e.clientX < boxSel.startX;
        ov.style.left = x + 'px';
        ov.style.top = y + 'px';
        ov.style.width = w + 'px';
        ov.style.height = h + 'px';
        ov.classList.toggle('crossing', crossing);
        return;
      }
      // Body direct-drag (no gizmo) — XZ ground plane by default, Alt for Y axis
      if (bodyDrag.armed) {
        const ddx = e.clientX - bodyDrag.startMouse.x;
        const ddy = e.clientY - bodyDrag.startMouse.y;
        if (Math.hypot(ddx, ddy) > 4) {
          pushUndo();
          bodyDrag.armed = false;
          bodyDrag.active = true;
          bodyDrag.mode = bodyDrag.alt ? 'y' : 'xz';
          this.scene.updateMatrixWorld(true);
          const bb = new THREE.Box3().setFromObject(bodyDrag.anchorMesh);
          const center = bb.getCenter(new THREE.Vector3());
          const tempRay = new THREE.Raycaster();
          tempRay.setFromCamera(ndc({ clientX: bodyDrag.startMouse.x, clientY: bodyDrag.startMouse.y }), this.camera);
          if (bodyDrag.mode === 'xz') {
            // Drag plane: horizontal plane through the body's center
            bodyDrag.planeY = center.y;
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -center.y);
            bodyDrag.dragPlane = plane;
            const start = new THREE.Vector3();
            tempRay.ray.intersectPlane(plane, start);
            bodyDrag.startWorld = start || center.clone();
          } else {
            // Y-axis: project ray onto vertical line through body center
            bodyDrag.axisDir = new THREE.Vector3(0, 1, 0);
            bodyDrag.anchor = center;
            bodyDrag.startT = projectRayOnAxis(tempRay.ray, center, bodyDrag.axisDir);
          }
          setStatus(bodyDrag.mode === 'y' ? 'Dragging on Y axis (Alt)' : 'Dragging on ground plane');
        }
      }
      if (bodyDrag.active) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        if (bodyDrag.mode === 'xz') {
          const point = new THREE.Vector3();
          if (this.raycaster.ray.intersectPlane(bodyDrag.dragPlane, point)) {
            const dx = point.x - bodyDrag.startWorld.x;
            const dz = point.z - bodyDrag.startWorld.z;
            for (const id of bodyDrag.ids) {
              const b = doc.bodies.find(x => x.id === id);
              if (b) { b.x = snapVal(bodyDrag.startVals[id].x + dx); b.z = snapVal(bodyDrag.startVals[id].z + dz); }
            }
          }
        } else {
          const t = projectRayOnAxis(this.raycaster.ray, bodyDrag.anchor, bodyDrag.axisDir);
          const delta = t - bodyDrag.startT;
          for (const id of bodyDrag.ids) {
            const b = doc.bodies.find(x => x.id === id);
            if (b) b.y = snapVal(bodyDrag.startVals[id].y + delta);
          }
        }
        this.rebuildBodies();
        this.updateGizmo();
        renderProps();
        return;
      }

      // Drag-to-extrude — grow / shrink the preview body along plane normal.
      // Sign of delta picks direction: + = push out (add), − = push in (cut).
      // For sketches without a body face (no boundary), negative is clamped to 0.
      if (extrudeState.active) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const t = projectRayOnAxis(this.raycaster.ray, extrudeState.origin, extrudeState.axis);
        let signed = t - extrudeState.startT;
        const canCut = !!extrudeState.sketch?.boundary;
        if (!canCut && signed < 0) signed = 0;
        if (doc.grid?.snap) {
          const step = doc.grid.spacing || 1;
          signed = Math.round(signed / step) * step;
        }
        const dir = signed >= 0 ? 1 : -1;
        const len = Math.abs(signed);
        extrudeState.direction = dir;
        extrudeState.length = len;
        this.updateExtrudePreview(len, dir);
        // Tooltip at the preview tip
        const tipWorld = extrudeState.origin.clone()
          .add(extrudeState.axis.clone().multiplyScalar(signed));
        updateExtrudeTooltipText(len, tipWorld);
        return;
      }
      // Gizmo drag — translate every selected body along the locked axis
      if (gizmoState.active && gizmoState.startVals) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const t = projectRayOnAxis(this.raycaster.ray, gizmoState.axisOrigin, gizmoState.axisDir);
        const delta = t - gizmoState.startT;
        for (const idStr of Object.keys(gizmoState.startVals)) {
          const id = parseInt(idStr);
          const b = doc.bodies.find(x => x.id === id);
          if (b) b[gizmoState.axis] = snapVal(gizmoState.startVals[idStr] + delta);
        }
        this.rebuildBodies();
        this.updateGizmo();
        renderProps();
        return;
      }
      if (!dragKind) return;
      const dx = e.clientX - lastX, dy = e.clientY - lastY;
      lastX = e.clientX; lastY = e.clientY;
      if (dragKind === 'orbit') {
        this.spherical.theta -= dx * 0.005;
        this.spherical.phi = clamp(this.spherical.phi - dy * 0.005, 0.05, Math.PI - 0.05);
      } else if (dragKind === 'pan') {
        const panSpeed = this.spherical.radius * 0.0018;
        const right = new THREE.Vector3().setFromMatrixColumn(this.camera.matrix, 0);
        const up = new THREE.Vector3().setFromMatrixColumn(this.camera.matrix, 1);
        right.multiplyScalar(-dx * panSpeed); up.multiplyScalar(dy * panSpeed);
        this.target.add(right).add(up);
      }
      this.updateCamera();
    });
    this.canvas.addEventListener('pointerup', (e) => {
      if (extrudeState.active) {
        const len = extrudeState.length;
        const dir = extrudeState.direction;
        const region = extrudeState.region;
        const sketch = extrudeState.sketch;
        extrudeState.active = false;
        try { this.canvas.releasePointerCapture(e.pointerId); } catch(_) {}
        // ALWAYS leave the tooltip open after the drag releases — the user
        // wants to fine-tune the length, switch Add/Cut, then click Done to
        // commit. Committing immediately on release made it impossible to
        // change the operation. Re-arm the extrude state so the input field
        // and the toggle keep talking to the live preview.
        extrudeState.active = false;
        // Preserve region/sketch/direction so live preview + commit can resume
        extrudeState.region = region;
        extrudeState.sketch = sketch;
        extrudeState.direction = dir;
        extrudeState.length = len;
        // Push the latest length to the input + preview, then focus it for typing
        const input = document.getElementById('extrude-input');
        if (input) {
          if (len >= 0.05) input.value = toUnit(len).toFixed(2);
          input.focus();
          input.select();
        }
        if (len >= 0.05) this.updateExtrudePreview(len, dir);
        return;
      }
      if (resizeState.active) {
        resizeState.active = false;
        hideDimLabels();
        try { this.canvas.releasePointerCapture(e.pointerId); } catch(_) {}
        return;
      }
      if (rotateState.active) {
        rotateState.active = false;
        try { this.canvas.releasePointerCapture(e.pointerId); } catch(_) {}
        return;
      }
      // Resolve box-select:
      //   L→R window: body's projected screen-bbox must be FULLY inside the
      //     drag rect (every one of its 8 3D corners projects inside).
      //   R→L crossing: drag rect intersects the body's projected screen-bbox
      //     anywhere — touching is enough.
      if (boxSel.active) {
        const x1 = Math.min(boxSel.startX, e.clientX);
        const y1 = Math.min(boxSel.startY, e.clientY);
        const x2 = Math.max(boxSel.startX, e.clientX);
        const y2 = Math.max(boxSel.startY, e.clientY);
        const crossing = e.clientX < boxSel.startX;
        const ov = $('box-select');
        ov.classList.remove('show');
        ov.classList.remove('crossing');
        boxSel.active = false;
        if (Math.abs(x2 - x1) < 4 && Math.abs(y2 - y1) < 4) {
          // Just a click, not a real drag — don't change selection
          dragKind = null;
          return;
        }
        const r = this.canvas.getBoundingClientRect();
        this.scene.updateMatrixWorld(true);
        const picked = [];
        for (const body of doc.bodies) {
          if (!body.mesh) continue;
          const bb = new THREE.Box3().setFromObject(body.mesh);
          // Project all 8 corners of the body's world AABB to screen space,
          // then take the screen-aligned bbox of those projections.
          const corners = [
            new THREE.Vector3(bb.min.x, bb.min.y, bb.min.z),
            new THREE.Vector3(bb.max.x, bb.min.y, bb.min.z),
            new THREE.Vector3(bb.min.x, bb.max.y, bb.min.z),
            new THREE.Vector3(bb.max.x, bb.max.y, bb.min.z),
            new THREE.Vector3(bb.min.x, bb.min.y, bb.max.z),
            new THREE.Vector3(bb.max.x, bb.min.y, bb.max.z),
            new THREE.Vector3(bb.min.x, bb.max.y, bb.max.z),
            new THREE.Vector3(bb.max.x, bb.max.y, bb.max.z),
          ];
          let bMinX = Infinity, bMaxX = -Infinity, bMinY = Infinity, bMaxY = -Infinity;
          let allInside = true;
          for (const c of corners) {
            const p = c.project(this.camera);
            // Bodies straddling the camera near-plane have nonsense
            // projections — bail out of window mode for those.
            if (Math.abs(p.z) > 1.5) allInside = false;
            const sx = r.left + ((p.x + 1) / 2) * r.width;
            const sy = r.top + ((1 - p.y) / 2) * r.height;
            if (sx < bMinX) bMinX = sx;
            if (sx > bMaxX) bMaxX = sx;
            if (sy < bMinY) bMinY = sy;
            if (sy > bMaxY) bMaxY = sy;
            if (sx < x1 || sx > x2 || sy < y1 || sy > y2) allInside = false;
          }
          if (crossing) {
            // Rect-vs-rect intersection between drag rect and projected bbox
            const intersects = !(bMaxX < x1 || bMinX > x2 || bMaxY < y1 || bMinY > y2);
            if (intersects) picked.push(body.id);
          } else {
            if (allInside) picked.push(body.id);
          }
        }
        if (boxSel.additive) {
          for (const id of picked) if (!doc.multiSelectedBodies.includes(id)) doc.multiSelectedBodies.push(id);
        } else {
          doc.multiSelectedBodies = picked;
        }
        doc.selection = picked.length ? { kind: 'body', id: picked[picked.length - 1] } : null;
        this.updateGizmo();
        renderTree(); renderProps();
        setStatus(`${picked.length} bod${picked.length === 1 ? 'y' : 'ies'} selected (${crossing ? 'crossing' : 'window'})`);
        try { this.canvas.releasePointerCapture(e.pointerId); } catch(_) {}
        return;
      }
      gizmoState.active = false;
      bodyDrag.active = false;
      bodyDrag.armed = false;
      dragKind = null;
      try { this.canvas.releasePointerCapture(e.pointerId); } catch(_) {}
    });
    this.canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const oldR = this.spherical.radius;
      const newR = clamp(oldR * Math.exp(e.deltaY * 0.001), 20, 2000);
      const f = newR / oldR;
      // Zoom toward the cursor: cast a ray through the pointer, project onto
      // the plane through the target perpendicular to the view, then shift
      // target toward that world point by (1 − f). Net effect: the world
      // point under the cursor stays under the cursor as you zoom.
      const rect = this.canvas.getBoundingClientRect();
      const nx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      const ny = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      this.raycaster.setFromCamera({ x: nx, y: ny }, this.camera);
      const camFwd = this.target.clone().sub(this.camera.position).normalize();
      const viewPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(camFwd, this.target);
      const cursorWorld = new THREE.Vector3();
      const hit = this.raycaster.ray.intersectPlane(viewPlane, cursorWorld);
      this.spherical.radius = newR;
      if (hit) {
        const shift = cursorWorld.sub(this.target).multiplyScalar(1 - f);
        this.target.add(shift);
      }
      this.updateCamera();
    }, { passive: false });
    window.addEventListener('resize', () => this.resize());
  }

  resize() {
    const r = this.canvas.getBoundingClientRect();
    if (r.width === 0 || r.height === 0) return;
    this.renderer.setSize(r.width, r.height, false);
    this.camera.aspect = r.width / r.height;
    this.camera.updateProjectionMatrix();
  }

  loop() {
    this.resize();
    this.renderer.render(this.scene, this.camera);
    // Live-update engineering dimension labels for the selected body so they
    // follow camera orbit / zoom / pan continuously.
    if (doc.mode === '3d' && doc.selection?.kind === 'body') {
      const body = doc.bodies.find(b => b.id === doc.selection.id);
      if (body) showDimLabels(body);
    }
    requestAnimationFrame(() => this.loop());
  }

  rebuildBodies() {
    while (this.bodyGroup.children.length) {
      const c = this.bodyGroup.children.pop();
      // Deep dispose so edge-overlay child geometries/materials don't leak
      c.traverse(o => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) o.material.dispose();
      });
    }
    for (const body of doc.bodies) {
      if (body.hidden) { body.mesh = null; continue; }
      const mesh = buildBodyMesh(body);
      if (mesh) {
        body.mesh = mesh;
        mesh.userData.bodyId = body.id;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        this.bodyGroup.add(mesh);
        // Edge overlay — only for non-CSG primitives / single extrudes.
        // CSG output is too tessellation-noisy for EdgesGeometry to extract
        // a clean line set: fans around cut cylinders, near-coplanar seams
        // at unions, and short artifact segments survive every threshold /
        // weld / length-filter combination. The shaded mesh + silhouette
        // already convey the form on a grouped body; skipping the overlay
        // gives the cleanest read.
        const isCSGBody = body.type === 'group' || body.type === 'combined';
        if (!isCSGBody && mesh.geometry && mesh.geometry.attributes?.position) {
          try {
            const edgeGeo = new THREE.EdgesGeometry(mesh.geometry, 25);
            if (edgeGeo.attributes?.position?.count >= 2) {
              const edgeMat = new THREE.LineBasicMaterial({
                color: 0x2f5fe0, transparent: true, opacity: 0.55,
              });
              const edges = new THREE.LineSegments(edgeGeo, edgeMat);
              edges.renderOrder = 1;
              mesh.add(edges);
            } else {
              edgeGeo.dispose();
            }
          } catch (_) { /* some geometry types reject EdgesGeometry */ }
        }
      }
    }
    pruneOrphanJoints();
    this.updateGizmo();
    this.updateRegions();
    this.updateExtrudeGizmo();
    this.updateJointGizmos();
  }

  // One small amber pin per joint: a short cylinder along the joint axis
  // with a darker cap sphere so the origin point is unambiguous.
  updateJointGizmos() {
    while (this.jointGizmos.children.length) {
      const c = this.jointGizmos.children.pop();
      c.traverse?.(o => { o.geometry?.dispose(); o.material?.dispose(); });
    }
    if (!doc.joints?.length) return;
    const pinLen = 8, pinRad = 1.2, capRad = 1.8;
    const pinColor = 0xf59e0b, capColor = 0xb45309;
    for (const j of doc.joints) {
      const origin = new THREE.Vector3(j.origin[0], j.origin[1], j.origin[2]);
      const axis = new THREE.Vector3(j.axis[0], j.axis[1], j.axis[2]).normalize();
      const g = new THREE.Group();
      g.userData = { kind: 'joint', jointId: j.id };
      const cyl = new THREE.Mesh(
        new THREE.CylinderGeometry(pinRad, pinRad, pinLen, 16),
        new THREE.MeshStandardMaterial({ color: pinColor, roughness: 0.5, metalness: 0.3 }),
      );
      // CylinderGeometry's long axis is Y by default; rotate Y → joint axis.
      cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), axis);
      const cap = new THREE.Mesh(
        new THREE.SphereGeometry(capRad, 18, 12),
        new THREE.MeshStandardMaterial({ color: capColor, roughness: 0.6 }),
      );
      g.add(cyl); g.add(cap);
      g.position.copy(origin);
      this.jointGizmos.add(g);
    }
  }

  // Drag-to-extrude gizmo: when exactly one region is picked, place the push/
  // pull arrows at its centroid pointing along the sketch plane normal.
  updateExtrudeGizmo() {
    const sel = doc.selectedRegions || [];
    if (sel.length !== 1) {
      this.extrudeArrows.visible = false;
      this.clearExtrudePreview();
      hideExtrudeTooltip();
      return;
    }
    const id = sel[0];
    let region = null, sketch = null;
    for (const s of doc.sketches) {
      const r = computeSketchRegions(s).find(r => r.id === id);
      if (r) { region = r; sketch = s; break; }
    }
    if (!region) { this.extrudeArrows.visible = false; return; }
    let cu = 0, cv = 0;
    let rMinX = +Infinity, rMaxX = -Infinity, rMinY = +Infinity, rMaxY = -Infinity;
    for (const p of region.points) {
      cu += p.x; cv += p.y;
      if (p.x < rMinX) rMinX = p.x; if (p.x > rMaxX) rMaxX = p.x;
      if (p.y < rMinY) rMinY = p.y; if (p.y > rMaxY) rMaxY = p.y;
    }
    cu /= region.points.length; cv /= region.points.length;
    const planeM = makePlaneMatrix(sketch.plane);
    const center = new THREE.Vector3(cu, cv, 0).applyMatrix4(planeM);
    const n = new THREE.Vector3(...sketch.plane.n).normalize();
    // Scale the extrude cone with the region's largest in-plane span so a
    // 6 mm hole doesn't get a 7 mm cone hovering over it, and a 200 mm
    // pocket doesn't get a barely-visible one. ~5% of span, clamped.
    const regionSpan = Math.max(rMaxX - rMinX, rMaxY - rMinY);
    const eScale = Math.min(2.5, Math.max(0.3, regionSpan * 0.05));
    this.extrudeArrows.scale.setScalar(eScale);
    this.extrudeArrows.position.copy(center);
    const yAxis = new THREE.Vector3(0, 1, 0);
    // Lift offset scales too so the cone sits just above the region.
    const posOffset = n.clone().multiplyScalar(7 * eScale);
    const posQ = new THREE.Quaternion().setFromUnitVectors(yAxis, n);
    this.extrudeArrows.children[0].position.copy(posOffset);
    this.extrudeArrows.children[0].quaternion.copy(posQ);
    this.extrudeArrows.visible = true;
    this.extrudeArrows.userData = { region, sketch, center, normal: n };
  }

  clearExtrudePreview() {
    if (!this.extrudePreview) return;
    this.scene.remove(this.extrudePreview);
    this.extrudePreview.geometry?.dispose();
    this.extrudePreview.material?.dispose();
    this.extrudePreview = null;
  }

  // Build / refresh a translucent preview of the in-progress extrude.
  // direction = +1 (push out, add) or -1 (push in, cut).
  updateExtrudePreview(length, direction) {
    this.clearExtrudePreview();
    if (Math.abs(length) < 0.001) return;
    const meta = this.extrudeArrows.userData;
    if (!meta) return;
    const shape = regionToShape(meta.region);
    if (!shape) return;
    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: Math.abs(length),
      bevelEnabled: false,
      curveSegments: 32,
    });
    if (direction < 0) geo.translate(0, 0, -Math.abs(length));
    geo.applyMatrix4(makePlaneMatrix(meta.sketch.plane));
    // Cut/Add color follows the explicit toggle the user picked on the tooltip.
    const isCut = (typeof getExtrudeTooltipOp === 'function')
      ? getExtrudeTooltipOp() === 'subtract'
      : (direction < 0 && !!meta.sketch.boundary);
    const mat = new THREE.MeshBasicMaterial({
      color: isCut ? 0xff5252 : 0x4f7cff,
      transparent: true,
      opacity: isCut ? 0.45 : 0.35,
      side: THREE.DoubleSide,
      depthWrite: false,
    });
    this.extrudePreview = new THREE.Mesh(geo, mat);
    this.extrudePreview.renderOrder = 9;
    this.scene.add(this.extrudePreview);
  }

  // Rebuild the translucent pickable region overlays for every sketch.
  // Each region is a flat ShapeGeometry sitting just above its sketch plane.
  updateRegions() {
    while (this.regionGroup.children.length) {
      const c = this.regionGroup.children.pop();
      c.geometry?.dispose();
      c.material?.dispose();
    }
    for (const sketch of doc.sketches) {
      if (sketch.hidden) continue;
      const planeM = makePlaneMatrix(sketch.plane);
      const regs = computeSketchRegions(sketch);
      for (const r of regs) {
        const shape = regionToShape(r);
        if (!shape) continue;
        const geo = new THREE.ShapeGeometry(shape);
        // Push out ~0.2 along plane +n so it sits above the sketch fill (0.05)
        // and a body face it might be coincident with.
        geo.translate(0, 0, 0.2);
        geo.applyMatrix4(planeM);
        const isSelected = doc.selectedRegions?.includes(r.id);
        const mat = new THREE.MeshBasicMaterial({
          color: isSelected ? 0x2c64ff : 0x6f8cff,
          transparent: true,
          opacity: isSelected ? 0.45 : 0.16,
          side: THREE.DoubleSide,
          depthWrite: false,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.renderOrder = 8;
        // Stash area + bbox so the picker can prefer the smallest containing
        // region when several overlap (e.g., a square drawn inside a sphere's
        // circular boundary — without this, the boundary always wins).
        mesh.userData = {
          kind: 'region',
          regionId: r.id,
          sketchId: r.sketchId,
          regionArea: Math.abs(r.area || 0),
        };
        this.regionGroup.add(mesh);
      }
    }
  }

  // 3 translucent picker planes through the origin (YZ red, XZ green, XY
  // blue) — clickable to mirror the selected body across that plane.
  buildMirrorPlanePicker() {
    this.clearMirrorPlanePicker();
    const body = doc.bodies.find(b => b.id === doc.selection?.id);
    if (!body?.mesh) return;
    this.scene.updateMatrixWorld(true);
    const bb = new THREE.Box3().setFromObject(body.mesh);
    if (bb.isEmpty()) return;
    // Plane size scales with the body so it always reads at any zoom level.
    const sz = bb.getSize(new THREE.Vector3());
    const span = Math.max(sz.x, sz.y, sz.z,
      Math.abs(bb.min.x), Math.abs(bb.max.x),
      Math.abs(bb.min.y), Math.abs(bb.max.y),
      Math.abs(bb.min.z), Math.abs(bb.max.z));
    const planeSize = Math.max(span * 2.4, 20);
    const group = new THREE.Group();
    const makePlane = (kind, color, rotateFn) => {
      const geo = new THREE.PlaneGeometry(planeSize, planeSize);
      const mat = new THREE.MeshBasicMaterial({
        color, transparent: true, opacity: 0.22,
        side: THREE.DoubleSide, depthWrite: false,
      });
      const m = new THREE.Mesh(geo, mat);
      rotateFn(m);
      m.userData.mirrorPlane = kind;
      m.renderOrder = 100;
      group.add(m);
      // Outline so the plane reads even when looking at it edge-on
      const wire = new THREE.LineSegments(
        new THREE.WireframeGeometry(new THREE.PlaneGeometry(planeSize, planeSize)),
        new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.85, depthWrite: false }),
      );
      rotateFn(wire);
      wire.userData.mirrorPlane = kind;
      wire.renderOrder = 101;
      group.add(wire);
    };
    // YZ: normal = +X, so rotate plane around Y by 90°
    makePlane('yz', 0xe53e3e, m => { m.rotation.y = Math.PI / 2; });
    // XZ: normal = +Y, rotate around X by 90°
    makePlane('xz', 0x38a169, m => { m.rotation.x = Math.PI / 2; });
    // XY: normal = +Z (default plane orientation)
    makePlane('xy', 0x4f7cff, () => {});
    this.mirrorPicker = group;
    this.scene.add(group);
  }
  clearMirrorPlanePicker() {
    if (!this.mirrorPicker) return;
    this.scene.remove(this.mirrorPicker);
    this.mirrorPicker.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) o.material.dispose();
    });
    this.mirrorPicker = null;
  }

  buildAlignWidget() {
    this.clearAlignWidget();
    if (!doc.multiSelectedBodies?.length || doc.multiSelectedBodies.length < 2) return false;
    this.scene.updateMatrixWorld(true);
    const bb = new THREE.Box3();
    for (const id of doc.multiSelectedBodies) {
      const b = doc.bodies.find(x => x.id === id);
      if (b?.mesh) bb.union(new THREE.Box3().setFromObject(b.mesh));
    }
    if (bb.isEmpty()) return false;
    const min = bb.min, max = bb.max;
    const ctr = bb.getCenter(new THREE.Vector3());
    const size = bb.getSize(new THREE.Vector3());
    // Offset distance — proportional to bbox so handles read at any zoom
    const δ = Math.max(5, Math.max(size.x, size.y, size.z) * 0.12);
    const hr = Math.max(1.2, Math.max(size.x, size.y, size.z) * 0.02);

    const group = new THREE.Group();

    // Wireframe outline of the selection's combined bbox
    const helper = new THREE.Box3Helper(bb.clone(), 0x4f7cff);
    helper.material.depthTest = false;
    helper.material.transparent = true;
    helper.material.opacity = 0.85;
    helper.renderOrder = 1000;
    group.add(helper);

    const axisColors = { x: 0xe53e3e, y: 0x38a169, z: 0x3182ce };
    const handles = [
      // X axis dots — sit just below the bbox front-bottom edge, span x
      { axis: 'x', kind: 'min', position: [min.x, min.y - δ, max.z + δ] },
      { axis: 'x', kind: 'mid', position: [ctr.x, min.y - δ, max.z + δ] },
      { axis: 'x', kind: 'max', position: [max.x, min.y - δ, max.z + δ] },
      // Y axis dots — sit just left of bbox front-left edge, span y
      { axis: 'y', kind: 'min', position: [min.x - δ, min.y, max.z + δ] },
      { axis: 'y', kind: 'mid', position: [min.x - δ, ctr.y, max.z + δ] },
      { axis: 'y', kind: 'max', position: [min.x - δ, max.y, max.z + δ] },
      // Z axis dots — sit just left-and-below the bbox bottom-left edge, span z
      { axis: 'z', kind: 'min', position: [min.x - δ, min.y - δ, min.z] },
      { axis: 'z', kind: 'mid', position: [min.x - δ, min.y - δ, ctr.z] },
      { axis: 'z', kind: 'max', position: [min.x - δ, min.y - δ, max.z] },
    ];
    for (const h of handles) {
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(hr, 16, 12),
        new THREE.MeshBasicMaterial({ color: axisColors[h.axis], depthTest: false, transparent: true, opacity: 0.95 }),
      );
      sphere.position.set(...h.position);
      sphere.userData.alignAxis = h.axis;
      sphere.userData.alignKind = h.kind;
      sphere.renderOrder = 1001;
      group.add(sphere);

      // Faint guide line from each handle through the bbox center axis (not strictly needed — but reads as "this dot moves along this axis")
      const axisDir = h.axis === 'x' ? new THREE.Vector3(1, 0, 0)
                     : h.axis === 'y' ? new THREE.Vector3(0, 1, 0)
                     :                   new THREE.Vector3(0, 0, 1);
      // Skip the connector to keep the visual clean
    }
    this.alignWidget = group;
    this.scene.add(group);
    return true;
  }

  clearAlignWidget() {
    if (!this.alignWidget) return;
    this.scene.remove(this.alignWidget);
    this.alignWidget.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) o.material.dispose();
    });
    this.alignWidget = null;
  }

  buildRotationHandles(bbox) {
    this.clearRotationHandles();
    if (!bbox || bbox.isEmpty()) return;
    const ctr = bbox.getCenter(new THREE.Vector3());
    // Small and light — the rotation hints fade in only on hover-style use; they
    // shouldn't compete visually with the body itself.
    const arcR = 3;
    const tube = 0.22;
    const off = arcR + 1;

    // Build one slim half-arch (180°) with arrowhead cones at both ends, in its
    // local XY plane. The caller rotates the whole archGroup into the rotation
    // plane of the chosen axis.
    const buildArch = (axis, color, position, planeXform) => {
      const archGroup = new THREE.Group();
      // Lower opacity so they read as a hint rather than blocking the body
      const matOpts = { color, transparent: true, opacity: 0.55, depthTest: false };
      const torus = new THREE.Mesh(
        new THREE.TorusGeometry(arcR, tube, 10, 36, Math.PI),
        new THREE.MeshBasicMaterial(matOpts),
      );
      torus.userData.rotateAxis = axis;
      torus.renderOrder = 1003;
      archGroup.add(torus);
      // Wider transparent torus for easier picking
      const hit = new THREE.Mesh(
        new THREE.TorusGeometry(arcR, tube * 5, 6, 24, Math.PI),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0, depthTest: false }),
      );
      hit.userData.rotateAxis = axis;
      archGroup.add(hit);
      // Tiny arrowheads at both ends pointing radially outward
      const coneR = tube * 3, coneH = 1.2;
      const startCone = new THREE.Mesh(new THREE.ConeGeometry(coneR, coneH, 12), new THREE.MeshBasicMaterial(matOpts));
      startCone.position.set(arcR + coneH * 0.5, 0, 0);
      startCone.rotation.z = -Math.PI / 2;
      startCone.userData.rotateAxis = axis;
      archGroup.add(startCone);
      const endCone = new THREE.Mesh(new THREE.ConeGeometry(coneR, coneH, 12), new THREE.MeshBasicMaterial(matOpts));
      endCone.position.set(-arcR - coneH * 0.5, 0, 0);
      endCone.rotation.z = Math.PI / 2;
      endCone.userData.rotateAxis = axis;
      archGroup.add(endCone);
      planeXform(archGroup);
      archGroup.position.copy(position);
      return archGroup;
    };

    const group = new THREE.Group();
    // Each arch sits OUTSIDE the body's perimeter, centered on the rotation
    // axis line, at one of the two faces that axis exits through.
    // X arch (red) — outside the +X face (right), centered in Y/Z, in YZ plane
    group.add(buildArch('x', 0xc26b6b,
      new THREE.Vector3(bbox.max.x + off, ctr.y, ctr.z),
      (g) => { g.rotation.y = Math.PI / 2; }));
    // Y arch (green) — outside the −Y face (bottom), centered in X/Z, in XZ plane
    group.add(buildArch('y', 0x6fa882,
      new THREE.Vector3(ctr.x, bbox.min.y - off, ctr.z),
      (g) => { g.rotation.x = Math.PI / 2; }));
    // Z arch (blue) — outside the +Z face (front), centered in X/Y, in XY plane
    group.add(buildArch('z', 0x6f8fb8,
      new THREE.Vector3(ctr.x, ctr.y, bbox.max.z + off),
      (g) => { /* default XY plane */ }));

    this.rotateHandles = group;
    this.rotateHandles.userData.bodyCenter = ctr.clone();
    this.scene.add(group);
  }
  clearRotationHandles() {
    if (!this.rotateHandles) return;
    this.scene.remove(this.rotateHandles);
    this.rotateHandles.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) o.material.dispose();
    });
    this.rotateHandles = null;
  }

  rebuildWorkplane() {
    if (!this.workplaneGroup) return;
    while (this.workplaneGroup.children.length) {
      const c = this.workplaneGroup.children.pop();
      c.geometry?.dispose();
      c.material?.dispose();
    }
    const size = doc.grid.size;
    // Cap divisions so large workplanes with fine spacing don't lag
    const divisions = clamp(Math.round(size / doc.grid.spacing), 4, 200);
    const grid = new THREE.GridHelper(size, divisions, 0xc7cee0, 0xe6e8f1);
    grid.position.y = 0.001;
    this.workplaneGroup.add(grid);
    // Stronger border line at the workplane edge
    const half = size / 2;
    const borderPts = [
      new THREE.Vector3(-half, 0.002, -half),
      new THREE.Vector3( half, 0.002, -half),
      new THREE.Vector3( half, 0.002,  half),
      new THREE.Vector3(-half, 0.002,  half),
      new THREE.Vector3(-half, 0.002, -half),
    ];
    const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPts);
    const border = new THREE.Line(borderGeo, new THREE.LineBasicMaterial({ color: 0x9aa0b8 }));
    this.workplaneGroup.add(border);
  }

  // Render 6 translucent clickable face overlays around the body's bbox so
  // the user can pick which side to sketch on (one for each ±X / ±Y / ±Z
  // direction). Used in place of the old Top/Front/Right modal.
  buildBboxFacePicker(body) {
    this.clearBboxFacePicker();
    if (!body || !body.mesh) return;
    this.scene.updateMatrixWorld(true);
    const bb = new THREE.Box3().setFromObject(body.mesh);
    if (bb.isEmpty()) return;
    const sz = bb.getSize(new THREE.Vector3());
    const ctr = bb.getCenter(new THREE.Vector3());
    const FUDGE = 0.05; // sit a hair outside so face is clearly outside body
    const group = new THREE.Group();
    // Wireframe bbox to anchor the eye
    const helper = new THREE.Box3Helper(bb.clone(), 0x4f7cff);
    helper.material.transparent = true;
    helper.material.opacity = 0.55;
    helper.renderOrder = 999;
    group.add(helper);
    // Label container in HTML overlay would need separate work — for now just
    // colour the faces and let the cursor show what's clickable.
    const faces = [
      { axis: 'x', sign: +1, label: 'Right', size: [sz.z, sz.y], pos: [bb.max.x + FUDGE, ctr.y, ctr.z], rot: [0, Math.PI / 2, 0] },
      { axis: 'x', sign: -1, label: 'Left',  size: [sz.z, sz.y], pos: [bb.min.x - FUDGE, ctr.y, ctr.z], rot: [0, -Math.PI / 2, 0] },
      { axis: 'y', sign: +1, label: 'Top',   size: [sz.x, sz.z], pos: [ctr.x, bb.max.y + FUDGE, ctr.z], rot: [-Math.PI / 2, 0, 0] },
      { axis: 'y', sign: -1, label: 'Bot',   size: [sz.x, sz.z], pos: [ctr.x, bb.min.y - FUDGE, ctr.z], rot: [ Math.PI / 2, 0, 0] },
      { axis: 'z', sign: +1, label: 'Front', size: [sz.x, sz.y], pos: [ctr.x, ctr.y, bb.max.z + FUDGE], rot: [0, 0, 0] },
      { axis: 'z', sign: -1, label: 'Back',  size: [sz.x, sz.y], pos: [ctr.x, ctr.y, bb.min.z - FUDGE], rot: [0, Math.PI, 0] },
    ];
    for (const f of faces) {
      const geo = new THREE.PlaneGeometry(f.size[0], f.size[1]);
      const mat = new THREE.MeshBasicMaterial({
        color: 0x4f7cff,
        transparent: true,
        opacity: 0.18,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(...f.pos);
      mesh.rotation.set(...f.rot);
      mesh.userData = { axis: f.axis, sign: f.sign, label: f.label };
      mesh.renderOrder = 998;
      group.add(mesh);
    }
    this.bboxFacePickGroup = group;
    this.scene.add(group);
  }
  clearBboxFacePicker() {
    if (this.bboxFacePickGroup) {
      this.scene.remove(this.bboxFacePickGroup);
      this.bboxFacePickGroup.traverse(o => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) o.material.dispose();
      });
      this.bboxFacePickGroup = null;
    }
  }

  buildResizeHandles() {
    // Clear old
    if (this.resizeHandles) {
      this.scene.remove(this.resizeHandles);
      this.resizeHandles.traverse(o => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) o.material.dispose();
      });
      this.resizeHandles = null;
    }
    // Show only when exactly one body is selected (no multi-select).
    if (!doc.selection || doc.selection.kind !== 'body') return;
    if ((doc.multiSelectedBodies?.length || 0) > 1) return;
    const body = doc.bodies.find(b => b.id === doc.selection.id);
    if (!body || !body.mesh) return;
    // Threaded fasteners have their shape set in the fastener dialog
    // (length / diameter / pitch) — letting the user drag the bbox would
    // distort the helix. Skip resize handles entirely; the properties panel
    // still exposes every parameter.
    if (body.type === 'fastener') return;

    this.scene.updateMatrixWorld(true);
    const bb = new THREE.Box3().setFromObject(body.mesh);
    if (bb.isEmpty()) return;

    const ctr = bb.getCenter(new THREE.Vector3());
    // Scale the resize spheres with the body's largest bbox dimension so
    // they read as a small affordance on any-size object instead of a
    // fixed 1.5 mm sphere that looks huge on a 6 mm fastener and tiny on a
    // 200 mm block. ~5% of the span, clamped so they stay clickable even
    // on extreme sizes.
    const sz = bb.getSize(new THREE.Vector3());
    const span = Math.max(sz.x, sz.y, sz.z);
    const hr = Math.min(3, Math.max(0.4, span * 0.05));
    const off = hr * 1.2;
    const isCSGResult = body.type === 'group' || body.type === 'combined';

    const group = new THREE.Group();
    const matEdge = new THREE.LineBasicMaterial({ color: 0x4f7cff, transparent: true, opacity: 0.45 });

    // Faint bbox helper — only shown for parametric primitives. For a group
    // with cuts the bbox is still cube-shaped even after the material's
    // been carved out, so drawing it creates a confusing "phantom cube"
    // outline floating in the empty space where the cuts went through.
    if (!isCSGResult) {
      const helper = new THREE.Box3Helper(bb.clone(), 0x4f7cff);
      helper.material = matEdge;
      helper.renderOrder = 999;
      group.add(helper);
    }

    // Per-axis face-center resize spheres — only meaningful for parametric
    // primitives + extrudes; not for CSG group/combined results (their
    // baked geometry doesn't have parametric width/height to drag).
    if (!isCSGResult) {
      const facePoints = [
        { axis: 'x', sign: +1, pos: [bb.max.x + off, ctr.y, ctr.z] },
        { axis: 'x', sign: -1, pos: [bb.min.x - off, ctr.y, ctr.z] },
        { axis: 'y', sign: +1, pos: [ctr.x, bb.max.y + off, ctr.z] },
        { axis: 'y', sign: -1, pos: [ctr.x, bb.min.y - off, ctr.z] },
        { axis: 'z', sign: +1, pos: [ctr.x, ctr.y, bb.max.z + off] },
        { axis: 'z', sign: -1, pos: [ctr.x, ctr.y, bb.min.z - off] },
      ];
      for (const f of facePoints) {
        const handle = new THREE.Mesh(
          new THREE.SphereGeometry(hr, 16, 12),
          new THREE.MeshBasicMaterial({ color: 0x1f2540, transparent: true, opacity: 0.95 }),
        );
        handle.position.set(...f.pos);
        handle.userData.resizeAxis = f.axis;
        handle.userData.resizeSign = f.sign;
        group.add(handle);
      }
    }

    this.resizeHandles = group;
    this.scene.add(group);
  }

  updateGizmo() {
    // Highlight all selected bodies via emissive glow
    for (const body of doc.bodies) {
      if (!body.mesh || !body.mesh.material) continue;
      const isSelected = doc.multiSelectedBodies?.includes(body.id) ||
                         (doc.selection?.kind === 'body' && doc.selection.id === body.id);
      if (body.mesh.material.emissive) {
        body.mesh.material.emissive.setHex(isSelected ? 0x4f7cff : 0x000000);
        body.mesh.material.emissiveIntensity = isSelected ? 0.35 : 0;
      }
    }
    // Build / refresh resize handles for the currently selected single primitive
    this.buildResizeHandles();
    // Position gizmo well above the top face of the selection's combined bbox so
    // it doesn't crowd the rotation arcs or resize handles.
    if (doc.selection?.kind === 'body') {
      const ids = doc.multiSelectedBodies?.length ? doc.multiSelectedBodies : [doc.selection.id];
      const meshes = ids.map(id => doc.bodies.find(b => b.id === id)?.mesh).filter(Boolean);
      if (meshes.length > 0) {
        this.scene.updateMatrixWorld(true);
        const combined = new THREE.Box3();
        for (const m of meshes) combined.union(new THREE.Box3().setFromObject(m));
        const ctr = combined.getCenter(new THREE.Vector3());
        // Scale the Y-lift cone with the body span so it stays a sensible
        // affordance on tiny fasteners and big plates alike. ~4% of span,
        // clamped. The hover lift above the body also scales so a small
        // body doesn't get a cone that visually crashes into the top face.
        const sz = combined.getSize(new THREE.Vector3());
        const span = Math.max(sz.x, sz.y, sz.z);
        const gScale = Math.min(2.5, Math.max(0.3, span * 0.04));
        this.gizmo.scale.setScalar(gScale);
        this.gizmo.position.set(ctr.x, combined.max.y + 6 * gScale, ctr.z);
        this.gizmo.visible = true;
        // Rotation arches removed for now — rotation is still available via
        // the property panel (X / Y / Z degree fields). buildRotationHandles
        // remains in the codebase, ready to be re-enabled when the visual is right.
        this.clearRotationHandles();
        return;
      }
    }
    this.gizmo.visible = false;
    this.clearRotationHandles();
    hideDimLabels();
  }

  updateSketchOverlay() {
    while (this.sketchGroup.children.length) {
      const c = this.sketchGroup.children.pop();
      c.geometry?.dispose();
      c.material?.dispose();
    }
    // depthTest stays ON: now that curved-body sketches sit tangent to the
    // outer surface (not through the equator), natural depth occlusion works
    // — the sketch is visible from its own side and hidden by the body when
    // the camera orbits behind. That matches what students intuitively expect.
    const matActive       = new THREE.LineBasicMaterial({ color: 0x4f7cff, transparent: true, opacity: 0.95 });
    const matInactive     = new THREE.LineBasicMaterial({ color: 0x4f7cff, transparent: true, opacity: 0.35 });
    const matConstruction = new THREE.LineDashedMaterial({ color: 0xff9a3e, dashSize: 1.5, gapSize: 0.8, transparent: true, opacity: 0.7 });

    // Build a Three.js Shape from a closed entity, in sketch (u,v) coords
    const buildClosedShape = (ent) => {
      if (ent.type === 'rect') {
        const s = new THREE.Shape();
        s.moveTo(ent.x, ent.y);
        s.lineTo(ent.x + ent.w, ent.y);
        s.lineTo(ent.x + ent.w, ent.y + ent.h);
        s.lineTo(ent.x, ent.y + ent.h);
        s.closePath();
        return s;
      }
      if (ent.type === 'circle') {
        const s = new THREE.Shape();
        s.absarc(ent.cx, ent.cy, ent.r, 0, Math.PI * 2, false);
        return s;
      }
      if (ent.type === 'polyline' && ent.closed && ent.points.length >= 3) {
        const s = new THREE.Shape();
        s.moveTo(ent.points[0].x, ent.points[0].y);
        for (let i = 1; i < ent.points.length; i++) s.lineTo(ent.points[i].x, ent.points[i].y);
        s.closePath();
        return s;
      }
      return null;
    };

    for (const sketch of doc.sketches) {
      if (sketch.hidden) continue;
      const planeM = makePlaneMatrix(sketch.plane);
      const isActive = sketch.id === doc.activeSketchId;
      const baseMat = isActive ? matActive : matInactive;
      // Tiny perpendicular offset along plane +n so fills/lines don't z-fight body faces
      const sketch2dTo3d = (sx, sy) => new THREE.Vector3(sx, sy, 0.05).applyMatrix4(planeM);
      for (const ent of sketch.entities) {
        if (doc.hideConstruction && ent.construction) continue;
        const useMat = ent.construction ? matConstruction : baseMat;

        // Thread mark — render as an orange crosshair-in-circle on the
        // sketch plane. Tagged with userData.threadMark so the 3D click
        // handler can pick them and pop the per-mark thread dialog.
        if (ent.type === 'threadMark') {
          const orangeMat = new THREE.LineBasicMaterial({ color: 0xff9a3e, transparent: true, opacity: 0.95 });
          const R = 3; // mm
          // Circle
          const cPts = [];
          const Nc = 32;
          for (let i = 0; i <= Nc; i++) {
            const t = (i / Nc) * Math.PI * 2;
            cPts.push(sketch2dTo3d(ent.cx + Math.cos(t) * R, ent.cy + Math.sin(t) * R));
          }
          const cGeo = new THREE.BufferGeometry().setFromPoints(cPts);
          const cLine = new THREE.Line(cGeo, orangeMat);
          cLine.renderOrder = 7;
          cLine.userData = { kind: 'threadMark', markId: ent.id, sketchId: sketch.id };
          this.sketchGroup.add(cLine);
          // Crosshair (horizontal + vertical)
          const cross = R + 1.5;
          const hGeo = new THREE.BufferGeometry().setFromPoints([
            sketch2dTo3d(ent.cx - cross, ent.cy), sketch2dTo3d(ent.cx + cross, ent.cy),
          ]);
          const vGeo = new THREE.BufferGeometry().setFromPoints([
            sketch2dTo3d(ent.cx, ent.cy - cross), sketch2dTo3d(ent.cx, ent.cy + cross),
          ]);
          const hLine = new THREE.Line(hGeo, orangeMat);
          const vLine = new THREE.Line(vGeo, orangeMat);
          hLine.userData = vLine.userData = { kind: 'threadMark', markId: ent.id, sketchId: sketch.id };
          hLine.renderOrder = vLine.renderOrder = 7;
          this.sketchGroup.add(hLine);
          this.sketchGroup.add(vLine);
          // Invisible disc centered on the mark — line geometries are too
          // thin to raycast reliably, so this provides a clickable target.
          const hitDisc = new THREE.Mesh(
            new THREE.CircleGeometry(R + 2, 16),
            new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide, depthWrite: false }),
          );
          const markWorld = new THREE.Vector3(ent.cx, ent.cy, 0.06).applyMatrix4(planeM);
          hitDisc.position.copy(markWorld);
          const planeN = new THREE.Vector3(...sketch.plane.n).normalize();
          hitDisc.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), planeN);
          hitDisc.userData = { kind: 'threadMark', markId: ent.id, sketchId: sketch.id };
          hitDisc.renderOrder = 8;
          this.sketchGroup.add(hitDisc);
          continue;
        }

        // Shaded fill for closed shapes
        if (!ent.construction) {
          const shape = buildClosedShape(ent);
          if (shape) {
            const fillGeo = new THREE.ShapeGeometry(shape);
            fillGeo.translate(0, 0, 0.05); // before plane transform: small +z (= +n in world)
            fillGeo.applyMatrix4(planeM);
            const fillMat = new THREE.MeshBasicMaterial({
              color: isActive ? 0x4f7cff : 0x9eb6ff,
              transparent: true,
              opacity: isActive ? 0.22 : 0.10,
              side: THREE.DoubleSide,
              depthWrite: false,
            });
            const fillMesh = new THREE.Mesh(fillGeo, fillMat);
            fillMesh.renderOrder = 5;
            this.sketchGroup.add(fillMesh);
          }
        }

        // Outline (always)
        let pts = null;
        if (ent.type === 'rect') {
          pts = [
            sketch2dTo3d(ent.x, ent.y),
            sketch2dTo3d(ent.x + ent.w, ent.y),
            sketch2dTo3d(ent.x + ent.w, ent.y + ent.h),
            sketch2dTo3d(ent.x, ent.y + ent.h),
            sketch2dTo3d(ent.x, ent.y),
          ];
        } else if (ent.type === 'circle') {
          pts = [];
          const N = 64;
          for (let i = 0; i <= N; i++) {
            const t = (i / N) * Math.PI * 2;
            pts.push(sketch2dTo3d(ent.cx + Math.cos(t) * ent.r, ent.cy + Math.sin(t) * ent.r));
          }
        } else if (ent.type === 'polyline') {
          pts = ent.points.map(p => sketch2dTo3d(p.x, p.y));
          if (ent.closed && pts.length) pts.push(pts[0].clone());
        }
        if (pts && pts.length > 1) {
          const geo = new THREE.BufferGeometry().setFromPoints(pts);
          const line = new THREE.Line(geo, useMat);
          if (ent.construction) line.computeLineDistances();
          line.renderOrder = 6;
          this.sketchGroup.add(line);
        }
      }
    }
  }
}

function buildBodyMesh(body) {
  const isNeg = body.op === 'subtract';
  // Parametric primitives and single extrudes render FrontSide — we control
  // their winding, and DoubleSide would introduce the gl_FrontFacing
  // lighting horizon on smooth curves. Group / CSG results render DoubleSide
  // because the boolean engine occasionally outputs patches of geometry with
  // reversed winding at cut seams; FrontSide would render those as literal
  // holes through the body (visible from one side, gone from the other).
  // The faceted CSG output hides the horizon artifact that bothered us on
  // smooth primitive curves, so DoubleSide is the lesser evil for groups.
  const isCSGResult = body.type === 'group' || body.type === 'combined';
  const matSolid = new THREE.MeshStandardMaterial({
    color: isNeg ? 0xff7070 : 0x9eb6ff,
    roughness: 0.55, metalness: 0.05, flatShading: false,
    transparent: isNeg,
    opacity: isNeg ? 0.45 : 1.0,
    side: isCSGResult ? THREE.DoubleSide : THREE.FrontSide,
  });
  // Reverse triangle winding to keep front faces outward when the plane
  // matrix has negative determinant (a mirror). Used by extrude/revolve.
  const fixWindingIfMirrored = (g, planeMat) => {
    if (planeMat.determinant() >= 0) return;
    const idx = g.index;
    if (idx) {
      const arr = idx.array;
      for (let i = 0; i < arr.length; i += 3) {
        const t = arr[i]; arr[i] = arr[i + 2]; arr[i + 2] = t;
      }
      idx.needsUpdate = true;
    } else {
      const pos = g.attributes.position;
      const a = pos.array;
      for (let i = 0; i < a.length; i += 9) {
        for (let k = 0; k < 3; k++) {
          const t = a[i + k]; a[i + k] = a[i + 6 + k]; a[i + 6 + k] = t;
        }
      }
      pos.needsUpdate = true;
    }
    g.computeVertexNormals();
  };
  // Apply Euler rotation (degrees) at the end
  const applyRotation = (m) => {
    if (!body.rotation) return;
    m.rotation.set(
      THREE.MathUtils.degToRad(body.rotation.x || 0),
      THREE.MathUtils.degToRad(body.rotation.y || 0),
      THREE.MathUtils.degToRad(body.rotation.z || 0),
    );
  };
  let geo = null, mesh = null;
  if (body.type === 'combined' || body.type === 'group') {
    // Guard against a transient null geometry — a batch op that's stripped
    // a group's geometry before re-deriving it can call rebuildBodies in
    // the middle, and three.js throws 'cannot read isBufferGeometry of
    // null' on render. Returning null here makes rebuildBodies skip this
    // mesh until the next pass (after the geometry is restored / rebuilt).
    if (!(body.geometry instanceof THREE.BufferGeometry)) {
      return null;
    }
    mesh = new THREE.Mesh(body.geometry, matSolid);
    mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'cube') {
    const fr = body.filletRadius || 0;
    const fe = body.filletEdges || { v: true, h: true };
    const wantV = fr > 0 && fe.v !== false; // round 4 vertical edges
    const wantH = fr > 0 && fe.h !== false; // round 8 top+bottom edges
    if (wantV || wantH) {
      const w = body.w, d = body.d, h = body.h;
      const r = Math.min(fr,
        wantV ? w / 2 - 0.01 : Infinity,
        wantV ? d / 2 - 0.01 : Infinity,
        wantH ? h / 2 - 0.01 : Infinity);
      const sX = -w / 2, sY = -d / 2;
      const shape = new THREE.Shape();
      if (wantV) {
        // Rounded-rectangle profile gives the 4 vertical fillets
        shape.moveTo(sX + r, sY);
        shape.lineTo(sX + w - r, sY);
        shape.absarc(sX + w - r, sY + r, r, -Math.PI / 2, 0, false);
        shape.lineTo(sX + w, sY + d - r);
        shape.absarc(sX + w - r, sY + d - r, r, 0, Math.PI / 2, false);
        shape.lineTo(sX + r, sY + d);
        shape.absarc(sX + r, sY + d - r, r, Math.PI / 2, Math.PI, false);
        shape.lineTo(sX, sY + r);
        shape.absarc(sX + r, sY + r, r, Math.PI, 3 * Math.PI / 2, false);
      } else {
        // Sharp rectangle — only the top/bottom edges will be rounded via bevel
        shape.moveTo(sX, sY);
        shape.lineTo(sX + w, sY);
        shape.lineTo(sX + w, sY + d);
        shape.lineTo(sX, sY + d);
        shape.lineTo(sX, sY);
      }
      // Bevel goes INTO the depth (z range stays [0, depth]), so depth must
      // equal the full requested height. Bevel just rounds the front/back
      // faces inward; it doesn't add to the prism's overall length.
      geo = new THREE.ExtrudeGeometry(shape, {
        depth: h,
        bevelEnabled: wantH,
        bevelThickness: wantH ? r : 0,
        bevelSize: wantH ? r : 0,
        bevelSegments: 6,
        curveSegments: 16,
      });
      // Stand the prism up so it extrudes along world +Y, then anchor the
      // bottom at body-local y=0 by measuring the geometry's actual bbox.
      geo.rotateX(-Math.PI / 2);
      geo.computeBoundingBox();
      const minY = geo.boundingBox.min.y;
      geo.translate(0, -minY, 0);
      mesh = new THREE.Mesh(geo, matSolid);
      mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    } else {
      geo = new THREE.BoxGeometry(body.w, body.h, body.d);
      mesh = new THREE.Mesh(geo, matSolid);
      mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    }
    applyRotation(mesh);
    return mesh;
  }
  // Round primitives — bake the per-axis scale directly INTO the geometry
  // (instead of using mesh.scale) so three-csg-ts sees the actual bbox-sized
  // mesh during boolean ops. Keeps CSG cuts working and still allows stretch
  // into ovals.
  if (body.type === 'sphere') {
    geo = new THREE.SphereGeometry(0.5, 48, 32);
    geo.scale(body.w, body.h, body.d);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'cylinder') {
    geo = new THREE.CylinderGeometry(0.5, 0.5, 1, 48);
    geo.scale(body.w, body.h, body.d);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'cone') {
    geo = new THREE.ConeGeometry(0.5, 1, 48);
    geo.scale(body.w, body.h, body.d);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'torus') {
    geo = new THREE.TorusGeometry(0.5, 0.5, 24, 64);
    geo.rotateX(Math.PI / 2);
    geo.scale(body.w, body.h, body.d);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'pyramid') {
    geo = new THREE.ConeGeometry(0.5, 1, 4); // 4-sided cone = pyramid
    geo.rotateY(Math.PI / 4); // align flat sides to axes
    geo.scale(body.w, body.h, body.d);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  // Polygon prisms + star / heart / teardrop — built from a unit profile
  // with the per-axis scale baked into the geometry (NOT mesh.scale) so
  // CSG booleans see the real bbox-sized mesh.
  if (body.type === 'hexagon' || body.type === 'pentagon' || body.type === 'octagon' ||
      body.type === 'star' || body.type === 'heart' || body.type === 'teardrop') {
    const shape = build2DProfileShape(body.type, 0.5);
    if (shape) {
      geo = new THREE.ExtrudeGeometry(shape, {
        depth: 1,
        bevelEnabled: false,
        curveSegments: 48,
      });
      // After rotateX(-π/2): profile lies on XZ, extrusion runs along +Y, so
      // local geometry occupies x∈[-0.5, 0.5], y∈[0, 1], z∈[-0.5, 0.5].
      geo.rotateX(-Math.PI / 2);
      geo.scale(body.w, body.h, body.d);
      mesh = new THREE.Mesh(geo, matSolid);
      mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
      applyRotation(mesh);
      return mesh;
    }
  }
  if (body.type === 'fastener') {
    const fgeo = buildFastenerGeometry(body);
    if (!fgeo) return null;
    // Use a steel-grey material for fasteners so they read as hardware
    const matFastener = new THREE.MeshStandardMaterial({
      color: 0x9aa3ad,
      roughness: 0.45, metalness: 0.6, flatShading: false,
    });
    mesh = new THREE.Mesh(fgeo, matFastener);
    mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'threadShell') {
    const spec = getFastenerSpec(body.size);
    if (!spec) return null;
    const fit = body.fit || 'loose';
    const clearance = FASTENER_FIT_CLEARANCE[fit] || 0;
    const pitch = spec.p;
    // Inset rOuter by a hair so the smooth shell wall doesn't z-fight with
    // the CSG-cut hole wall (which sits at exactly (spec.d/2)+clearance).
    const rOuter = (spec.d / 2) + clearance - 0.005;
    const rCrest = Math.max(0.3, rOuter - 0.04);      // thread crest sits just inside the wall
    const rRoot  = Math.max(0.2, (spec.d / 2) - 0.5413 * pitch);
    const shellGeo = buildThreadShellGeo(rRoot, rCrest, rOuter, pitch, body.length);
    // Match the body colour so the shell reads as a feature of the part,
    // not a separate hardware piece (which is the bolt's job).
    const matShell = new THREE.MeshStandardMaterial({
      color: 0x9eb6ff,
      roughness: 0.55, metalness: 0.05, flatShading: false,
      side: THREE.DoubleSide,
    });
    mesh = new THREE.Mesh(shellGeo, matShell);
    mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'revolve') {
    const profile = (body.sketch?.entities || []).find(e => e.type === 'polyline' && !e.construction && e.points?.length >= 2);
    if (!profile) return null;
    const pts = profile.points.map(p => new THREE.Vector2(Math.max(0, p.x), p.y));
    if (pts.length < 2) return null;
    geo = new THREE.LatheGeometry(pts, body.segments || 48);
    const revPlaneMat = makePlaneMatrix(body.plane || GROUND_PLANE);
    geo.applyMatrix4(revPlaneMat);
    fixWindingIfMirrored(geo, revPlaneMat);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'extrude') {
    const shape = sketchToShape(body.sketch);
    if (!shape) return null;
    geo = new THREE.ExtrudeGeometry(shape, {
      depth: body.height,
      bevelEnabled: false,
      curveSegments: 48,
    });
    // For Negative extrudes, flip extrusion direction so it goes INTO the body
    // (along plane −n) instead of outward — that's the natural "cut a hole" direction.
    if (body.op === 'subtract') geo.translate(0, 0, -body.height);
    const plane = body.plane || GROUND_PLANE;
    const planeMat = makePlaneMatrix(plane);
    geo.applyMatrix4(planeMat);
    // For mirrored planes the winding flips; reverse indices + recompute
    // normals to keep front faces outward. Non-mirrored extrudes keep
    // ExtrudeGeometry's pre-smoothed normals (avoids facet seams on curves).
    fixWindingIfMirrored(geo, planeMat);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  return null;
}

// ==================================================================
// Planar arrangement (v2 region engine)
// Every sketch entity is decomposed into line segments. All pairwise
// intersections split the segments. The result is a planar graph; its
// minimal cycles (bounded faces) become pickable regions. This covers
// v1 (single closed shape, chained loops) AND the X-of-lines case
// where intersections subdivide the face.
// ==================================================================

// Decompose any entity into a list of {a, b} line segments in sketch (u,v) coords
function entityToSegments(ent) {
  const out = [];
  const push = (a, b) => {
    if (Math.hypot(a.x - b.x, a.y - b.y) < 1e-6) return;
    out.push({ a: { x: a.x, y: a.y }, b: { x: b.x, y: b.y } });
  };
  if (ent.type === 'rect' && ent.w > 0 && ent.h > 0) {
    const x = ent.x, y = ent.y, w = ent.w, h = ent.h;
    push({ x, y }, { x: x + w, y });
    push({ x: x + w, y }, { x: x + w, y: y + h });
    push({ x: x + w, y: y + h }, { x, y: y + h });
    push({ x, y: y + h }, { x, y });
  } else if (ent.type === 'circle' && ent.r > 0) {
    const N = 64;
    let prev = { x: ent.cx + ent.r, y: ent.cy };
    for (let i = 1; i <= N; i++) {
      const t = (i / N) * Math.PI * 2;
      const cur = { x: ent.cx + Math.cos(t) * ent.r, y: ent.cy + Math.sin(t) * ent.r };
      push(prev, cur);
      prev = cur;
    }
  } else if (ent.type === 'polyline' && ent.points.length >= 2) {
    const n = ent.points.length;
    const segCount = ent.closed ? n : n - 1;
    const hasCurve = ent.points.some(p => p.cpOut || p.cpIn);
    if (!hasCurve) {
      for (let i = 0; i < segCount; i++) push(ent.points[i], ent.points[(i + 1) % n]);
    } else {
      for (let i = 0; i < segCount; i++) {
        const p0 = ent.points[i], p1 = ent.points[(i + 1) % n];
        if (!p0.cpOut && !p1.cpIn) {
          push(p0, p1);
        } else {
          const c1 = p0.cpOut ? { x: p0.x + p0.cpOut.dx, y: p0.y + p0.cpOut.dy } : { x: p0.x, y: p0.y };
          const c2 = p1.cpIn  ? { x: p1.x + p1.cpIn.dx,  y: p1.y + p1.cpIn.dy  } : { x: p1.x, y: p1.y };
          const pts = cubicBezierPoints(p0, c1, c2, p1, 12);
          for (let j = 0; j < pts.length - 1; j++) push(pts[j], pts[j + 1]);
        }
      }
    }
  }
  return out;
}

// Build a simple-polyline representation of any entity (rect, circle, or
// polyline) — straight-segment points, no curve handles. Used by the trim
// tool so it can treat every entity type with one unified algorithm.
// The resulting polyline is a NEW object; the original entity is untouched.
function convertToSimplePolyline(ent) {
  if (ent.type === 'rect' && ent.w > 0 && ent.h > 0) {
    return {
      type: 'polyline',
      points: [
        { x: ent.x,         y: ent.y         },
        { x: ent.x + ent.w, y: ent.y         },
        { x: ent.x + ent.w, y: ent.y + ent.h },
        { x: ent.x,         y: ent.y + ent.h },
      ],
      closed: true,
      construction: ent.construction || false,
      groupId: ent.groupId,
    };
  }
  if (ent.type === 'circle' && ent.r > 0) {
    const N = 64;
    const pts = [];
    for (let i = 0; i < N; i++) {
      const t = (i / N) * Math.PI * 2;
      pts.push({
        x: ent.cx + Math.cos(t) * ent.r,
        y: ent.cy + Math.sin(t) * ent.r,
      });
    }
    return {
      type: 'polyline',
      points: pts,
      closed: true,
      construction: ent.construction || false,
      groupId: ent.groupId,
    };
  }
  if (ent.type === 'polyline' && ent.points && ent.points.length >= 2) {
    const hasCurve = ent.points.some(p => p.cpOut || p.cpIn);
    if (!hasCurve) {
      return {
        type: 'polyline',
        points: ent.points.map(p => ({ x: p.x, y: p.y })),
        closed: !!ent.closed,
        construction: ent.construction || false,
        groupId: ent.groupId,
      };
    }
    // Has curve handles → tessellate beziers into straight segments
    const segs = entityToSegments(ent);
    if (!segs.length) return null;
    const pts = [{ x: segs[0].a.x, y: segs[0].a.y }];
    for (const s of segs) pts.push({ x: s.b.x, y: s.b.y });
    if (ent.closed && pts.length > 1) {
      const f = pts[0], l = pts[pts.length - 1];
      if (Math.hypot(f.x - l.x, f.y - l.y) < 1e-6) pts.pop();
    }
    return {
      type: 'polyline',
      points: pts,
      closed: !!ent.closed,
      construction: ent.construction || false,
      groupId: ent.groupId,
    };
  }
  return null;
}

// Intersection of an infinite ray (origin + t * dir, t >= 0) with a finite
// segment AB. Returns the positive ray parameter t if a forward intersection
// inside the segment exists, else null. Used by the Extend tool to find how
// far a line can grow along its own direction before hitting another entity.
function raySegIntersect(origin, dir, segA, segB) {
  const sx = segB.x - segA.x, sy = segB.y - segA.y;
  const denom = dir.x * sy - dir.y * sx;
  if (Math.abs(denom) < 1e-9) return null; // parallel
  const t = ((segA.x - origin.x) * sy - (segA.y - origin.y) * sx) / denom;
  const u = ((segA.x - origin.x) * dir.y - (segA.y - origin.y) * dir.x) / denom;
  if (u < -1e-6 || u > 1 + 1e-6) return null;
  if (t < 0) return null;
  return t;
}

// Strict interior intersection of two segments. Returns {x, y, t, u} where
// t in [0,1] for seg1 and u in [0,1] for seg2, or null if they don't cross.
// Returns null when the crossing is at both endpoints (already a shared vertex).
function segmentIntersection(p1, p2, p3, p4) {
  const dx12 = p2.x - p1.x, dy12 = p2.y - p1.y;
  const dx34 = p4.x - p3.x, dy34 = p4.y - p3.y;
  const denom = dx12 * dy34 - dy12 * dx34;
  if (Math.abs(denom) < 1e-9) return null; // parallel / collinear
  const t = ((p3.x - p1.x) * dy34 - (p3.y - p1.y) * dx34) / denom;
  const u = ((p3.x - p1.x) * dy12 - (p3.y - p1.y) * dx12) / denom;
  const eps = 1e-5;
  if (t < -eps || t > 1 + eps || u < -eps || u > 1 + eps) return null;
  const tEnd = (t < eps || t > 1 - eps);
  const uEnd = (u < eps || u > 1 - eps);
  if (tEnd && uEnd) return null; // shared vertex, not a crossing
  return { x: p1.x + t * dx12, y: p1.y + t * dy12, t, u };
}

// Build the planar graph: nodes (deduped points) + undirected edges between them.
function buildPlanarGraph(entities, boundary) {
  const segs = [];
  for (const ent of entities) {
    if (ent.construction) continue;
    for (const s of entityToSegments(ent)) segs.push(s);
  }
  // Implicit boundary (face perimeter for sketch-on-face) joins the planar graph
  if (boundary && boundary.type === 'rect' && boundary.w > 0 && boundary.h > 0) {
    const bx = boundary.x, by = boundary.y, bw = boundary.w, bh = boundary.h;
    segs.push({ a: { x: bx,      y: by      }, b: { x: bx + bw, y: by      } });
    segs.push({ a: { x: bx + bw, y: by      }, b: { x: bx + bw, y: by + bh } });
    segs.push({ a: { x: bx + bw, y: by + bh }, b: { x: bx,      y: by + bh } });
    segs.push({ a: { x: bx,      y: by + bh }, b: { x: bx,      y: by      } });
  } else if (boundary && boundary.type === 'circle' && boundary.r > 0) {
    const N = 64;
    let prev = { x: boundary.cx + boundary.r, y: boundary.cy };
    for (let i = 1; i <= N; i++) {
      const t = (i / N) * Math.PI * 2;
      const cur = { x: boundary.cx + Math.cos(t) * boundary.r,
                    y: boundary.cy + Math.sin(t) * boundary.r };
      segs.push({ a: prev, b: cur });
      prev = cur;
    }
  } else if (boundary && boundary.type === 'ellipse' && boundary.rx > 0 && boundary.ry > 0) {
    const N = 64;
    let prev = { x: boundary.cx + boundary.rx, y: boundary.cy };
    for (let i = 1; i <= N; i++) {
      const t = (i / N) * Math.PI * 2;
      const cur = { x: boundary.cx + Math.cos(t) * boundary.rx,
                    y: boundary.cy + Math.sin(t) * boundary.ry };
      segs.push({ a: prev, b: cur });
      prev = cur;
    }
  }
  if (!segs.length) return null;
  // Find all interior intersections per segment
  const ix = segs.map(() => []);
  for (let i = 0; i < segs.length; i++) {
    for (let j = i + 1; j < segs.length; j++) {
      const r = segmentIntersection(segs[i].a, segs[i].b, segs[j].a, segs[j].b);
      if (r) {
        ix[i].push({ t: r.t, x: r.x, y: r.y });
        ix[j].push({ t: r.u, x: r.x, y: r.y });
      }
    }
  }
  // Dedupe nodes by position with a small tolerance
  const nodes = [];
  const NODE_TOL = 0.5; // mm
  const findOrAdd = (p) => {
    for (let i = 0; i < nodes.length; i++) {
      if (Math.hypot(nodes[i].x - p.x, nodes[i].y - p.y) < NODE_TOL) return i;
    }
    nodes.push({ x: p.x, y: p.y });
    return nodes.length - 1;
  };
  // Split each segment at its intersections; each piece is a graph edge
  const rawEdges = [];
  for (let i = 0; i < segs.length; i++) {
    const s = segs[i];
    const pts = [{ t: 0, x: s.a.x, y: s.a.y }, ...ix[i], { t: 1, x: s.b.x, y: s.b.y }];
    pts.sort((p1, p2) => p1.t - p2.t);
    let prev = findOrAdd(pts[0]);
    for (let k = 1; k < pts.length; k++) {
      const cur = findOrAdd(pts[k]);
      if (cur !== prev) rawEdges.push({ a: prev, b: cur });
      prev = cur;
    }
  }
  // Dedupe identical undirected edges
  const seen = new Set();
  const edges = [];
  for (const e of rawEdges) {
    const k = e.a < e.b ? `${e.a},${e.b}` : `${e.b},${e.a}`;
    if (!seen.has(k)) { seen.add(k); edges.push(e); }
  }
  return { nodes, edges };
}

// Find every bounded face in the planar graph. For each directed edge, follow
// the "next CCW edge at the next node" rule until we cycle back; collect cycles
// with positive (CCW) signed area. Outer/unbounded cycles have negative area.
function findPlanarFaces(graph) {
  if (!graph || !graph.edges.length) return [];
  const { nodes, edges } = graph;
  // Adjacency: per node, list of {to, angle} sorted ascending (CCW)
  const adj = nodes.map(() => []);
  for (const e of edges) {
    const A = nodes[e.a], B = nodes[e.b];
    adj[e.a].push({ to: e.b, angle: Math.atan2(B.y - A.y, B.x - A.x) });
    adj[e.b].push({ to: e.a, angle: Math.atan2(A.y - B.y, A.x - B.x) });
  }
  for (const list of adj) list.sort((x, y) => x.angle - y.angle);
  // Given directed edge (u → v), the next edge in a CCW face cycle is, at v,
  // the edge IMMEDIATELY CW (previous index) of the reverse direction (v → u)
  // in the CCW-sorted adjacency list.
  const nextEdge = (u, v) => {
    const back = Math.atan2(nodes[u].y - nodes[v].y, nodes[u].x - nodes[v].x);
    const list = adj[v];
    let idx = -1, bestDiff = Infinity;
    for (let i = 0; i < list.length; i++) {
      let d = Math.abs(list[i].angle - back);
      if (d > Math.PI) d = 2 * Math.PI - d;
      if (d < bestDiff) { bestDiff = d; idx = i; }
    }
    if (idx < 0) return null;
    return list[(idx - 1 + list.length) % list.length].to;
  };
  const visited = new Set();
  const faces = [];
  for (const e of edges) {
    for (const dir of [[e.a, e.b], [e.b, e.a]]) {
      if (visited.has(`${dir[0]},${dir[1]}`)) continue;
      const cycle = [dir[0]];
      let u = dir[0], v = dir[1];
      let safety = 0;
      while (safety++ < 4000) {
        const k = `${u},${v}`;
        if (visited.has(k)) break;
        visited.add(k);
        cycle.push(v);
        const nxt = nextEdge(u, v);
        if (nxt == null) break;
        u = v; v = nxt;
        if (u === dir[0] && v === dir[1]) break; // closed back to start
      }
      // Drop the duplicated last vertex if it equals the first
      if (cycle.length > 2 && cycle[0] === cycle[cycle.length - 1]) cycle.pop();
      if (cycle.length < 3) continue;
      // Signed area — positive CCW = bounded interior face; outer face is CW
      let area = 0;
      for (let i = 0; i < cycle.length; i++) {
        const p = nodes[cycle[i]], q = nodes[cycle[(i + 1) % cycle.length]];
        area += p.x * q.y - q.x * p.y;
      }
      area /= 2;
      if (area > 0.5) faces.push({ cycle, area, points: cycle.map(i => ({ x: nodes[i].x, y: nodes[i].y })) });
    }
  }
  return faces;
}

// Compute pickable closed regions for a sketch using v2 planar arrangement.
// Each bounded face of the planar graph becomes a region. Falls back gracefully
// when no faces (e.g., only construction lines).
function computeSketchRegions(sketch) {
  if (!sketch || !sketch.entities.length) return [];
  const candidates = sketch.entities.filter(e => !e.construction);
  if (!candidates.length) return [];
  const graph = buildPlanarGraph(candidates, sketch.boundary);
  const faces = findPlanarFaces(graph);
  if (!faces.length) return [];
  const regs = [];
  for (let i = 0; i < faces.length; i++) {
    const f = faces[i];
    regs.push({
      id: `s${sketch.id}-f${i}`,
      sketchId: sketch.id,
      kind: 'face',
      points: f.points,
      area: f.area,
    });
  }
  return regs;
}

// Build a THREE.Shape from a region (used both for picker overlay and extrude geometry).
function regionToShape(region) {
  if (region.kind === 'circle' && region.circle) {
    const s = new THREE.Shape();
    s.absarc(region.circle.cx, region.circle.cy, region.circle.r, 0, Math.PI * 2, false);
    return s;
  }
  if (!region.points || region.points.length < 3) return null;
  const s = new THREE.Shape();
  s.moveTo(region.points[0].x, region.points[0].y);
  for (let i = 1; i < region.points.length; i++) s.lineTo(region.points[i].x, region.points[i].y);
  s.closePath();
  return s;
}

// Convert a region into a synthetic single-entity sketch (closed) so we can
// reuse the existing extrude pipeline.
function regionToSyntheticSketch(region, sourceSketch) {
  const ent = (region.kind === 'circle' && region.circle)
    ? { id: 1, type: 'circle', cx: region.circle.cx, cy: region.circle.cy, r: region.circle.r }
    : { id: 1, type: 'polyline', closed: true, points: region.points.map(p => ({ x: p.x, y: p.y })) };
  const entities = [ent];
  // Pick up any closed entities in the source sketch that are fully inside
  // this region's boundary — those become holes in the extruded body via
  // sketchToShape's hole-detection. Lets the user click an outline + get
  // the cut-outs in one extrude operation.
  let nextId = 2;
  for (const e of (sourceSketch.entities || [])) {
    if (e.construction) continue;
    if (e.type !== 'rect' && e.type !== 'circle' &&
        !(e.type === 'polyline' && e.closed)) continue;
    if (!entityFullyInside(e, ent)) continue;
    const copy = JSON.parse(JSON.stringify(e));
    copy.id = nextId++;
    entities.push(copy);
  }
  return {
    id: sourceSketch.id,
    plane: JSON.parse(JSON.stringify(sourceSketch.plane)),
    entities,
    nextId,
    name: sourceSketch.name + ' · region',
  };
}

// Centroid of a region (circle's center, or polygon vertex average). Used
// as a stable identifier so an extruded body can find its source region
// again after the sketch is edited.
function regionCentroidOf(region) {
  if (region.kind === 'circle' && region.circle) {
    return { x: region.circle.cx, y: region.circle.cy };
  }
  const pts = region.points || [];
  if (!pts.length) return null;
  let sx = 0, sy = 0;
  for (const p of pts) { sx += p.x; sy += p.y; }
  return { x: sx / pts.length, y: sy / pts.length };
}

// Re-run the CSG boolean for a group body (positives unioned, negatives
// subtracted) and bake the result into group.geometry. Used after any of
// the group's children's geometry has changed.
function rebuildGroupGeometry(group) {
  if (!group || group.type !== 'group' || !Array.isArray(group.children)) return;
  if (typeof CSG === 'undefined') return;
  const positives = group.children.filter(c => c.op !== 'subtract');
  const negatives = group.children.filter(c => c.op === 'subtract');
  if (!positives.length) return;
  // Build fresh meshes for each child (none of them are in the scene)
  const buildMeshFor = (c) => {
    const m = buildBodyMesh(c);
    if (m) m.updateMatrixWorld(true);
    return m;
  };
  const tempScene = new THREE.Scene();
  const meshes = [];
  for (const c of group.children) {
    const m = buildMeshFor(c);
    if (m) { tempScene.add(m); meshes.push({ child: c, mesh: m }); }
  }
  tempScene.updateMatrixWorld(true);
  const meshOf = (childId) => meshes.find(x => x.child === childId)?.mesh;
  // Refuse to clobber a known-good geometry with a busted rebuild. If we
  // can't even build the first positive's mesh (e.g. the user just edited
  // its source sketch into an unbuildable state), bail BEFORE touching
  // group.geometry — the body keeps rendering with its previous CSG bake
