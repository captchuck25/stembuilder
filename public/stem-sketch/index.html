  }).join('');
  openModal({
    title: 'Load design',
    body: `<p style="color:var(--ink-soft)">Select a saved design. Your current work will be added to undo history.</p>
           <div style="max-height:260px;overflow-y:auto;margin-top:8px">${rows}</div>`,
    hideOk: true,
  });
}

function triggerCloudLoad(id) {
  notifyParent({ type: 'STEMSKETCH_REQUEST_LOAD', id });
  document.getElementById('modal-bg')?.classList.remove('show');
  setStatus('Loading…');
}

window.addEventListener('beforeunload', (e) => {
  // Force-write the latest doc to localStorage NOW — the 500 ms autosave
  // timer doesn't survive a close / refresh, so without this flush a user
  // who reloads within half a second of an edit (thread mark, group, ...)
  // sees the pre-edit state come back. Synchronous setItem keeps the
  // browser's unload sequence happy.
  if (_docDirty) {
    flushAutosave();
    e.preventDefault();
    e.returnValue = '';
  }
});

window.addEventListener('message', (e) => {
  const data = e.data || {};
  if (data.type === 'STEMSKETCH_LOAD') {
    // Loading a cloud design replaces the local autosave draft so refresh
    // restores the cloud content, not the previous in-progress draft.
    loadDesignFromJson(data.name, data.docJson, data.units);
    clearLocalDraft();
    scheduleAutosave();
  } else if (data.type === 'STEMSKETCH_LOAD_LIST') {
    showCloudLoadDialog(data.designs);
  } else if (data.type === 'STEMSKETCH_SAVE_OK') {
    setDirty(false);
    setStatus('✓ Saved to cloud');
    cloudSaveFlash(true);
    // Refresh the autosave with the newly-saved state (so the dirty=false
    // status round-trips through the draft on next reload).
    scheduleAutosave();
  } else if (data.type === 'STEMSKETCH_SAVE_ERR') {
    setStatus('⚠ Save failed: ' + (data.message || 'unknown error'));
    cloudSaveFlash(false, data.message);
  } else if (data.type === 'STEMSKETCH_USER') {
    applyUser(data.user);
  }
});

// ---------- Account menu (driven by the wrapper page's auth session) ----------
// The wrapper posts STEMSKETCH_USER on load / session change; Sign Out posts
// back so the parent can run next-auth's signOut(). Nav links use target=_top
// (same-origin) to drive the whole page.
function applyUser(user) {
  const login  = document.getElementById('login-link');
  const avatar = document.getElementById('user-avatar');
  if (!login || !avatar) return;
  if (user && user.signedIn) {
    login.style.display = 'none';
    avatar.style.display = 'flex';
    if (user.image) {
      avatar.innerHTML = '<img src="' + user.image + '" alt=""/>';
    } else {
      avatar.textContent = String(user.name || user.email || '?').trim().charAt(0).toUpperCase() || '?';
    }
    avatar.title = user.name || user.email || 'Account';
  } else {
    login.style.display = 'inline-flex';
    avatar.style.display = 'none';
  }
}
function initUserMenu() {
  const avatar = document.getElementById('user-avatar');
  const dd = document.getElementById('user-dropdown');
  const signout = document.getElementById('signout-btn');
  if (!avatar || !dd) return;
  avatar.addEventListener('click', (e) => { e.stopPropagation(); dd.classList.toggle('show'); });
  document.addEventListener('click', (e) => {
    if (!dd.contains(e.target) && e.target !== avatar) dd.classList.remove('show');
  });
  if (signout) signout.addEventListener('click', () => {
    dd.classList.remove('show');
    notifyParent({ type: 'STEMSKETCH_SIGNOUT' });
  });
  // Ask the wrapper for the current session (covers the case where the parent
  // posted STEMSKETCH_USER before this iframe finished wiring up).
  notifyParent({ type: 'STEMSKETCH_REQUEST_USER' });
}

// ---------- Auto-dimension ----------
function autoAddDimensions() {
  if (!doc.sketch) return;
  pushUndo();
  // Clear previous auto-dims
  doc.sketch.entities = doc.sketch.entities.filter(e => !e.autoDim);

  const shapes = doc.sketch.entities.filter(e => e.type !== 'dimension' && !e.construction);
  if (!shapes.length) { setStatus('No shapes to dimension'); return; }

  const gap = 10, step = 10;
  const newDims = [];

  // Overall bounding box
  let bMinX = Infinity, bMaxX = -Infinity, bMinY = Infinity, bMaxY = -Infinity;
  function expandBbox(x, y) {
    if (x < bMinX) bMinX = x; if (x > bMaxX) bMaxX = x;
    if (y < bMinY) bMinY = y; if (y > bMaxY) bMaxY = y;
  }
  for (const ent of shapes) {
    if (ent.type === 'rect') {
      expandBbox(ent.x, ent.y); expandBbox(ent.x + ent.w, ent.y + ent.h);
    } else if (ent.type === 'circle') {
      expandBbox(ent.cx - ent.r, ent.cy - ent.r); expandBbox(ent.cx + ent.r, ent.cy + ent.r);
    } else {
      for (const p of (ent.points || [])) expandBbox(p.x, p.y);
    }
  }

  // Deduplicated span collectors (all H dims project to bMinY, all V dims to bMaxX)
  // off = -(gap + level * step):
  //   H perpendicular is (0,1), so dim line y = bMinY + off  → negative off = below sketch
  //   V perpendicular is (-1,0), so dim line x = bMaxX - off → negative off = right of sketch
  const hSpans = new Map(); // key -> [x1, x2]
  const vSpans = new Map(); // key -> [y1, y2]
  const hk = (x1, x2) => `${Math.round(x1 * 100)},${Math.round(x2 * 100)}`;
  const vk = (y1, y2) => `${Math.round(y1 * 100)},${Math.round(y2 * 100)}`;
  const addH = (x1, x2) => { const k = hk(x1, x2); if (!hSpans.has(k)) hSpans.set(k, [x1, x2]); };
  const addV = (y1, y2) => { const k = vk(y1, y2); if (!vSpans.has(k)) vSpans.set(k, [y1, y2]); };

  const singleCircle = shapes.length === 1 && shapes[0].type === 'circle';

  for (const ent of shapes) {
    if (ent.type === 'rect') {
      addH(ent.x, ent.x + ent.w);
      addV(ent.y, ent.y + ent.h);
    } else if (ent.type === 'circle') {
      // Radius leader — short slanted arrow from outside the circle pointing
      // to the edge, with "R XX" label on the outside end. Picks the upper-
      // right diagonal (45°) so the leader doesn't overlap the shape.
      const dirX = Math.SQRT1_2, dirY = Math.SQRT1_2; // 45°
      const leaderLen = Math.max(8, ent.r * 0.6);
      const edgeX = ent.cx + dirX * ent.r;
      const edgeY = ent.cy + dirY * ent.r;
      const outX  = ent.cx + dirX * (ent.r + leaderLen);
      const outY  = ent.cy + dirY * (ent.r + leaderLen);
      newDims.push({
        id: doc.sketch.nextId++, type: 'dimension', autoDim: true, leader: true,
        p1: { x: edgeX, y: edgeY }, p2: { x: outX, y: outY },
        label: `R ${fmtUL(ent.r)}`,
      });
    } else if (ent.type === 'polyline' && ent.points.length >= 2) {
      const pts = ent.points, n = pts.length;
      const limit = ent.closed ? n : n - 1;
      for (let i = 0; i < limit; i++) {
        const a = pts[i], b = pts[(i + 1) % n];
        const segLen = Math.hypot(b.x - a.x, b.y - a.y);
        if (segLen < 1) continue;
        if (Math.abs(b.y - a.y) / segLen < 0.1)       addH(Math.min(a.x, b.x), Math.max(a.x, b.x));
        else if (Math.abs(b.x - a.x) / segLen < 0.1)  addV(Math.min(a.y, b.y), Math.max(a.y, b.y));
      }
    }
  }

  // Stack overlapping spans at successive levels so their dim lines don't
  // visually collide. Two spans overlap if their ranges intersect (with a
  // small label-width padding).
  function assignLevels(spans) {
    const arr = Array.from(spans.values()).map(([a, b]) => ({ a, b, level: 0 }));
    arr.sort((x, y) => (x.a - y.a) || (x.b - y.b));
    const levels = []; // levels[i] = array of placed spans at level i
    const PAD = 6; // mm of label space — keeps adjacent labels from kissing
    for (const sp of arr) {
      let placed = false;
      for (let lvl = 0; lvl < levels.length; lvl++) {
        const overlaps = levels[lvl].some(ex => !(sp.b < ex.a - PAD || sp.a > ex.b + PAD));
        if (!overlaps) { levels[lvl].push(sp); sp.level = lvl; placed = true; break; }
      }
      if (!placed) { levels.push([sp]); sp.level = levels.length - 1; }
    }
    return arr;
  }
  const hArr = assignLevels(hSpans);
  const vArr = assignLevels(vSpans);

  for (const sp of hArr) {
    newDims.push({ id: doc.sketch.nextId++, type: 'dimension', autoDim: true,
      p1: { x: sp.a, y: bMinY }, p2: { x: sp.b, y: bMinY },
      off: -(gap + sp.level * step) });
  }
  for (const sp of vArr) {
    newDims.push({ id: doc.sketch.nextId++, type: 'dimension', autoDim: true,
      p1: { x: bMaxX, y: sp.a }, p2: { x: bMaxX, y: sp.b },
      off: -(gap + sp.level * step) });
  }

  // Overall bbox dims — placed beyond the highest per-entity level
  if (!singleCircle) {
    const bW = bMaxX - bMinX, bH = bMaxY - bMinY;
    const maxHLvl = hArr.length ? Math.max(...hArr.map(s => s.level)) : -1;
    const maxVLvl = vArr.length ? Math.max(...vArr.map(s => s.level)) : -1;
    const overallHCovered = hSpans.has(hk(bMinX, bMaxX));
    const overallVCovered = vSpans.has(vk(bMinY, bMaxY));
    if (bW > 1 && !overallHCovered) {
      newDims.push({ id: doc.sketch.nextId++, type: 'dimension', autoDim: true,
        p1: { x: bMinX, y: bMinY }, p2: { x: bMaxX, y: bMinY },
        off: -(gap + (maxHLvl + 1) * step) });
    }
    if (bH > 1 && !overallVCovered) {
      newDims.push({ id: doc.sketch.nextId++, type: 'dimension', autoDim: true,
        p1: { x: bMaxX, y: bMinY }, p2: { x: bMaxX, y: bMaxY },
        off: -(gap + (maxVLvl + 1) * step) });
    }
  }

  if (!newDims.length) { setStatus('Nothing to dimension'); return; }
  doc.sketch.entities.push(...newDims);
  renderTree();
  sketchEng.render();
  setStatus(`Added ${newDims.length} auto-dimension${newDims.length !== 1 ? 's' : ''}`);
}

// ---------- Node editing actions ----------
function nodeAddAction() {
  if (!sketchEng?.selectedNode) { setStatus('Select a node first: switch to Select tool, click the polyline, then click a vertex square'); return; }
  const { entId, pointIdx } = sketchEng.selectedNode;
  const ent = doc.sketch.entities.find(e => e.id === entId);
  if (!ent || ent.type !== 'polyline') return;
  const n = ent.points.length;
  const nextIdx = ent.closed ? (pointIdx + 1) % n : (pointIdx < n - 1 ? pointIdx + 1 : -1);
  if (nextIdx < 0) { showHint('Cannot add a node after the last point of an open polyline.'); return; }
  const p0 = ent.points[pointIdx], p1 = ent.points[nextIdx];
  pushUndo();
  ent.points.splice(pointIdx + 1, 0, { x: (p0.x + p1.x) / 2, y: (p0.y + p1.y) / 2 });
  sketchEng.selectedNode = { entId, pointIdx: pointIdx + 1 };
  sketchEng.updateNodeActions();
  renderTree(); renderProps(); sketchEng.render();
  setStatus('Node inserted at midpoint');
}

function nodeDeleteAction() {
  if (!sketchEng?.selectedNode) { setStatus('Select a node first: switch to Select tool, click the polyline, then click a vertex square'); return; }
  const { entId, pointIdx } = sketchEng.selectedNode;
  const ent = doc.sketch.entities.find(e => e.id === entId);
  if (!ent || ent.type !== 'polyline') return;
  if (ent.points.length <= 2) { showHint('Need at least 2 points — use the Eraser to delete the whole shape.'); return; }
  pushUndo();
  ent.points.splice(pointIdx, 1);
  sketchEng.selectedNode = null;
  sketchEng.updateNodeActions();
  renderTree(); renderProps(); sketchEng.render();
  setStatus('Node removed');
}

function nodeRmInAction() {
  if (!sketchEng?.selectedNode) return;
  const { entId, pointIdx } = sketchEng.selectedNode;
  const ent = doc.sketch.entities.find(e => e.id === entId);
  if (!ent || ent.type !== 'polyline') return;
  pushUndo();
  delete ent.points[pointIdx].cpIn;
  sketchEng.updateNodeActions(); sketchEng.render();
  setStatus('Incoming curve handle removed — entry side is now straight');
}

function nodeRmOutAction() {
  if (!sketchEng?.selectedNode) return;
  const { entId, pointIdx } = sketchEng.selectedNode;
  const ent = doc.sketch.entities.find(e => e.id === entId);
  if (!ent || ent.type !== 'polyline') return;
  pushUndo();
  delete ent.points[pointIdx].cpOut;
  sketchEng.updateNodeActions(); sketchEng.render();
  setStatus('Outgoing curve handle removed — exit side is now straight');
}

function nodeCurveAction() {
  if (!sketchEng?.selectedNode) { setStatus('Select a node first: switch to Select tool, click the polyline, then click a vertex square'); return; }
  const { entId, pointIdx } = sketchEng.selectedNode;
  const ent = doc.sketch.entities.find(e => e.id === entId);
  if (!ent || ent.type !== 'polyline') return;
  const p = ent.points[pointIdx];
  pushUndo();
  if (p.cpOut || p.cpIn) {
    delete p.cpOut; delete p.cpIn;
    setStatus('Node: corner (sharp)');
  } else {
    // Auto-compute a tangent handle from neighbouring points
    const n = ent.points.length;
    const prev = ent.closed ? ent.points[(pointIdx - 1 + n) % n] : (pointIdx > 0 ? ent.points[pointIdx - 1] : null);
    const next = ent.closed ? ent.points[(pointIdx + 1) % n] : (pointIdx < n - 1 ? ent.points[pointIdx + 1] : null);
    let dx = 0, dy = 0;
    if (prev && next) { dx = (next.x - prev.x) / 4; dy = (next.y - prev.y) / 4; }
    else if (next)    { dx = (next.x - p.x) / 3;    dy = (next.y - p.y) / 3; }
    else if (prev)    { dx = (p.x - prev.x) / 3;    dy = (p.y - prev.y) / 3; }
    if (Math.hypot(dx, dy) < 0.1) { dx = 5; dy = 0; } // fallback
    p.cpOut = { dx, dy };
    p.cpIn  = { dx: -dx, dy: -dy };
    setStatus('Node: smooth curve — drag the orange handles to adjust');
  }
  sketchEng.render();
}

// ---------- 7. Init ----------
function init() {
  try {
    sketchEng = new SketchEngine($('sketch-svg'));
  } catch (err) {
    console.error('SketchEngine init failed:', err);
    setStatus('2D init error: ' + err.message);
  }
  // Wire the delegated rename handler once — the tree container persists
  // across renderTree() calls so the listener doesn't get destroyed mid-dblclick.
  attachTreeRenameHandler();

  // 3D init — non-fatal if Three.js didn't load
  if (typeof THREE !== 'undefined') {
    try {
      viewer = new Viewer3D($('three-canvas'));
    } catch (err) {
      console.error('Viewer3D init failed:', err);
      setStatus('3D init error: ' + err.message + ' (2D still works)');
      // Surface the failure inside the 3D canvas slot so the user knows
      // WHY the 3D view is blank — not just see a blank panel. The most
      // common cause is the browser hitting its per-process WebGL-context
      // cap (close other 3D tabs and refresh).
      const c = $('three-canvas');
      if (c && c.parentNode) {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;background:#f4f6fa;color:#1a2a4a;font:14px/1.5 system-ui,sans-serif;z-index:5;';
        overlay.innerHTML = `<div style="max-width:380px"><div style="font-size:16px;font-weight:700;margin-bottom:6px">3D view unavailable</div><div style="color:#475569">The browser couldn't create a WebGL context. Usually this means too many 3D tabs are open — close other STEM Sketch / Blueprint Lab tabs and refresh. If it persists, restart your browser.</div></div>`;
        c.parentNode.appendChild(overlay);
      }
    }
  } else {
    console.warn('Three.js did not load. 3D mode disabled.');
    setStatus('Three.js unavailable — 3D disabled. 2D works.');
    // disable 3D-only controls
    document.querySelectorAll('#tools-3d .tool, #export-btn').forEach(b => b.disabled = true);
  }

  // Cloud save/load buttons
  const cloudSaveBtn = document.getElementById('cloud-save-btn');
  const cloudLoadBtn = document.getElementById('cloud-load-btn');
  if (cloudSaveBtn) cloudSaveBtn.onclick = cloudSave;
  if (cloudLoadBtn) cloudLoadBtn.onclick = () => {
    notifyParent({ type: 'STEMSKETCH_REQUEST_LIST' });
    setStatus('Fetching saved designs…');
  };
  const newDesignBtn = document.getElementById('new-design-btn');
  if (newDesignBtn) newDesignBtn.onclick = startNewDesign;

  // Node editing toolbar buttons (appear in main toolbar when a node is selected)
  $('tb-node-add').onclick   = nodeAddAction;
  $('tb-node-del').onclick   = nodeDeleteAction;
  $('tb-node-curve').onclick = nodeCurveAction;
  $('tb-node-rmin').onclick  = nodeRmInAction;
  $('tb-node-rmout').onclick = nodeRmOutAction;

  // "Done" button — exits the sketch editor and returns to 3D
  $('back-to-3d-btn').onclick = () => setMode('3d');
  // Undo / redo buttons
  $('undo-btn').onclick = () => undo();
  $('redo-btn').onclick = () => redo();

  // Generic action handler (works in both 2D and 3D toolbars)
  const runAction = (action) => {
    switch (action) {
      case 'extrude': extrudeCurrentSketch(); break;
      case 'copy': copySelection(); break;
      case 'paste': pasteSelection(); break;
      case 'duplicate': duplicateSelection(); break;
      case 'explode-2d': explodeSelected(); break;
      case 'toggle-construction-vis': toggleConstructionVisibility(); break;
      case 'combine': groupSelected(); break; // legacy alias
      case 'mirror-2d': openMirrorDialog(); break;
      case 'mirror-3d': startMirrorPick(); break;
      case 'sketch-on-face': startSketchOnFace(); break;
      case 'boolean-cut': startBooleanCut(); break;
      case 'add-fastener': openFastenerDialog(); break;
      case 'threaded-holes': openThreadedHolesDialog(); break;
      case 'new-sketch': openNewSketchDialog(); break;
      case 'fillet-2d': enterFilletPickMode(); break;
      case 'fillet-3d': enterBevelPickMode(); break;
      case 'revolve': revolveCurrentSketch(); break;
      case 'array-2d': openArrayDialog(); break;
      case 'scale-2d': openScaleDialog(); break;
      case 'offset-2d': startOffsetMode(); break;
      case 'auto-dim': autoAddDimensions(); break;
      case 'group': groupSelected(); break;
      case 'ungroup': ungroupSelected(); break;
      case 'trim':
        if (sketchEng) sketchEng.setTool('trim');
        break;
      case 'prim-menu':
        $('prim-dropdown').classList.toggle('open');
        break;
      case 'shape2d-menu':
        $('shape2d-dropdown').classList.toggle('open');
        break;
      case 'align': startAlignMode(); break;
      case 'joint': startJointCreation(); break;
      case 'orbit-mode': toggleOrbitMode(); break;
      case 'pan-mode': togglePanMode(); break;
    }
  };

  // 2D tools — data-tool sets tool, data-action runs an action
  document.querySelectorAll('#tools-2d .tool').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', () => {
      if (b.dataset.tool) sketchEng.setTool(b.dataset.tool);
      else if (b.dataset.action) runAction(b.dataset.action);
    });
  });

  // 3D tools
  document.querySelectorAll('#tools-3d .tool').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      if (b.dataset.action) runAction(b.dataset.action);
    });
  });

  // Primitive dropdown items
  document.querySelectorAll('#prim-dropdown .dropdown-menu button').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', () => {
      addPrimitive(b.dataset.prim);
      $('prim-dropdown').classList.remove('open');
    });
  });
  // 2D shape dropdown items
  document.querySelectorAll('#shape2d-dropdown .dropdown-menu button').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', () => {
      insert2DShape(b.dataset.shape2d);
      $('shape2d-dropdown').classList.remove('open');
    });
  });
  // Close dropdowns on outside click
  document.addEventListener('click', (e) => {
    const dd = $('prim-dropdown');
    if (dd && !dd.contains(e.target)) dd.classList.remove('open');
    const dd2 = $('shape2d-dropdown');
    if (dd2 && !dd2.contains(e.target)) dd2.classList.remove('open');
  });

  // Units toggle
  document.querySelectorAll('#units-toggle button').forEach(b => {
    b.addEventListener('click', () => setUnits(b.dataset.units));
  });

  // Export — single button, popup dialog with format choice. Filename
  // input lives in the topbar so STEM Builder can use it as the saved name.
  $('export-btn').onclick = openExportDialog;
  $('new-sketch-btn').onclick = openNewSketchDialog;
  initUserMenu();

  // Length / angle inputs — Enter commits a vertex at the typed distance.
  // If angle field is filled, that angle (in degrees) is used; else cursor direction.
  const commitFromInputs = () => {
    const lv = parseFloat($('length-input').value);
    const av = parseFloat($('angle-input').value);
    if (lv > 0 && sketchEng.activeLine) {
      const lenMm = fromUnit(lv);
      sketchEng.commitTypedVector(lenMm, isFinite(av) ? av : null);
      $('length-input').value = '';
      $('angle-input').value = '';
      $('length-input').blur();
      $('angle-input').blur();
    }
  };
  ['length-input', 'angle-input'].forEach(id => {
    $(id).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commitFromInputs(); }
      else if (e.key === 'Tab' && id === 'length-input') { /* native focus to angle */ }
      else if (e.key === 'Escape') {
        e.preventDefault();
        $('length-input').value = '';
        $('angle-input').value = '';
        e.target.blur();
      }
    });
  });

  // Track Space — temporary orbit modifier in 3D
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
      doc.spaceHeld = true;
      if (doc.mode === '3d' && viewer && !doc.orbitMode) viewer.canvas.style.cursor = 'grab';
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
      doc.spaceHeld = false;
      if (doc.mode === '3d' && viewer && !doc.orbitMode) viewer.canvas.style.cursor = '';
    }
  });

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    // Auto-focus the length input when typing digits during line drawing —
    // but ONLY if no other input field is already focused. Otherwise we'd
    // hijack the user's keystrokes after they Tab into the angle field.
    if (doc.mode === '2d' && sketchEng?.activeLine && /^[0-9.]$/.test(e.key) &&
        document.activeElement?.tagName !== 'INPUT' &&
        document.activeElement?.tagName !== 'TEXTAREA') {
      const li = $('length-input');
      li.value = e.key;
      li.focus();
      try { li.setSelectionRange(li.value.length, li.value.length); } catch(_) {}
      e.preventDefault();
      return;
    }
    // Same idea for offset mode — if the user just starts typing while the
    // offset tooltip is open and no other input is focused, redirect into
    // the offset distance field so the keystroke is captured.
    if (doc.mode === '2d' && sketchEng?.offsetMode && /^[0-9.]$/.test(e.key) &&
        document.activeElement?.tagName !== 'INPUT' &&
        document.activeElement?.tagName !== 'TEXTAREA') {
      const oi = document.getElementById('offset-input');
      if (oi) {
        oi.value = e.key;
        oi.focus();
        try { oi.setSelectionRange(oi.value.length, oi.value.length); } catch(_) {}
        oi.dispatchEvent(new Event('input', { bubbles: true }));
        e.preventDefault();
        return;
      }
    }
    // Shape draw (rect / circle): auto-focus the W (or R) input on first digit.
    if (doc.mode === '2d' && sketchEng?.draft &&
        (sketchEng.dragMode === 'draw' || sketchEng.dragMode === 'shape-place') &&
        /^[0-9.]$/.test(e.key) &&
        document.activeElement?.tagName !== 'INPUT' &&
        document.activeElement?.tagName !== 'TEXTAREA') {
      const si = document.getElementById('shape-tooltip-input-1');
      if (si) {
        si.value = e.key;
        si.focus();
        try { si.setSelectionRange(si.value.length, si.value.length); } catch(_) {}
        si.dispatchEvent(new Event('input', { bubbles: true }));
        e.preventDefault();
        return;
      }
    }

    // Copy/paste — works in both 2D and 3D
    if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
      copySelection(); e.preventDefault(); return;
    }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')) {
      pasteSelection(); e.preventDefault(); return;
    }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'd' || e.key === 'D')) {
      duplicateSelection(); e.preventDefault(); return;
    }
    // Group / Ungroup
    if ((e.ctrlKey || e.metaKey) && (e.key === 'g' || e.key === 'G')) {
      if (e.shiftKey) ungroupSelected(); else groupSelected();
      e.preventDefault(); return;
    }
    // Undo / Redo
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key === 'z' || e.key === 'Z')) {
      undo(); e.preventDefault(); return;
    }
    if ((e.ctrlKey || e.metaKey) && (
        (e.shiftKey && (e.key === 'z' || e.key === 'Z')) ||
        (e.key === 'y' || e.key === 'Y'))) {
      redo(); e.preventDefault(); return;
    }
    if (e.target.tagName === 'INPUT') return;
    if (doc.mode === '2d') {
      if (e.key === 'v' || e.key === 'V') sketchEng.setTool('select');
      if (e.key === 'r' || e.key === 'R') sketchEng.setTool('rect');
      if (e.key === 'c' || e.key === 'C') sketchEng.setTool('circle');
      if (e.key === 'l' || e.key === 'L') sketchEng.setTool('line');
      if (e.key === 'a' || e.key === 'A') sketchEng.setTool('arc');
      if (e.key === 'e' || e.key === 'E') sketchEng.setTool('eraser');
      if (e.key === 'x' || e.key === 'X') sketchEng.setTool('extend');
      if (e.key === 'g' || e.key === 'G') sketchEng.setTool('construction');
      if (e.key === 'd' || e.key === 'D') sketchEng.setTool('dimension');
      if (e.key === 'f' || e.key === 'F') fitSketchViewToBodies();
      if (e.key === 'Enter' && sketchEng.activeLine) sketchEng.finalizeLine(true);
      if (e.key === 'Escape') {
        // Cancel mirror axis-pick first if it's active
        if (sketchEng.mirrorAxis) {
          sketchEng.mirrorAxis = null;
          sketchEng.render(); setStatus('Mirror cancelled'); return;
        }
        // Exit repeat-offset mode first
        if (sketchEng.offsetMode) {
          sketchEng.offsetMode = null;
          hideOffsetTooltip();
          sketchEng.render(); setStatus('Offset mode exited'); return;
        }
        // Clear node selection
        if (sketchEng.selectedNode) {
          sketchEng.selectedNode = null; sketchEng.updateNodeActions(); sketchEng.render(); return;
        }
        // Commit (not discard) any segments already drawn in a polyline
        if (sketchEng.activeLine) sketchEng.finalizeLine(true);
        else if (sketchEng.activeArc) { sketchEng.activeArc = null; sketchEng.render(); setStatus('Arc cancelled'); }
        else if (sketchEng.activeDim) { sketchEng.activeDim = null; sketchEng.render(); setStatus('Dimension cancelled'); }
        else if (sketchEng.draft) {
          sketchEng.draft = null; sketchEng.dragMode = null;
          sketchEng.typedDim1 = null; sketchEng.typedDim2 = null;
          hideShapeTooltip();
          sketchEng.render();
        }
      }
    }
    // 3D-mode letter shortcuts
    if (doc.mode === '3d') {
      if (e.key === 'j' || e.key === 'J') { startJointCreation(); return; }
    }
    // Cancel face-pick mode in 3D (also clears the bbox 6-face picker if up)
    // Enter while picking edges = finish + open dialog.
    if (e.key === 'Enter' && doc.bevelPickMode && doc.bevelSelected.length) {
      e.preventDefault();
      const sels = doc.bevelSelected.slice();
      doc.bevelSelected = [];
      _clearBevelHighlight();
      doc.bevelPickMode = false;
      if (viewer) viewer.canvas.style.cursor = '';
      openBevelDialog(sels);
      return;
    }
    // Enter while in 2D fillet pick mode opens the dialog (only if anything
    // is picked — Enter on an empty selection is a no-op, not a cancel).
    if (e.key === 'Enter' && doc.filletPickMode && doc.filletSelectedCorners.length) {
      e.preventDefault();
      openFilletDialog();
      return;
    }
    if (e.key === 'Escape' && (doc.faceMode || doc.curvedPickBody || doc.bevelPickMode || doc.filletPickMode)) {
      const wasFastener = !!doc.fastenerPlaceTarget;
      const wasBevel = !!doc.bevelPickMode;
      const wasFillet = !!doc.filletPickMode;
      doc.faceMode = false;
      doc.curvedPickBody = null;
      doc.fastenerPlaceTarget = null;
      doc.bevelPickMode = false;
      doc.bevelSelected = [];
      _clearBevelHighlight();
      if (wasFillet) _exitFilletPickMode(null);
      if (viewer) {
        viewer.canvas.style.cursor = '';
        viewer.clearBboxFacePicker && viewer.clearBboxFacePicker();
      }
      setStatus(wasFastener ? 'Fastener placement cancelled'
              : wasBevel    ? 'Fillet cancelled'
              : wasFillet   ? 'Fillet cancelled'
              : 'Sketch on Face cancelled');
    }
    // Cancel align mode
    if (e.key === 'Escape' && doc.alignMode) {
      exitAlignMode();
      setStatus('Align cancelled');
    }
    // Cancel boolean cut mode
    if (e.key === 'Escape' && doc.cutMode) {
      exitBooleanCut('Cut cancelled');
    }
    // Cancel mirror plane picker
    if (e.key === 'Escape' && doc.mirrorMode) {
      exitMirrorPick('Mirror cancelled');
    }
    // Cancel in-progress joint creation
    if (e.key === 'Escape' && doc.jointPickStage) {
      exitJointCreation('Joint cancelled');
    }
    // Cancel an in-progress drag-to-extrude (or just close the typing tooltip)
    if (e.key === 'Escape' && doc.mode === '3d') {
      const st = viewer?.extrudeState;
      const tooltipOpen = document.getElementById('extrude-tooltip')?.classList.contains('show');
      if ((st && st.active) || tooltipOpen) {
        if (st) st.active = false;
        if (viewer) viewer.clearExtrudePreview();
        hideExtrudeTooltip();
        setStatus('Extrude cancelled');
        return;
      }
    }
    // Clear region selection
    if (e.key === 'Escape' && doc.mode === '3d' && (doc.selectedRegions?.length || 0) > 0) {
      doc.selectedRegions = [];
      if (viewer) {
        viewer.updateRegions();
        viewer.updateExtrudeGizmo();
      }
      renderProps();
      setStatus('Region selection cleared');
    }
    // Esc as a universal "return to pointer" — works in 2D when the active
    // tool is anything other than select, switching back to the select tool.
    if (e.key === 'Escape' && doc.mode === '2d' && sketchEng &&
        sketchEng.tool && sketchEng.tool !== 'select' &&
        !sketchEng.activeLine && !sketchEng.activeArc && !sketchEng.draft) {
      sketchEng.setTool('select');
      setStatus('Pointer tool');
    }
    // Arrow-key nudge — moves the selected sketch shape (in 2D) or body
    // (in 3D) by one grid step. Shift = 4× step (faster). Alt + ↑/↓ in 3D
    // moves along the Y (vertical) axis instead of Z.
    if (!e.ctrlKey && !e.metaKey &&
        (e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
         e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
      // Don't hijack arrows when an input is focused
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      const step = (doc.grid.spacing || 1) * (e.shiftKey ? 4 : 1);
      e.preventDefault();
      if (doc.mode === '2d' && doc.selection?.kind === 'sketch') {
        pushUndo();
        const ids = doc.multiSelectedSketch?.length ? doc.multiSelectedSketch : [doc.selection.id];
        let dx = 0, dy = 0;
        if (e.key === 'ArrowLeft')  dx = -step;
        if (e.key === 'ArrowRight') dx = +step;
        if (e.key === 'ArrowUp')    dy = +step;
        if (e.key === 'ArrowDown')  dy = -step;
        for (const id of ids) {
          const ent = doc.sketch.entities.find(x => x.id === id);
          if (!ent) continue;
          // Snapshot current state and feed to moveEntity
          const snap = JSON.parse(JSON.stringify(ent));
          moveEntity(ent, snap, dx, dy);
        }
        sketchEng.render(); renderProps();
        return;
      }
      if (doc.mode === '3d' && doc.selection?.kind === 'body') {
        pushUndo();
        const ids = doc.multiSelectedBodies?.length ? doc.multiSelectedBodies : [doc.selection.id];
        let dx = 0, dy = 0, dz = 0;
        if (e.altKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
          // Alt + Up/Down → move on Y axis (vertical)
          dy = e.key === 'ArrowUp' ? +step : -step;
        } else {
          if (e.key === 'ArrowLeft')  dx = -step;
          if (e.key === 'ArrowRight') dx = +step;
          // Up = forward (-Z, into the screen for default view), Down = back (+Z)
          if (e.key === 'ArrowUp')    dz = -step;
          if (e.key === 'ArrowDown')  dz = +step;
        }
        for (const id of ids) {
          const b = doc.bodies.find(x => x.id === id);
          if (!b) continue;
          b.x = (b.x || 0) + dx;
          b.y = (b.y || 0) + dy;
          b.z = (b.z || 0) + dz;
        }
        viewer.rebuildBodies(); viewer.updateGizmo(); renderProps();
        return;
      }
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (doc.selection?.kind === 'sketch') {
        pushUndo();
        const ids = doc.multiSelectedSketch?.length ? new Set(doc.multiSelectedSketch) : new Set([doc.selection.id]);
        doc.sketch.entities = doc.sketch.entities.filter(x => !ids.has(x.id));
        doc.selection = null;
        doc.multiSelectedSketch = [];
        sketchEng.render(); renderTree(); renderProps();
      } else if (doc.selection?.kind === 'body') {
        pushUndo();
        const ids = doc.multiSelectedBodies?.length ? new Set(doc.multiSelectedBodies) : new Set([doc.selection.id]);
        doc.bodies = doc.bodies.filter(x => !ids.has(x.id));
        doc.selection = null;
        doc.multiSelectedBodies = [];
        viewer.rebuildBodies(); renderTree(); renderProps();
      }
    }
  });

  // Initial render — open in 3D so the user lands in the modeling viewport
  setMode('3d');
  renderGridPanel();
  renderTree();
  renderProps();
  sketchEng.render();
  sketchEng.updateNodeActions();
  updateUndoRedoButtons();
  setStatus('Ready — add a primitive or click + Sketch to draw');

  // Restore any unsaved work from the previous session (localStorage draft).
  // Survives page refresh — same pattern as blueprint-lab. If the parent
  // immediately sends a STEMSKETCH_LOAD afterward, that overrides.
  try {
    if (restoreLocalDraft()) setDirty(true);
  } catch (err) { console.warn('Local draft restore failed:', err); }

  // Re-render the 2D sketch whenever the canvas changes size (handles iframe resize
  // and the initial case where the iframe viewport isn't known at DOMContentLoaded).
  const canvasArea = $('canvas-area');
  if (canvasArea && window.ResizeObserver) {
    let _lastW = 0, _lastH = 0;
    new ResizeObserver(entries => {
      const { width, height } = entries[0].contentRect;
      if (Math.abs(width - _lastW) < 1 && Math.abs(height - _lastH) < 1) return;
      _lastW = width; _lastH = height;
      if (doc.mode === '2d') sketchEng.render();
    }).observe(canvasArea);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  try { init(); } catch (err) {
    console.error('init failed:', err);
    setStatus('Init error: ' + err.message);
    // last-resort visible message
    const sb = document.getElementById('status-msg');
    if (sb) sb.style.color = '#c0392b';
  }
});

// Surface uncaught errors in the status bar so they're visible without devtools
window.addEventListener('error', (e) => {
  console.error(e.error || e.message);
  const sb = document.getElementById('status-msg');
  if (sb) { sb.textContent = 'Error: ' + (e.message || 'see console'); sb.style.color = '#c0392b'; }
});
</script>
</body>
</html>
