// Build one SVG document from a list of entities (mm units, Y-flipped to
// match standard SVG axes, construction lines stripped).
function _sketchEntitiesToSVG(entities) {
  const exportable = entities.filter(e => !e.construction);
  if (!exportable.length) return null;
  let minX = +Infinity, minY = +Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const e of exportable) {
    if (e.type === 'rect') {
      minX = Math.min(minX, e.x); minY = Math.min(minY, e.y);
      maxX = Math.max(maxX, e.x + e.w); maxY = Math.max(maxY, e.y + e.h);
    } else if (e.type === 'circle') {
      minX = Math.min(minX, e.cx - e.r); minY = Math.min(minY, e.cy - e.r);
      maxX = Math.max(maxX, e.cx + e.r); maxY = Math.max(maxY, e.cy + e.r);
    } else if (e.type === 'polyline') {
      for (const p of e.points) {
        minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
        maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
      }
    }
  }
  const m = 5;
  const w = maxX - minX + 2 * m, h = maxY - minY + 2 * m;
  let body = '';
  for (const e of exportable) {
    if (e.type === 'rect') {
      body += `<rect x="${e.x - minX + m}" y="${maxY - (e.y + e.h) + m}" width="${e.w}" height="${e.h}" fill="none" stroke="black" stroke-width="0.2"/>\n`;
    } else if (e.type === 'circle') {
      body += `<circle cx="${e.cx - minX + m}" cy="${maxY - e.cy + m}" r="${e.r}" fill="none" stroke="black" stroke-width="0.2"/>\n`;
    } else if (e.type === 'polyline') {
      const pts = e.points.map(p => `${p.x - minX + m},${maxY - p.y + m}`).join(' ');
      const tag = e.closed ? 'polygon' : 'polyline';
      body += `<${tag} points="${pts}" fill="none" stroke="black" stroke-width="0.2"/>\n`;
    }
  }
  return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">
${body}</svg>`;
}

// Sanitize "Sketch 1" / "Right paddle" → "Sketch_1" / "Right_paddle" for the
// filename suffix. Avoids spaces and chars that confuse downstream tools.
function _slugify(s) {
  return String(s || 'part').replace(/[^A-Za-z0-9._-]+/g, '_').slice(0, 60) || 'part';
}

function exportSVG(opts = {}) {
  const sketches = opts.sketchIds
    ? opts.sketchIds.map(id => doc.sketches.find(s => s.id === id)).filter(Boolean)
    : [doc.sketch];
  if (!sketches.length) {
    showHint('Pick at least one sketch to export.');
    return;
  }
  if (opts.combine) {
    // Combine: merge all selected sketches' entities into one SVG. This is
    // useful when several sketches should be laser-cut on the same sheet.
    const all = sketches.flatMap(s => s.entities || []);
    const svg = _sketchEntitiesToSVG(all);
    if (!svg) { showHint('No exportable shapes — construction lines do not export.'); return; }
    download(svg, getProjectName() + '.svg', 'image/svg+xml');
    setStatus(`Exported ${sketches.length} sketch${sketches.length === 1 ? '' : 'es'} as one SVG`);
    return;
  }
  let count = 0;
  for (const s of sketches) {
    const svg = _sketchEntitiesToSVG(s.entities || []);
    if (!svg) continue;
    const suffix = sketches.length > 1 ? `__${_slugify(s.name || ('Sketch' + s.id))}` : '';
    download(svg, getProjectName() + suffix + '.svg', 'image/svg+xml');
    count++;
  }
  setStatus(`Exported ${count} SVG file${count === 1 ? '' : 's'}`);
}

// Build ASCII STL text from a list of body meshes.
// Mesh cleanup tuned for STL export. CSG.js (the boolean engine behind
// every threaded / beveled body in this app) leaves drift across cut
// seams — vertices that SHOULD be shared between two faces land at
// slightly-different float values, so each face owns its own copy and
// the edge between them becomes 'non-manifold' (an edge with only one
// adjacent face on each side instead of one truly shared edge between
// two faces). Slicers like Bambu Studio flag those. Two-pass fix:
//   1) Weld vertices within EXPORT_WELD_MM. 0.02 mm is 1/10 of the
//      finest printable layer (0.2 mm on a typical FDM printer with a
//      0.4 mm nozzle), so we can't accidentally collapse real features.
//      Catches every CSG seam drift we've seen so far on bracket-scale
//      models.
//   2) Strip degenerate triangles whose 2x signed area is below
//      DEGEN_EPS_MM2. After welding, two triangles can share two
//      vertices and end up zero-area (knife-blade slivers — the other
//      common non-manifold cause). Cross-product squared length < 1e-6
//      is well below any meaningful geometry.
const EXPORT_WELD_MM   = 0.02;
const EXPORT_DEGEN_EPS = 1e-6;
function _cleanGeometryForExport(geo) {
  let cleaned = weldGeometryForEdges(geo, EXPORT_WELD_MM);
  cleaned = _stripDegenerateTriangles(cleaned, EXPORT_DEGEN_EPS);
  cleaned.computeVertexNormals();
  return cleaned;
}

function _bodiesToSTL(bodies, solidName = 'mini_cad') {
  let stl = `solid ${solidName}\n`;
  let cleanupStats = { totalBefore: 0, totalAfter: 0, bodies: 0 };
  for (const body of bodies) {
    const mesh = body.mesh;
    if (!mesh) continue;
    let geo = mesh.geometry.clone();
    geo.applyMatrix4(mesh.matrixWorld);
    // Capture vertex count before cleanup so we can report the welding
    // ratio to the user — useful when they're debugging an actual print.
    const beforeVerts = geo.attributes.position?.count || 0;
    geo = _cleanGeometryForExport(geo);
    const afterVerts = geo.attributes.position?.count || 0;
    cleanupStats.totalBefore += beforeVerts;
    cleanupStats.totalAfter  += afterVerts;
    cleanupStats.bodies++;
    const pos = geo.attributes.position;
    const idx = geo.index;
    const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
    const writeTri = (i1, i2, i3) => {
      a.fromBufferAttribute(pos, i1);
      b.fromBufferAttribute(pos, i2);
      c.fromBufferAttribute(pos, i3);
      const ab = new THREE.Vector3().subVectors(b, a);
      const ac = new THREE.Vector3().subVectors(c, a);
      const n = new THREE.Vector3().crossVectors(ab, ac).normalize();
      // Skip degenerate triangles that survived cleanup (normal is NaN /
      // length 0 when the cross product is zero — vertices collinear or
      // coincident). Writing them produces 'facet normal NaN NaN NaN'
      // lines which slicers reject the whole file over.
      if (!isFinite(n.x) || !isFinite(n.y) || !isFinite(n.z)) return;
      stl += `  facet normal ${n.x.toFixed(6)} ${n.y.toFixed(6)} ${n.z.toFixed(6)}\n    outer loop\n`;
      stl += `      vertex ${a.x.toFixed(6)} ${a.y.toFixed(6)} ${a.z.toFixed(6)}\n`;
      stl += `      vertex ${b.x.toFixed(6)} ${b.y.toFixed(6)} ${b.z.toFixed(6)}\n`;
      stl += `      vertex ${c.x.toFixed(6)} ${c.y.toFixed(6)} ${c.z.toFixed(6)}\n`;
      stl += `    endloop\n  endfacet\n`;
    };
    if (idx) {
      for (let i = 0; i < idx.count; i += 3) writeTri(idx.getX(i), idx.getX(i + 1), idx.getX(i + 2));
    } else {
      for (let i = 0; i < pos.count; i += 3) writeTri(i, i + 1, i + 2);
    }
    geo.dispose();
  }
  if (cleanupStats.bodies > 0) {
    const collapsed = cleanupStats.totalBefore - cleanupStats.totalAfter;
    console.log(`STL export cleanup: ${cleanupStats.bodies} bod${cleanupStats.bodies === 1 ? 'y' : 'ies'}, ${cleanupStats.totalBefore} → ${cleanupStats.totalAfter} verts (${collapsed} welded together at ${EXPORT_WELD_MM} mm tolerance).`);
  }
  stl += `endsolid ${solidName}\n`;
  return stl;
}

function exportSTL(opts = {}) {
  if (!doc.bodies.length) {
    showHint('No 3D bodies yet — extrude a sketch or add a cube.');
    return;
  }
  // Default: every positive body. Negatives are exclude (they're cut-tools,
  // already represented by holes in the combined body).
  const bodies = opts.bodyIds
    ? opts.bodyIds.map(id => doc.bodies.find(b => b.id === id)).filter(Boolean)
    : doc.bodies.filter(b => b.op !== 'subtract');
  if (!bodies.length) { showHint('Pick at least one body to export.'); return; }
  if (opts.combine) {
    download(_bodiesToSTL(bodies), getProjectName() + '.stl', 'model/stl');
    setStatus(`Exported ${bodies.length} bod${bodies.length === 1 ? 'y' : 'ies'} as one STL`);
    return;
  }
  let count = 0;
  for (const b of bodies) {
    const stl = _bodiesToSTL([b], _slugify(bodyDisplayLabel(b)));
    const suffix = bodies.length > 1 ? `__${_slugify(bodyDisplayLabel(b))}` : '';
    download(stl, getProjectName() + suffix + '.stl', 'model/stl');
    count++;
  }
  setStatus(`Exported ${count} STL file${count === 1 ? '' : 's'}`);
}

function download(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ---------- Fillet a polyline corner ----------
// Symmetric chamfer at a polyline corner — trim back the same distance
// `d` along each adjacent edge and connect the two trim points with a
// straight segment. Works at any non-degenerate angle; for a 90° corner
// the chamfer line is at 45° to both edges, for other angles it's
// symmetric to the corner's bisector. Returns true if the corner was
// replaced, false if it was too tight or the edges too short.
function chamferPolylineCorner(poly, idx, d) {
  const n = poly.points.length;
  if (n < 3) return false;
  const prev = poly.points[(idx - 1 + n) % n];
  const curr = poly.points[idx];
  const next = poly.points[(idx + 1) % n];
  const v1x = prev.x - curr.x, v1y = prev.y - curr.y;
  const v2x = next.x - curr.x, v2y = next.y - curr.y;
  const len1 = Math.hypot(v1x, v1y), len2 = Math.hypot(v2x, v2y);
  if (len1 < 1e-6 || len2 < 1e-6) return false;
  const u1x = v1x / len1, u1y = v1y / len1;
  const u2x = v2x / len2, u2y = v2y / len2;
  const cosA = clamp(u1x * u2x + u1y * u2y, -1, 1);
  const angle = Math.acos(cosA);
  if (angle < 0.05 || angle > Math.PI - 0.05) return false;
  if (d > len1 * 0.95 || d > len2 * 0.95) return false;
  const t1 = { x: curr.x + u1x * d, y: curr.y + u1y * d };
  const t2 = { x: curr.x + u2x * d, y: curr.y + u2y * d };
  // Replace the corner vertex with two trim points; the polyline renders
  // the straight cut between them automatically.
  poly.points.splice(idx, 1, t1, t2);
  return true;
}

function filletPolylineCorner(poly, idx, r) {
  const n = poly.points.length;
  if (n < 3) return false;
  const prev = poly.points[(idx - 1 + n) % n];
  const curr = poly.points[idx];
  const next = poly.points[(idx + 1) % n];
  const v1x = prev.x - curr.x, v1y = prev.y - curr.y;
  const v2x = next.x - curr.x, v2y = next.y - curr.y;
  const len1 = Math.hypot(v1x, v1y), len2 = Math.hypot(v2x, v2y);
  if (len1 < 1e-6 || len2 < 1e-6) return false;
  const u1x = v1x / len1, u1y = v1y / len1;
  const u2x = v2x / len2, u2y = v2y / len2;
  const cosA = clamp(u1x * u2x + u1y * u2y, -1, 1);
  const angle = Math.acos(cosA);
  if (angle < 0.05 || angle > Math.PI - 0.05) return false;
  const d = r / Math.tan(angle / 2);
  if (d > len1 * 0.95 || d > len2 * 0.95) return false;
  const t1 = { x: curr.x + u1x * d, y: curr.y + u1y * d };
  const t2 = { x: curr.x + u2x * d, y: curr.y + u2y * d };
  const bisx = (u1x + u2x), bisy = (u1y + u2y);
  const blen = Math.hypot(bisx, bisy);
  if (blen < 1e-6) return false;
  const ubx = bisx / blen, uby = bisy / blen;
  const cdist = r / Math.sin(angle / 2);
  const center = { x: curr.x + ubx * cdist, y: curr.y + uby * cdist };
  let a1 = Math.atan2(t1.y - center.y, t1.x - center.x);
  let a2 = Math.atan2(t2.y - center.y, t2.x - center.x);
  let span = a2 - a1;
  if (span > Math.PI) span -= 2 * Math.PI;
  if (span < -Math.PI) span += 2 * Math.PI;
  const N = 16;
  const arcPts = [];
  for (let i = 0; i <= N; i++) {
    const t = a1 + span * (i / N);
    arcPts.push({ x: center.x + Math.cos(t) * r, y: center.y + Math.sin(t) * r });
  }
  poly.points.splice(idx, 1, ...arcPts);
  return true;
}

// ──────────────────────────────────────────────────────────────────────────
// Per-corner Fillet picking — student clicks each corner they want softened
// (a rect corner, a polyline vertex), then opens the dialog to pick style +
// size. The bulk-fillet-all-corners path is gone: openFilletDialog is now
// only reached after corners are selected.

function enterFilletPickMode() {
  if (doc.mode !== '2d') {
    showHint('Switch to a 2D sketch first, then click Fillet.');
    return;
  }
  const ents = (doc.sketch?.entities || []).filter(e =>
    !e.construction && (e.type === 'polyline' || e.type === 'rect'));
  if (!ents.length) {
    showHint('Draw a rectangle or polyline first — Fillet rounds / chamfers its corners.');
    return;
  }
  doc.filletPickMode = true;
  doc.filletSelectedCorners = [];
  if (sketchEng) {
    sketchEng.svg.style.cursor = 'crosshair';
    sketchEng.render();
  }
  setStatus('Fillet — click each corner to soften. Click empty space (or press Enter) when done. Esc cancels. Click a selected corner again to remove it.');
}

// Return every reachable corner (vertex) from rect / polyline entities in the
// active sketch as { entityId, vertexIdx, x, y }. Closed polylines expose
// every vertex; open polylines skip endpoints (they only have one adjacent
// edge so there's nothing to fillet). Rects expose all 4 corners.
function _enumerateFilletableCorners() {
  const out = [];
  const ents = (doc.sketch?.entities || []);
  for (const e of ents) {
    if (e.construction) continue;
    if (e.type === 'rect') {
      out.push({ entityId: e.id, vertexIdx: 0, x: e.x,         y: e.y });
      out.push({ entityId: e.id, vertexIdx: 1, x: e.x + e.w,   y: e.y });
      out.push({ entityId: e.id, vertexIdx: 2, x: e.x + e.w,   y: e.y + e.h });
      out.push({ entityId: e.id, vertexIdx: 3, x: e.x,         y: e.y + e.h });
    } else if (e.type === 'polyline' && Array.isArray(e.points)) {
      const n = e.points.length;
      if (n < 3) continue;
      for (let i = 0; i < n; i++) {
        // Open polyline endpoints have only one adjacent edge → not a corner.
        if (!e.closed && (i === 0 || i === n - 1)) continue;
        out.push({ entityId: e.id, vertexIdx: i, x: e.points[i].x, y: e.points[i].y });
      }
    }
  }
  return out;
}

// Find the nearest filletable corner to (wx, wy) within snap distance.
// snapPxRadius is in screen pixels so the snap feels right at any zoom.
function _pickNearestCorner(wx, wy, snapPxRadius = 14) {
  if (!sketchEng) return null;
  const ppm = sketchEng.view.pxPerMm || 1;
  const snapMm = snapPxRadius / ppm;
  let best = null, bestD = Infinity;
  for (const c of _enumerateFilletableCorners()) {
    const d = Math.hypot(c.x - wx, c.y - wy);
    if (d < bestD) { bestD = d; best = c; }
  }
  if (!best || bestD > snapMm) return null;
  return best;
}

function _isCornerSelected(corner) {
  return doc.filletSelectedCorners.some(c =>
    c.entityId === corner.entityId && c.vertexIdx === corner.vertexIdx);
}

function _exitFilletPickMode(reason) {
  doc.filletPickMode = false;
  doc.filletSelectedCorners = [];
  if (sketchEng) {
    sketchEng.svg.style.cursor = '';
    sketchEng.render();
  }
  if (reason) setStatus(reason);
}

function openFilletDialog() {
  const corners = doc.filletSelectedCorners.slice();
  if (!corners.length) {
    showHint('Click at least one corner first.');
    return;
  }
  const u = unitLabel();
  const defaultSize = doc.units === 'in' ? 0.1 : 2;
  openModal({
    title: `Soften ${corners.length} corner${corners.length === 1 ? '' : 's'}`,
    body: `<p>Replace each picked corner with either a round arc (fillet) or a straight cut (chamfer). Works on any angle between two lines, not just 90°.</p>
           <div class="field" style="margin-top:8px">
             <label>Style</label>
             <select id="fil-style">
               <option value="round" selected>Round — tangent arc (fillet)</option>
               <option value="chamfer">Chamfer — symmetric straight cut</option>
             </select>
           </div>
           <div class="field">
             <label>Size (${u})</label>
             <input id="fil-r" type="number" value="${defaultSize}" min="0.01" step="0.5"/>
           </div>
           <p style="color:var(--ink-soft);font-size:12px;margin:4px 0 0">
             <b>Round:</b> arc radius. <b>Chamfer:</b> leg length along each adjacent edge — the cut sits symmetrically across the corner so it's at 45° on a 90° corner, otherwise it bisects the angle.
           </p>`,
    confirmText: `Apply to ${corners.length}`,
    onConfirm: () => {
      const v = parseFloat($('fil-r').value);
      if (!(v > 0)) return;
      const style = $('fil-style').value === 'chamfer' ? 'chamfer' : 'round';
      pushUndo();
      const r = fromUnit(v);
      // Group selected corners by entity so we can convert each rect ONCE
      // and process its corners in DESCENDING vertex order (so the
      // splice-in-place inside the corner replacers doesn't shift indices
      // we haven't visited yet).
      const byEnt = new Map();
      for (const c of corners) {
        if (!byEnt.has(c.entityId)) byEnt.set(c.entityId, []);
        byEnt.get(c.entityId).push(c.vertexIdx);
      }
      let processed = 0;
      for (const [entId, indices] of byEnt) {
        let ent = doc.sketch.entities.find(e => e.id === entId);
        if (!ent) continue;
        // Rects get promoted to a 4-vertex closed polyline so the same
        // corner replacer works on them. The vertex indices we recorded
        // when picking (0=bl,1=br,2=tr,3=tl) line up with this polyline
        // by construction.
        if (ent.type === 'rect') {
          const r2p = {
            id: ent.id, type: 'polyline', closed: true, construction: ent.construction,
            points: [
              { x: ent.x, y: ent.y },
              { x: ent.x + ent.w, y: ent.y },
              { x: ent.x + ent.w, y: ent.y + ent.h },
              { x: ent.x, y: ent.y + ent.h },
            ],
          };
          const i = doc.sketch.entities.findIndex(e => e.id === ent.id);
          doc.sketch.entities[i] = r2p;
          ent = r2p;
        }
        if (ent.type !== 'polyline') continue;
        indices.sort((a, b) => b - a); // descending — splices later first
        for (const i of indices) {
          const ok = (style === 'chamfer')
            ? chamferPolylineCorner(ent, i, r)
            : filletPolylineCorner(ent, i, r);
          if (ok) processed++;
        }
      }
      _exitFilletPickMode(null);
      sketchEng.render(); renderProps();
      const verb = style === 'chamfer' ? 'Chamfered' : 'Filleted';
      if (processed > 0) setStatus(`${verb} ${processed} corner${processed > 1 ? 's' : ''}.`);
      else showHint(`No corners ${style === 'chamfer' ? 'chamfered' : 'filleted'} — size too large for the geometry at every pick.`);
    },
  });
}

// Build a vertex on the offset polyline at "cur", given its neighbors and a
// perpendicular distance d (positive = LEFT of the directed edge). Works by
// intersecting the two offset lines for the incoming and outgoing edges.
function offsetVertexCorner(prev, cur, next, d) {
  const e1x = cur.x - prev.x, e1y = cur.y - prev.y;
  const l1 = Math.hypot(e1x, e1y);
  if (l1 < 1e-6) return { x: cur.x, y: cur.y };
  const n1x = -e1y / l1, n1y = e1x / l1;
  const e2x = next.x - cur.x, e2y = next.y - cur.y;
  const l2 = Math.hypot(e2x, e2y);
  if (l2 < 1e-6) return { x: cur.x, y: cur.y };
  const n2x = -e2y / l2, n2y = e2x / l2;
  const P1x = prev.x + n1x * d, P1y = prev.y + n1y * d;
  const P2x = next.x + n2x * d, P2y = next.y + n2y * d;
  const denom = e1x * (-e2y) - e1y * (-e2x);
  if (Math.abs(denom) < 1e-9) return { x: cur.x + n1x * d, y: cur.y + n1y * d };
  const dx = P2x - P1x, dy = P2y - P1y;
  const t = (dx * (-e2y) - dy * (-e2x)) / denom;
  return { x: P1x + t * e1x, y: P1y + t * e1y };
}

function offsetPolyline(pts, d, closed) {
  if (pts.length < 2) return null;
  let orientation = 1;
  if (closed && pts.length >= 3) {
    let a = 0;
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i], q = pts[(i + 1) % pts.length];
      a += p.x * q.y - q.x * p.y;
    }
    orientation = a > 0 ? 1 : -1; // +1 for CCW so positive d expands outward
  }
  const offset = d * orientation;
  const n = pts.length;
  const out = [];
  for (let i = 0; i < n; i++) {
    const prev = closed ? pts[(i - 1 + n) % n] : (i === 0 ? null : pts[i - 1]);
    const cur = pts[i];
    const next = closed ? pts[(i + 1) % n] : (i === n - 1 ? null : pts[i + 1]);
    if (!prev || !next) {
      const ref = prev || next;
      const ex = cur.x - (prev ? prev.x : cur.x);
      const ey = cur.y - (prev ? prev.y : cur.y);
      const fx = (next ? next.x : cur.x) - cur.x;
      const fy = (next ? next.y : cur.y) - cur.y;
      const dxe = prev ? ex : fx;
      const dye = prev ? ey : fy;
      const len = Math.hypot(dxe, dye);
      if (len < 1e-6) { out.push({ x: cur.x, y: cur.y }); continue; }
      out.push({ x: cur.x + (-dye / len) * offset, y: cur.y + (dxe / len) * offset });
      continue;
    }
    out.push(offsetVertexCorner(prev, cur, next, offset));
  }
  return out;
}

function offsetEntity(ent, d) {
  if (ent.type === 'circle') {
    const r = ent.r + d;
    if (r <= 0.01) return null;
    return { type: 'circle', cx: ent.cx, cy: ent.cy, r, construction: ent.construction };
  }
  if (ent.type === 'rect') {
    const x = ent.x - d, y = ent.y - d;
    const w = ent.w + 2 * d, h = ent.h + 2 * d;
    if (w <= 0.01 || h <= 0.01) return null;
    return { type: 'rect', x, y, w, h, construction: ent.construction };
  }
  if (ent.type === 'polyline') {
    const pts = offsetPolyline(ent.points, d, !!ent.closed);
    if (!pts || pts.length < 2) return null;
    return { type: 'polyline', closed: !!ent.closed, points: pts, construction: ent.construction };
  }
  return null;
}

// ──────────────────────────────────────────────────────────────────────────
// Bevel / Fillet — click an edge in 3D, choose round or 45° chamfer + size,
// auto-detect convex (subtract) vs concave (union), apply via CSG.
// Works on any body type: primitives, extrudes, CSG groups. The Fillet
// toolbar button now enters edge-pick mode; the old all-12-edges cube
// dialog (openFillet3DDialog) is still exported for the Properties panel.

function enterBevelPickMode() {
  if (doc.mode !== '3d') {
    showHint('Switch to 3D first, then click Fillet.');
    return;
  }
  if (!doc.bodies.length) {
    showHint('Add or import a body first — fillet picks an edge to round / chamfer.');
    return;
  }
  doc.bevelPickMode = true;
  doc.bevelSelected = [];
  _clearBevelHighlight();
  if (viewer) viewer.canvas.style.cursor = 'crosshair';
  setStatus('Fillet — click each edge to add it. Click empty space (or press Enter) to apply, Esc to cancel.');
}

// Build a list of {p1, p2, n1, n2} edges in WORLD coords for a body's mesh.
// An edge here is a manifold edge where two triangles meet at a crease
// sharper than `creaseDeg`. Tessellation seams within smooth surfaces are
// excluded so the user only ever snaps to a real geometric edge.
function _buildBevelEdgeIndex(mesh, creaseDeg = 20) {
  if (!mesh?.geometry?.attributes?.position) return [];
  // Pre-weld so CSG drift doesn't split one physical edge into many
  // disconnected segments — coincident vertices that landed at slightly
  // different float values after a boolean op now share the same INDEX,
  // which is what triangle-adjacency hashing depends on. 0.15 mm is just
  // under FDM line width (~0.4 mm nozzle / 0.2 mm layer) so we don't
  // collapse real corners, but it's wide enough to absorb the drift that
  // a stack of CSG ops accumulates (extrude → bevel → thread → bevel…),
  // which was breaking the chain walker on the user's heavier brackets.
  const geo = weldGeometryForEdges(mesh.geometry, 0.15);
  const pos = geo.attributes.position;
  const idx = geo.index;
  const mw = mesh.matrixWorld;
  // After welding, edges are identified by SORTED VERTEX INDEX PAIRS —
  // no quantization key needed because shared vertices now share their
  // numeric index directly. Map edge → list of triangles that share it.
  const triCount = idx ? (idx.array.length / 3) | 0 : (pos.count / 3) | 0;
  const getVertIdx = (triI, j) => idx ? idx.array[triI * 3 + j] : (triI * 3 + j);
  const edgeMap = new Map();
  const triNormals = new Array(triCount);
  const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
  const e1 = new THREE.Vector3(), e2 = new THREE.Vector3();
  // Cache welded vertices in WORLD coords once.
  const worldVerts = new Array(pos.count);
  for (let i = 0; i < pos.count; i++) {
    worldVerts[i] = new THREE.Vector3(
      pos.array[i*3], pos.array[i*3+1], pos.array[i*3+2]
    ).applyMatrix4(mw);
  }
  for (let t = 0; t < triCount; t++) {
    const ia = getVertIdx(t, 0), ib = getVertIdx(t, 1), ic = getVertIdx(t, 2);
    a.copy(worldVerts[ia]);
    b.copy(worldVerts[ib]);
    c.copy(worldVerts[ic]);
    e1.subVectors(b, a);
    e2.subVectors(c, a);
    const n = new THREE.Vector3().crossVectors(e1, e2);
    if (n.lengthSq() < 1e-12) { triNormals[t] = null; continue; }
    triNormals[t] = n.normalize();
    const addEdge = (i1, i2) => {
      const key = i1 < i2 ? i1 + '_' + i2 : i2 + '_' + i1;
      let list = edgeMap.get(key);
      if (!list) { list = []; edgeMap.set(key, list); }
      list.push({ tri: t, va: i1, vb: i2 });
    };
    addEdge(ia, ib);
    addEdge(ib, ic);
    addEdge(ic, ia);
  }
  // Promote manifold edges (exactly 2 triangles) whose dihedral exceeds
  // creaseDeg to "visible edges". Coplanar shared triangles (tessellation
  // seams on smooth surfaces) are filtered out. We attach the shared
  // vertex INDICES (idxA, idxB) so the expander can chain segments via
  // exact integer matching instead of fuzzy position keys.
  const cosThresh = Math.cos(creaseDeg * Math.PI / 180);
  const out = [];
  for (const list of edgeMap.values()) {
    if (list.length !== 2) continue;
    const ta = list[0].tri, tb = list[1].tri;
    const na = triNormals[ta], nb = triNormals[tb];
    if (!na || !nb) continue;
    if (na.dot(nb) > cosThresh) continue; // too flat — same face
    const va = list[0].va, vb = list[0].vb;
    out.push({
      idxA: va, idxB: vb,
      p1: worldVerts[va].clone(),
      p2: worldVerts[vb].clone(),
      n1: na.clone(),
      n2: nb.clone(),
    });
  }
  return out;
}

// Given a list of edges (each with world-coord p1, p2) and a world-coord
// click point, return the edge whose SEGMENT (not infinite line) is
// nearest the click. The acceptance threshold scales with the body so a
// distant click on a giant base plate doesn't bias toward a tiny detail
// edge in the foreground.
function _pickClosestSegment(edges, clickPoint, mesh) {
  if (!edges.length) return null;
  let best = null, bestDist = Infinity;
  const ab = new THREE.Vector3();
  const ap = new THREE.Vector3();
  for (const ed of edges) {
    ab.subVectors(ed.p2, ed.p1);
    const len2 = ab.lengthSq();
    if (len2 < 1e-9) continue;
    ap.subVectors(clickPoint, ed.p1);
    let t = Math.max(0, Math.min(1, ap.dot(ab) / len2));
    const closest = ed.p1.clone().add(ab.clone().multiplyScalar(t));
    const d = closest.distanceTo(clickPoint);
    if (d < bestDist) { bestDist = d; best = ed; }
  }
  const bbox = new THREE.Box3().setFromObject(mesh);
  const scale = bbox.getSize(new THREE.Vector3()).length();
  if (bestDist > scale * 0.15) return null;
  return best;
}

// Position quantization key — 0.05 mm grid. Used to detect "same vertex"
// across edge segments produced by a tessellated mesh.
function _bevelPosKey(p) {
  const Q = 20;
  return Math.round(p.x * Q) + '|' + Math.round(p.y * Q) + '|' + Math.round(p.z * Q);
}

// A single physical edge usually arrives as a CHAIN of short colinear
// segments because every CSG operation retessellates the face. The user
// clicks NEAR the edge, we snap to one segment, then walk outward in both
// directions and gather every neighbouring segment that:
//   * shares an endpoint vertex INDEX with the chain (exact, post-weld)
//   * runs along (within ~10°) the same direction
//   * meets the SAME two faces (n1, n2 within ~18°, either order)
// Then return the chain's extreme endpoints as a single logical edge.
function expandToFullStraightEdge(seed, allEdges) {
  const seedDir = new THREE.Vector3().subVectors(seed.p2, seed.p1).normalize();
  // Looser tolerances than v1 — heavier CSG output drifts the seam
  // normals enough that 18° was clipping real chain extensions on a
  // bracket that had been through several boolean ops. 14° / 25° still
  // excludes coplanar / wrong-edge candidates.
  const DIR_DOT_MIN    = 0.97;   // ≈ 14°
  const NORMAL_DOT_MIN = 0.90;   // ≈ 26°
  const sameDir = (d) => Math.abs(d.dot(seedDir)) > DIR_DOT_MIN;
  const sameFaces = (a1, a2) =>
    (a1.dot(seed.n1) > NORMAL_DOT_MIN && a2.dot(seed.n2) > NORMAL_DOT_MIN) ||
    (a1.dot(seed.n2) > NORMAL_DOT_MIN && a2.dot(seed.n1) > NORMAL_DOT_MIN);
  // Pre-filter candidates by direction + face pair so the chain walk
  // doesn't accidentally turn at a corner into a perpendicular edge.
  const candidates = [];
  for (const ed of allEdges) {
    if (ed === seed) continue;
    const edir = new THREE.Vector3().subVectors(ed.p2, ed.p1);
    if (edir.lengthSq() < 1e-9) continue;
    edir.normalize();
    if (!sameDir(edir)) continue;
    if (!sameFaces(ed.n1, ed.n2)) continue;
    candidates.push(ed);
  }
  // Index candidates by each of their endpoint vertex indices. Post-weld
  // these are exact integer matches — no floating-point tolerance fuss.
  const byIdx = new Map();
  for (const ed of candidates) {
    for (const v of [ed.idxA, ed.idxB]) {
      if (!byIdx.has(v)) byIdx.set(v, []);
      byIdx.get(v).push(ed);
    }
  }
  const used = new Set([seed]);
  const chain = [seed];
  const extend = (startIdx) => {
    let tip = startIdx;
    while (true) {
      const list = byIdx.get(tip) || [];
      let next = null;
      for (const ed of list) {
        if (used.has(ed)) continue;
        next = ed; break;
      }
      if (!next) break;
      used.add(next);
      chain.push(next);
      tip = (next.idxA === tip) ? next.idxB : next.idxA;
    }
  };
  extend(seed.idxB);
  extend(seed.idxA);
  // Chain extremes by projection along seedDir give us the logical
  // edge's two endpoints in world coords.
  let minProj = Infinity, maxProj = -Infinity;
  let minPt = seed.p1, maxPt = seed.p2;
  for (const ed of chain) {
    for (const p of [ed.p1, ed.p2]) {
      const proj = p.dot(seedDir);
      if (proj < minProj) { minProj = proj; minPt = p; }
      if (proj > maxProj) { maxProj = proj; maxPt = p; }
    }
  }
  return { p1: minPt.clone(), p2: maxPt.clone(), n1: seed.n1, n2: seed.n2 };
}

// Render orange tubes over the currently-selected edges so the user can
// see what's accumulated. Sits in viewer.scene with depthTest off so it's
// visible through the body — matches the convention we use elsewhere for
// selection feedback.
function _renderBevelHighlight() {
  if (!viewer) return;
  _clearBevelHighlight();
  const group = new THREE.Group();
  for (const sel of doc.bevelSelected) {
    const len = sel.edge.p1.distanceTo(sel.edge.p2);
    if (len < 0.01) continue;
    const dir = new THREE.Vector3().subVectors(sel.edge.p2, sel.edge.p1).normalize();
    const mid = new THREE.Vector3().addVectors(sel.edge.p1, sel.edge.p2).multiplyScalar(0.5);
    // Tube radius scales with the body so giant bracket edges get a thick
    // highlight and small features get a thin one.
    const body = doc.bodies.find(b => b.id === sel.bodyId);
    const scale = body?.mesh
      ? new THREE.Box3().setFromObject(body.mesh).getSize(new THREE.Vector3()).length()
      : 50;
    const r = Math.max(0.4, Math.min(1.5, scale * 0.006));
    const cyl = new THREE.CylinderGeometry(r, r, len, 12);
    const color = sel.kind === 'convex' ? 0xff9000 : 0x00b870;
    const mat = new THREE.MeshBasicMaterial({ color, depthTest: false, transparent: true, opacity: 0.85 });
    const mesh = new THREE.Mesh(cyl, mat);
    mesh.position.copy(mid);
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
    mesh.renderOrder = 999;
    group.add(mesh);
  }
  viewer.scene.add(group);
  viewer._bevelHighlight = group;
}

function _clearBevelHighlight() {
  if (!viewer || !viewer._bevelHighlight) return;
  viewer.scene.remove(viewer._bevelHighlight);
  viewer._bevelHighlight.traverse(o => {
    if (o.geometry) o.geometry.dispose();
    if (o.material) o.material.dispose();
  });
  viewer._bevelHighlight = null;
}

// Classify an edge as convex or concave by signing the dihedral. The
// sign of (n1 × n2)·e is reliable on properly-wound meshes, but CSG
// output occasionally produces seam triangles with flipped winding —
// fall back to a raycaster probe along (n1+n2) for that case.
// Face-loop selection from a double-click. Find every edge whose adjacent
// faces include the triangle the user clicked on, CLUSTER segments that
// lie on the same 3D line (which is what makes the chain walker's
// fragmentation invisible to the user), filter out tessellation-noise
// stubs, and push the clean logical edges into doc.bevelSelected. For
// a flat rectangular face like a cube's top, this gives 4 edges in one
// click; for an L-shaped face it gives 6, etc. Toggle-deselect on the
// second click is honoured — a face loop where every edge is already
// selected gets cleared instead.
function _selectFaceLoopFromHit(body, hit, allEdges) {
  if (!hit.face) return;
  const localNormal = hit.face.normal.clone();
  const faceNormal = localNormal.transformDirection(hit.object.matrixWorld).normalize();
  const FACE_DOT_MIN = 0.90;
  const boundary = allEdges.filter(ed =>
    ed.n1.dot(faceNormal) > FACE_DOT_MIN || ed.n2.dot(faceNormal) > FACE_DOT_MIN
  );
  if (!boundary.length) {
    showHint('No edges found around that face. Click an edge directly instead.');
    return;
  }
  // Cluster all boundary segments by 3D line — two segments belong to the
  // same logical edge if their direction is parallel (within 14°) AND
  // their lines are within 0.3 mm of each other in the perpendicular
  // direction. This catches the CSG-retessellation fragmentation that
  // the chain walker can't always bridge: every fragment of the same
  // physical edge clusters together regardless of whether its endpoints
  // happen to share an exact vertex index with its neighbours.
  const DIR_PARALLEL = 0.97;   // ~14°
  const LINE_PERP_TOL = 0.3;   // mm — perpendicular distance for "same line"
  const clusters = []; // { dir, refPoint, segments[], faceMatch }
  for (const ed of boundary) {
    const v = new THREE.Vector3().subVectors(ed.p2, ed.p1);
    if (v.lengthSq() < 1e-9) continue;
    const dir = v.normalize();
    let target = null;
    for (const c of clusters) {
      if (Math.abs(c.dir.dot(dir)) < DIR_PARALLEL) continue;
      // Perpendicular distance from this edge's p1 to the cluster's line.
      const off = new THREE.Vector3().subVectors(ed.p1, c.refPoint);
      const along = off.dot(c.dir);
      const perp = off.sub(c.dir.clone().multiplyScalar(along));
      if (perp.length() < LINE_PERP_TOL) { target = c; break; }
    }
    if (target) target.segments.push(ed);
    else clusters.push({ dir: dir.clone(), refPoint: ed.p1.clone(), segments: [ed] });
  }
  // Drop clusters that are too short to be a real edge (CSG tessellation
  // stubs at corners). Threshold scales with the body so tiny detail
  // edges on big brackets aren't accidentally filtered.
  const bbox = new THREE.Box3().setFromObject(body.mesh);
  const scale = bbox.getSize(new THREE.Vector3()).length();
  const MIN_LEN = Math.max(0.5, scale * 0.005);
  const expanded = [];
  for (const c of clusters) {
    // Extract the cluster's logical edge — extreme endpoints along dir.
    let minProj = Infinity, maxProj = -Infinity;
    let minPt = null, maxPt = null;
    for (const seg of c.segments) {
      for (const p of [seg.p1, seg.p2]) {
        const proj = p.dot(c.dir);
        if (proj < minProj) { minProj = proj; minPt = p; }
        if (proj > maxProj) { maxProj = proj; maxPt = p; }
      }
    }
    if (!minPt || !maxPt) continue;
    if (maxProj - minProj < MIN_LEN) continue; // noise stub
    expanded.push({
      p1: minPt.clone(), p2: maxPt.clone(),
      n1: c.segments[0].n1, n2: c.segments[0].n2,
    });
  }
  if (!expanded.length) {
    showHint('No clean edges around that face — try clicking each edge individually.');
    return;
  }
  const POS_TOL = 0.2;
  const isSameEdge = (a, b) =>
    (a.p1.distanceTo(b.p1) < POS_TOL && a.p2.distanceTo(b.p2) < POS_TOL) ||
    (a.p1.distanceTo(b.p2) < POS_TOL && a.p2.distanceTo(b.p1) < POS_TOL);
  // If every edge in the loop is ALREADY in the selection, treat the
  // double-click as deselect-the-whole-loop. Otherwise add the missing
  // ones (so partial-loop states converge to fully-selected on click).
  const allAlreadySelected = expanded.every(full =>
    doc.bevelSelected.some(s => s.bodyId === body.id && isSameEdge(s.edge, full))
  );
  if (allAlreadySelected) {
    doc.bevelSelected = doc.bevelSelected.filter(s =>
      !(s.bodyId === body.id && expanded.some(full => isSameEdge(s.edge, full)))
    );
    _renderBevelHighlight();
    setStatus(`Fillet — face loop deselected (${doc.bevelSelected.length} edge${doc.bevelSelected.length === 1 ? '' : 's'} remaining).`);
    return;
  }
  let added = 0;
  for (const full of expanded) {
    const alreadyIn = doc.bevelSelected.some(s => s.bodyId === body.id && isSameEdge(s.edge, full));
    if (alreadyIn) continue;
    const kind = classifyBevelEdge(full, body);
    doc.bevelSelected.push({ bodyId: body.id, edge: full, kind });
    added++;
  }
  _renderBevelHighlight();
  setStatus(`Fillet — added ${added} edge${added === 1 ? '' : 's'} from the face loop (${doc.bevelSelected.length} total selected). Click empty space / press Enter to apply.`);
}

function classifyBevelEdge(edge, body) {
  const e = new THREE.Vector3().subVectors(edge.p2, edge.p1).normalize();
  const cross = new THREE.Vector3().crossVectors(edge.n1, edge.n2);
  const dihedralSign = cross.dot(e);
  if (Math.abs(dihedralSign) > 0.1) {
    return dihedralSign > 0 ? 'convex' : 'concave';
  }
  // Near-180° dihedral or ambiguous winding — probe along bisector to
  // see whether a tiny step past the edge lands outside the body's
  // bounding mesh. Convex = outside (no hit going back), concave =
  // inside (hit going back).
  const mid = edge.p1.clone().add(edge.p2).multiplyScalar(0.5);
  const b = edge.n1.clone().add(edge.n2).normalize();
  const bbox = new THREE.Box3().setFromObject(body.mesh);
  const scale = bbox.getSize(new THREE.Vector3()).length();
  const probe = mid.clone().add(b.clone().multiplyScalar(scale * 0.001));
  const ray = new THREE.Raycaster(probe, b.clone().negate(), 0, scale * 0.002);
  const hits = ray.intersectObject(body.mesh, false);
  return hits.length ? 'convex' : 'concave';
}

function openFillet3DDialog() {
  const sel = doc.selection;
  if (!sel || sel.kind !== 'body') {
    showHint('Select a cube first, then click Fillet.');
    return;
  }
  const body = doc.bodies.find(b => b.id === sel.id);
  if (!body) return;
  if (body.type !== 'cube') {
    showHint('3D Fillet currently rounds the edges of cube primitives only.');
    return;
  }
  const u = unitLabel();
  const fe = body.filletEdges || { v: true, h: true };
  const maxR = Math.min(body.w, body.d, body.h) / 2 - 0.01;
  const defaultR = doc.units === 'in' ? 0.1 : 2;
  openModal({
    title: 'Fillet cube edges',
    body: `<p>Round the cube's edges with the given radius. Pick which edge groups to round.</p>
           <div class="field"><label>Radius (${u})</label><input id="f3-r" type="number" value="${body.filletRadius ? toUnit(body.filletRadius).toFixed(2) : defaultR}" min="0" max="${toUnit(maxR).toFixed(2)}" step="0.1"/></div>
           <div class="field"><label><input type="checkbox" id="f3-v" ${fe.v !== false ? 'checked' : ''}/> Vertical edges (4 corners going up)</label></div>
           <div class="field"><label><input type="checkbox" id="f3-h" ${fe.h !== false ? 'checked' : ''}/> Top &amp; bottom edges (8 around the prism ends)</label></div>
           <div class="hint">Set radius to 0 — or uncheck both — to return to sharp edges. Per-individual-edge picking is on the road map.</div>`,
    onConfirm: () => {
      const v = parseFloat(document.getElementById('f3-r').value);
      if (!isFinite(v) || v < 0) return;
      const wantV = document.getElementById('f3-v').checked;
      const wantH = document.getElementById('f3-h').checked;
      pushUndo();
      body.filletRadius = (wantV || wantH) ? fromUnit(v) : 0;
      body.filletEdges = { v: wantV, h: wantH };
      if (viewer) viewer.rebuildBodies();
      renderProps();
      const label = (wantV && wantH) ? 'all edges'
        : wantV ? 'vertical edges'
        : wantH ? 'top &amp; bottom edges'
        : null;
      setStatus(label ? `Filleted ${label} to ${fmtUL(fromUnit(v))}` : 'Cleared fillet');
    },
  });
}

// Bevel dialog — opens after the user finishes picking. Accepts the full
// selection array (each entry has a bodyId + classified edge) so one
// confirm beveles all of them. Style (round / 45° chamfer) and size apply
// uniformly; convex selections get CSG.subtract, concave get CSG.union.
function openBevelDialog(selections) {
  if (!selections.length) return;
  // Resolve current body objects (the id might have changed if a previous
  // bevel already ran on this body during this session — selections from
  // the pick mode are always fresh, so this is just defensive).
  const sels = selections.map(s => ({
    body: doc.bodies.find(b => b.id === s.bodyId),
    edge: s.edge,
    kind: s.kind,
  })).filter(s => s.body);
  if (!sels.length) { showHint('Edges no longer point to a valid body — try again.'); return; }
  const convexCount = sels.filter(s => s.kind === 'convex').length;
  const concaveCount = sels.length - convexCount;
  const totalLen = sels.reduce((sum, s) => sum + s.edge.p1.distanceTo(s.edge.p2), 0);
  const avgLen = totalLen / sels.length;
  // Use the smallest edge as the cap so the default size doesn't blow past
  // a short edge in the batch.
  const shortestLen = Math.min(...sels.map(s => s.edge.p1.distanceTo(s.edge.p2)));
  const firstBody = sels[0].body;
  const bbox = new THREE.Box3().setFromObject(firstBody.mesh);
  const bodyScale = bbox.getSize(new THREE.Vector3()).length();
  const defaultMm = Math.max(0.5, Math.min(avgLen * 0.08, bodyScale * 0.05, shortestLen * 0.3));
  const u = unitLabel();
  const defaultUL = toUnit(defaultMm).toFixed(2);
  const mix = (convexCount && concaveCount)
    ? `Mixed selection — ${convexCount} outer (removed) and ${concaveCount} inner (filled).`
    : convexCount
      ? `${convexCount} outer edge${convexCount === 1 ? '' : 's'} — material will be removed.`
      : `${concaveCount} inner edge${concaveCount === 1 ? '' : 's'} — material will be added to fill each corner.`;
  openModal({
    title: `Bevel ${sels.length} edge${sels.length === 1 ? '' : 's'}`,
    body: `<p>${mix}</p>
           <div class="field" style="margin-top:8px">
             <label>Style</label>
             <select id="bv-style">
               <option value="round" selected>Round — quarter-circle</option>
               <option value="chamfer">45° chamfer — flat cut</option>
             </select>
           </div>
           <div class="field">
             <label>Size (${u})</label>
             <input id="bv-size" type="number" value="${defaultUL}" min="0.05" step="0.1"/>
           </div>
           <div class="hint">Shortest edge in batch: ${fmtUL(shortestLen)}. Size is the bevel's reach along each adjacent face — keep it well under half the shortest edge.</div>`,
    confirmText: `Apply to ${sels.length}`,
    onConfirm: () => {
      const style = document.getElementById('bv-style').value || 'round';
      const sizeVal = parseFloat(document.getElementById('bv-size').value);
      const size = fromUnit(sizeVal);
      if (!isFinite(size) || size <= 0) { showHint('Size must be positive.'); return; }
      if (size >= shortestLen * 0.5) { showHint('Size too large for the shortest edge in the batch.'); return; }
      applyBevelsBatch(sels, style, size);
    },
  });
}

// Build a triangle-prism CSG tool for the bevel. The 2D cross-section in
// (u,v) — perpendicular to the edge — is the corner sliver between a sharp
// 90°-ish corner and the new bevel surface:
//   - round   → bounded by u-axis (0..R), arc center (R,R) radius R, v-axis (R..0)
//   - chamfer → triangle (0,0)–(S,0)–(0,S)
// Extruded along the edge from p1 to p2 with small overhang on each end so
// the boolean cleanly clips through any corner adjacent geometry.
function buildBevelTool(edge, kind, style, size) {
  const p1 = edge.p1, p2 = edge.p2;
  const eDir = new THREE.Vector3().subVectors(p2, p1);
  const len = eDir.length();
  if (len < 1e-6) return null;
  eDir.normalize();
  const n1 = edge.n1.clone().normalize();
  const n2 = edge.n2.clone().normalize();
  const bisector = n1.clone().add(n2).normalize();
  // t1 / t2: unit vectors perpendicular to the edge, lying in each
  // adjacent face, chosen to point AWAY from the exterior gap so the
  // body's body-side of each face is in the +t1 / +t2 direction.
  const t1 = new THREE.Vector3().crossVectors(eDir, n1).normalize();
  if (t1.dot(bisector) > 0) t1.negate();
  const t2 = new THREE.Vector3().crossVectors(eDir, n2).normalize();
  if (t2.dot(bisector) > 0) t2.negate();
  // For concave edges the sliver sits in the OPPOSITE 2D quadrant — flip
  // both basis vectors so the cross-section coordinates still place the
  // sliver in (+u, +v).
  const u = (kind === 'concave') ? t1.clone().negate() : t1.clone();
  const v = (kind === 'concave') ? t2.clone().negate() : t2.clone();
  // 2D cross-section shape
  const shape = new THREE.Shape();
  if (style === 'chamfer') {
    shape.moveTo(0, 0);
    shape.lineTo(size, 0);
    shape.lineTo(0, size);
    shape.lineTo(0, 0);
  } else {
    // Round — sliver bounded by u-axis to (size,0), the quarter-arc with
    // centre (size,size) and radius size curving toward the origin, and
    // the v-axis back to origin.
    shape.moveTo(0, 0);
    shape.lineTo(size, 0);
    shape.absarc(size, size, size, -Math.PI / 2, Math.PI, true);
    shape.lineTo(0, 0);
  }
  // Overhang policy by edge kind:
  //   * Convex (subtract): keep a small overhang so the cut punches cleanly
  //     through any near-coplanar tessellation noise at the corners. The
  //     overhang lives in empty space outside the body, so there's nothing
  //     to over-subtract — safe.
  //   * Concave (union): NO overhang. The bevel tool ADDS material here,
  //     and any extension past the edge endpoints adds material into open
  //     space — that's the small triangular protrusions the user reported
  //     sticking off the ends of each step's fillet on the stepped pyramid.
  //     Zero overhang means the union ends exactly at p1 and p2; a tiny
  //     gap from tessellation noise is far less visible than a protruding
  //     blade of added material.
  const OVER = (kind === 'concave') ? 0 : Math.max(0.1, len * 0.02);
  const geo = new THREE.ExtrudeGeometry(shape, {
    depth: len + 2 * OVER,
    bevelEnabled: false,
    curveSegments: style === 'round' ? 24 : 1,
  });
  // Move geometry so z spans [-OVER, len + OVER] before world placement.
  geo.translate(0, 0, -OVER);
  // Now rotate the prism so its local (x, y, z) maps to (u, v, eDir) in
  // world space, with the prism corner anchored at p1.
  const m = new THREE.Matrix4().makeBasis(u, v, eDir);
  m.setPosition(p1);
  geo.applyMatrix4(m);
  geo.computeVertexNormals();
  const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial());
  mesh.updateMatrixWorld(true);
  return mesh;
}

// Core single-edge bevel. Does NOT push undo, NOT rebuild views, NOT
// autosave — the caller owns those so a batch can wrap N bevels in one
// undo step + one redraw. Returns the new body id on success, null on
// failure.
function _bevelOnce(body, edge, kind, style, size) {
  if (typeof CSG === 'undefined') return null;
  const tool = buildBevelTool(edge, kind, style, size);
  if (!tool) return null;
  // getCSGMesh handles the cleanup pass for group/combined bodies so
  // compound bevels on a CSG bracket stay stable across iterations.
  const targetMesh = getCSGMesh(body);
  if (!targetMesh?.geometry?.attributes?.position?.count) {
    console.warn(`_bevelOnce: source body id=${body.id} has no renderable geometry — refusing to bevel.`);
    return null;
  }
  let result;
  try {
    result = (kind === 'concave')
      ? CSG.union(targetMesh, tool)
      : CSG.subtract(targetMesh, tool);
  } catch (err) {
    console.error(`_bevelOnce: CSG ${kind === 'concave' ? 'union' : 'subtract'} threw on body id=${body.id}:`, err);
    return null;
  }
  result.updateMatrixWorld(true);
  const baked = result.geometry.clone();
  baked.applyMatrix4(result.matrixWorld);
  baked.computeVertexNormals();
  // Refuse to commit a zero-position result — that's what's been
  // producing invisible-body-but-tree-entry-stays states the user can't
  // undo out of cleanly. CSG can silently return an empty mesh when the
  // bevel tool intersects in a degenerate way; better to fail noisily and
  // leave the body unchanged than to bake the failure into the doc.
  if (!baked.attributes?.position?.count) {
    console.warn(`_bevelOnce: CSG returned a zero-position result for body id=${body.id}; keeping the source body unchanged. ` +
      `Try a smaller bevel size, or a different edge.`);
    return null;
  }
  // Sanity-check the result vs the source. CSG's BSP tree occasionally
  // misclassifies the inside / outside of a complex body and returns the
  // CUTTING TOOL instead of the difference — visible as 'my pyramid got
  // replaced by a 0.25 in × 0.02 in × 0.02 in stick.' If the baked result
  // is dramatically smaller than the source mesh, something went wrong;
  // refuse to commit and surface the failure so the source body stays
  // visible.
  const srcVerts = targetMesh.geometry?.attributes?.position?.count || 0;
  const bakedVerts = baked.attributes.position.count;
  if (srcVerts > 100 && bakedVerts < srcVerts * 0.2) {
    console.warn(`_bevelOnce: CSG result is suspiciously small (${bakedVerts} verts vs ${srcVerts} in source) on body id=${body.id}. ` +
      `Likely BSP classification flipped; refusing to commit. Try a different edge or a larger bevel size — tiny bevels on complex bodies stress CSG precision.`);
    return null;
  }
  // Wrap the result as a single-child group so Ungroup recovers the
  // pre-bevel body. Mirror groupSelected's cloneChild so EVERY field
  // survives — the old hardcoded list dropped extrude-specific keys
  // (sourceSketchId, sketch, height, plane, regionCentroid), which
  // silently broke the sketch ↔ body linkage: editing the source sketch
  // could no longer find the now-anonymous extrude child and the user's
  // alterations stopped propagating.
  const cloneChildPreserve = (b) => {
    const c = {};
    for (const k of Object.keys(b)) {
      if (k === 'mesh') continue;
      if (k === 'geometry') { c.geometry = b.geometry; continue; }
      if (k === 'children' && Array.isArray(b.children)) {
        c.children = b.children.map(cloneChildPreserve);
        continue;
      }
      try { c[k] = JSON.parse(JSON.stringify(b[k])); } catch (_) { /* unserializable */ }
    }
    return c;
  };
  const childClone = cloneChildPreserve(body);
  const groupBody = {
    id: doc.nextBodyId++,
    type: 'group',
    children: [childClone],
    geometry: baked,
    op: body.op || 'add',
    x: 0, y: 0, z: 0,
    name: body.name ? `${body.name} (beveled)` : undefined,
  };
  // Carry any thread-shell metadata from the body being beveled forward
  // onto the new wrapper. The bevel CSG already preserved the shells in
  // baked (CSG.subtract leaves non-intersected triangles intact), but
  // without the metadata a later rebuild — say, the user edits the
  // source sketch and Done triggers rebuildGroupGeometry — would silently
  // strip them off the rebuilt geometry.
  if (Array.isArray(body._mergedShells) && body._mergedShells.length) {
    groupBody._mergedShells = body._mergedShells.map(s => ({ ...s, rotation: { ...s.rotation } }));
  }
  doc.bodies = doc.bodies.filter(b => b.id !== body.id);
  doc.bodies.push(groupBody);
  for (const sk of doc.sketches) {
    if (sk.sourceBodyId === body.id) sk.sourceBodyId = groupBody.id;
  }
  return groupBody.id;
}

// Single-edge entry kept for any code that still wants the old signature.
function applyBevelToBody(body, edge, kind, style, size) {
  pushUndo();
  try {
    viewer.scene.updateMatrixWorld(true);
    const newId = _bevelOnce(body, edge, kind, style, size);
    if (!newId) { showHint('Bevel failed — try a smaller size.'); return; }
    doc.selection = { kind: 'body', id: newId };
    doc.multiSelectedBodies = [newId];
    if (viewer) viewer.rebuildBodies();
    renderTree(); renderProps();
    const label = (kind === 'convex' ? 'Rounded outer edge' : 'Filleted inner edge');
    setStatus(`${label} — ${style === 'round' ? 'round' : '45° chamfer'} of ${fmtUL(size)}`);
    flushAutosave();
  } catch (err) {
    console.error('Bevel CSG failed:', err);
    showHint('Bevel failed — try a smaller size, or the edge may be too short.');
  }
}

// Multi-edge batch. One pushUndo, then iterate _bevelOnce across all
// selections, tracking each body's evolving id so successive bevels on
// the same body land on the latest group. One redraw + one autosave at
// the end keep this snappy and undo-friendly (single Ctrl+Z reverts the
// whole batch).
async function applyBevelsBatch(selections, style, size) {
  if (typeof CSG === 'undefined') { showHint('CSG library failed to load.'); return; }
  // Stash the undo snapshot BEFORE any work so we can roll back if nothing
  // succeeds — pushing an undo entry for a no-op bevel was creating a
  // confusing "nothing happened, but undo blanks my body" loop where the
  // user's first undo restored a state from BEFORE the bracket existed
  // (because the failed bevel filled the undo slot).
  const undoSnapshot = snapshotDoc();
  const idMap = new Map();
  const perEdge = []; // { idx, label, status, info }
  let okCount = 0, failCount = 0;
  // Yield to the event loop so each setStatus actually paints between
  // iterations. Without this the whole synchronous loop blocks the UI
  // and the user just sees "Beveling…" until the final state appears.
  const yieldFrame = () => new Promise(r => requestAnimationFrame(r));
  setStatus(`Beveling ${selections.length} edge${selections.length === 1 ? '' : 's'}…`);
  await yieldFrame();
  try {
    viewer.scene.updateMatrixWorld(true);
    for (let i = 0; i < selections.length; i++) {
      const sel = selections[i];
      const N = selections.length;
      const edgeLabel = `${sel.kind === 'convex' ? 'outer' : 'inner'} edge ${i + 1}/${N}`;
      setStatus(`Beveling ${edgeLabel}…`);
      await yieldFrame();
      const currentId = idMap.get(sel.body.id) ?? sel.body.id;
      const currentBody = doc.bodies.find(b => b.id === currentId);
      if (!currentBody) {
        failCount++;
        perEdge.push({ i, kind: sel.kind, ok: false, reason: 'source body not found' });
        console.warn(`Bevel ${i + 1}/${N}: source body id=${currentId} disappeared between picks and apply — skipped.`);
        continue;
      }
      const newId = _bevelOnce(currentBody, sel.edge, sel.kind, style, size);
      if (newId) {
        idMap.set(sel.body.id, newId);
        for (const [k, v] of idMap) if (v === currentId) idMap.set(k, newId);
        okCount++;
        perEdge.push({ i, kind: sel.kind, ok: true, reason: `→ body id=${newId}` });
        console.log(`Bevel ${i + 1}/${N} (${sel.kind}, ${style}) → ok, new body id=${newId}`);
        // Show what's been done so far so the user can see incremental progress.
        if (viewer) viewer.rebuildBodies();
        await yieldFrame();
      } else {
        failCount++;
        perEdge.push({ i, kind: sel.kind, ok: false, reason: 'CSG carved nothing — see prior console line' });
        console.warn(`Bevel ${i + 1}/${N} (${sel.kind}, ${style}) → failed (CSG returned an empty / unusable result).`);
      }
    }
    if (okCount > 0) {
      // Only push undo when at least one bevel actually committed.
      undoStack.push(undoSnapshot);
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      redoStack.length = 0;
      updateUndoRedoButtons();
      setDirty(true);
      const lastId = [...idMap.values()].pop();
      if (lastId) {
        doc.selection = { kind: 'body', id: lastId };
        doc.multiSelectedBodies = [lastId];
      }
      if (viewer) viewer.rebuildBodies();
      renderTree(); renderProps();
      flushAutosave();
      const sizeLabel = `${style === 'round' ? 'round' : '45° chamfer'} of ${fmtUL(size)}`;
      setStatus(failCount
        ? `Beveled ${okCount}/${selections.length} edges (${sizeLabel}). ${failCount} failed — see console for which.`
        : `Beveled ${okCount}/${selections.length} edges (${sizeLabel}).`);
    } else {
      // Total failure — no doc state changed. Don't pollute the undo stack
      // and surface a clear message so the user knows nothing happened.
      setStatus(`Fillet did nothing — CSG couldn't carve ${selections.length === 1 ? 'that edge' : 'any of the picked edges'}. Try a smaller size or a different edge. (See console for the per-edge reasons.)`);
      showHint('Fillet failed — try a smaller bevel size or a different edge. Check the browser console for details.');
    }
  } catch (err) {
    console.error('Batch bevel failed:', err);
    showHint('Bevel batch failed — try a smaller size.');
  }
}

// Perpendicular distance from a point to the nearest edge of a 2D entity.
// Used by offset mode to derive a live distance from the cursor position.
function pointToEntityEdgeDist(wx, wy, ent) {
  if (!ent) return 0;
  if (ent.type === 'circle') {
    return Math.abs(Math.hypot(wx - ent.cx, wy - ent.cy) - ent.r);
  }
  const segs = entityToSegments(ent);
  let best = Infinity;
  for (const s of segs) {
    const d = pointSegDist(wx, wy, s.a.x, s.a.y, s.b.x, s.b.y);
    if (d < best) best = d;
  }
  return isFinite(best) ? best : 0;
}

// Enter offset mode with no modal — distance comes from the cursor position
// each frame. Floating offset-tooltip near the cursor shows the live value
// and lets the user type a specific distance to override.
function startOffsetMode() {
  // Gather every currently-selected sketch entity. Multi-select is honored
  // so a user can highlight several lines / circles (anywhere in the sketch)
  // and offset them all together at the same distance — no grouping needed.
  const ids = (doc.multiSelectedSketch?.length ? doc.multiSelectedSketch.slice()
              : (doc.selection?.kind === 'sketch' ? [doc.selection.id] : []));
  const ents = ids.map(id => doc.sketch.entities.find(e => e.id === id)).filter(Boolean);
  if (!ents.length) {
    showHint('Select one or more shapes first, then click Offset.');
    return;
  }
  const sources = ents.map(e => {
    const c = JSON.parse(JSON.stringify(e));
    return { sourceEnt: c, lastEnt: c };
  });
  // d starts at 0 — _updateOffsetPreview will derive it from the cursor on
  // the next move. typedOverride lets the user override with a typed value.
  sketchEng.offsetMode = {
    sources,
    // Kept for backward compat with code paths that still reference the
    // single-entity fields; they alias the first source.
    sourceEnt: sources[0].sourceEnt,
    lastEnt: sources[0].lastEnt,
    d: 0,
    preview: null,
    previews: [],
    typedOverride: null,
  };
  // Position the tooltip near the cursor for the user's first reading.
  showOffsetTooltip();
  sketchEng._updateOffsetPreview(sketchEng.cursorWorld.x, sketchEng.cursorWorld.y);
  sketchEng.render();
  setStatus('Offset — move the mouse to preview, click to place. Type a number to lock a distance. Esc to finish.');
}

function showOffsetTooltip() {
  const t = document.getElementById('offset-tooltip');
  if (!t) return;
  t.classList.add('show');
  const unit = document.getElementById('offset-unit');
  if (unit) unit.textContent = unitLabel();
  // Intentionally NOT auto-focusing the input — that would suppress the live
  // cursor-distance updates (the "don't overwrite while focused" guard kicks
  // in). Instead, the window keydown handler auto-focuses the field the
  // moment the user types a digit, so the live readout shows the cursor
  // distance until the user decides to lock a value.
}
function hideOffsetTooltip() {
  const t = document.getElementById('offset-tooltip');
  if (t) t.classList.remove('show');
}
// ─── Shape-draw tooltip ──────────────────────────────────────────────────
// Same UX as the offset tooltip — visible during rect/circle drawing, shows
// live W/H (rect) or R (circle), accepts typed overrides, Enter commits.
function showShapeTooltip(type) {
  const t = document.getElementById('shape-tooltip');
  if (!t) return;
  const lab1 = document.getElementById('shape-tooltip-label-1');
  const inp1 = document.getElementById('shape-tooltip-input-1');
  const lab2 = document.getElementById('shape-tooltip-label-2');
  const inp2 = document.getElementById('shape-tooltip-input-2');
  const u2   = document.getElementById('shape-tooltip-unit-2');
  // Each tool gets its own label set.
  const twoDims = (type === 'rect');
  if (type === 'rect')   lab1.textContent = 'W';
  if (type === 'circle') lab1.textContent = 'R';
  lab2.style.display = twoDims ? '' : 'none';
  inp2.style.display = twoDims ? '' : 'none';
  u2.style.display   = twoDims ? '' : 'none';
  // Reset both inputs so a stale value from a previous draw doesn't override.
  inp1.value = '';
  inp2.value = '';
  t.dataset.type = type;
  t.classList.add('show');
}
function hideShapeTooltip() {
  const t = document.getElementById('shape-tooltip');
  if (t) t.classList.remove('show');
  if (sketchEng) {
    sketchEng.typedDim1 = null;
    sketchEng.typedDim2 = null;
  }
}
function updateShapeTooltip(draft, screenX, screenY) {
  const t = document.getElementById('shape-tooltip');
  if (!t || !t.classList.contains('show') || !draft) return;
  const inp1 = document.getElementById('shape-tooltip-input-1');
  const inp2 = document.getElementById('shape-tooltip-input-2');
  if (draft.type === 'rect') {
    if (inp1 && document.activeElement !== inp1 && (sketchEng?.typedDim1 == null))
      inp1.value = toUnit(Math.abs(draft.w || 0)).toFixed(3);
    if (inp2 && document.activeElement !== inp2 && (sketchEng?.typedDim2 == null))
      inp2.value = toUnit(Math.abs(draft.h || 0)).toFixed(3);
  } else if (draft.type === 'circle') {
    if (inp1 && document.activeElement !== inp1 && (sketchEng?.typedDim1 == null))
      inp1.value = toUnit(draft.r || 0).toFixed(3);
  }
  const cArea = document.getElementById('canvas-area').getBoundingClientRect();
  t.style.left = (screenX - cArea.left + 14) + 'px';
  t.style.top  = (screenY - cArea.top - 26) + 'px';
}

function updateOffsetTooltip(distMm, screenX, screenY) {
  const t = document.getElementById('offset-tooltip');
  if (!t || !t.classList.contains('show')) return;
  const input = document.getElementById('offset-input');
  const om = sketchEng?.offsetMode;
  // Don't overwrite the field if the user is typing OR has locked a value.
  // Otherwise the next mousemove would clobber whatever they just typed.
  const userOwnsValue = (input && document.activeElement === input) ||
                       (om && om.typedOverride != null);
  if (input && !userOwnsValue) {
    input.value = toUnit(distMm).toFixed(3);
  }
  const cArea = document.getElementById('canvas-area').getBoundingClientRect();
  // Offset the tooltip a hair from the cursor so it doesn't sit under the pointer
  t.style.left = (screenX - cArea.left + 14) + 'px';
  t.style.top  = (screenY - cArea.top - 26) + 'px';
}

// 2D Scale — resize selected entities by a typed factor around their combined
// centroid. Supports rect / circle / polyline (incl. curve handles) / dimension.
// Non-uniform: independent X / Y factors revealed via "lock aspect" checkbox.
function scaleSketchEntity(ent, pivot, sx, sy) {
  const sp = (x, y) => ({
    x: pivot.x + (x - pivot.x) * sx,
    y: pivot.y + (y - pivot.y) * sy,
  });
  if (ent.type === 'rect') {
    const c = sp(ent.x, ent.y);
    ent.x = c.x; ent.y = c.y;
    ent.w *= sx; ent.h *= sy;
  } else if (ent.type === 'circle') {
    const c = sp(ent.cx, ent.cy);
    ent.cx = c.x; ent.cy = c.y;
    ent.r *= (sx + sy) / 2;
  } else if (ent.type === 'polyline') {
    ent.points = ent.points.map(p => {
      const np = sp(p.x, p.y);
      const r = { x: np.x, y: np.y };
      if (p.cpIn)  r.cpIn  = { x: p.cpIn.x  * sx, y: p.cpIn.y  * sy };
      if (p.cpOut) r.cpOut = { x: p.cpOut.x * sx, y: p.cpOut.y * sy };
      return r;
    });
  } else if (ent.type === 'dimension') {
    const a = sp(ent.p1.x, ent.p1.y);
    const b = sp(ent.p2.x, ent.p2.y);
    ent.p1 = a; ent.p2 = b;
    if (ent.off != null) ent.off *= (sx + sy) / 2;
  }
}

function entitiesCentroid(ents) {
  let sx = 0, sy = 0, n = 0;
  for (const ent of ents) {
    if (ent.type === 'rect') {
      sx += ent.x + ent.w / 2; sy += ent.y + ent.h / 2; n++;
    } else if (ent.type === 'circle') {
      sx += ent.cx; sy += ent.cy; n++;
    } else if (ent.type === 'polyline') {
      for (const p of ent.points) { sx += p.x; sy += p.y; n++; }
    } else if (ent.type === 'dimension') {
      sx += (ent.p1.x + ent.p2.x) / 2; sy += (ent.p1.y + ent.p2.y) / 2; n++;
    }
  }
  if (!n) return { x: 0, y: 0 };
  return { x: sx / n, y: sy / n };
}

function openScaleDialog() {
  const ids = (doc.multiSelectedSketch?.length ? doc.multiSelectedSketch :
              (doc.selection?.kind === 'sketch' ? [doc.selection.id] : []));
  if (!ids.length) { showHint('Select a 2D shape first (Shift-click to multi-select).'); return; }
  const ents = ids.map(id => doc.sketch.entities.find(e => e.id === id)).filter(Boolean);
  if (!ents.length) return;
  openModal({
    title: 'Scale',
    body: `<p>Resize the selected shape${ents.length > 1 ? 's together' : ''} by a factor. The centroid stays put.</p>
           <div class="field"><label>Scale</label><input id="sc-f" type="number" value="1" step="0.1" min="0.01" autofocus/></div>
           <div class="field" style="display:flex;align-items:center;gap:8px;margin-top:6px">
             <input type="checkbox" id="sc-lock" checked style="width:auto;margin:0"/>
             <label for="sc-lock" style="margin:0;cursor:pointer">Lock aspect (X = Y)</label>
           </div>
           <div id="sc-xy" style="display:none;margin-top:6px">
             <div class="field"><label>Scale X</label><input id="sc-fx" type="number" value="1" step="0.1" min="0.01"/></div>
             <div class="field"><label>Scale Y</label><input id="sc-fy" type="number" value="1" step="0.1" min="0.01"/></div>
           </div>
           <div class="hint" style="margin-top:6px">Tip: 0.5 makes it half the size; 2 doubles it.</div>`,
    custom: () => {
      const lock = document.getElementById('sc-lock');
      const xy = document.getElementById('sc-xy');
      const single = document.getElementById('sc-f');
      lock.addEventListener('change', () => {
        const locked = lock.checked;
        xy.style.display = locked ? 'none' : '';
        single.parentElement.style.display = locked ? '' : 'none';
        if (!locked) {
          document.getElementById('sc-fx').value = single.value;
          document.getElementById('sc-fy').value = single.value;
        } else {
          single.value = document.getElementById('sc-fx').value;
        }
      });
    },
    onConfirm: () => {
      const locked = document.getElementById('sc-lock').checked;
      let fx, fy;
      if (locked) {
        const f = parseFloat(document.getElementById('sc-f').value);
        fx = fy = f;
      } else {
        fx = parseFloat(document.getElementById('sc-fx').value);
        fy = parseFloat(document.getElementById('sc-fy').value);
      }
      if (!isFinite(fx) || fx <= 0 || !isFinite(fy) || fy <= 0) {
        showHint('Enter positive scale factor(s).'); return;
      }
      if (Math.abs(fx - 1) < 1e-9 && Math.abs(fy - 1) < 1e-9) return;
      pushUndo();
      const pivot = entitiesCentroid(ents);
      for (const ent of ents) scaleSketchEntity(ent, pivot, fx, fy);
      sketchEng.render(); renderTree(); renderProps();
      setStatus(locked
        ? `Scaled ${ents.length} shape${ents.length === 1 ? '' : 's'} by ×${fx}`
        : `Scaled ${ents.length} shape${ents.length === 1 ? '' : 's'} by X×${fx}, Y×${fy}`);
    },
  });
}

function openArrayDialog() {
  const sel = doc.selection;
  if (!sel || sel.kind !== 'sketch') { showHint('Select a 2D shape first.'); return; }
  const u = unitLabel();
  openModal({
    title: 'Array along a line',
    body: `<p>Make multiple copies of the selected shape, evenly spaced along a direction.</p>
           <div class="field"><label>Count</label><input id="arr-n" type="number" value="3" min="2" max="50" step="1"/></div>
           <div class="field"><label>Spacing X (${u})</label><input id="arr-dx" type="number" value="${doc.units === 'in' ? 1 : 25}" step="0.5"/></div>
           <div class="field"><label>Spacing Y (${u})</label><input id="arr-dy" type="number" value="0" step="0.5"/></div>`,
    onConfirm: () => {
      const n = parseInt($('arr-n').value, 10);
      const dx = fromUnit(parseFloat($('arr-dx').value) || 0);
      const dy = fromUnit(parseFloat($('arr-dy').value) || 0);
      if (!(n > 1)) return;
      const ent = doc.sketch.entities.find(e => e.id === sel.id);
      if (!ent) return;
      pushUndo();
      for (let i = 1; i < n; i++) {
        const copy = JSON.parse(JSON.stringify(ent));
        copy.id = doc.sketch.nextId++;
        if (copy.type === 'rect') { copy.x += dx * i; copy.y += dy * i; }
        else if (copy.type === 'circle') { copy.cx += dx * i; copy.cy += dy * i; }
        else if (copy.type === 'polyline') copy.points = copy.points.map(p => ({ x: p.x + dx * i, y: p.y + dy * i }));
        doc.sketch.entities.push(copy);
      }
      sketchEng.render(); renderTree(); renderProps();
      setStatus(`Created ${n - 1} more copies`);
    },
  });
}

// ---------- Modal ----------
function openModal({ title, body, onConfirm, custom, hideOk, confirmText }) {
  $('modal').innerHTML = `
    <h3>${title}</h3>
    ${body}
    <div class="modal-actions">
      <button class="action" id="m-cancel">${hideOk ? 'Close' : 'Cancel'}</button>
      ${hideOk ? '' : `<button class="action primary" id="m-ok">${confirmText || 'OK'}</button>`}
    </div>`;
  $('modal-bg').classList.add('show');
  const close = () => $('modal-bg').classList.remove('show');
  $('m-cancel').onclick = close;
  if (!hideOk && $('m-ok')) $('m-ok').onclick = () => { onConfirm?.(); close(); };
  $('modal-bg').onclick = (e) => { if (e.target.id === 'modal-bg') close(); };
  custom?.();
}

// ---------- 7. Platform integration (postMessage save/load) ----------
// Outbound: { type:'STEMSKETCH_SAVE', name, docJson, units }
// Outbound: { type:'STEMSKETCH_REQUEST_LIST' }
// Outbound: { type:'STEMSKETCH_REQUEST_LOAD', id }
// Inbound:  { type:'STEMSKETCH_LOAD', name, docJson, units }
// Inbound:  { type:'STEMSKETCH_LOAD_LIST', designs:[{id,name,units,updated_at}] }
// Inbound:  { type:'STEMSKETCH_SAVE_OK' }
// Inbound:  { type:'STEMSKETCH_SAVE_ERR', message }

function notifyParent(msg) {
  try { window.parent.postMessage(msg, '*'); } catch (_) {}
}

function captureThumbnailAsync() {
  return new Promise((resolve) => {
    // 3D snapshot — render a fresh frame then read the WebGL canvas directly
    if (viewer && doc.bodies.length > 0) {
      try {
        viewer.renderer.render(viewer.scene, viewer.camera);
        const glCanvas = document.getElementById('three-canvas');
        resolve(glCanvas.toDataURL('image/jpeg', 0.7));
        return;
      } catch (_) {}
    }
    // 2D fallback — rasterise the live SVG via an Image → offscreen canvas
    try {
      const svgEl = document.getElementById('sketch-svg');
      const r = svgEl && svgEl.getBoundingClientRect();
      if (!r || r.width < 10 || r.height < 10) { resolve(null); return; }
      const svgStr = new XMLSerializer().serializeToString(svgEl);
      const blob = new Blob([svgStr], { type: 'image/svg+xml' });
      const url  = URL.createObjectURL(blob);
      const W = 320, H = Math.round(320 * r.height / r.width) || 220;
      const tmp = document.createElement('canvas');
      tmp.width = W; tmp.height = H;
      const ctx = tmp.getContext('2d');
      ctx.fillStyle = '#f6f7fb';
      ctx.fillRect(0, 0, W, H);
      const img = new Image();
      img.onload = () => {
        try { ctx.drawImage(img, 0, 0, W, H); } catch (_) {}
        URL.revokeObjectURL(url);
        resolve(tmp.toDataURL('image/png', 0.85));
      };
      img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
      img.src = url;
    } catch (_) { resolve(null); }
  });
}

// gzip + base64-encode a JSON-serialisable value. CompressionStream ships
// in every modern browser. Returns null on browsers that don't support it
// (we then fall back to raw JSON). 10× size reduction on a typical CSG-
// heavy doc means saves stop hitting Vercel/Supabase body-size limits and
// JSON.stringify finishes in tens of ms instead of seconds.
async function gzipJsonToBase64(value) {
  if (typeof CompressionStream === 'undefined') return null;
  try {
    const json = JSON.stringify(value);
    const stream = new Blob([json]).stream().pipeThrough(new CompressionStream('gzip'));
    const buf = await new Response(stream).arrayBuffer();
    const bytes = new Uint8Array(buf);
    // Build base64 in chunks to avoid String.fromCharCode arg-count overflow on big payloads.
    let bin = '';
    const CHUNK = 0x8000;
    for (let i = 0; i < bytes.length; i += CHUNK) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK));
    }
    return btoa(bin);
  } catch (_) {
    return null;
  }
}

async function cloudSave() {
  const btn = document.getElementById('cloud-save-btn');
  if (btn) {
    // Stash the original glyph once, then drop any prior state and enter "saving".
    if (!btn.dataset.origText) btn.dataset.origText = btn.textContent;
    clearTimeout(btn._resetT);
    btn.classList.remove('saved', 'failed');
    btn.classList.add('saving');
    btn.textContent = '⋯';
  }
  setStatus('Saving to cloud…');
  const name = getProjectName() || 'Untitled';
  const thumbnail = await captureThumbnailAsync();
  const docJson = snapshotDoc();
  // Mirror the cloud snapshot into localStorage RIGHT NOW. A plain page
  // reload only restores from localStorage — the cloud copy is only loaded
  // when the user explicitly clicks Load — so if the local draft was older
  // than what we're sending up here, a reload right after cloud save would
  // bring back the stale draft and the work "looks lost". Flushing now
  // keeps the two stores in lockstep.
  try {
    localStorage.setItem(LOCAL_DRAFT_KEY, JSON.stringify({
      name, units: doc.units, docJson, savedAt: Date.now(),
    }));
  } catch (err) {
    console.warn('STEM Sketch local draft mirror failed:', err);
  }
  const docJsonGz = await gzipJsonToBase64(docJson);
  // Surface the payload size to the console so a "Save failed" can be
  // correlated with the size at send time. Vercel's serverless body
  // limit on this stack is around 4.5 MB.
  const rawKB = Math.round(JSON.stringify(docJson).length / 1024);
  const gzKB = docJsonGz ? Math.round(docJsonGz.length / 1024) : null;
  console.log(`STEM Sketch cloud save — raw ${rawKB} KB${gzKB !== null ? `, gzipped+b64 ${gzKB} KB` : ''}`);
  // If gzip ballooned past the API limit too, refuse early with a clear
  // message instead of letting Vercel return an opaque 413.
  if (gzKB !== null && gzKB > 4200) {
    setStatus(`⚠ Design too large to cloud-save (${gzKB} KB gzipped — limit ~4500 KB). Try undoing recent CSG ops, or use Export instead.`);
    return;
  }
  const payload = docJsonGz
    ? { type: 'STEMSKETCH_SAVE', name, docJsonGz, units: doc.units, thumbnail }
    : { type: 'STEMSKETCH_SAVE', name, docJson,   units: doc.units, thumbnail };
  notifyParent(payload);
}

// Flash the cloud Save button green/red briefly, then revert. Reuses the
// same handle (btn._resetT) so rapid saves don't pile up timers.
function cloudSaveFlash(ok, msg) {
  const btn = document.getElementById('cloud-save-btn');
  if (!btn) return;
  clearTimeout(btn._resetT);
  btn.classList.remove('saving', 'saved', 'failed');
  if (ok) {
    btn.classList.add('saved');
    btn.textContent = '✓';
  } else {
    btn.classList.add('failed');
    btn.textContent = '✕';
    if (msg) btn.title = `Save failed: ${msg}`;
  }
  btn._resetT = setTimeout(() => {
    btn.classList.remove('saved', 'failed');
    btn.textContent = btn.dataset.origText || '☁';
    btn.title = 'Save to your account';
  }, 1500);
}

// Start a blank design: snapshot first (so Ctrl+Z restores the previous
// work even after the user confirms), clear the localStorage draft, then
// reset doc state and rebuild every view.
function startNewDesign() {
  if (_docDirty) {
    if (!window.confirm('Discard the current design and start blank?\nUnsaved changes will be lost (but Ctrl+Z will undo this).')) return;
  }
  pushUndo();
  // Reset doc to the same shape as initial seed
  doc.sketches = [{
    id: 1, plane: { ...GROUND_PLANE }, entities: [], nextId: 1, name: 'Sketch 1',
  }];
  doc.activeSketchId = 1;
  doc.nextSketchId = 2;
  doc.bodies = [];
  doc.nextBodyId = 1;
  doc.selection = null;
  doc.multiSelectedSketch = [];
  doc.multiSelectedBodies = [];
  doc.selectedRegions = [];
  doc.joints = [];
  doc.nextJointId = 1;
  doc.mode = '3d';
  setDirty(false);
  clearLocalDraft();
  const nameInp = document.getElementById('project-filename');
  if (nameInp) nameInp.value = '';
  if (viewer) {
    viewer.rebuildBodies();
    viewer.updateSketchOverlay && viewer.updateSketchOverlay();
    viewer.updateRegions && viewer.updateRegions();
    viewer.updateExtrudeGizmo && viewer.updateExtrudeGizmo();
    viewer.updateGizmo && viewer.updateGizmo();
  }
  if (sketchEng) sketchEng.render();
  renderTree(); renderProps();
  setMode('3d');
  setStatus('New blank design');
}

function loadDesignFromJson(name, docJson, units) {
  pushUndo();
  const inp = document.getElementById('project-filename');
  if (inp) inp.value = name;
  if (units && units !== doc.units) setUnits(units);
  applySnapshot(docJson);
  setStatus('Loaded: ' + name);
}

function showCloudLoadDialog(designs) {
  if (!designs || designs.length === 0) {
    openModal({ title: 'Load design', body: '<p style="color:var(--ink-soft)">No saved designs found. Save a design first using ☁ Save.</p>', hideOk: true });
    return;
  }
  const rows = designs.map(d => {
    const dt = new Date(d.updated_at).toLocaleDateString();
    const safeId = d.id.replace(/"/g, '');
    const safeName = d.name.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:2px solid var(--line);border-radius:8px;margin-bottom:6px;">
      <div>
        <div style="font-weight:700;font-size:14px;color:var(--ink)">${safeName}</div>
        <div style="font-size:11px;color:var(--ink-muted)">Last saved ${dt} &middot; ${d.units}</div>
      </div>
      <button class="action" onclick="triggerCloudLoad('${safeId}')" style="font-size:12px;padding:5px 10px">Load</button>
    </div>`;
