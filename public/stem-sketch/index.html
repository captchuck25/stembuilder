// New sketch on a chosen reference plane (XY/YZ/XZ)
function newSketchOnPlane(kind) {
  let plane;
  if (kind === 'top' || kind === 'xz') plane = { ...GROUND_PLANE, name: 'Top (XZ)' };
  else if (kind === 'front' || kind === 'xy') plane = {
    origin: [0, 0, 0], u: [1, 0, 0], v: [0, 1, 0], n: [0, 0, 1],
    kind: 'reference', name: 'Front (XY)',
  };
  else if (kind === 'right' || kind === 'yz') plane = {
    origin: [0, 0, 0], u: [0, 0, -1], v: [0, 1, 0], n: [1, 0, 0],
    kind: 'reference', name: 'Right (YZ)',
  };
  else plane = { ...GROUND_PLANE };
  createSketchOnPlane(plane);
}

// Apply a resize-handle drag to the body. `delta` is the signed distance the
// face moved along its axis. `sign` tells us which face (+/-).
// uniform=true → scale all dimensions proportionally (Shift held).
// Floating dimension labels — no box, text with a white halo, rotated to run
// parallel to the edge each one measures. Edge picks are camera-aware so the
// labels always live on the side facing the viewer.
function showDimLabels(body) {
  const overlay = $('dim-overlay');
  if (!overlay || !viewer || !body || !body.mesh) { hideDimLabels(); return; }
  // Fasteners are fully parameterised in the fastener dialog (length,
  // diameter, pitch) — bbox dimension labels add visual noise without any
  // resize affordance, since stretching the bbox would deform the helix.
  if (body.type === 'fastener') { hideDimLabels(); return; }
  viewer.scene.updateMatrixWorld(true);
  const bb = new THREE.Box3().setFromObject(body.mesh);
  if (bb.isEmpty()) { hideDimLabels(); return; }
  const ctr = bb.getCenter(new THREE.Vector3());
  const off = Math.max(5, Math.max(bb.max.x - bb.min.x, bb.max.y - bb.min.y, bb.max.z - bb.min.z) * 0.10);

  // Camera direction from the body's center — used to pick which edges face us
  const camDir = new THREE.Vector3().subVectors(viewer.camera.position, ctr).normalize();
  const pickEdge = (cands) => {
    let best = cands[0], bestScore = -Infinity;
    for (const c of cands) {
      const s = c.outward.dot(camDir);
      if (s > bestScore) { bestScore = s; best = c; }
    }
    return best;
  };

  // Universal X/Y/Z dimensioning — every body type gets the same three labels
  // pulled from its world-space bounding box. Width along the bottom-front
  // edge, Depth along the bottom-side, Height up a vertical corner, all with
  // camera-aware edge picking so labels always live on the side facing the
  // viewer.
  const items = [];
  {
    const sz = bb.getSize(new THREE.Vector3());
    const w = pickEdge([
      { y: bb.min.y, z: bb.max.z, outward: new THREE.Vector3(0, -1,  1).normalize() },
      { y: bb.min.y, z: bb.min.z, outward: new THREE.Vector3(0, -1, -1).normalize() },
    ]);
    const wOff = w.outward.clone().multiplyScalar(off * 0.4);
    items.push({
      a: new THREE.Vector3(bb.min.x, w.y, w.z).add(wOff),
      b: new THREE.Vector3(bb.max.x, w.y, w.z).add(wOff),
      text: fmtUL(sz.x),
    });
    const d = pickEdge([
      { x: bb.max.x, y: bb.min.y, outward: new THREE.Vector3( 1, -1, 0).normalize() },
      { x: bb.min.x, y: bb.min.y, outward: new THREE.Vector3(-1, -1, 0).normalize() },
    ]);
    const dOff = d.outward.clone().multiplyScalar(off * 0.4);
    items.push({
      a: new THREE.Vector3(d.x, d.y, bb.max.z).add(dOff),
      b: new THREE.Vector3(d.x, d.y, bb.min.z).add(dOff),
      text: fmtUL(sz.z),
    });
    const hh = pickEdge([
      { x: bb.max.x, z: bb.max.z, outward: new THREE.Vector3( 1, 0,  1).normalize() },
      { x: bb.min.x, z: bb.max.z, outward: new THREE.Vector3(-1, 0,  1).normalize() },
      { x: bb.max.x, z: bb.min.z, outward: new THREE.Vector3( 1, 0, -1).normalize() },
      { x: bb.min.x, z: bb.min.z, outward: new THREE.Vector3(-1, 0, -1).normalize() },
    ]);
    const hhOff = hh.outward.clone().multiplyScalar(off * 0.6);
    items.push({
      a: new THREE.Vector3(hh.x, bb.min.y, hh.z).add(hhOff),
      b: new THREE.Vector3(hh.x, bb.max.y, hh.z).add(hhOff),
      text: fmtUL(sz.y),
    });
  }
  if (!items.length) { hideDimLabels(); return; }

  const cArea = $('canvas-area').getBoundingClientRect();
  const canvasRect = viewer.canvas.getBoundingClientRect();
  const proj = (worldPos) => {
    const v = worldPos.clone().project(viewer.camera);
    return {
      x: canvasRect.left + (v.x + 1) / 2 * canvasRect.width - cArea.left,
      y: canvasRect.top + (1 - v.y) / 2 * canvasRect.height - cArea.top,
      z: v.z,
    };
  };

  overlay.innerHTML = '';
  for (const item of items) {
    const a = proj(item.a);
    const b = proj(item.b);
    if (a.z >= 1 || b.z >= 1) continue;
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    let angle = Math.atan2(b.y - a.y, b.x - a.x);
    // Keep text upright — flip if upside down
    if (angle > Math.PI / 2) angle -= Math.PI;
    if (angle < -Math.PI / 2) angle += Math.PI;
    const div = document.createElement('div');
    div.className = 'dim-label-3d';
    div.textContent = item.text;
    div.style.left = mx + 'px';
    div.style.top = my + 'px';
    div.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;
    overlay.appendChild(div);
  }
}
function hideDimLabels() {
  const overlay = $('dim-overlay');
  if (overlay) overlay.innerHTML = '';
}

function applyResize(rs, delta) {
  const b = rs.body;
  const sign = rs.sign;
  const MIN = 0.1;
  // If snap-to-grid is on, round the *delta* itself so dimensions land on grid steps
  let Δ = sign * delta;
  if (doc.grid?.snap) {
    const step = doc.grid.spacing || 1;
    Δ = Math.round(Δ / step) * step;
  }
  const snappedDelta = sign * Δ; // re-apply sign for downstream position math

  // Helper for "anchor opposite face" cube-style resize on linear dims
  const anchorAxis = (key, posKey, isYBottom) => {
    const oldVal = rs.startDims[key];
    const newVal = Math.max(MIN, oldVal + Δ);
    b[key] = newVal;
    if (posKey === 'y') {
      if (sign < 0) {
        b.y = rs.startPos.y + rs.startDims[key] - newVal;
      } else {
        b.y = rs.startPos.y;
      }
    } else {
      b[posKey] = rs.startPos[posKey] + snappedDelta / 2;
    }
    return newVal / oldVal;
  };

  if (b.type === 'cube' ||
      b.type === 'hexagon' || b.type === 'pentagon' || b.type === 'octagon' ||
      b.type === 'star' || b.type === 'heart' || b.type === 'teardrop' ||
      b.type === 'sphere' || b.type === 'cylinder' || b.type === 'cone' ||
      b.type === 'pyramid' || b.type === 'torus') {
    const axisToKey = { x: 'w', y: 'h', z: 'd' };
    const dim = axisToKey[rs.axis];
    const factor = anchorAxis(dim, rs.axis, rs.axis === 'y');
    if (rs.uniform) {
      b.w = Math.max(MIN, rs.startDims.w * factor);
      b.h = Math.max(MIN, rs.startDims.h * factor);
      b.d = Math.max(MIN, rs.startDims.d * factor);
      // Re-anchor only the dragged face for uniform too
      if (rs.axis !== 'y') b[rs.axis] = rs.startPos[rs.axis] + snappedDelta / 2;
      else if (sign < 0) b.y = rs.startPos.y + rs.startDims.h - b.h;
      else b.y = rs.startPos.y;
    }
  } else if (b.type === 'old_cylinder_legacy_unused') {
    if (rs.axis === 'y') {
      const factor = anchorAxis('h', 'y', true);
      if (rs.uniform) b.r = Math.max(MIN, rs.startDims.r * factor);
    } else {
      const newR = Math.max(MIN, rs.startDims.r + Math.abs(Δ));
      const factor = newR / rs.startDims.r;
      b.r = newR;
      if (rs.uniform) b.h = Math.max(MIN, rs.startDims.h * factor);
    }
  } else if (b.type === 'torus') {
    if (rs.axis === 'y') {
      b.tube = Math.max(MIN, rs.startDims.tube + Δ / 2);
    } else {
      b.r = Math.max(MIN, rs.startDims.r + Math.abs(Δ));
    }
  } else if (b.type === 'extrude') {
    if (rs.axis === 'y') {
      const factor = anchorAxis('height', 'y', true);
      if (rs.uniform) {
        // No XZ scaling for extrude in v1 — would require sketch transform
      }
    }
  }
}

// Revolve / Lathe — spin a 2D polyline profile around the active sketch's Y axis
// to create a 3D body (chess-pawn-style workflow).
function revolveCurrentSketch() {
  const sketch = doc.sketch;
  if (!sketch) return;
  const profile = sketch.entities.find(e => e.type === 'polyline' && !e.construction && e.points?.length >= 2);
  if (!profile) {
    showHint('Draw a polyline profile first — a series of connected lines on one side of the sketch\'s Y axis.');
    return;
  }
  // Validate: all profile points should have x >= 0 (revolve axis is sketch X = 0)
  const minX = Math.min(...profile.points.map(p => p.x));
  if (minX < -0.5) {
    showHint('Profile must lie to the right of the Y axis (sketch x ≥ 0). The Y axis is the revolution axis.');
    return;
  }
  openModal({
    title: 'Revolve profile',
    body: `<p>Spin the polyline around the sketch's vertical (Y) axis to make a body.</p>
           <p style="color:var(--ink-muted);font-size:12px">Tip: works best on a <b>Front</b> or <b>Right</b> reference plane sketch so the body stands up in 3D.</p>
           <div class="field"><label>Smoothness</label><input id="rv-segs" type="number" value="48" min="6" max="128" step="1"/></div>`,
    onConfirm: () => {
      const segs = parseInt($('rv-segs').value, 10) || 48;
      pushUndo();
      const sketchCopy = JSON.parse(JSON.stringify(sketch));
      sketchCopy.entities = sketchCopy.entities.filter(e => !e.construction);
      const body = {
        id: doc.nextBodyId++, type: 'revolve',
        sketch: sketchCopy,
        plane: JSON.parse(JSON.stringify(sketch.plane)),
        segments: segs,
        x: 0, y: 0, z: 0,
        op: 'add',
      };
      doc.bodies.push(body);
      doc.selection = { kind: 'body', id: body.id };
      doc.multiSelectedBodies = [body.id];
      setMode('3d');
      renderTree(); renderProps();
      setStatus('Revolved profile into a body');
    },
  });
}

// Align selected bodies along an axis: 'x'|'y'|'z' + 'min'|'mid'|'max'
function alignBodies(spec) {
  if (!doc.multiSelectedBodies?.length || doc.multiSelectedBodies.length < 2) {
    showHint('Shift-click 2+ bodies first, then align.');
    return;
  }
  const [axis, kind] = spec.split('-');
  const ids = [...doc.multiSelectedBodies];
  const meshes = ids.map(id => doc.bodies.find(b => b.id === id)?.mesh).filter(Boolean);
  if (meshes.length < 2) return;
  viewer.scene.updateMatrixWorld(true);
  // Compute bounding boxes for each
  const boxes = meshes.map(m => new THREE.Box3().setFromObject(m));
  // Determine the target value
  let target;
  if (kind === 'min') target = Math.min(...boxes.map(b => b.min[axis]));
  else if (kind === 'max') target = Math.max(...boxes.map(b => b.max[axis]));
  else target = (Math.min(...boxes.map(b => b.min[axis])) + Math.max(...boxes.map(b => b.max[axis]))) / 2;
  // Adjust each body's position so its bbox aligns
  for (let i = 0; i < ids.length; i++) {
    const id = ids[i];
    const body = doc.bodies.find(b => b.id === id);
    if (!body) continue;
    const box = boxes[i];
    let curRef;
    if (kind === 'min') curRef = box.min[axis];
    else if (kind === 'max') curRef = box.max[axis];
    else curRef = (box.min[axis] + box.max[axis]) / 2;
    const delta = target - curRef;
    body[axis] = (body[axis] || 0) + delta;
  }
  viewer.rebuildBodies();
  viewer.updateGizmo();
  renderProps();
  setStatus(`Aligned ${ids.length} bodies — ${spec.replace('-', ' ')}`);
}

function groupSelected(skipUndo) {
  if (doc.mode === '3d') {
    // 3D Group = boolean: positives unioned, negatives subtracted.
    // Children are stored on the group so Ungroup is reversible.
    if (typeof CSG === 'undefined') { showHint('CSG library failed to load.'); return; }
    if (!doc.multiSelectedBodies || doc.multiSelectedBodies.length < 2) {
      showHint('Shift-click 2+ bodies first, then group.');
      return;
    }
    if (!skipUndo) pushUndo();
    const ids = [...doc.multiSelectedBodies];
    const bodies = ids.map(id => doc.bodies.find(b => b.id === id)).filter(Boolean);
    const positives = bodies.filter(b => b.op !== 'subtract');
    const negatives = bodies.filter(b => b.op === 'subtract');
    if (!positives.length) { showHint('Group needs at least one positive body.'); return; }

    setStatus('Grouping…');
    let geometry;
    try {
      viewer.scene.updateMatrixWorld(true);
      // Fasteners use a simplified smooth-cylinder envelope for CSG (their
      // visual mesh has the threaded helix which is non-manifold and confuses
      // the boolean engine). Other body types use their real mesh directly.
      let result = getCSGMesh(positives[0]);
      for (let i = 1; i < positives.length; i++) result = CSG.union(result, getCSGMesh(positives[i]));
      for (const n of negatives) result = CSG.subtract(result, getCSGMesh(n));
      result.updateMatrixWorld(true);
      geometry = result.geometry.clone();
      geometry.applyMatrix4(result.matrixWorld);
      geometry.computeVertexNormals();
    } catch (err) {
      console.error('Group CSG failed:', err);
      showHint('Group failed — geometry too complex. Check console.');
      return;
    }

    // Save children as deep copies so Ungroup can fully restore them.
    // Plain JSON.stringify can't round-trip a THREE.BufferGeometry (its
    // TypedArrays don't survive), so a nested group's geometry becomes
    // garbage and the next bbox / rebuild crashes. Deep-clone the JSON-safe
    // fields normally; pass the BufferGeometry through by reference (the
    // original mesh is being deleted from doc.bodies, so there's no aliasing
    // concern). snapshotDoc / save will serialize it properly later.
    const cloneChild = (b) => {
      const c = {};
      for (const k of Object.keys(b)) {
        if (k === 'mesh') continue;
        if (k === 'geometry') { c.geometry = b.geometry; continue; }
        if (k === 'children' && Array.isArray(b.children)) {
          c.children = b.children.map(cloneChild);
          continue;
        }
        try { c[k] = JSON.parse(JSON.stringify(b[k])); } catch (_) {}
      }
      return c;
    };
    const children = bodies.map(cloneChild);
    const group = {
      id: doc.nextBodyId++, type: 'group',
      children, geometry,
      op: 'add', x: 0, y: 0, z: 0,
    };
    // Forward any thread-shell metadata from the consumed positives onto
    // the new wrapper so successive thread cuts / bevels don't strand
    // earlier shells deep in the child tree where the rebuild path
    // couldn't see them.
    const mergedShells = [];
    for (const src of positives) {
      if (Array.isArray(src._mergedShells)) {
        for (const s of src._mergedShells) mergedShells.push({ ...s, rotation: { ...s.rotation } });
      }
    }
    if (mergedShells.length) group._mergedShells = mergedShells;
    doc.bodies = doc.bodies.filter(b => !ids.includes(b.id));
    doc.bodies.push(group);
    // Re-point every sketch that was anchored to one of the consumed bodies
    // at the new group. Without this, only the sketch that triggered the
    // group (the one auto-grouped right after its extrude) gets updated —
    // any OTHER sketches you started on the same face / cube still point at
    // the now-deleted body id, so the next extrude can't find its parent,
    // the "Through" button stays hidden, and auto-group never fires again.
    const consumed = new Set(ids);
    for (const sk of doc.sketches) {
      if (sk.sourceBodyId != null && consumed.has(sk.sourceBodyId)) {
        sk.sourceBodyId = group.id;
      }
    }
    doc.selection = { kind: 'body', id: group.id };
    doc.multiSelectedBodies = [group.id];
    viewer.rebuildBodies();
    renderTree(); renderProps();
    setStatus(`Grouped ${children.length} bodies — ungroup to restore`);
    return;
  }
  // 2D sketch group
  if (!doc.multiSelectedSketch || doc.multiSelectedSketch.length < 2) {
    showHint('Pick 2+ shapes first — Shift-click adds shapes to the selection.');
    return;
  }
  const selectedEnts = doc.multiSelectedSketch
    .map(id => doc.sketch.entities.find(e => e.id === id))
    .filter(Boolean);
  // If all selections are open polylines that chain end-to-end, MERGE them
  // into a single polyline (closed if the chain forms a loop). Otherwise
  // fall back to the legacy groupId-tagging behavior.
  const merged = tryMergeChainedPolylines(selectedEnts);
  if (merged) {
    if (!skipUndo) pushUndo();
    const ids = new Set(doc.multiSelectedSketch);
    doc.sketch.entities = doc.sketch.entities.filter(e => !ids.has(e.id));
    const newEnt = {
      id: doc.sketch.nextId++,
      type: 'polyline',
      points: merged.points,
      closed: merged.closed,
    };
    doc.sketch.entities.push(newEnt);
    doc.selection = { kind: 'sketch', id: newEnt.id };
    doc.multiSelectedSketch = [newEnt.id];
    sketchEng.render();
    renderProps();
    setStatus(`Merged ${selectedEnts.length} shapes into one polyline${merged.closed ? ' (closed)' : ''}`);
    return;
  }
  const newGroupId = 'g' + Date.now() + '_' + Math.floor(Math.random() * 1000);
  for (const id of doc.multiSelectedSketch) {
    const ent = doc.sketch.entities.find(e => e.id === id);
    if (ent) ent.groupId = newGroupId;
  }
  sketchEng.render();
  setStatus(`Grouped ${doc.multiSelectedSketch.length} shapes (not chainable; kept as group)`);
}

// Attempt to merge a set of polylines into one by walking endpoint-to-endpoint.
// Returns { points, closed } on success, null on failure (entities aren't
// all polylines, or they don't form a single chain).
function tryMergeChainedPolylines(entities) {
  if (entities.length < 2) return null;
  if (!entities.every(e => e && e.type === 'polyline' && Array.isArray(e.points) && e.points.length >= 2)) return null;
  // Treat each polyline as a directional chain start→end. Use a small
  // tolerance so chains snapped by hand still join.
  const TOL = 0.05;
  const eq = (a, b) => Math.abs(a.x - b.x) < TOL && Math.abs(a.y - b.y) < TOL;
  // Index endpoints: for each entity store [startPt, endPt, points[]].
  const segs = entities.map(e => ({
    id: e.id,
    start: e.points[0],
    end: e.points[e.points.length - 1],
    points: e.points,
    used: false,
  }));
  // Find a starting segment with an "open" end (an endpoint that doesn't
  // match any other segment's endpoint). If every endpoint has a partner,
  // the chain is a closed loop — start anywhere.
  const endpointMatches = (pt, exceptId) => segs.some(s => s.id !== exceptId && (eq(s.start, pt) || eq(s.end, pt)));
  let startSeg = null;
  let reverseStart = false;
  for (const s of segs) {
    if (!endpointMatches(s.start, s.id)) { startSeg = s; reverseStart = false; break; }
    if (!endpointMatches(s.end, s.id))   { startSeg = s; reverseStart = true;  break; }
  }
  let closed = false;
  if (!startSeg) { startSeg = segs[0]; reverseStart = false; closed = true; }
  // Walk: append points, find a segment whose start or end matches the
  // current tail. Reverse the segment's points if needed.
  const out = reverseStart ? [...startSeg.points].reverse() : [...startSeg.points];
  startSeg.used = true;
  let tail = out[out.length - 1];
  let safety = segs.length + 2;
  while (safety-- > 0) {
    const remaining = segs.filter(s => !s.used);
    if (remaining.length === 0) break;
    const next = remaining.find(s => eq(s.start, tail) || eq(s.end, tail));
    if (!next) return null; // chain broke
    const pts = eq(next.start, tail) ? next.points.slice(1) : [...next.points].reverse().slice(1);
    out.push(...pts);
    tail = out[out.length - 1];
    next.used = true;
  }
  if (segs.some(s => !s.used)) return null; // unused segments — not one chain
  // If closed loop: the last point should equal the first; drop the duplicate.
  if (eq(out[0], out[out.length - 1])) { out.pop(); closed = true; }
  return { points: out, closed };
}
function ungroupSelected() {
  if (doc.mode === '3d') {
    // Restore the children of any selected group bodies (reverses the boolean)
    if (!doc.multiSelectedBodies?.length) { showHint('Select a group first.'); return; }
    pushUndo();
    const ids = [...doc.multiSelectedBodies];
    const newSelection = [];
    let count = 0;
    for (const id of ids) {
      const group = doc.bodies.find(b => b.id === id);
      if (!group || group.type !== 'group') continue;
      // Restore each child with a fresh ID; apply the group's translation
      // offset. Mirror the cloneChild logic from groupSelected: deep-clone
      // JSON-safe fields, but pass any BufferGeometry through by reference
      // so a nested group's geometry isn't mangled by JSON.stringify.
      const cloneRestored = (b) => {
        const c = {};
        for (const k of Object.keys(b)) {
          if (k === 'mesh') continue;
          if (k === 'geometry') { c.geometry = b.geometry; continue; }
          if (k === 'children' && Array.isArray(b.children)) {
            c.children = b.children.map(cloneRestored);
            continue;
          }
          try { c[k] = JSON.parse(JSON.stringify(b[k])); } catch (_) {}
        }
        return c;
      };
      for (const child of group.children) {
        const restored = cloneRestored(child);
        // If the child geometry came back from a save / undo as a plain
        // serialized object, hydrate it into a real BufferGeometry.
        if (restored.geometry && !(restored.geometry instanceof THREE.BufferGeometry) && restored._geomSerialized) {
          restored.geometry = _deserializeGeometry(restored.geometry);
          delete restored._geomSerialized;
        }
        // Saves dropped nested-group geometries to keep file size sane —
        // rebuild on demand here via CSG of THIS child's own children.
        // Primitive children rebuild from params in buildBodyMesh and
        // never need this branch.
        if ((restored.type === 'group' || restored.type === 'combined')
            && !(restored.geometry instanceof THREE.BufferGeometry)) {
          _ensureGroupGeometry(restored);
        }
        restored.id = doc.nextBodyId++;
        restored.x = (restored.x || 0) + (group.x || 0);
        restored.y = (restored.y || 0) + (group.y || 0);
        restored.z = (restored.z || 0) + (group.z || 0);
        delete restored.mesh;
        doc.bodies.push(restored);
        newSelection.push(restored.id);
      }
      doc.bodies = doc.bodies.filter(b => b.id !== id);
      count++;
    }
    if (count === 0) { showHint('Selection contains no groups.'); return; }
    doc.multiSelectedBodies = newSelection;
    doc.selection = newSelection.length ? { kind: 'body', id: newSelection[0] } : null;
    viewer.rebuildBodies();
    renderTree(); renderProps();
    setStatus(`Ungrouped ${count} group${count > 1 ? 's' : ''} — ${newSelection.length} bodies restored`);
    return;
  }
  if (!doc.multiSelectedSketch?.length) {
    showHint('Select a grouped shape first.');
    return;
  }
  const removedGroups = new Set();
  for (const id of doc.multiSelectedSketch) {
    const ent = doc.sketch.entities.find(e => e.id === id);
    if (ent && ent.groupId != null) {
      removedGroups.add(ent.groupId);
      ent.groupId = null;
    }
  }
  for (const ent of doc.sketch.entities) {
    if (ent.groupId != null && removedGroups.has(ent.groupId)) ent.groupId = null;
  }
  sketchEng.render();
  setStatus(`Ungrouped ${removedGroups.size || 0} group${removedGroups.size === 1 ? '' : 's'}`);
}

// Mirror selected 3D body across an axis plane (XY / YZ / XZ)
function mirror3DBody(planeKind) {
  if (!doc.selection || doc.selection.kind !== 'body') {
    showHint('Select a 3D body first.');
    return;
  }
  const body = doc.bodies.find(b => b.id === doc.selection.id);
  if (!body) return;
  pushUndo();
  const copy = JSON.parse(JSON.stringify(body));
  delete copy.mesh;
  copy.id = doc.nextBodyId++;
  // Flip the appropriate position component
  if (planeKind === 'yz') copy.x = -(body.x || 0);
  else if (planeKind === 'xz') copy.y = -(body.y || 0);
  else if (planeKind === 'xy') copy.z = -(body.z || 0);
  // For extrudes with a plane, also mirror the plane
  if (copy.type === 'extrude' && copy.plane) {
    const flipKey = planeKind === 'yz' ? 0 : planeKind === 'xz' ? 1 : 2;
    copy.plane.origin[flipKey] = -copy.plane.origin[flipKey];
    copy.plane.u[flipKey] = -copy.plane.u[flipKey];
    copy.plane.v[flipKey] = -copy.plane.v[flipKey];
    copy.plane.n[flipKey] = -copy.plane.n[flipKey];
  }
  // Tag the mirrored copy so buildBodyMesh can render it with DoubleSide.
  // Mirroring inverts triangle winding, and rather than re-flipping indices
  // (which had per-triangle edge cases producing visible holes), we just
  // render both sides. Robust and visually identical for opaque solids.
  copy.mirrored = !body.mirrored; // toggling supports mirror-of-mirror
  doc.bodies.push(copy);
  doc.selection = { kind: 'body', id: copy.id };
  viewer?.rebuildBodies();
  renderTree(); renderProps();
  setStatus(`Mirrored across ${planeKind.toUpperCase()} plane`);
}

// Interactive mirror picker — instead of a modal, three translucent reference
// planes (YZ red, XZ green, XY blue) appear in the 3D scene around the

function startMirrorPick() {

function combineBodies() {
  if (typeof CSG === 'undefined') {
    showHint('CSG library failed to load — keep csg.bundle.js next to mini-cad.html.');
    return;
  }
  if (!doc.bodies.length) { showHint('No bodies to combine.'); return; }
  const positives = doc.bodies.filter(b => b.op !== 'subtract');
  const negatives = doc.bodies.filter(b => b.op === 'subtract');
  if (!positives.length) { showHint('Need at least one positive solid.'); return; }
  if (positives.length === 1 && !negatives.length) { showHint('Only one positive — nothing to combine.'); return; }
  setStatus('Computing combine…');
  try {
    viewer.scene.updateMatrixWorld(true);
    let result = getCSGMesh(positives[0]);
    for (let i = 1; i < positives.length; i++) result = CSG.union(result, getCSGMesh(positives[i]));
    for (const n of negatives) result = CSG.subtract(result, getCSGMesh(n));
    // Bake world transform into geometry so position/rotation are absorbed
    result.updateMatrixWorld(true);
    const baked = result.geometry.clone();
    baked.applyMatrix4(result.matrixWorld);
    baked.computeVertexNormals();
    const combined = {
      id: doc.nextBodyId++, type: 'combined',
      geometry: baked, op: 'add',
      x: 0, y: 0, z: 0,
    };
    doc.bodies = [combined];
    doc.selection = { kind: 'body', id: combined.id };
    viewer.rebuildBodies();
    renderTree(); renderProps();
    setStatus(`Combined ${positives.length} positive${positives.length>1?'s':''}${negatives.length?` − ${negatives.length} negative${negatives.length>1?'s':''}`:''}`);
  } catch (err) {
    console.error('Combine failed:', err);
    showHint('Combine failed — geometry may be too complex. Check console.');
  }
}

// Boolean Cut (⊖) — interactive: click target body, then click tool body.
// The tool is subtracted from the target; both inputs are consumed and replaced
// by a single 'combined' body. Op flags (positive/negative) are ignored — the
// cut direction is explicit from the pick order.
function startBooleanCut() {
  if (typeof CSG === 'undefined') { showHint('CSG library failed to load.'); return; }
  if (doc.bodies.length < 2) { showHint('Need at least two bodies. Add another, then try Cut.'); return; }
  if (doc.mode !== '3d') setMode('3d');
  doc.cutMode = { stage: 'target', targetId: null };
  if (viewer) viewer.canvas.style.cursor = 'crosshair';
  document.querySelectorAll('[data-action="boolean-cut"]').forEach(b => b.classList.add('active'));
  setStatus('Cut — click the TARGET body (what to keep). Esc to cancel.');
}
function exitBooleanCut(msg) {
  doc.cutMode = null;
  if (viewer) viewer.canvas.style.cursor = '';
  document.querySelectorAll('[data-action="boolean-cut"]').forEach(b => b.classList.remove('active'));
  if (msg) setStatus(msg);
}
function performBooleanCut(targetId, toolId) {
  const target = doc.bodies.find(b => b.id === targetId);
  const tool = doc.bodies.find(b => b.id === toolId);
  if (!target || !tool) { exitBooleanCut('Cut cancelled — body missing.'); return; }
  pushUndo();
  setStatus('Computing cut…');
  try {
    viewer.scene.updateMatrixWorld(true);
    const result = CSG.subtract(getCSGMesh(target), getCSGMesh(tool));
    result.updateMatrixWorld(true);
    const baked = result.geometry.clone();
    baked.applyMatrix4(result.matrixWorld);
    baked.computeVertexNormals();
    // Store target + tool as children of a group body so the sketch-overlay
    // projection (which walks children and draws cuts as red dashed lines)
    // can render the cut features cleanly. Mark the tool as 'subtract' so
    // it's drawn as a cut, regardless of its original op flag. Ungroup
    // restores both originals.
    const targetCopy = JSON.parse(JSON.stringify(target));
    delete targetCopy.mesh;
    targetCopy.op = 'add';
    const toolCopy = JSON.parse(JSON.stringify(tool));
    delete toolCopy.mesh;
    toolCopy.op = 'subtract';
    const cutBody = {
      id: doc.nextBodyId++, type: 'group',
      children: [targetCopy, toolCopy],
      geometry: baked, op: 'add',
      x: 0, y: 0, z: 0,
    };
    doc.bodies = doc.bodies.filter(b => b.id !== targetId && b.id !== toolId);
    doc.bodies.push(cutBody);
    doc.selection = { kind: 'body', id: cutBody.id };
    doc.multiSelectedBodies = [cutBody.id];
    viewer.rebuildBodies();
    renderTree(); renderProps();
    exitBooleanCut('Cut complete — Ungroup (Ctrl+Shift+G) to restore both bodies');
  } catch (err) {
    console.error('Cut failed:', err);
    showHint('Cut failed — geometry too complex or non-manifold. Check console.');
    exitBooleanCut('Cut cancelled');
  }
}

// ─── Joints (articulation) — Phase 1: definition only ─────────────────────
// 3-click flow: click body A, click body B, click near an edge on either
// picked body. The edge defines the hinge axis (direction) and origin
// (segment midpoint). Phase 2 will read these to drive forward kinematics.
function startJointCreation() {
  if (doc.bodies.length < 2) {
    showHint('Need at least two bodies. Add another, then try Joint.');
    return;
  }
  if (doc.mode !== '3d') setMode('3d');
  // Cancel any conflicting modal pick states
  if (doc.cutMode) exitBooleanCut();
  if (doc.mirrorMode) exitMirrorPick();
  if (doc.alignMode) exitAlignMode();
  if (doc.faceMode) { doc.faceMode = false; if (viewer) viewer.canvas.style.cursor = ''; }
  doc.jointPickStage = 'bodyA';
  doc.jointDraft = { bodyA: null, bodyB: null };
  if (viewer) viewer.canvas.style.cursor = 'crosshair';
  document.querySelectorAll('[data-action="joint"]').forEach(b => b.classList.add('active'));
  setStatus('Joint — click the first body (A). Esc to cancel.');
}
function exitJointCreation(msg) {
  doc.jointPickStage = null;
  doc.jointDraft = null;
  if (viewer) viewer.canvas.style.cursor = '';
  document.querySelectorAll('[data-action="joint"]').forEach(b => b.classList.remove('active'));
  if (msg) setStatus(msg);
}

// Find the body edge closest to the picking ray. Returns
// { d, origin, axis, length } in world coords, or null. Reuses the same 25°
// angle threshold + 0.25mm min-length filter that the sketch silhouette uses
// so CSG tessellation artifacts don't get picked.
function findClosestBodyEdge(body, ray) {
  if (!body?.mesh?.geometry) return null;
  let best = null;
  try {
    const edges = new THREE.EdgesGeometry(body.mesh.geometry, 25);
    const pos = edges.attributes?.position;
    if (!pos) { edges.dispose(); return null; }
    const mw = body.mesh.matrixWorld;
    const a = new THREE.Vector3(), b = new THREE.Vector3();
    const ptRay = new THREE.Vector3(), ptSeg = new THREE.Vector3();
    for (let i = 0; i < pos.count; i += 2) {
      a.fromBufferAttribute(pos, i).applyMatrix4(mw);
      b.fromBufferAttribute(pos, i + 1).applyMatrix4(mw);
      const len = a.distanceTo(b);
      if (len < 0.25) continue;
      const distSq = ray.distanceSqToSegment(a, b, ptRay, ptSeg);
      if (!best || distSq < best.distSq) {
        best = {
          distSq, d: Math.sqrt(distSq), length: len,
          origin: ptSeg.clone(),
          axis: b.clone().sub(a).normalize(),
        };
      }
    }
    edges.dispose();
  } catch (_) { return null; }
  return best;
}

function commitJointAxis(edgePick) {
  if (!doc.jointDraft) return;
  const { bodyA, bodyB } = doc.jointDraft;
  pushUndo();
  const j = {
    id: doc.nextJointId++,
    bodyA, bodyB,
    origin: [edgePick.origin.x, edgePick.origin.y, edgePick.origin.z],
    axis: [edgePick.axis.x, edgePick.axis.y, edgePick.axis.z],
    angle: 0,
  };
  doc.joints.push(j);
  exitJointCreation(`Joint ${j.id} created (bodies ${bodyA} ↔ ${bodyB}).`);
  // Clear the body selection picked during the flow so the panel pops to the
  // Joints list (renderProps's no-selection 3D branch).
  doc.selection = null;
  doc.multiSelectedBodies = [];
  if (viewer) { viewer.updateJointGizmos(); viewer.updateGizmo(); }
  renderTree(); renderProps();
  setDirty(true);
}

function deleteJoint(jointId) {
  const before = doc.joints.length;
  pushUndo();
  doc.joints = doc.joints.filter(j => j.id !== jointId);
  if (doc.joints.length !== before) {
    if (viewer) viewer.updateJointGizmos();
    renderProps();
    setDirty(true);
    setStatus(`Joint ${jointId} deleted.`);
  }
}

// Drop any joints whose bodies no longer exist. Called from rebuildBodies so
// every code path that removes bodies (cut, group, delete, undo) gets covered.
function pruneOrphanJoints() {
  if (!doc.joints?.length) return;
  const ids = new Set(doc.bodies.map(b => b.id));
  const before = doc.joints.length;
  doc.joints = doc.joints.filter(j => ids.has(j.bodyA) && ids.has(j.bodyB));
  if (doc.joints.length !== before && viewer) viewer.updateJointGizmos();
}

function copySelection() {
  let items = [];
  let kind = null;
  if (doc.mode === '2d') {
    const ids = (doc.multiSelectedSketch?.length ? doc.multiSelectedSketch :
                (doc.selection?.kind === 'sketch' ? [doc.selection.id] : []));
    items = ids.map(id => doc.sketch.entities.find(e => e.id === id))
               .filter(Boolean)
               .map(e => JSON.parse(JSON.stringify(e)));
    kind = 'sketch';
  } else {
    const ids = (doc.multiSelectedBodies?.length ? doc.multiSelectedBodies :
                (doc.selection?.kind === 'body' ? [doc.selection.id] : []));
    // Same caveat as duplicateSelection: group bodies carry a live
    // BufferGeometry that doesn't survive JSON.stringify.
    const cloneForClipboard = (b) => {
      const c = {};
      for (const k of Object.keys(b)) {
        if (k === 'mesh') continue;
        if (k === 'geometry') { c.geometry = b.geometry ? b.geometry.clone() : null; continue; }
        if (k === 'children' && Array.isArray(b.children)) {
          c.children = b.children.map(cloneForClipboard);
          continue;
        }
        try { c[k] = JSON.parse(JSON.stringify(b[k])); } catch (_) {}
      }
      return c;
    };
    items = ids.map(id => doc.bodies.find(b => b.id === id))
               .filter(Boolean)
               .map(cloneForClipboard);
    kind = 'body';
  }
  if (!items.length) { showHint('Nothing selected to copy.'); return; }
  doc.clipboard = { kind, items };
  setStatus(`Copied ${items.length} item${items.length === 1 ? '' : 's'}`);
}

// Duplicate-in-place: clone whatever's selected, push the clones into the
// same sketch / body list with no positional offset, then re-select the
// clones. The originals stay put underneath; the user drags the new copies
// off if they want them somewhere else. Skips the clipboard so a real
// Ctrl+C selection isn't overwritten.
// Global construction-line visibility toggle. Construction entities stay in
// the sketch data — only their rendering + click hit-test are suppressed.

  doc.hideConstruction = !doc.hideConstruction;
  const btn = document.getElementById('toggle-construction-vis');
  if (btn) {
    btn.classList.toggle('active', !doc.hideConstruction);
    const label = btn.querySelector('.tool-label');
    if (label) label.textContent = doc.hideConstruction ? 'Hidden' : 'Show';
    btn.title = doc.hideConstruction
      ? 'Construction lines are HIDDEN — click to show them again'
      : 'Click to hide all construction lines (visibility only — they stay in the sketch)';
  }
  if (sketchEng) sketchEng.render();
  if (viewer) viewer.updateSketchOverlay();
  setStatus(doc.hideConstruction ? 'Construction lines hidden' : 'Construction lines shown');
}

function duplicateSelection() {
  if (doc.mode === '2d') {
    const ids = (doc.multiSelectedSketch?.length ? doc.multiSelectedSketch :
                (doc.selection?.kind === 'sketch' ? [doc.selection.id] : []));
    const sources = ids.map(id => doc.sketch.entities.find(e => e.id === id)).filter(Boolean);
    if (!sources.length) { showHint('Nothing selected to duplicate.'); return; }
    pushUndo();
    const newIds = [];
    for (const src of sources) {
      const ent = JSON.parse(JSON.stringify(src));
      ent.id = doc.sketch.nextId++;
      doc.sketch.entities.push(ent);
      newIds.push(ent.id);
    }
    doc.multiSelectedSketch = newIds;
    doc.selection = { kind: 'sketch', id: newIds[newIds.length - 1] };
    sketchEng.render(); renderTree(); renderProps();
    setStatus(`Duplicated ${newIds.length} shape${newIds.length === 1 ? '' : 's'} in place`);
  } else {
    const ids = (doc.multiSelectedBodies?.length ? doc.multiSelectedBodies :
                (doc.selection?.kind === 'body' ? [doc.selection.id] : []));
    const sources = ids.map(id => doc.bodies.find(b => b.id === id)).filter(Boolean);
    if (!sources.length) { showHint('Nothing selected to duplicate.'); return; }
    pushUndo();
    // Deep-clone the JSON-safe fields, but pass BufferGeometry through by
    // clone (NOT JSON-round-trip — TypedArrays don't survive). Both groups
    // and their nested-group children carry .geometry as a BufferGeometry
    // and would otherwise come out malformed.
    const cloneBody = (b) => {
      const c = {};
      for (const k of Object.keys(b)) {
        if (k === 'mesh') continue;
        if (k === 'geometry') { c.geometry = b.geometry ? b.geometry.clone() : null; continue; }
        if (k === 'children' && Array.isArray(b.children)) {
          c.children = b.children.map(cloneBody);
          continue;
        }
        try { c[k] = JSON.parse(JSON.stringify(b[k])); } catch (_) {}
      }
      return c;
    };
    const newIds = [];
    for (const src of sources) {
      const body = cloneBody(src);
      body.id = doc.nextBodyId++;
      doc.bodies.push(body);
      newIds.push(body.id);
    }
    doc.multiSelectedBodies = newIds;
    doc.selection = { kind: 'body', id: newIds[newIds.length - 1] };
    if (viewer) viewer.rebuildBodies();
    renderTree(); renderProps();
    setStatus(`Duplicated ${newIds.length} bod${newIds.length === 1 ? 'y' : 'ies'} in place`);
  }
}

function pasteSelection() {
  if (!doc.clipboard?.items?.length) { showHint('Clipboard is empty. Copy something first.'); return; }
  pushUndo();
  const newIds = [];
  if (doc.clipboard.kind === 'sketch') {
    for (const item of doc.clipboard.items) {
      const ent = JSON.parse(JSON.stringify(item));
      ent.id = doc.sketch.nextId++;
      if (ent.type === 'rect') { ent.x += 5; ent.y += 5; }
      else if (ent.type === 'circle') { ent.cx += 5; ent.cy += 5; }
      else if (ent.type === 'polyline') ent.points = ent.points.map(p => ({ x: p.x + 5, y: p.y + 5 }));
      doc.sketch.entities.push(ent);
      newIds.push(ent.id);
    }
    doc.multiSelectedSketch = newIds;
    doc.selection = { kind: 'sketch', id: newIds[newIds.length - 1] };
    sketchEng.render();
  } else if (doc.clipboard.kind === 'body') {
    // Same BufferGeometry-safe deep clone used by copy + duplicate.
    const cloneForPaste = (b) => {
      const c = {};
      for (const k of Object.keys(b)) {
        if (k === 'mesh') continue;
        if (k === 'geometry') { c.geometry = b.geometry ? b.geometry.clone() : null; continue; }
        if (k === 'children' && Array.isArray(b.children)) {
          c.children = b.children.map(cloneForPaste);
          continue;
        }
        try { c[k] = JSON.parse(JSON.stringify(b[k])); } catch (_) {}
      }
      return c;
    };
    for (const item of doc.clipboard.items) {
      const body = cloneForPaste(item);
      body.id = doc.nextBodyId++;
      body.x = (body.x || 0) + 10;
      body.z = (body.z || 0) + 10;
      doc.bodies.push(body);
      newIds.push(body.id);
    }
    doc.multiSelectedBodies = newIds;
    doc.selection = { kind: 'body', id: newIds[newIds.length - 1] };
    if (viewer) viewer.rebuildBodies();
  }
  renderTree(); renderProps();
  setStatus(`Pasted ${newIds.length} item${newIds.length === 1 ? '' : 's'}`);
}

function mirror2D(axis) {
  if (!doc.selection || doc.selection.kind !== 'sketch') {
    showHint('Select a 2D shape first, then mirror.');
    return;
  }
  const ent = doc.sketch.entities.find(e => e.id === doc.selection.id);
  if (!ent) return;
  pushUndo();
  const m = mirrorEntity(ent, axis);
  doc.sketch.entities.push(m);
  doc.selection = { kind: 'sketch', id: m.id };
  sketchEng.render(); renderTree(); renderProps();
  setStatus(`Mirrored across ${axis.toUpperCase()} axis`);
}

// Break a Rect / closed polyline / open multi-segment polyline into one
// single-segment polyline per edge. Returns the array of new entities,
// or null if the entity isn't "explodable" (single straight lines and
// circles are left alone — circles aren't a finite set of edges).
function explodeEntityToSegments(ent) {
  const out = [];
  const mk = (a, b) => ({
    id: doc.sketch.nextId++,
    type: 'polyline',
    closed: false,
    construction: !!ent.construction,
    groupId: ent.groupId,
    points: [{ x: a.x, y: a.y }, { x: b.x, y: b.y }],
  });
  if (ent.type === 'rect' && ent.w > 0 && ent.h > 0) {
    const c = [
      { x: ent.x,         y: ent.y },
      { x: ent.x + ent.w, y: ent.y },
      { x: ent.x + ent.w, y: ent.y + ent.h },
      { x: ent.x,         y: ent.y + ent.h },
    ];
    for (let i = 0; i < 4; i++) out.push(mk(c[i], c[(i + 1) % 4]));
    return out;
  }
  if (ent.type === 'polyline' && ent.points && ent.points.length >= 2) {
    // Skip a single straight line — it's already one segment.
    if (!ent.closed && ent.points.length === 2) return null;
    const n = ent.points.length;
    const segCount = ent.closed ? n : n - 1;
    for (let i = 0; i < segCount; i++) {
      const a = ent.points[i], b = ent.points[(i + 1) % n];
      // Preserve curved segments (bezier handles) — emit a 2-point polyline
      // carrying the same cpOut/cpIn so the curve survives explosion.
      const np = mk(a, b);
      if (a.cpOut) np.points[0].cpOut = { ...a.cpOut };
      if (b.cpIn)  np.points[1].cpIn  = { ...b.cpIn };
      out.push(np);
    }
    return out;
  }
  return null;
}

function explodeSelected() {
  const ids = (doc.multiSelectedSketch?.length ? doc.multiSelectedSketch.slice()
              : (doc.selection?.kind === 'sketch' ? [doc.selection.id] : []));
  if (!ids.length) { showHint('Select a rectangle or closed polyline first, then click Explode.'); return; }
  const targets = ids.map(id => doc.sketch.entities.find(e => e.id === id)).filter(Boolean);
  const explodable = targets.filter(e => e.type === 'rect' || (e.type === 'polyline' && (e.closed || e.points.length > 2)));
  if (!explodable.length) {
    showHint('Nothing to explode — already a single line or a circle.');
    return;
  }
  pushUndo();
  const newIds = [];
  for (const ent of explodable) {
    const segs = explodeEntityToSegments(ent);
    if (!segs) continue;
    const idx = doc.sketch.entities.indexOf(ent);
    doc.sketch.entities.splice(idx, 1);
    for (const s of segs) {
      doc.sketch.entities.push(s);
      newIds.push(s.id);
    }
  }
  // Deselect after explode. If we left every new line selected, shift-click
  // would TOGGLE OFF (since everything's already in the selection) instead
  // of feeling like "add more lines" — confusing the user. Empty selection
  // lets them click whichever line(s) they actually want.
  doc.multiSelectedSketch = [];
  doc.selection = null;
  sketchEng.render(); renderTree(); renderProps();
  setStatus(`Exploded into ${newIds.length} line${newIds.length === 1 ? '' : 's'} — click any one, or shift-click to pick several`);
}

// Start the in-canvas mirror flow: user clicks two points to define an
// arbitrary axis line, the current selection is mirrored across that line,
// originals stay in place. Replaces the old X-or-Y modal — far more useful
// for asymmetric parts where the mirror axis isn't world-axis-aligned.
function openMirrorDialog() {
  const selIds = (doc.multiSelectedSketch?.length ? doc.multiSelectedSketch.slice() : null)
              ?? (doc.selection?.kind === 'sketch' ? [doc.selection.id] : null);
  if (!selIds || !selIds.length) {
    showHint('Select one or more 2D shapes first, then mirror.');
    return;
  }
  if (!sketchEng) return;
  sketchEng.setTool('select');
  sketchEng.mirrorAxis = { selIds, start: null };
  setStatus('Mirror: click the START of the mirror line, then click its END. Esc to cancel.');
  sketchEng.render();
}

function commitMirror2D(ax, ay, bx, by) {
  const eng = sketchEng;
  if (!eng?.mirrorAxis) return;
  const { selIds } = eng.mirrorAxis;
  const dx = bx - ax, dy = by - ay;
  if (dx * dx + dy * dy < 1e-6) {
    showHint('Mirror line is too short — click two distinct points.');
    return;
  }
  pushUndo();
  const newIds = [];
  for (const id of selIds) {
    const ent = doc.sketch.entities.find(e => e.id === id);
    if (!ent) continue;
    const m = mirrorEntityAcrossLine(ent, ax, ay, bx, by);
    if (m) { doc.sketch.entities.push(m); newIds.push(m.id); }
  }
  eng.mirrorAxis = null;
  if (newIds.length) {
    doc.multiSelectedSketch = newIds;
    doc.selection = { kind: 'sketch', id: newIds[newIds.length - 1] };
  }
  renderTree(); renderProps(); eng.render();
  setStatus(`Mirrored ${newIds.length} shape${newIds.length === 1 ? '' : 's'} across line`);
}

// ---------- 5. Properties panel ----------
function renderGridPanel() {
  const sel = $('grid-spacing');
  const snap = $('grid-snap');
  const sizeSel = $('grid-size');
  if (!sel || !snap || !sizeSel) return;

  const spacings = doc.units === 'in'
    ? [{ v: 25.4 / 16, l: '1/16 in' }, { v: 25.4 / 8, l: '1/8 in' }, { v: 25.4 / 4, l: '1/4 in' }, { v: 25.4 / 2, l: '1/2 in' }, { v: 25.4, l: '1 in' }]
    : [{ v: 1, l: '1 mm' }, { v: 2, l: '2 mm' }, { v: 5, l: '5 mm' }, { v: 10, l: '10 mm' }, { v: 25, l: '25 mm' }];
  sel.innerHTML = spacings.map(s =>
    `<option value="${s.v}"${Math.abs(s.v - doc.grid.spacing) < 0.001 ? ' selected' : ''}>${s.l}</option>`
  ).join('');

  const sizes = doc.units === 'in'
    ? [{ v: 4 * 25.4, l: '4 in' }, { v: 8 * 25.4, l: '8 in' }, { v: 12 * 25.4, l: '12 in' }, { v: 20 * 25.4, l: '20 in' }, { v: 40 * 25.4, l: '40 in' }]
    : [{ v: 100, l: '100 mm' }, { v: 200, l: '200 mm' }, { v: 300, l: '300 mm' }, { v: 500, l: '500 mm' }, { v: 1000, l: '1000 mm' }];
  // Make sure the current size is one of the options; if not, snap to nearest preset
  const closest = sizes.reduce((best, s) => Math.abs(s.v - doc.grid.size) < Math.abs(best.v - doc.grid.size) ? s : best, sizes[0]);
  if (Math.abs(closest.v - doc.grid.size) > 0.5) doc.grid.size = closest.v;
  sizeSel.innerHTML = sizes.map(s =>
    `<option value="${s.v}"${Math.abs(s.v - doc.grid.size) < 0.5 ? ' selected' : ''}>${s.l}</option>`
  ).join('');

  snap.checked = !!doc.grid.snap;

  // Re-bind via clone-replace to drop any previous handlers
  const newSel = sel.cloneNode(true);
  sel.parentNode.replaceChild(newSel, sel);
  newSel.addEventListener('change', (e) => {
    doc.grid.spacing = parseFloat(e.target.value);
    sketchEng?.render();
    if (viewer) viewer.rebuildWorkplane();
  });
  const newSnap = snap.cloneNode(true);
  snap.parentNode.replaceChild(newSnap, snap);
  newSnap.addEventListener('change', (e) => {
    doc.grid.snap = e.target.checked;
    setStatus(`Snap to grid: ${e.target.checked ? 'on' : 'off'}`);
  });
  const newSize = sizeSel.cloneNode(true);
  sizeSel.parentNode.replaceChild(newSize, sizeSel);
  newSize.addEventListener('change', (e) => {
    doc.grid.size = parseFloat(e.target.value);
    sketchEng?.render();
    if (viewer) viewer.rebuildWorkplane();
    setStatus(`Workplane: ${fmtUL(doc.grid.size)} square`);
  });
}

function renderTree() {
  const tree = $('tree');
  let html = '';
  // List all sketches — every sketch is deletable
  for (const sketch of doc.sketches) {
    const isActiveSketch = sketch.id === doc.activeSketchId;
    const inSketchMode = doc.mode === '2d' && isActiveSketch;
    const cls = inSketchMode ? 'active' : '';
    const eye = sketch.hidden ? '◌' : '◉';
    const eyeTitle = sketch.hidden ? 'Show sketch' : 'Hide sketch';
    const lock = sketch.locked ? '🔒' : '🔓';
    const lockTitle = sketch.locked ? 'Unlock sketch (currently read-only)' : 'Lock sketch (prevent edits)';
    const lockedCls = sketch.locked ? ' locked' : '';
    html += `<div class="tree-node ${cls}${lockedCls}" data-kind="sketch" data-id="${sketch.id}">
      <button class="tree-eye" data-action="toggle-sketch" data-id="${sketch.id}" title="${eyeTitle}">${eye}</button>
      <button class="tree-lock${sketch.locked ? ' locked' : ''}" data-action="toggle-lock-sketch" data-id="${sketch.id}" title="${lockTitle}">${lock}</button>
      <span class="ico">📐</span> <span class="tree-label" style="${sketch.hidden ? 'opacity:0.45' : ''}">${sketch.name}</span>
      <span class="tree-count">${sketch.entities.length}</span>
      <button class="tree-del" data-action="del-sketch" data-id="${sketch.id}" title="Delete sketch">×</button></div>`;
  }
  // List all bodies
  for (const body of doc.bodies) {
    const active = doc.multiSelectedBodies?.includes(body.id) ||
                   (doc.selection?.kind === 'body' && doc.selection.id === body.id);
    // User-set name (via double-click rename) wins over the computed type label.
    let label = body.type;
    if (body.name && body.name.trim()) {
      label = body.name;
    } else if (body.type === 'extrude') label = `Extrude (${fmtUL(body.height)})`;
    else if (body.type === 'cube') label = 'Cube';
    else if (body.type === 'sphere') label = 'Sphere';
    else if (body.type === 'cylinder') label = 'Cylinder';
    else if (body.type === 'cone') label = 'Cone';
    else if (body.type === 'torus') label = 'Torus';
    else if (body.type === 'pyramid') label = 'Pyramid';
    else if (body.type === 'hexagon') label = 'Hexagon';
    else if (body.type === 'pentagon') label = 'Pentagon';
    else if (body.type === 'octagon') label = 'Octagon';
    else if (body.type === 'star') label = 'Star';
    else if (body.type === 'heart') label = 'Heart';
    else if (body.type === 'teardrop') label = 'Teardrop';
    else if (body.type === 'combined') label = 'Combined';
    else if (body.type === 'group') label = `Group (${body.children?.length || 0})`;
    else if (body.type === 'revolve') label = 'Revolved';
    else if (body.type === 'fastener') {
      const spec = getFastenerSpec(body.size);
      label = `${spec.label} ${FASTENER_HEAD_LABELS[body.headType] || body.headType} (${fmtUL(body.length)})`;
    }
    else if (body.type === 'threadShell') {
      const spec = getFastenerSpec(body.size);
      label = `${spec ? spec.label : body.size} thread shell (${fmtUL(body.length)})`;
    }
    const ico = body.type === 'extrude' ? '⇪' :
                body.type === 'fastener' ? '🔩' :
                body.type === 'threadShell' ? '⌬' :
                body.type === 'revolve' ? '⟳' :
                body.type === 'sphere' ? '●' :
                body.type === 'cylinder' ? '⬭' :
                body.type === 'cone' ? '▲' :
                body.type === 'torus' ? '◯' :
                body.type === 'pyramid' ? '◭' :
                body.type === 'hexagon' ? '⬡' :
                body.type === 'pentagon' ? '⬠' :
                body.type === 'octagon' ? '⯃' :
                body.type === 'star' ? '★' :
                body.type === 'heart' ? '♥' :
                body.type === 'teardrop' ? '💧' :
                body.type === 'combined' ? '⊕' :
                body.type === 'group' ? '⊞' : '▣';
    const negTag = body.op === 'subtract' ? ' <span style="color:#e53e3e;font-size:10px">(neg)</span>' : '';
    const eye = body.hidden ? '◌' : '◉';
    const eyeTitle = body.hidden ? 'Show body' : 'Hide body';
    const lock = body.locked ? '🔒' : '🔓';
    const lockTitle = body.locked ? 'Unlock body (currently read-only)' : 'Lock body (prevent moves / resize / delete)';
    const lockedCls = body.locked ? ' locked' : '';
    html += `<div class="tree-node ${active ? 'active' : ''}${lockedCls}" data-kind="body" data-id="${body.id}">
      <button class="tree-eye" data-action="toggle-body" data-id="${body.id}" title="${eyeTitle}">${eye}</button>
      <button class="tree-lock${body.locked ? ' locked' : ''}" data-action="toggle-lock-body" data-id="${body.id}" title="${lockTitle}">${lock}</button>
      <span class="ico">${ico}</span> <span class="tree-label" style="${body.hidden ? 'opacity:0.45' : ''}">${label}${negTag}</span>
      <button class="tree-del" data-action="del-body" data-id="${body.id}" title="Delete body">×</button></div>`;
  }
  tree.innerHTML = html;
  // Per-node visibility toggles (eyeball)
  tree.querySelectorAll('.tree-eye').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      if (btn.dataset.action === 'toggle-sketch') {
        const s = doc.sketches.find(x => x.id === id);
        if (!s) return;
        s.hidden = !s.hidden;
        renderTree();
        if (sketchEng) sketchEng.render();
        if (viewer) { viewer.updateSketchOverlay(); viewer.updateRegions(); viewer.updateExtrudeGizmo(); }
      } else if (btn.dataset.action === 'toggle-body') {
        const b = doc.bodies.find(x => x.id === id);
        if (!b) return;
        b.hidden = !b.hidden;
        // If this is a thread-mark visualizer bolt, keep the source mark's
        // settings in sync so the configure dialog reflects what the user
        // sees in the scene.
        if (b._threadMarkRef) {
          const sk = doc.sketches.find(s => s.id === b._threadMarkRef.sketchId);
          const mk = sk?.entities?.find(e => e.id === b._threadMarkRef.markId);
          if (mk?._settings) mk._settings.placeBolt = !b.hidden;
        }
        renderTree();
        if (viewer) viewer.rebuildBodies();
      }
    });
  });
  // Per-node lock toggles — locked sketches/bodies can't be edited or deleted
  tree.querySelectorAll('.tree-lock').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id, 10);
      if (btn.dataset.action === 'toggle-lock-sketch') {
        const s = doc.sketches.find(x => x.id === id);
        if (!s) return;
        s.locked = !s.locked;
        renderTree();
        setStatus(s.locked ? `Sketch "${s.name}" locked` : `Sketch "${s.name}" unlocked`);
      } else if (btn.dataset.action === 'toggle-lock-body') {
        const b = doc.bodies.find(x => x.id === id);
        if (!b) return;
        b.locked = !b.locked;
        renderTree();
        if (viewer) viewer.updateGizmo();
        setStatus(b.locked ? `Body locked` : `Body unlocked`);
      }
    });
  });
  // Per-node delete buttons (sketches and bodies)
  tree.querySelectorAll('.tree-del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      if (btn.dataset.action === 'del-sketch') {
        if (doc.sketches.length <= 1) {
          showHint('At least one sketch is required — clear its shapes instead.');
          return;
        }
        const s = doc.sketches.find(x => x.id === id);
        if (!s) return;
        if (s.entities.length > 0 && !confirm(`Delete "${s.name}" and its ${s.entities.length} shape${s.entities.length === 1 ? '' : 's'}?`)) return;
        pushUndo();
        doc.sketches = doc.sketches.filter(x => x.id !== id);
        if (doc.activeSketchId === id) doc.activeSketchId = doc.sketches[0].id;
        // Drop any bodies that depended on this sketch (extrudes / revolves)
        doc.bodies = doc.bodies.filter(b => !((b.type === 'extrude' || b.type === 'revolve') && b.sketch && b.sketch.id === id));
        renderTree(); renderProps();
        if (sketchEng) sketchEng.render();
        if (viewer) { viewer.rebuildBodies(); viewer.updateSketchOverlay(); }
        setStatus(`Deleted sketch "${s.name}"`);
      } else if (btn.dataset.action === 'del-body') {
        const b = doc.bodies.find(x => x.id === id);
        if (!b) return;
        pushUndo();
        doc.bodies = doc.bodies.filter(x => x.id !== id);
        if (doc.selection?.kind === 'body' && doc.selection.id === id) doc.selection = null;
        doc.multiSelectedBodies = (doc.multiSelectedBodies || []).filter(x => x !== id);
        if (viewer) { viewer.rebuildBodies(); viewer.updateGizmo(); }
        renderTree(); renderProps();
        setStatus('Deleted body');
      }
    });
  });
  tree.querySelectorAll('.tree-node').forEach(n => {
    n.addEventListener('click', () => {
      if (n.dataset.kind === 'sketch') {
        doc.activeSketchId = parseInt(n.dataset.id);
        doc.selection = null;
        doc.multiSelectedSketch = [];
        setMode('2d');
      } else {
        const id = parseInt(n.dataset.id);
        const body = doc.bodies.find(b => b.id === id);
        doc.selection = { kind: 'body', id };
        doc.multiSelectedBodies = [id];
        if (body?.bodyGroupId != null) {
          for (const b of doc.bodies) {
            if (b.bodyGroupId === body.bodyGroupId && b.id !== id) doc.multiSelectedBodies.push(b.id);
          }
        }
        if (doc.mode !== '3d') setMode('3d');
        viewer?.updateGizmo();
        renderProps();
      }
      renderTree();
    });
  });
  // Add the "double-click to rename" tooltip to sketch labels.
  // (The actual dblclick handler is attached once below via event delegation
  // on the tree container — it survives the renderTree rebuild that happens
  // on every click, which otherwise eats the second click of a dblclick.)
  tree.querySelectorAll('.tree-node[data-kind="sketch"] .tree-label').forEach(span => {
    span.title = 'Double-click to rename';
  });
}

// Event-delegated double-click handler for renaming tree items. Attached
// ONCE in init() to the tree container; the handler survives every renderTree
// rebuild. Without this, the per-span listener gets wiped between click 1
// and click 2 of a dblclick, so the dblclick event never fires.
function attachTreeRenameHandler() {
  const tree = document.getElementById('tree');
  if (!tree || tree._renameWired) return;
  tree._renameWired = true;
  // Manual double-click detection: the per-node click handler calls
  // renderTree() and replaces the DOM between clicks, which kills the
  // browser's native dblclick event. We track click timing + node identity
  // (kind:id) so two consecutive clicks on the SAME logical tree node fire
  // a rename regardless of DOM rebuilds.
  const DBL_MS = 400;
  tree.addEventListener('click', (ev) => {
    if (ev.target.closest('.tree-eye, .tree-lock, .tree-del')) return; // ignore button clicks
    const span = ev.target.closest('.tree-node .tree-label');
    if (!span) return;
    const node = span.closest('.tree-node');
    if (!node) return;
    const kind = node.dataset.kind;
    if (kind !== 'sketch' && kind !== 'body') return;
    const sig = `${kind}:${node.dataset.id}`;
    const now = performance.now();
    if (tree._lastClickSig === sig && now - tree._lastClickAt < DBL_MS) {
      tree._lastClickSig = null; // consume so a third click doesn't double-fire
      startTreeRename(node, kind, parseInt(node.dataset.id, 10));
      return;
    }
    tree._lastClickSig = sig;
    tree._lastClickAt = now;
  });
}

function startTreeRename(node, kind, id) {
  // Sketches use .name directly; bodies use .name as an optional override of
  // the computed type label. Clearing the field removes the override (body
  // falls back to "Cube", "Extrude (0.5 in)", etc.).
  const target = (kind === 'sketch')
    ? doc.sketches.find(s => s.id === id)
    : doc.bodies.find(b => b.id === id);
  if (!target) return;
  // After renderTree the span may have been replaced — re-query.
  const liveNode = document.querySelector(
    `.tree-node[data-kind="${kind}"][data-id="${id}"]`
  );
  const span = liveNode?.querySelector('.tree-label');
  if (!span) return;
  const currentName = target.name || span.textContent.trim();
  const input = document.createElement('input');
  input.type = 'text';
  input.value = currentName;
  input.className = 'tree-rename';
  span.replaceWith(input);
  input.focus(); input.select();
  let done = false;
  const finish = (commit) => {
    if (done) return; done = true;
    if (commit) {
      const v = input.value.trim();
      if (v && v !== (target.name || '')) { pushUndo(); target.name = v; }
      else if (!v && target.name) { pushUndo(); delete target.name; }
    }
    renderTree();
  };
  input.addEventListener('keydown', (e2) => {
    if (e2.key === 'Enter') { e2.preventDefault(); finish(true); }
    else if (e2.key === 'Escape') { e2.preventDefault(); finish(false); }
  });
  input.addEventListener('blur', () => finish(true));
  input.addEventListener('click',     (e2) => e2.stopPropagation());
  input.addEventListener('mousedown', (e2) => e2.stopPropagation());
}

function renderProps() {

    } else {
      const jointRows = (doc.joints || []).map(j =>
        `<div class="field" style="display:flex;align-items:center;gap:6px;padding:4px 0">
          <span style="color:#b45309;font-size:14px">🔗</span>
          <span style="flex:1">Joint ${j.id}: Body ${j.bodyA} ↔ Body ${j.bodyB}</span>

      props.innerHTML = `
        <div class="empty" style="margin-bottom:8px">Select a body or use the tools above.</div>

  if (doc.selection.kind === 'sketch') {

    } else if (ent.type === 'circle') {

        <div class="field"><label>Center Y (${u})</label><input type="number" data-k="cy" value="${fmtU(ent.cy)}" step="0.5"/></div>
        <div class="field"><label>Radius (${u})</label><input type="number" data-k="r" value="${fmtU(ent.r)}" step="0.5" min="0.01"/></div>
        <div class="field"><label>Diameter</label><div>${fmtUL(ent.r * 2)}</div></div>
        <div class="field"><label>Type</label><div class="type-toggle">
          <button type="button" data-type="regular"${!ent.construction ? ' class="active"' : ''}>Regular</button>
          <button type="button" data-type="construction"${ent.construction ? ' class="active"' : ''}>Construction</button>
        </div></div>
        <button class="action" id="del-ent" style="margin-top:10px">Delete shape</button>`;
    } else if (ent.type === 'threadMark') {
      props.innerHTML = `

        <div class="field"><label>Y (${u})</label><input type="number" data-k="cy" value="${fmtU(ent.cy)}" step="0.5"/></div>
        <div class="hint">Switch to 3D and click <b>Thd Holes</b> to turn every mark in this sketch into a real threaded hole + visualizer bolt.</div>
        <button class="action" id="del-ent" style="margin-top:10px">Delete mark</button>`;
    } else if (ent.type === 'polyline') {
      let len = 0;
      for (let i = 0; i < ent.points.length - 1; i++) {
        len += Math.hypot(ent.points[i+1].x - ent.points[i].x, ent.points[i+1].y - ent.points[i].y);
      }
      if (ent.closed && ent.points.length > 1) {
        const a = ent.points[0], b = ent.points[ent.points.length - 1];
        len += Math.hypot(a.x - b.x, a.y - b.y);
      }
      props.innerHTML = `
        <h4>${ent.closed ? 'Closed polyline' : 'Polyline'}</h4>
        <div class="field"><label>Vertices</label><div>${ent.points.length}</div></div>
        <div class="field"><label>Length</label><div>${fmtUL(len)}</div></div>
        ${ent.closed ? `<div class="field"><label>Area</label><div>${fmt(doc.units === 'in' ? entityArea(ent) / (MM_PER_IN * MM_PER_IN) : entityArea(ent))} ${u}²</div></div>` : ''}
        <div class="field"><label>Type</label><div class="type-toggle">
          <button type="button" data-type="regular"${!ent.construction ? ' class="active"' : ''}>Regular</button>
          <button type="button" data-type="construction"${ent.construction ? ' class="active"' : ''}>Construction</button>

    if (del) del.onclick = () => {
      doc.sketch.entities = doc.sketch.entities.filter(e => e.id !== ent.id);
      doc.selection = null;
      sketchEng.render();
      renderTree();
      renderProps();
    };
    return;
  }

  if (doc.selection.kind === 'body') {
    const body = doc.bodies.find(b => b.id === doc.selection.id);
    if (!body) { props.innerHTML = ''; return; }
    const u = unitLabel();
    const rot = body.rotation || { x: 0, y: 0, z: 0 };
    // CAD convention: Y = depth (into screen), Z = up.
    // Internal Three.js storage stays Y-up (body.y is vertical) so saved
    // designs aren't migrated. The label/wiring just swaps Y↔Z for the user.
    const positionFields = `
      <h4 style="margin-top:14px">Position</h4>
      <div class="field"><label>X (${u})</label><input type="number" data-k="x" value="${fmtU(body.x || 0)}" step="1"/></div>
      <div class="field"><label>Y (${u})</label><input type="number" data-k="z" value="${fmtU(body.z || 0)}" step="1"/></div>
      <div class="field"><label>Z (${u})</label><input type="number" data-k="y" value="${fmtU(body.y || 0)}" step="1"/></div>
      <div class="field"><label></label>
        <button class="action" id="snap-to-plane" title="Drop the body so its lowest point sits on the workplane (Z=0)" style="font-size:12px;padding:6px 10px;display:inline-flex;align-items:center;gap:6px;justify-content:center">
          <svg width="13" height="13" viewBox="0 0 13 13" style="flex-shrink:0">
            <path d="M6.5 1.5 L6.5 8 M3.5 5 L6.5 8 L9.5 5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="2" y1="11" x2="11" y2="11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Snap to plane
        </button>
      </div>
      <h4 style="margin-top:14px">Rotation (°)</h4>
      <div class="field"><label>X axis</label><input type="number" data-rk="x" value="${fmt(rot.x)}" step="15"/></div>
      <div class="field"><label>Y axis</label><input type="number" data-rk="z" value="${fmt(rot.z)}" step="15"/></div>
      <div class="field"><label>Z axis</label><input type="number" data-rk="y" value="${fmt(rot.y)}" step="15"/></div>`;

    let dimFields = '';
    if (body.type === 'cube') {
      dimFields = `<h4>Cube</h4>
        <div class="field"><label>Width (${u})</label><input type="number" data-k="w" value="${fmtU(body.w)}" min="0.01" step="1"/></div>
        <div class="field"><label>Height (${u})</label><input type="number" data-k="h" value="${fmtU(body.h)}" min="0.01" step="1"/></div>
        <div class="field"><label>Depth (${u})</label><input type="number" data-k="d" value="${fmtU(body.d)}" min="0.01" step="1"/></div>`;
    } else if (body.type === 'sphere' || body.type === 'cylinder' || body.type === 'cone' ||
               body.type === 'pyramid' || body.type === 'torus') {
      const labelMap = {
        sphere: 'Sphere', cylinder: 'Cylinder', cone: 'Cone',
        pyramid: 'Pyramid', torus: 'Torus',
      };
      dimFields = `<h4>${labelMap[body.type]}</h4>
        <div class="field"><label>Width (${u})</label><input type="number" data-k="w" value="${fmtU(body.w)}" min="0.01" step="1"/></div>
        <div class="field"><label>Height (${u})</label><input type="number" data-k="h" value="${fmtU(body.h)}" min="0.01" step="1"/></div>
        <div class="field"><label>Depth (${u})</label><input type="number" data-k="d" value="${fmtU(body.d)}" min="0.01" step="1"/></div>`;
    } else if (body.type === 'hexagon' || body.type === 'pentagon' || body.type === 'octagon' ||
               body.type === 'star' || body.type === 'heart' || body.type === 'teardrop') {
      const labelMap = {
        hexagon: 'Hexagon', pentagon: 'Pentagon', octagon: 'Octagon',
        star: 'Star', heart: 'Heart', teardrop: 'Teardrop',
      };
      dimFields = `<h4>${labelMap[body.type]}</h4>
        <div class="field"><label>Width (${u})</label><input type="number" data-k="w" value="${fmtU(body.w)}" min="0.01" step="1"/></div>
        <div class="field"><label>Height (${u})</label><input type="number" data-k="h" value="${fmtU(body.h)}" min="0.01" step="1"/></div>
        <div class="field"><label>Depth (${u})</label><input type="number" data-k="d" value="${fmtU(body.d)}" min="0.01" step="1"/></div>`;
    } else if (body.type === 'extrude') {
      dimFields = `<h4>Extrude</h4>
        <div class="field"><label>Height (${u})</label><input type="number" data-k="height" value="${fmtU(body.height)}" min="0.01" step="0.5"/></div>
        <div class="hint">Edit the source sketch in 2D to change the profile, then come back.</div>`;
    } else if (body.type === 'fastener') {
      const spec = getFastenerSpec(body.size);
      const headOpts = FASTENER_HEAD_TYPES.map(t =>
        `<option value="${t}"${t === body.headType ? ' selected' : ''}>${FASTENER_HEAD_LABELS[t]}</option>`
      ).join('');
      const sizeOpts = FASTENER_SPECS.map(s =>
        `<option value="${s.key}"${s.key === body.size ? ' selected' : ''}>${s.label} · ${s.p.toFixed(2)} mm pitch (${s.system})</option>`
      ).join('');
      const fit = body.fit || 'tight';
      const fitOpts = `
        <option value="tight"${fit === 'tight' ? ' selected' : ''}>Tight — actual bolt size</option>
        <option value="normal"${fit === 'normal' ? ' selected' : ''}>Normal — +0.1 mm clearance</option>
        <option value="loose"${fit === 'loose' ? ' selected' : ''}>Loose — +0.25 mm clearance (FDM)</option>`;
      dimFields = `<h4>Fastener</h4>
        <div class="field"><label>Head</label><select data-k="headType">${headOpts}</select></div>
        <div class="field"><label>Thread size</label><select data-k="size">${sizeOpts}</select></div>
        <div class="field"><label>Length (${u})</label><input type="number" data-k="length" value="${fmtU(body.length)}" min="0.1" step="0.5"/></div>
        <div class="field"><label>Fit</label><select data-k="fit">${fitOpts}</select></div>
        <div class="field"><label></label>
          <button class="action" id="fastener-place-btn" title="Click any body face — the bolt seats with the bottom of its head flush on that face, perpendicular to it">📌 Place on face</button>
        </div>
        <div class="hint">Use <b>Tight</b> for bolts that print as a solid, or <b>Loose</b> when grouping as a Negative to cut a threaded hole that fits a real bolt.</div>`;
    } else if (body.type === 'group') {
      const childList = (body.children || []).map(c => `${c.type}${c.op === 'subtract' ? ' (neg)' : ''}`).join(', ');
      // Compute the merged bbox so the user can see the group's overall
      // W × H × D — matches what every other primitive shows.
      let bboxStr = '—';
      if (body.mesh) {
        viewer && viewer.scene && viewer.scene.updateMatrixWorld(true);
        const bb = new THREE.Box3().setFromObject(body.mesh);
        if (!bb.isEmpty()) {
          const sz = bb.getSize(new THREE.Vector3());
          bboxStr = `${fmtUL(sz.x)} × ${fmtUL(sz.y)} × ${fmtUL(sz.z)}`;
        }
      }
      dimFields = `<h4>Group</h4>
        <div class="field"><label>Size (W×H×D)</label><div>${bboxStr}</div></div>
        <div class="field"><label>Bodies</label><div>${body.children?.length || 0}</div></div>
        <div class="field"><label>Contents</label><div style="font-size:11px;color:var(--ink-soft)">${childList}</div></div>
        <div class="hint"><b>Ungroup</b> (Ctrl+Shift+G) to restore the originals — negatives reappear.</div>`;
    }

    const opField = `
      <h4 style="margin-top:14px">Operation</h4>
      <div class="field"><label>Type</label>
        <select data-k="op">
          <option value="add"${body.op !== 'subtract' ? ' selected' : ''}>Positive (solid)</option>
          <option value="subtract"${body.op === 'subtract' ? ' selected' : ''}>Negative (cut-out)</option>
        </select>
      </div>
      ${body.op === 'subtract' ? '<div class="hint">Negative bodies are subtracted when you click <b>Combine</b>.</div>' : ''}`;

    props.innerHTML = dimFields + positionFields + opField + `<button class="action" id="del-body" style="margin-top:14px">Delete body</button>`;

    props.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', () => {
        const v = parseFloat(inp.value);
        if (!isFinite(v)) return;
        if (inp.dataset.rk) {
          // Rotation field — store in body.rotation, in degrees (no unit conversion)
          body.rotation = body.rotation || { x: 0, y: 0, z: 0 };
          body.rotation[inp.dataset.rk] = v;
        } else if (inp.dataset.k) {
          body[inp.dataset.k] = fromUnit(v);
        }
        viewer?.rebuildBodies();
      });
    });
    // Place-on-face: enter a pick mode where the next 3D face click seats
    // the bolt with its head-bottom face flush against that face,
    // perpendicular to it (shaft pointing INTO the body).
    const placeBtn = $('fastener-place-btn');
    if (placeBtn) placeBtn.onclick = () => {
      doc.fastenerPlaceTarget = body.id;
      doc.faceMode = true; // reuse the existing face-pick infra
      setStatus('Place fastener: click any body face. Esc to cancel.');
      if (viewer) viewer.canvas.style.cursor = 'crosshair';
    };
    // Snap-to-plane: drop the body so its lowest point sits at internal Y=0
    // (the workplane). Use the current world-space bbox so any rotation /
    // existing offset is accounted for.
    const snapBtn = $('snap-to-plane');
    if (snapBtn) snapBtn.onclick = () => {
      if (!body.mesh) return;
      viewer?.scene.updateMatrixWorld(true);
      const wbb = new THREE.Box3().setFromObject(body.mesh);
      if (wbb.isEmpty()) return;
      pushUndo();
      body.y = (body.y || 0) - wbb.min.y;
      viewer?.rebuildBodies();
      renderProps();
      setStatus('Snapped body to the workplane');
    };
    props.querySelectorAll('select').forEach(sel => {
      sel.addEventListener('change', () => {
        body[sel.dataset.k] = sel.value;
        viewer?.rebuildBodies();
        renderProps(); // re-render to show/hide hint
      });
    });
    const del = $('del-body');
    if (del) del.onclick = () => {
      pushUndo();
      doc.bodies = doc.bodies.filter(b => b.id !== body.id);
      doc.selection = null;
      viewer?.rebuildBodies();
      renderTree();
      renderProps();
    };
  }
}

// ---------- 6. Export ----------
// Returns the user-typed project name (for STEM Builder integration), or
// 'untitled' if blank. Used as the saved/exported filename.
function getProjectName() {
  const v = (document.getElementById('project-filename')?.value || '').trim();
  // Strip filesystem-unsafe characters but keep spaces, dashes, underscores
  return (v || 'untitled').replace(/[\\/:*?"<>|]/g, '').slice(0, 80);
}

// Friendly label for a body, matching the tree's display.
function bodyDisplayLabel(b) {
  if (b.name && b.name.trim()) return b.name;
  if (b.type === 'extrude')  return `Extrude (${fmtUL(b.height)})`;
  if (b.type === 'group')    return `Group (${b.children?.length || 0})`;
  if (b.type === 'cube')     return 'Cube';
  if (b.type === 'sphere')   return 'Sphere';
  if (b.type === 'cylinder') return 'Cylinder';
  if (b.type === 'cone')     return 'Cone';
  if (b.type === 'torus')    return 'Torus';
  if (b.type === 'pyramid')  return 'Pyramid';
  if (b.type === 'revolve')  return 'Revolve';
  if (b.type === 'fastener') return 'Fastener';
  return b.type;
}

// Component picker — lists every exportable item with checkboxes so the user
// can choose a subset, then exports each checked item as its own file (so a
// six-part assembly produces six separate STLs for the slicer).
function openExportPicker(format) {
  const items = format === 'stl'
    ? doc.bodies.filter(b => b.op !== 'subtract').map(b => ({
        id: b.id, label: bodyDisplayLabel(b),
        subtitle: `Body · ${b.type}`,
      }))
    : doc.sketches.filter(s => (s.entities || []).some(e => !e.construction)).map(s => ({
        id: s.id, label: s.name || `Sketch ${s.id}`,
        // Sketches hidden in the 3D view are still exportable — most users
        // hide a finished sketch to clean up the view, not to retire it.
        subtitle: `Sketch · ${(s.entities || []).filter(e => !e.construction).length} shape${(s.entities || []).filter(e => !e.construction).length === 1 ? '' : 's'}${s.hidden ? ' · hidden' : ''}`,
      }));
  if (!items.length) {
    showHint(format === 'stl'
      ? 'No 3D bodies yet — extrude a sketch or add a primitive.'
      : 'No 2D sketches with exportable shapes.');
    return;
  }
  const rows = items.map(it => `
    <label style="display:flex;align-items:center;gap:12px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;margin-bottom:6px;cursor:pointer;background:white">
      <input type="checkbox" class="exp-pick" data-id="${it.id}" checked style="width:18px;height:18px;cursor:pointer"/>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:14px;color:var(--ink)">${it.label}</div>
        <div style="font-size:11px;color:var(--ink-soft);margin-top:2px">${it.subtitle}</div>
      </div>
    </label>`).join('');
  openModal({
    title: format === 'stl' ? 'Export STL — pick parts' : 'Export SVG — pick sketches',
    body: `<p style="margin:0 0 12px;color:var(--ink-soft)">Each checked item is downloaded as its own <b>.${format}</b> file, named <b>${getProjectName()}__&lt;part&gt;.${format}</b>.</p>
           <div style="display:flex;gap:10px;margin-bottom:10px">
             <button class="action" id="exp-all"  style="font-size:12px;padding:5px 10px">Select all</button>
             <button class="action" id="exp-none" style="font-size:12px;padding:5px 10px">Clear</button>
             <div style="flex:1"></div>
             <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-soft);cursor:pointer">
               <input type="checkbox" id="exp-combine" style="width:14px;height:14px"/>
               Combine into one file
             </label>
           </div>
           <div style="max-height:300px;overflow-y:auto;padding-right:4px">${rows}</div>
           <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:14px">
             <button class="action" id="exp-cancel">Cancel</button>
             <button class="action primary" id="exp-go">Export</button>
           </div>`,
    hideOk: true,
    custom: () => {
      const close = () => $('modal-bg').classList.remove('show');
      $('exp-cancel').onclick = close;
      $('exp-all').onclick  = () => document.querySelectorAll('.exp-pick').forEach(c => c.checked = true);
      $('exp-none').onclick = () => document.querySelectorAll('.exp-pick').forEach(c => c.checked = false);
      $('exp-go').onclick = () => {
        const ids = Array.from(document.querySelectorAll('.exp-pick:checked')).map(c => parseInt(c.dataset.id, 10));
        if (!ids.length) { showHint('Check at least one item to export.'); return; }
        const combine = $('exp-combine').checked;
        close();
        if (format === 'stl') exportSTL({ bodyIds: ids, combine });
        else                  exportSVG({ sketchIds: ids, combine });
      };
    },
  });
}
