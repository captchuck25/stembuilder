}
// Build an extrude body from a region + length + direction. Direction = +1 for
// positive (add) along plane normal, -1 for negative (cut into the body).
// When the sketch was made on a body face (sourceBodyId known), the new body
// is auto-grouped with that parent so positives union and negatives subtract
// without any extra clicks from the user.
// True when every segment of the entity matches one of the region's boundary
// edges (within a small endpoint tolerance, in either direction). Used to
// "consume" source lines after they've been extruded — so the V you drew
// disappears from the 2D sketch once it's a 3D body.
function entityFullyBoundsRegion(ent, region) {
  if (!ent || ent.construction) return false;
  const segs = entityToSegments(ent);
  if (!segs.length) return false;
  const pts = region.points;
  const TOL = 1.5; // forgiving — entity coords may differ from graph-merged coords
  const same = (a, b) => Math.hypot(a.x - b.x, a.y - b.y) < TOL;
  const onBoundary = (p) => {
    for (const q of pts) if (same(p, q)) return true;
    for (let i = 0; i < pts.length; i++) {
      const a = pts[i], b = pts[(i + 1) % pts.length];
      const dx = b.x - a.x, dy = b.y - a.y;
      const len2 = dx * dx + dy * dy;
      if (len2 < 1e-6) continue;
      const t = ((p.x - a.x) * dx + (p.y - a.y) * dy) / len2;
      if (t < -0.05 || t > 1.05) continue;
      const cx = a.x + t * dx, cy = a.y + t * dy;
      if (Math.hypot(p.x - cx, p.y - cy) < TOL) return true;
    }
    return false;
  };
  // Even-odd point-in-polygon test (with a small inside-buffer that lets points
  // sitting right on the boundary still count as inside).
  const inside = (p) => {
    let cnt = 0;
    for (let i = 0, j = pts.length - 1; i < pts.length; j = i++) {
      const a = pts[i], b = pts[j];
      if (((a.y > p.y) !== (b.y > p.y)) &&
          (p.x < (b.x - a.x) * (p.y - a.y) / (b.y - a.y + 1e-12) + a.x)) {
        cnt++;
      }
    }
    return cnt % 2 === 1;
  };
  // BOUNDARY MATCH: every segment of the entity lies on the region's closed
  // polygon. This is the cleanest "the entity defines this region" signal.
  let bounds = true;
  for (const s of segs) {
    if (!onBoundary(s.a) || !onBoundary(s.b)) { bounds = false; break; }
    const m = { x: (s.a.x + s.b.x) / 2, y: (s.a.y + s.b.y) / 2 };
    if (!onBoundary(m)) { bounds = false; break; }
  }
  if (bounds) return true;
  // INTERIOR MATCH: every segment lies inside (or on the boundary of) the
  // region. Catches entities that approximate the region with slightly
  // different sample points than the planar-arrangement nodes — without this,
  // the original sketch lines would survive the extrude and "float" in 3D.
  for (const s of segs) {
    const m = { x: (s.a.x + s.b.x) / 2, y: (s.a.y + s.b.y) / 2 };
    const aOk = onBoundary(s.a) || inside(s.a);
    const bOk = onBoundary(s.b) || inside(s.b);
    const mOk = onBoundary(m)   || inside(m);
    if (!aOk || !bOk || !mOk) return false;
  }
  return true;
}

function commitExtrudeFromGizmo(region, sketch, lengthMm, direction, opOverride) {
  if (!region || !sketch || lengthMm <= 0) return;
  pushUndo();
  const synth = regionToSyntheticSketch(region, sketch);
  // Operation is whatever the user picked on the tooltip toggle. The drag
  // direction still affects which way the extrude grows: a Cut should grow
  // INTO the body (use the direction that points toward it).
  const userOp = opOverride || getExtrudeTooltipOp();
  const op = userOp || ((direction < 0 && sketch.boundary) ? 'subtract' : 'add');
  const body = {
    id: doc.nextBodyId++, type: 'extrude',
    sketch: synth,
    plane: JSON.parse(JSON.stringify(sketch.plane)),
    height: lengthMm,
    x: 0, y: 0, z: 0,
    op,
  };
  doc.bodies.push(body);
  doc.selection = { kind: 'body', id: body.id };
  doc.selectedRegions = [];
  // Consume the source sketch entities that fully bounded this region — those
  // 2D lines/shapes have served their purpose and should disappear so the
  // sketch isn't littered with leftover constructions.
  const liveSketch = doc.sketches.find(s => s.id === sketch.id);
  if (liveSketch) {
    liveSketch.entities = liveSketch.entities.filter(
      ent => !entityFullyBoundsRegion(ent, region)
    );
  }
  if (viewer) {
    viewer.clearExtrudePreview();
    viewer.rebuildBodies(); // also refreshes regions + extrude gizmo
    viewer.updateSketchOverlay(); // refresh 3D sketch lines after consumption
  }
  hideExtrudeTooltip();

  // Auto-group with the parent body the sketch was started on (when known).
  // This skips the manual shift-click + Group step that's a pain in dense scenes.
  const parent = sketch.sourceBodyId
    ? doc.bodies.find(b => b.id === sketch.sourceBodyId)
    : null;
  if (parent && typeof CSG !== 'undefined') {
    doc.multiSelectedBodies = [parent.id, body.id];
    groupSelected(true); // already snapshotted at the top of this function
    // Re-point the sketch at the new group so the next extrude on this
    // sketch can auto-group with the (now combined) body too.
    if (doc.selection?.kind === 'body') {
      const sk = doc.sketches.find(s => s.id === sketch.id);
      if (sk) sk.sourceBodyId = doc.selection.id;
    }
    setStatus(op === 'subtract'
      ? `Cut a region from the body (${fmtUL(lengthMm)} deep)`
      : `Added a region to the body (${fmtUL(lengthMm)} tall)`);
  } else {
    renderTree(); renderProps();
    setStatus(op === 'subtract'
      ? `Negative extrude (${fmtUL(lengthMm)}) — click Group to cut`
      : `Extruded region to ${fmtUL(lengthMm)}`);
  }
}

// Extrude tooltip input: typed length commits on Enter
(function wireExtrudeTooltipInput() {
  const ready = () => {
    const inp = document.getElementById('extrude-input');
    if (!inp) { setTimeout(ready, 50); return; }
    inp.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter') {
        ev.preventDefault();
        const v = parseFloat(inp.value);
        if (!isFinite(v) || v <= 0) return;
        const lenMm = fromUnit(v);
        const st = viewer?.extrudeState;
        if (!st || !st.region) return;
        const dir = st.direction || 1;
        commitExtrudeFromGizmo(st.region, st.sketch, lenMm, dir);
      } else if (ev.key === 'Escape') {
        hideExtrudeTooltip();
        if (viewer) viewer.clearExtrudePreview();
      }
    });
    inp.addEventListener('input', (ev) => {
      // Live-preview while user types
      const v = parseFloat(inp.value);
      const st = viewer?.extrudeState;
      if (!st || !st.region) return;
      if (isFinite(v) && v > 0 && viewer) {
        viewer.updateExtrudePreview(fromUnit(v), st.direction || 1);
      } else if (viewer) {
        viewer.clearExtrudePreview();
      }
    });
    // Wire the Add/Cut toggle buttons. Either button switches the operation
    // and re-renders the live preview color (blue = add, red = cut).
    const tg = document.getElementById('extrude-op-toggle');
    if (tg) {
      tg.querySelectorAll('button').forEach(b => {
        b.addEventListener('mousedown', (ev) => {
          // mousedown so the Three.js canvas doesn't steal focus first
          ev.preventDefault();
          ev.stopPropagation();
          setExtrudeTooltipOp(b.dataset.op);
        });
        b.addEventListener('click', (ev) => { ev.stopPropagation(); });
      });
    }
    // Done button — commit the current length + op + direction to a body
    const doneBtn = document.getElementById('extrude-done-btn');
    if (doneBtn) {
      doneBtn.addEventListener('mousedown', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const v = parseFloat(inp.value);
        if (!isFinite(v) || v <= 0) {
          // Try the last drag length if the input is empty
          const st = viewer?.extrudeState;
          const fallback = st && st.length > 0 ? st.length : 0;
          if (fallback <= 0) return;
          const dir = st.direction || 1;
          commitExtrudeFromGizmo(st.region, st.sketch, fallback, dir);
          return;
        }
        const lenMm = fromUnit(v);
        const st = viewer?.extrudeState;
        if (!st || !st.region) return;
        commitExtrudeFromGizmo(st.region, st.sketch, lenMm, st.direction || 1);
      });
    }
    // Cancel — close tooltip without creating a body
    const cancelBtn = document.getElementById('extrude-cancel-btn');
    if (cancelBtn) {
      cancelBtn.addEventListener('mousedown', (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        hideExtrudeTooltip();
        if (viewer) viewer.clearExtrudePreview();
      });
    }
  };
  ready();
})();

function extrudeCurrentSketch() {
  // If regions are picked, extrude each picked region as its own body.
  // Otherwise fall back to whole-sketch extrude (largest closed shape / chain loop).
  const picked = (doc.selectedRegions || []).slice();
  // Resolve every picked region back to its source sketch so we can build bodies
  const allRegions = [];
  for (const s of doc.sketches) {
    for (const r of computeSketchRegions(s)) allRegions.push({ region: r, sketch: s });
  }
  const regionJobs = picked
    .map(id => allRegions.find(x => x.region.id === id))
    .filter(Boolean);

  if (!regionJobs.length && !doc.sketch.entities.length) {
    showHint('Draw something in 2D first, then extrude it.');
    return;
  }
  const u = unitLabel();
  const defaultH = doc.units === 'in' ? 0.5 : 10;
  const usingRegions = regionJobs.length > 0;
  openModal({
    title: usingRegions
      ? `Extrude ${regionJobs.length} region${regionJobs.length === 1 ? '' : 's'}`
      : 'Extrude sketch',
    body: `<p>${usingRegions
             ? 'Push the picked region(s) into 3D by giving them a height.'
             : 'Push the sketch into 3D by giving it a height.'}</p>
           <div class="field"><label>Height (${u})</label><input id="ex-h" type="number" value="${defaultH}" min="0.01" step="0.5"/></div>
           <div class="field"><label>Operation</label>
             <select id="ex-op">
               <option value="add">Positive (add solid)</option>
               <option value="subtract">Negative (cut — pair with Combine)</option>
             </select>
           </div>
           <div class="hint">Tip: extrude a sketch-on-face as Negative, then click <b>Combine</b> in the toolbar to cut a hole through the body.</div>`,
    onConfirm: () => {
      const v = parseFloat(document.getElementById('ex-h').value);
      const op = document.getElementById('ex-op').value;
      if (!(v > 0)) return;
      pushUndo();
      const h = fromUnit(v);
      let lastBodyId = null;
      if (usingRegions) {
        for (const job of regionJobs) {
          const synth = regionToSyntheticSketch(job.region, job.sketch);
          const body = {
            id: doc.nextBodyId++, type: 'extrude',
            sketch: synth,
            plane: JSON.parse(JSON.stringify(job.sketch.plane)),
            height: h,
            x: 0, y: 0, z: 0,
            op,
          };
          doc.bodies.push(body);
          lastBodyId = body.id;
          // Consume source entities that exclusively bounded this region
          const live = doc.sketches.find(s => s.id === job.sketch.id);
          if (live) live.entities = live.entities.filter(
            ent => !entityFullyBoundsRegion(ent, job.region)
          );
        }
        doc.selectedRegions = [];
        setStatus(op === 'subtract'
          ? `${regionJobs.length} negative extrude(s) (${fmtUL(h)}) — click Combine to cut`
          : `Extruded ${regionJobs.length} region(s) to ${fmtUL(h)}`);
      } else {
        const sketchCopy = JSON.parse(JSON.stringify(doc.sketch));
        sketchCopy.entities = sketchCopy.entities.filter(e => !e.construction);
        const body = {
          id: doc.nextBodyId++, type: 'extrude',
          sketch: sketchCopy,
          plane: JSON.parse(JSON.stringify(doc.sketch.plane)),
          height: h,
          x: 0, y: 0, z: 0,
          op,
        };
        doc.bodies.push(body);
        lastBodyId = body.id;
        setStatus(op === 'subtract'
          ? `Negative extrude (${fmtUL(h)}) — click Combine to cut`
          : `Extruded sketch to ${fmtUL(h)}`);
      }
      if (lastBodyId != null) doc.selection = { kind: 'body', id: lastBodyId };
      setMode('3d');
      renderTree();
      renderProps();
    },
  });
}

// ==================================================================
// Pre-made 2D profiles — used by both the 3D primitive builder
// (extruded into a prism) and the 2D sketch shape dropdown
// (inserted as a closed polyline).
// `r` is the size budget — every profile fits inside a circle of
// radius `r` so swapping shapes feels consistent.
// ==================================================================

// Sample points for a profile of the given kind. Output is centered on origin
// and fits exactly in a square bounding box of side 2r ([-r, r] on both axes).
// Each axis is normalized independently — same metaphor as a rectangle, where
// w and d control the bbox and the shape stretches to fit. Default w=d gives
// a "natural square" version of the shape.
// Used both to build THREE.Shape (3D extrude) and to insert a closed polyline
// into a 2D sketch.
// ==================================================================
// Threaded fasteners — bolts and screws
// All dimensions stored in mm (imperial sizes pre-converted from inches).
// Head types: hex, phillips, cap (socket cap), flat (countersunk).
// ==================================================================
// d = nominal (major) diameter in mm. af = head size across-flats (hex)
// or head OD (Phillips/cap/flat) in mm. p = thread pitch in mm (the axial
// distance the helix advances per turn). All imperial values are pre-converted.
const FASTENER_SPECS = [
  // SAE / Imperial coarse (UNC). Pitch is 1 / TPI (threads per inch).
  { key: '4-40',    label: '#4-40',    d: 0.112  * 25.4, af: 0.219  * 25.4, p: 25.4 / 40, system: 'SAE' },
  { key: '6-32',    label: '#6-32',    d: 0.138  * 25.4, af: 0.250  * 25.4, p: 25.4 / 32, system: 'SAE' },
  { key: '8-32',    label: '#8-32',    d: 0.164  * 25.4, af: 0.3125 * 25.4, p: 25.4 / 32, system: 'SAE' },
  { key: '10-24',   label: '#10-24',   d: 0.190  * 25.4, af: 0.375  * 25.4, p: 25.4 / 24, system: 'SAE' },
  { key: '10-32',   label: '#10-32',   d: 0.190  * 25.4, af: 0.375  * 25.4, p: 25.4 / 32, system: 'SAE' },
  { key: '1/4-20',  label: '1/4"-20',  d: 0.250  * 25.4, af: 0.4375 * 25.4, p: 25.4 / 20, system: 'SAE' },
  { key: '5/16-18', label: '5/16"-18', d: 0.3125 * 25.4, af: 0.500  * 25.4, p: 25.4 / 18, system: 'SAE' },
  { key: '3/8-16',  label: '3/8"-16',  d: 0.375  * 25.4, af: 0.5625 * 25.4, p: 25.4 / 16, system: 'SAE' },
  { key: '7/16-14', label: '7/16"-14', d: 0.4375 * 25.4, af: 0.625  * 25.4, p: 25.4 / 14, system: 'SAE' },
  { key: '1/2-13',  label: '1/2"-13',  d: 0.500  * 25.4, af: 0.750  * 25.4, p: 25.4 / 13, system: 'SAE' },
  // Metric coarse (ISO standard)
  { key: 'M2',  label: 'M2',  d: 2,  af: 4,    p: 0.40, system: 'Metric' },
  { key: 'M3',  label: 'M3',  d: 3,  af: 5.5,  p: 0.50, system: 'Metric' },
  { key: 'M4',  label: 'M4',  d: 4,  af: 7,    p: 0.70, system: 'Metric' },
  { key: 'M5',  label: 'M5',  d: 5,  af: 8,    p: 0.80, system: 'Metric' },
  { key: 'M6',  label: 'M6',  d: 6,  af: 10,   p: 1.00, system: 'Metric' },
  { key: 'M8',  label: 'M8',  d: 8,  af: 13,   p: 1.25, system: 'Metric' },
  { key: 'M10', label: 'M10', d: 10, af: 17,   p: 1.50, system: 'Metric' },
  { key: 'M12', label: 'M12', d: 12, af: 19,   p: 1.75, system: 'Metric' },
];
const FASTENER_HEAD_TYPES = ['hex', 'phillips', 'cap', 'flat'];
const FASTENER_FIT_CLEARANCE = { tight: 0, normal: 0.1, loose: 0.25 }; // mm radial
const FASTENER_HEAD_LABELS = {
  hex: 'Hex bolt', phillips: 'Phillips screw', cap: 'Socket cap', flat: 'Machine screw',
};

function getFastenerSpec(key) {
  return FASTENER_SPECS.find(s => s.key === key) || FASTENER_SPECS.find(s => s.key === 'M5');
}

// Concatenate BufferGeometries by expanding indices and stacking attributes.
// We can't depend on three's BufferGeometryUtils (only in addons), so this is
// the minimum-viable replacement for multi-part fastener meshes.
function _mergeBufferGeometries(geos) {
  const posOut = [], normOut = [];
  for (const g of geos) {
    if (!g.attributes.position) continue;
    if (!g.attributes.normal) g.computeVertexNormals();
    const p = g.attributes.position.array;
    const n = g.attributes.normal.array;
    if (g.index) {
      const idx = g.index.array;
      for (let i = 0; i < idx.length; i++) {
        const k = idx[i] * 3;
        posOut.push(p[k], p[k + 1], p[k + 2]);
        normOut.push(n[k], n[k + 1], n[k + 2]);
      }
    } else {
      for (let i = 0; i < p.length; i++) posOut.push(p[i]);
      for (let i = 0; i < n.length; i++) normOut.push(n[i]);
    }
  }
  const out = new THREE.BufferGeometry();
  out.setAttribute('position', new THREE.Float32BufferAttribute(posOut, 3));
  out.setAttribute('normal',   new THREE.Float32BufferAttribute(normOut, 3));
  return out;
}

// Build the geometry for a fastener — root cylinder + helical thread + head.
// All mesh-local: bottom of shaft at y = 0, head sits on top.
//
// THREADS: A real ISO/UNC thread has a triangular cross-section spiralling
// around the shaft at the spec's pitch. We approximate with a TubeGeometry
// helix: a smoothly-rounded rib sitting on a minor-diameter cylinder, the
// rib's centerline at (rMinor + rMajor)/2 and rib radius (rMajor - rMinor)/2.
// This is a printable thread profile (similar to a rounded-Whitworth or
// Acme-style) that's also CSG-cuttable so the user can group it as a
// negative to make threaded holes.
// Manually build a closed-manifold threaded shaft. Each (i = axial step,
// j = angular step) sample places a vertex at radius r(θ, z), where r
// varies with the local "thread phase" — distance to the nearest helical
// crest line — to produce a sharp triangular V-thread cross-section. The
// last column wraps to the first (no duplicate seam) so the mesh has no
// open edges except the two end caps, which we close with triangle fans.
// Result: a watertight manifold with real ISO-style triangular threads
// that CSG can subtract to produce a real threaded hole.
function buildThreadedShaftGeo(rMinor, rMajor, pitch, length, segPerTurn = 24, axialStepsPerPitch = 6) {
  const halfPitch = pitch / 2;
  const totalAxialSteps = Math.max(8, Math.ceil((length / pitch) * axialStepsPerPitch));
  const N = segPerTurn;
  const positions = [];
  const indices = [];
  for (let i = 0; i <= totalAxialSteps; i++) {
    const z = (i / totalAxialSteps) * length;
    for (let j = 0; j < N; j++) {
      const theta = (j / N) * 2 * Math.PI;
      // Thread phase = signed axial distance to the helical crest at this θ
      let phase = (z - theta * pitch / (2 * Math.PI)) % pitch;
      if (phase >  halfPitch) phase -= pitch;
      else if (phase < -halfPitch) phase += pitch;
      const r = rMajor - (rMajor - rMinor) * Math.abs(phase) / halfPitch;
      positions.push(r * Math.cos(theta), z, r * Math.sin(theta));
    }
  }
  // Lateral triangles, wrapping in θ
  for (let i = 0; i < totalAxialSteps; i++) {
    for (let j = 0; j < N; j++) {
      const jN = (j + 1) % N;
      const a = i * N + j;
      const b = i * N + jN;
      const c = (i + 1) * N + j;
      const d = (i + 1) * N + jN;
      indices.push(a, c, b);
      indices.push(b, c, d);
    }
  }
  // Top cap (z = length) — wind so normal points +y (outward from the top)
  const topCenter = positions.length / 3;
  positions.push(0, length, 0);
  const topRing = totalAxialSteps * N;
  for (let j = 0; j < N; j++) {
    const jN = (j + 1) % N;
    indices.push(topRing + jN, topRing + j, topCenter);
  }
  // Bottom cap (z = 0) — wind so normal points −y (outward from the bottom)
  const botCenter = positions.length / 3;
  positions.push(0, 0, 0);
  for (let j = 0; j < N; j++) {
    const jN = (j + 1) % N;
    indices.push(j, jN, botCenter);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();
  return geo;
}

// Helper — bake a CSG.subtract into a fresh BufferGeometry. Used to carve
// recesses (hex socket, Phillips cross) into the head before merging with
// the rest of the bolt parts.
function _csgSubtractGeo(baseGeo, subGeos) {
  if (typeof CSG === 'undefined') return baseGeo;
  try {
    const matTmp = new THREE.MeshBasicMaterial();
    const baseMesh = new THREE.Mesh(baseGeo, matTmp);
    baseMesh.updateMatrixWorld(true);
    let result = baseMesh;
    for (const sg of subGeos) {
      const sm = new THREE.Mesh(sg, matTmp);
      sm.updateMatrixWorld(true);
      result = CSG.subtract(result, sm);
      result.updateMatrixWorld(true);
    }
    const out = result.geometry.clone();
    out.applyMatrix4(result.matrixWorld);
    out.computeVertexNormals();
    return out;
  } catch (err) {
    console.warn('CSG subtract failed for fastener head:', err);
    return baseGeo;
  }
}

function buildFastenerGeometry(body) {
  const spec = getFastenerSpec(body.size);
  if (!spec) return null;
  const length  = body.length || (spec.d * 4);
  const headType = body.headType || 'hex';
  const fit = body.fit || 'tight';
  const clearance = FASTENER_FIT_CLEARANCE[fit] || 0;
  const pitch = spec.p;
  const rMajor = (spec.d / 2) + clearance;
  const rMinor = Math.max(0.4, (spec.d / 2) - 0.5413 * pitch + clearance * 0.4);
  const rHex = spec.af / Math.sqrt(3);
  const rCap = spec.d * 0.85;
  const rRound = spec.d * 0.95;
  const rFlat = spec.d * 0.95;
  const rShaft = spec.d / 2;

  const parts = [];
  // Threaded shaft — single closed-manifold mesh built by hand so CSG can
  // subtract it cleanly to produce a real threaded hole.
  const threadedGeo = buildThreadedShaftGeo(rMinor, rMajor, pitch, length);
  parts.push(threadedGeo);

  // Build the head as its own geometry (so we can CSG-subtract recesses
  // without affecting the threads).
  let headGeo = null;
  if (headType === 'hex') {
    const headH = spec.d * 0.65;
    headGeo = new THREE.CylinderGeometry(rHex, rHex, headH, 6);
    headGeo.rotateY(Math.PI / 6);
    headGeo.translate(0, length + headH / 2, 0);
  } else if (headType === 'phillips') {
    const headH = spec.d * 0.65;
    headGeo = new THREE.CylinderGeometry(rRound, rRound, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
    // Cross slot via CSG.subtract — two crossed boxes recessed into top
    const slotW = rRound * 1.6, slotT = rRound * 0.20;
    const slotD = headH * 0.45;
    const slotY = length + headH - slotD / 2 + 0.02;
    const s1 = new THREE.BoxGeometry(slotW, slotD, slotT); s1.translate(0, slotY, 0);
    const s2 = new THREE.BoxGeometry(slotT, slotD, slotW); s2.translate(0, slotY, 0);
    headGeo = _csgSubtractGeo(headGeo, [s1, s2]);
  } else if (headType === 'cap') {
    const headH = spec.d;
    headGeo = new THREE.CylinderGeometry(rCap, rCap, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
    // Hex socket via CSG.subtract — recessed hexagonal hole on top
    const socketR = rCap * 0.55;
    const socketH = headH * 0.55;
    const socket = new THREE.CylinderGeometry(socketR, socketR, socketH, 6);
    socket.rotateY(Math.PI / 6);
    socket.translate(0, length + headH - socketH / 2 + 0.02, 0);
    headGeo = _csgSubtractGeo(headGeo, [socket]);
  } else if (headType === 'flat') {
    const headH = spec.d * 0.55;
    headGeo = new THREE.CylinderGeometry(rFlat, rShaft, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
    // Phillips cross via CSG.subtract — flat heads are typically Phillips
    const slotW = rFlat * 1.5, slotT = rFlat * 0.18;
    const slotD = headH * 0.5;
    const slotY = length + headH - slotD / 2 + 0.02;
    const s1 = new THREE.BoxGeometry(slotW, slotD, slotT); s1.translate(0, slotY, 0);
    const s2 = new THREE.BoxGeometry(slotT, slotD, slotW); s2.translate(0, slotY, 0);
    headGeo = _csgSubtractGeo(headGeo, [s1, s2]);
  }
  if (headGeo) parts.push(headGeo);

  const merged = _mergeBufferGeometries(parts);
  // Required for raycaster picking — without these the bolt mesh's bounding
  // sphere is undefined and click events miss.
  merged.computeBoundingBox();
  merged.computeBoundingSphere();
  return merged;
}

// CSG mesh helper — for fasteners, build a clean threaded mesh with the
// fit clearance baked into the shaft radii so the cut hole is correctly
// sized (slightly oversized for FDM print tolerances). For other bodies,
// the visual mesh IS already CSG-friendly.
function buildFastenerCSGMesh(body) {
  const spec = getFastenerSpec(body.size);
  if (!spec) return body.mesh || null;
  const length  = body.length || (spec.d * 4);
  const headType = body.headType || 'hex';
  const fit = body.fit || 'tight';
  const clearance = FASTENER_FIT_CLEARANCE[fit] || 0;
  const pitch = spec.p;
  const rMajor = (spec.d / 2) + clearance;
  const rMinor = Math.max(0.4, (spec.d / 2) - 0.5413 * pitch + clearance * 0.4);
  const rHex   = spec.af / Math.sqrt(3) + clearance;
  const rCap   = spec.d * 0.85 + clearance;
  const rRound = spec.d * 0.95 + clearance;
  const rFlat  = spec.d * 0.95 + clearance;

  const parts = [];
  const threadedGeo = buildThreadedShaftGeo(rMinor, rMajor, pitch, length);
  parts.push(threadedGeo);
  let headGeo = null;
  if (headType === 'hex') {
    const headH = spec.d * 0.65;
    headGeo = new THREE.CylinderGeometry(rHex, rHex, headH, 6);
    headGeo.rotateY(Math.PI / 6);
    headGeo.translate(0, length + headH / 2, 0);
  } else if (headType === 'phillips') {
    const headH = spec.d * 0.65;
    headGeo = new THREE.CylinderGeometry(rRound, rRound, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
  } else if (headType === 'cap') {
    const headH = spec.d;
    headGeo = new THREE.CylinderGeometry(rCap, rCap, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
  } else if (headType === 'flat') {
    const headH = spec.d * 0.55;
    headGeo = new THREE.CylinderGeometry(rFlat, spec.d / 2 + clearance, headH, 32);
    headGeo.translate(0, length + headH / 2, 0);
  }
  if (headGeo) parts.push(headGeo);
  const merged = _mergeBufferGeometries(parts);
  merged.computeBoundingBox();
  merged.computeBoundingSphere();
  const mesh = new THREE.Mesh(merged, new THREE.MeshBasicMaterial());
  if (body.mesh) {
    mesh.position.copy(body.mesh.position);
    mesh.rotation.copy(body.mesh.rotation);
    mesh.scale.copy(body.mesh.scale);
  }
  mesh.updateMatrixWorld(true);
  return mesh;
}

function getCSGMesh(body) {
  if (body.type === 'fastener') return buildFastenerCSGMesh(body);
  return body.mesh;
}

function build2DProfilePoints(kind, r) {
  const raw = [];
  if (kind === 'hexagon' || kind === 'pentagon' || kind === 'octagon') {
    const N = kind === 'hexagon' ? 6 : kind === 'pentagon' ? 5 : 8;
    // Pentagon points up; hex/oct have a flat side at the bottom
    const phase = (kind === 'pentagon') ? Math.PI / 2 : Math.PI / 2 + Math.PI / N;
    for (let i = 0; i < N; i++) {
      const t = phase + (i * 2 * Math.PI) / N;
      raw.push({ x: Math.cos(t), y: Math.sin(t) });
    }
  } else if (kind === 'star') {
    // 5-point star — alternating outer and inner vertices
    const N = 5;
    const inner = 0.42;
    const phase = Math.PI / 2; // tip up
    for (let i = 0; i < N * 2; i++) {
      const t = phase + (i * Math.PI) / N;
      const rr = (i % 2 === 0) ? 1 : inner;
      raw.push({ x: Math.cos(t) * rr, y: Math.sin(t) * rr });
    }
  } else if (kind === 'heart') {
    // Classic parametric heart curve.  x = 16 sin³t,  y = 13 cos t − 5 cos 2t − 2 cos 3t − cos 4t
    const N = 80;
    for (let i = 0; i < N; i++) {
      const t = 2 * Math.PI - (i / N) * 2 * Math.PI; // CCW
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
      raw.push({ x, y });
    }
  } else if (kind === 'teardrop') {
    // Round bottom, pointed tip at top. Tangent lines from the tip onto a
    // circle give the smooth body, then the two tangents meet at the tip.
    const rb = 0.55, cx0 = 0, cy0 = -0.10;
    const tip = { x: 0, y: 1 };
    const dx = tip.x - cx0, dy = tip.y - cy0;
    const D = Math.hypot(dx, dy);
    const phi = Math.atan2(dy, dx);
    const alpha = Math.acos(rb / D);
    const tA = phi + alpha;
    let aStart = phi - alpha;
    let aEnd = tA;
    if (aEnd > aStart) aEnd -= 2 * Math.PI;
    const N = 60;
    for (let i = 0; i <= N; i++) {
      const a = aStart + (i / N) * (aEnd - aStart);
      raw.push({ x: cx0 + Math.cos(a) * rb, y: cy0 + Math.sin(a) * rb });
    }
    raw.push({ x: tip.x, y: tip.y });
  }
  if (!raw.length) return [];
  // Normalize: center on origin, then scale each axis independently so the
  // shape's bbox is exactly [-r, r] × [-r, r]. This matches the "rectangle"
  // metaphor — the axis values map directly to the bbox, not a circumscribed
  // circle.
  let minX = +Infinity, maxX = -Infinity, minY = +Infinity, maxY = -Infinity;
  for (const p of raw) {
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.y > maxY) maxY = p.y;
  }
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const sx = (maxX - minX) > 1e-9 ? (2 * r) / (maxX - minX) : 1;
  const sy = (maxY - minY) > 1e-9 ? (2 * r) / (maxY - minY) : 1;
  return raw.map(p => ({ x: (p.x - cx) * sx, y: (p.y - cy) * sy }));
}

// THREE.Shape version — used by buildBodyMesh's ExtrudeGeometry.
function build2DProfileShape(kind, r) {
  const pts = build2DProfilePoints(kind, r);
  if (!pts.length) return null;
  const shape = new THREE.Shape();
  shape.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) shape.lineTo(pts[i].x, pts[i].y);
  shape.closePath();
  return shape;
}

function addPrimitive(kind) {
  pushUndo();
  // Default size lands on a clean number in the active unit AND fits the
  // default grid spacing: 1.00 in (25.4 mm) when units = inches, 25 mm in mm mode.
  const u = doc.units === 'in' ? 25.4 : 25;
  const r = u / 2;
  let body = null;
  if (kind === 'cube')          body = { id: doc.nextBodyId++, type: 'cube',     w: u, h: u, d: u };
  // Sphere uses w/h/d so the user can stretch it into an oval (ellipsoid).
  else if (kind === 'sphere')   body = { id: doc.nextBodyId++, type: 'sphere',   w: u, h: u, d: u };
  else if (kind === 'cylinder') body = { id: doc.nextBodyId++, type: 'cylinder', w: u, h: u, d: u };
  else if (kind === 'cone')     body = { id: doc.nextBodyId++, type: 'cone',     w: u, h: u, d: u };
  else if (kind === 'torus')    body = { id: doc.nextBodyId++, type: 'torus',    w: u, h: u * 0.26, d: u };
  else if (kind === 'pyramid')  body = { id: doc.nextBodyId++, type: 'pyramid',  w: u, h: u, d: u };
  // N-sided polygon prisms (hex/pent/oct) and profile-extruded fancy shapes
  // (star/heart/teardrop) all use the cube-style {w, h, d} schema so the
  // student can stretch each axis independently — same as a rectangle.
  else if (kind === 'hexagon')  body = { id: doc.nextBodyId++, type: 'hexagon',  w: u, h: u, d: u };
  else if (kind === 'pentagon') body = { id: doc.nextBodyId++, type: 'pentagon', w: u, h: u, d: u };
  else if (kind === 'octagon')  body = { id: doc.nextBodyId++, type: 'octagon',  w: u, h: u, d: u };
  else if (kind === 'star')     body = { id: doc.nextBodyId++, type: 'star',     w: u, h: u * 0.5, d: u };
  else if (kind === 'heart')    body = { id: doc.nextBodyId++, type: 'heart',    w: u, h: u * 0.5, d: u };
  else if (kind === 'teardrop') body = { id: doc.nextBodyId++, type: 'teardrop', w: u, h: u * 0.5, d: u };
  if (!body) return;
  body.x = body.y = body.z = 0;
  body.op = 'add';
  doc.bodies.push(body);
  doc.selection = { kind: 'body', id: body.id };
  viewer.rebuildBodies();
  renderTree();
  renderProps();
  setStatus(`Added ${kind}`);
}

// Add a threaded fastener with the chosen head type, size, length, and fit.
// fit ∈ 'tight' (= matched bolt, no clearance), 'normal' (+0.1mm radial),
// 'loose' (+0.25mm radial) — used when the fastener is grouped as a negative
// to subtract a printable threaded hole.
function addFastener(headType, size, length, fit) {
  pushUndo();
  const spec = getFastenerSpec(size);
  const len = (typeof length === 'number' && length > 0) ? length : (spec.d * 4);
  const body = {
    id: doc.nextBodyId++,
    type: 'fastener',
    headType: headType || 'hex',
    size: spec.key,
    length: len,
    fit: fit || 'tight',
    x: 0, y: 0, z: 0,
    op: 'add',
  };
  doc.bodies.push(body);
  doc.selection = { kind: 'body', id: body.id };
  viewer.rebuildBodies();
  renderTree();
  renderProps();
  setStatus(`Added ${spec.label} ${FASTENER_HEAD_LABELS[body.headType]} (${fmtUL(len)})`);
}

// Open the fastener picker dialog — head type, size, length, fit all at once.
function openFastenerDialog() {
  const u = unitLabel();
  const sizeOpts = FASTENER_SPECS.map(s =>
    `<option value="${s.key}"${s.key === 'M5' ? ' selected' : ''}>${s.label} · pitch ${s.p.toFixed(2)} mm (${s.system})</option>`
  ).join('');
  const headOpts = FASTENER_HEAD_TYPES.map(t =>
    `<label class="fastener-head-opt">
       <input type="radio" name="fastener-head" value="${t}"${t === 'hex' ? ' checked' : ''}/>
       ${FASTENER_HEAD_LABELS[t]}
     </label>`
  ).join('');
  const defLen = doc.units === 'in' ? 1 : 25;
  openModal({
    title: 'Add a threaded fastener',
    body: `<p>Pick a head type, thread size, length, and fit. Use <b>Loose</b> when you plan to group it as a negative to cut a printable threaded hole.</p>
           <h4 style="margin-top:12px">Head type</h4>
           <div id="fastener-head-grid">${headOpts}</div>
           <div class="field" style="margin-top:10px">
             <label>Thread size</label>
             <select id="fastener-size">${sizeOpts}</select>
           </div>
           <div class="field">
             <label>Length (${u})</label>
             <input id="fastener-length" type="number" value="${defLen}" min="0.1" step="0.5"/>
           </div>
           <div class="field">
             <label>Fit</label>
             <select id="fastener-fit">
               <option value="tight" selected>Tight — actual bolt size</option>
               <option value="normal">Normal — +0.1 mm clearance for printed holes</option>
               <option value="loose">Loose — +0.25 mm clearance for FDM printed holes</option>
             </select>
           </div>
           <div class="hint">Tip: drop a Loose fastener inside a body, set its <b>Operation</b> to Negative, then Group → printable threaded hole.</div>`,
    onConfirm: () => {
      const head = document.querySelector('input[name="fastener-head"]:checked')?.value || 'hex';
      const size = $('fastener-size').value;
      const lenVal = parseFloat($('fastener-length').value);
      const len = lenVal > 0 ? fromUnit(lenVal) : null;
      const fit = $('fastener-fit').value || 'tight';
      addFastener(head, size, len, fit);
    },
  });
}

// Insert a closed-polyline pre-made shape (hexagon, pentagon, octagon, star,
// heart, teardrop) into the active sketch, centered on the visible origin.
// Sized to match grid spacing so swapping with the rect/circle defaults feels
// natural. Used by the 2D toolbar's shape-2d dropdown.
function insert2DShape(kind) {
  if (!doc.sketch || doc.mode !== '2d') {
    showHint('Open a sketch first (or click + Sketch) to insert a 2D shape.');
    return;
  }
  pushUndo();
  const u = doc.units === 'in' ? 25.4 : 25;
  const r = u / 2;
  const ptsLocal = build2DProfilePoints(kind, r);
  if (!ptsLocal.length) return;
  // Place at the sketch view's current center (so it lands on-screen even
  // when the user has panned away from the origin).
  let cx = 0, cy = 0;
  if (sketchEng && sketchEng.svg) {
    const rect = sketchEng.svg.getBoundingClientRect();
    if (rect.width > 10 && rect.height > 10) {
      const c = sketchEng.screenToWorld(rect.width / 2, rect.height / 2);
      cx = c[0];
      cy = c[1];
    }
  }
  const points = ptsLocal.map(p => ({ x: p.x + cx, y: p.y + cy }));
  const ent = {
    id: doc.sketch.nextId++,
    type: 'polyline',
    points,
    closed: true,
  };
  doc.sketch.entities.push(ent);
  doc.selection = { kind: 'sketch', id: ent.id };
  doc.multiSelectedSketch = [ent.id];
  if (sketchEng) sketchEng.render();
  renderTree();
  renderProps();
  if (viewer) viewer.updateSketchOverlay();
  setStatus(`Added ${kind} to sketch`);
}

// Pan and zoom the 2D sketch view so the projected body silhouette is centered
// and fills ~60% of the canvas. Used when entering a sketch — esp. Sketch on Face.
function fitSketchViewToBodies() {
  if (!sketchEng) return;
  if (!doc.bodies.length || !doc.sketch?.plane) {
    // No bodies — center on origin at default zoom
    sketchEng.view.panX = 0;
    sketchEng.view.panY = 0;
    sketchEng.view.pxPerMm = 4;
    sketchEng.render();
    return;
  }
  const segs = projectBodiesOntoPlane(doc.sketch.plane);
  if (!segs.length) { sketchEng.render(); return; }

  let minX = +Infinity, minY = +Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const s of segs) {
    minX = Math.min(minX, s.p1.x, s.p2.x);
    minY = Math.min(minY, s.p1.y, s.p2.y);
    maxX = Math.max(maxX, s.p1.x, s.p2.x);
    maxY = Math.max(maxY, s.p1.y, s.p2.y);
  }
  const cx = (minX + maxX) / 2;
  const cy = (minY + maxY) / 2;
  const bw = Math.max(maxX - minX, 0.001);
  const bh = Math.max(maxY - minY, 0.001);

  const rect = sketchEng.svg.getBoundingClientRect();
  if (rect.width < 10 || rect.height < 10) { sketchEng.render(); return; }
  const fillFraction = 0.65;
  const zoomX = (rect.width * fillFraction) / bw;
  const zoomY = (rect.height * fillFraction) / bh;
  sketchEng.view.pxPerMm = clamp(Math.min(zoomX, zoomY), 0.5, 80);
  // Pan so the body's projected center sits at canvas center
  sketchEng.view.panX = -cx * sketchEng.view.pxPerMm;
  sketchEng.view.panY = cy * sketchEng.view.pxPerMm; // SVG y is flipped vs sketch y
  $('zoom-display').textContent = Math.round(sketchEng.view.pxPerMm * 25) + '%';
  sketchEng.render();
}

// Create a new sketch on the given plane and switch to 2D editing it.
// Project a body's bbox onto a sketch plane and return the bounding rectangle
// in sketch (u, v) coordinates — used as the implicit face boundary for v2
// region subdivision.
function computeFaceBoundary(bbox, plane, body) {
  const o = new THREE.Vector3(...plane.origin);
  const u = new THREE.Vector3(...plane.u);
  const v = new THREE.Vector3(...plane.v);
  // If the body is a GROUP (sphere with cuts auto-merged, etc.), recursively
  // hunt down the largest positive curved child and use its silhouette as the
  // boundary — otherwise we'd fall through to the bbox-rect fallback and lose
  // the curved outline. Handles nested groups (group containing a group).
  if (body && body.type === 'group' && Array.isArray(body.children)) {
    const score = (c) => (c.r || 0) + (c.tube || 0) + (c.w || 0) / 2 + (c.h || 0) / 2;
    const findCurvedDeep = (kids, accumOffset) => {
      let best = null, bestScore = -1, bestOffset = null;
      for (const child of kids) {
        if (child.op === 'subtract') continue;
        const off = {
          x: accumOffset.x + (child.x || 0),
          y: accumOffset.y + (child.y || 0),
          z: accumOffset.z + (child.z || 0),
        };
        if (child.type === 'sphere' || child.type === 'torus') {
          const s = score(child);
          if (s > bestScore) { best = child; bestScore = s; bestOffset = off; }
        } else if (child.type === 'group' && Array.isArray(child.children)) {
          const nested = findCurvedDeep(child.children, off);
          if (nested && score(nested.child) > bestScore) {
            best = nested.child;
            bestScore = score(nested.child);
            bestOffset = nested.offset;
          }
        }
      }
      return best ? { child: best, offset: bestOffset } : null;
    };
    const found = findCurvedDeep(body.children, {
      x: body.x || 0, y: body.y || 0, z: body.z || 0,
    });
    if (found) {
      const primary = found.child;
      const off = found.offset;
      const ghost = JSON.parse(JSON.stringify(primary));
      const halfH = (primary.h || 0) / 2;
      ghost.mesh = { position: new THREE.Vector3(off.x, halfH + off.y, off.z) };
      const r = Math.max(primary.w || 0, primary.h || 0, primary.d || 0) / 2 || 1;
      const c = ghost.mesh.position;
      const childBbox = new THREE.Box3(
        new THREE.Vector3(c.x - r, c.y - r, c.z - r),
        new THREE.Vector3(c.x + r, c.y + r, c.z + r),
      );
      return computeFaceBoundary(childBbox, plane, ghost);
    }
  }
  // For spheres / torus the orthogonal silhouette on an axis-aligned plane is
  // an ellipse (or circle when the body is uniform). Use the body's w/h/d to
  // compute semi-axes against the plane's u and v vectors.
  if (body && (body.type === 'sphere' || body.type === 'torus')) {
    const cWorld = (body.mesh && body.mesh.position)
      ? body.mesh.position.clone()
      : new THREE.Vector3(body.x || 0, ((body.h || 0) / 2) + (body.y || 0), body.z || 0);
    const local = cWorld.clone().sub(o);
    const halfW = (body.w || 0) / 2;
    const halfH = (body.h || 0) / 2;
    const halfD = (body.d || 0) / 2;
    const rx = Math.abs(u.x) * halfW + Math.abs(u.y) * halfH + Math.abs(u.z) * halfD;
    const ry = Math.abs(v.x) * halfW + Math.abs(v.y) * halfH + Math.abs(v.z) * halfD;
    if (Math.abs(rx - ry) < 1e-3) {
      return { type: 'circle', cx: local.dot(u), cy: local.dot(v), r: rx };
    }
    return { type: 'ellipse', cx: local.dot(u), cy: local.dot(v), rx, ry };
  }
  const corners = [
    new THREE.Vector3(bbox.min.x, bbox.min.y, bbox.min.z),
    new THREE.Vector3(bbox.max.x, bbox.min.y, bbox.min.z),
    new THREE.Vector3(bbox.min.x, bbox.max.y, bbox.min.z),
    new THREE.Vector3(bbox.max.x, bbox.max.y, bbox.min.z),
    new THREE.Vector3(bbox.min.x, bbox.min.y, bbox.max.z),
    new THREE.Vector3(bbox.max.x, bbox.min.y, bbox.max.z),
    new THREE.Vector3(bbox.min.x, bbox.max.y, bbox.max.z),
    new THREE.Vector3(bbox.max.x, bbox.max.y, bbox.max.z),
  ];
  let umin = Infinity, umax = -Infinity, vmin = Infinity, vmax = -Infinity;
  for (const c of corners) {
    const local = c.clone().sub(o);
    const us = local.dot(u);
    const vs = local.dot(v);
    if (us < umin) umin = us; if (us > umax) umax = us;
    if (vs < vmin) vmin = vs; if (vs > vmax) vmax = vs;
  }
  if (umax - umin < 0.01 || vmax - vmin < 0.01) return null;
  return { type: 'rect', x: umin, y: vmin, w: umax - umin, h: vmax - vmin };
}

function createSketchOnPlane(plane, opts = {}) {
  pushUndo();
  const id = doc.nextSketchId++;
  const name = plane.kind === 'face' ? `Face Sketch ${id}` : `${plane.name || 'Sketch'} ${id}`;
  const sk = { id, plane, entities: [], nextId: 1, name };
  if (opts.boundary)     sk.boundary     = opts.boundary;
  if (opts.sourceBodyId) sk.sourceBodyId = opts.sourceBodyId;
  doc.sketches.push(sk);
  doc.activeSketchId = id;
  doc.selection = null;
  doc.multiSelectedSketch = [];
  setMode('2d');
  // Fit view to the projected bodies — defer 2 frames so the SVG layout is
  // finalized after display:block flips on. Single frame isn't always enough.
  requestAnimationFrame(() => requestAnimationFrame(fitSketchViewToBodies));
  renderTree();
  renderProps();
  setStatus(`Sketching on ${name} — draw a profile, then switch back to 3D and Extrude or Combine.`);
}

// True if the picked face point sits on a smoothly curved surface — sphere
// or torus everywhere, cylinder/cone lateral wall (not the flat caps).
// On a tessellated curve, every triangle's normal points slightly differently
// from its neighbors, so using that normal for a sketch plane gives a
// perceptibly slanted plane. We detect these and route to a flat reference plane.
function isFaceOnCurvedSurface(body, hit) {
  if (!body || !hit) return false;
  if (body.type === 'sphere' || body.type === 'torus') return true;
  if (body.type === 'cylinder' || body.type === 'cone') {
    // The flat caps have a normal aligned with world ±Y. Anything else is
    // a side triangle on the curved lateral wall.
    const nLocal = hit.face.normal.clone();
    const nWorld = nLocal.transformDirection(hit.object.matrixWorld).normalize();
    return Math.abs(nWorld.y) < 0.95;
  }
  // Cube fillet: when the radius is large enough, lateral edges become
  // smoothly curved. Picking a triangle on that round corner is also bad.
  if (body.type === 'cube' && body.filletRadius > 0) {
    const nLocal = hit.face.normal.clone();
    const nWorld = nLocal.transformDirection(hit.object.matrixWorld).normalize();
    // A flat face on a cube has a normal aligned with one cardinal axis.
    const axes = [Math.abs(nWorld.x), Math.abs(nWorld.y), Math.abs(nWorld.z)];
    const maxA = Math.max(...axes);
    return maxA < 0.97; // not aligned → on a rounded corner
  }
  // Group bodies (sphere with cuts, etc.) — if any positive child is curved,
  // the merged surface is curved too. Recurse into nested groups so a
  // sphere-with-tunnel that gets cut a SECOND time (creating a group
  // containing a group) still triggers the plane chooser.
  if (body.type === 'group' && Array.isArray(body.children)) {
    const walk = (kids) => {
      for (const child of kids) {
        if (child.op === 'subtract') continue;
        if (child.type === 'sphere' || child.type === 'torus') return true;
        if (child.type === 'cylinder' || child.type === 'cone') return true;
        if (child.type === 'group' && Array.isArray(child.children)) {
          if (walk(child.children)) return true;
        }
      }
      return false;
    };
    if (walk(body.children)) return true;
  }
  return false;
}

// When the user tries to "Sketch on Face" of a sphere/cone/cylinder lateral
// surface, we don't have a sensible flat plane. Pop a chooser so they pick
// one of the three principal reference planes — and remember the body so its
// silhouette becomes the implicit boundary on the new sketch.
// Build a sketch plane tangent to one of the 6 faces of a body's bbox
// (axis ∈ 'x'|'y'|'z', sign ∈ +1|-1). Used by the bbox-face picker that
// replaced the old Top/Front/Right modal so students can sketch on any side.
function finishCurvedBodySketchOnSide(body, axis, sign) {
  if (!body || !body.mesh) return;
  const bbox = new THREE.Box3().setFromObject(body.mesh);
  if (bbox.isEmpty()) return;
  const center = bbox.getCenter(new THREE.Vector3());
  const FUDGE = 0.05;
  let plane;
  // For each side: origin sits at the bbox extreme along the axis (slightly
  // outside via FUDGE), normal points outward, and (u, v) form a sensible
  // 2D frame. v always points "up" in the sketch view when possible.
  if (axis === 'y' && sign === +1) plane = {
    origin: [center.x, bbox.max.y + FUDGE, center.z],
    u: [1, 0, 0], v: [0, 0, -1], n: [0, 1, 0],
    kind: 'reference', name: 'Top (+Y)',
  };
  else if (axis === 'y' && sign === -1) plane = {
    origin: [center.x, bbox.min.y - FUDGE, center.z],
    u: [1, 0, 0], v: [0, 0, 1], n: [0, -1, 0],
    kind: 'reference', name: 'Bottom (−Y)',
  };
  else if (axis === 'z' && sign === +1) plane = {
    origin: [center.x, center.y, bbox.max.z + FUDGE],
    u: [1, 0, 0], v: [0, 1, 0], n: [0, 0, 1],
    kind: 'reference', name: 'Front (+Z)',
  };
  else if (axis === 'z' && sign === -1) plane = {
    origin: [center.x, center.y, bbox.min.z - FUDGE],
    u: [-1, 0, 0], v: [0, 1, 0], n: [0, 0, -1],
    kind: 'reference', name: 'Back (−Z)',
  };
  else if (axis === 'x' && sign === +1) plane = {
    origin: [bbox.max.x + FUDGE, center.y, center.z],
    u: [0, 0, -1], v: [0, 1, 0], n: [1, 0, 0],
    kind: 'reference', name: 'Right (+X)',
  };
  else plane = {
    origin: [bbox.min.x - FUDGE, center.y, center.z],
    u: [0, 0, 1], v: [0, 1, 0], n: [-1, 0, 0],
    kind: 'reference', name: 'Left (−X)',
  };
  const boundary = computeFaceBoundary(bbox, plane, body);
  createSketchOnPlane(plane, { boundary, sourceBodyId: body.id });
}

// Enter "pick a face" mode in 3D
function startSketchOnFace() {
  if (!doc.bodies.length) {
    showHint('Add a 3D body first, then sketch on its face.');
    return;
  }
  if (doc.mode !== '3d') setMode('3d');
  doc.faceMode = true;
  if (viewer) viewer.canvas.style.cursor = 'crosshair';
  setStatus('Click a face on any body to start a sketch on it. Esc to cancel.');
}

// New sketch on a chosen reference plane (XY/YZ/XZ)
function newSketchOnPlane(kind) {
  let plane;
  if (kind === 'top' || kind === 'xz') plane = { ...GROUND_PLANE, name: 'Top (XZ)' };
  else if (kind === 'front' || kind === 'xy') plane = {
    origin: [0, 0, 0], u: [1, 0, 0], v: [0, 1, 0], n: [0, 0, 1],
    kind: 'reference', name: 'Front (XY)',
  };
  else if (kind === 'right' || kind === 'yz') plane = {
    origin: [0, 0, 0], u: [0, 0, -1], v: [0, 1, 0], n: [1, 0, 0],
    kind: 'reference', name: 'Right (YZ)',
  };
  else plane = { ...GROUND_PLANE };
  createSketchOnPlane(plane);
}

function openNewSketchDialog() {
  openModal({
    title: 'New sketch on plane',
    body: `<p>Pick a reference plane to sketch on. (Or use <b>Sketch on Face</b> in the 3D toolbar to sketch on any body face.)</p>
           <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
             <button class="action" id="np-top" style="flex:1">Top (XZ)</button>
             <button class="action" id="np-front" style="flex:1">Front (XY)</button>
             <button class="action" id="np-right" style="flex:1">Right (YZ)</button>
           </div>`,
    hideOk: true,
    custom: () => {
      const close = () => $('modal-bg').classList.remove('show');
      $('np-top').onclick = () => { newSketchOnPlane('top'); close(); };
      $('np-front').onclick = () => { newSketchOnPlane('front'); close(); };
      $('np-right').onclick = () => { newSketchOnPlane('right'); close(); };
    },
  });
}

// Apply a resize-handle drag to the body. `delta` is the signed distance the
// face moved along its axis. `sign` tells us which face (+/-).
// uniform=true → scale all dimensions proportionally (Shift held).
// Floating dimension labels — no box, text with a white halo, rotated to run
// parallel to the edge each one measures. Edge picks are camera-aware so the
// labels always live on the side facing the viewer.
function showDimLabels(body) {
  const overlay = $('dim-overlay');
  if (!overlay || !viewer || !body || !body.mesh) { hideDimLabels(); return; }
  viewer.scene.updateMatrixWorld(true);
  const bb = new THREE.Box3().setFromObject(body.mesh);
  if (bb.isEmpty()) { hideDimLabels(); return; }
  const ctr = bb.getCenter(new THREE.Vector3());
  const off = Math.max(5, Math.max(bb.max.x - bb.min.x, bb.max.y - bb.min.y, bb.max.z - bb.min.z) * 0.10);

  // Camera direction from the body's center — used to pick which edges face us
  const camDir = new THREE.Vector3().subVectors(viewer.camera.position, ctr).normalize();
  const pickEdge = (cands) => {
    let best = cands[0], bestScore = -Infinity;
    for (const c of cands) {
      const s = c.outward.dot(camDir);
      if (s > bestScore) { bestScore = s; best = c; }
    }
    return best;
  };

  // Universal X/Y/Z dimensioning — every body type gets the same three labels
  // pulled from its world-space bounding box. Width along the bottom-front
  // edge, Depth along the bottom-side, Height up a vertical corner, all with
  // camera-aware edge picking so labels always live on the side facing the
  // viewer.
  const items = [];
  {
    const sz = bb.getSize(new THREE.Vector3());
    const w = pickEdge([
      { y: bb.min.y, z: bb.max.z, outward: new THREE.Vector3(0, -1,  1).normalize() },
      { y: bb.min.y, z: bb.min.z, outward: new THREE.Vector3(0, -1, -1).normalize() },
    ]);
    const wOff = w.outward.clone().multiplyScalar(off * 0.4);
    items.push({
      a: new THREE.Vector3(bb.min.x, w.y, w.z).add(wOff),
      b: new THREE.Vector3(bb.max.x, w.y, w.z).add(wOff),
      text: fmtUL(sz.x),
    });
    const d = pickEdge([
      { x: bb.max.x, y: bb.min.y, outward: new THREE.Vector3( 1, -1, 0).normalize() },
      { x: bb.min.x, y: bb.min.y, outward: new THREE.Vector3(-1, -1, 0).normalize() },
    ]);
    const dOff = d.outward.clone().multiplyScalar(off * 0.4);
    items.push({
      a: new THREE.Vector3(d.x, d.y, bb.max.z).add(dOff),
      b: new THREE.Vector3(d.x, d.y, bb.min.z).add(dOff),
      text: fmtUL(sz.z),
    });
    const hh = pickEdge([
      { x: bb.max.x, z: bb.max.z, outward: new THREE.Vector3( 1, 0,  1).normalize() },
      { x: bb.min.x, z: bb.max.z, outward: new THREE.Vector3(-1, 0,  1).normalize() },
      { x: bb.max.x, z: bb.min.z, outward: new THREE.Vector3( 1, 0, -1).normalize() },
      { x: bb.min.x, z: bb.min.z, outward: new THREE.Vector3(-1, 0, -1).normalize() },
    ]);
    const hhOff = hh.outward.clone().multiplyScalar(off * 0.6);
    items.push({
      a: new THREE.Vector3(hh.x, bb.min.y, hh.z).add(hhOff),
      b: new THREE.Vector3(hh.x, bb.max.y, hh.z).add(hhOff),
      text: fmtUL(sz.y),
    });
  }
  if (!items.length) { hideDimLabels(); return; }

  const cArea = $('canvas-area').getBoundingClientRect();
  const canvasRect = viewer.canvas.getBoundingClientRect();
  const proj = (worldPos) => {
    const v = worldPos.clone().project(viewer.camera);
    return {
      x: canvasRect.left + (v.x + 1) / 2 * canvasRect.width - cArea.left,
      y: canvasRect.top + (1 - v.y) / 2 * canvasRect.height - cArea.top,
      z: v.z,
    };
  };

  overlay.innerHTML = '';
  for (const item of items) {
    const a = proj(item.a);
    const b = proj(item.b);
    if (a.z >= 1 || b.z >= 1) continue;
    const mx = (a.x + b.x) / 2;
    const my = (a.y + b.y) / 2;
    let angle = Math.atan2(b.y - a.y, b.x - a.x);
    // Keep text upright — flip if upside down
    if (angle > Math.PI / 2) angle -= Math.PI;
    if (angle < -Math.PI / 2) angle += Math.PI;
    const div = document.createElement('div');
    div.className = 'dim-label-3d';
    div.textContent = item.text;
    div.style.left = mx + 'px';
    div.style.top = my + 'px';
    div.style.transform = `translate(-50%, -50%) rotate(${angle}rad)`;
    overlay.appendChild(div);
  }
}
function hideDimLabels() {
  const overlay = $('dim-overlay');
  if (overlay) overlay.innerHTML = '';
}

function applyResize(rs, delta) {
  const b = rs.body;
  const sign = rs.sign;
  const MIN = 0.1;
  // If snap-to-grid is on, round the *delta* itself so dimensions land on grid steps
  let Δ = sign * delta;
  if (doc.grid?.snap) {
    const step = doc.grid.spacing || 1;
    Δ = Math.round(Δ / step) * step;
  }
  const snappedDelta = sign * Δ; // re-apply sign for downstream position math

  // Helper for "anchor opposite face" cube-style resize on linear dims
  const anchorAxis = (key, posKey, isYBottom) => {
    const oldVal = rs.startDims[key];
    const newVal = Math.max(MIN, oldVal + Δ);
    b[key] = newVal;
    if (posKey === 'y') {
      if (sign < 0) {
        b.y = rs.startPos.y + rs.startDims[key] - newVal;
      } else {
        b.y = rs.startPos.y;
      }
    } else {
      b[posKey] = rs.startPos[posKey] + snappedDelta / 2;
    }
    return newVal / oldVal;
  };

  if (b.type === 'cube' ||
      b.type === 'hexagon' || b.type === 'pentagon' || b.type === 'octagon' ||
      b.type === 'star' || b.type === 'heart' || b.type === 'teardrop' ||
      b.type === 'sphere' || b.type === 'cylinder' || b.type === 'cone' ||
      b.type === 'pyramid' || b.type === 'torus') {
    const axisToKey = { x: 'w', y: 'h', z: 'd' };
    const dim = axisToKey[rs.axis];
    const factor = anchorAxis(dim, rs.axis, rs.axis === 'y');
    if (rs.uniform) {
      b.w = Math.max(MIN, rs.startDims.w * factor);
      b.h = Math.max(MIN, rs.startDims.h * factor);
      b.d = Math.max(MIN, rs.startDims.d * factor);
      // Re-anchor only the dragged face for uniform too
      if (rs.axis !== 'y') b[rs.axis] = rs.startPos[rs.axis] + snappedDelta / 2;
      else if (sign < 0) b.y = rs.startPos.y + rs.startDims.h - b.h;
      else b.y = rs.startPos.y;
    }
  } else if (b.type === 'old_cylinder_legacy_unused') {
    if (rs.axis === 'y') {
      const factor = anchorAxis('h', 'y', true);
      if (rs.uniform) b.r = Math.max(MIN, rs.startDims.r * factor);
    } else {
      const newR = Math.max(MIN, rs.startDims.r + Math.abs(Δ));
      const factor = newR / rs.startDims.r;
      b.r = newR;
      if (rs.uniform) b.h = Math.max(MIN, rs.startDims.h * factor);
    }
  } else if (b.type === 'torus') {
    if (rs.axis === 'y') {
      b.tube = Math.max(MIN, rs.startDims.tube + Δ / 2);
    } else {
      b.r = Math.max(MIN, rs.startDims.r + Math.abs(Δ));
    }
  } else if (b.type === 'extrude') {
    if (rs.axis === 'y') {
      const factor = anchorAxis('height', 'y', true);
      if (rs.uniform) {
        // No XZ scaling for extrude in v1 — would require sketch transform
      }
    }
  }
}

// Revolve / Lathe — spin a 2D polyline profile around the active sketch's Y axis
// to create a 3D body (chess-pawn-style workflow).
function revolveCurrentSketch() {
  const sketch = doc.sketch;
  if (!sketch) return;
  const profile = sketch.entities.find(e => e.type === 'polyline' && !e.construction && e.points?.length >= 2);
  if (!profile) {
    showHint('Draw a polyline profile first — a series of connected lines on one side of the sketch\'s Y axis.');
    return;
  }
  // Validate: all profile points should have x >= 0 (revolve axis is sketch X = 0)
  const minX = Math.min(...profile.points.map(p => p.x));
  if (minX < -0.5) {
    showHint('Profile must lie to the right of the Y axis (sketch x ≥ 0). The Y axis is the revolution axis.');
    return;
  }
  openModal({
    title: 'Revolve profile',
    body: `<p>Spin the polyline around the sketch's vertical (Y) axis to make a body.</p>
           <p style="color:var(--ink-muted);font-size:12px">Tip: works best on a <b>Front</b> or <b>Right</b> reference plane sketch so the body stands up in 3D.</p>
           <div class="field"><label>Smoothness</label><input id="rv-segs" type="number" value="48" min="6" max="128" step="1"/></div>`,
    onConfirm: () => {
      const segs = parseInt($('rv-segs').value, 10) || 48;
      pushUndo();
      const sketchCopy = JSON.parse(JSON.stringify(sketch));
      sketchCopy.entities = sketchCopy.entities.filter(e => !e.construction);
      const body = {
        id: doc.nextBodyId++, type: 'revolve',
        sketch: sketchCopy,
        plane: JSON.parse(JSON.stringify(sketch.plane)),
        segments: segs,
        x: 0, y: 0, z: 0,
        op: 'add',
      };
      doc.bodies.push(body);
      doc.selection = { kind: 'body', id: body.id };
      doc.multiSelectedBodies = [body.id];
      setMode('3d');
      renderTree(); renderProps();
      setStatus('Revolved profile into a body');
    },
  });
}

// Align selected bodies along an axis: 'x'|'y'|'z' + 'min'|'mid'|'max'
function alignBodies(spec) {
  if (!doc.multiSelectedBodies?.length || doc.multiSelectedBodies.length < 2) {
    showHint('Shift-click 2+ bodies first, then align.');
    return;
  }
  const [axis, kind] = spec.split('-');
  const ids = [...doc.multiSelectedBodies];
  const meshes = ids.map(id => doc.bodies.find(b => b.id === id)?.mesh).filter(Boolean);
  if (meshes.length < 2) return;
  viewer.scene.updateMatrixWorld(true);
  // Compute bounding boxes for each
  const boxes = meshes.map(m => new THREE.Box3().setFromObject(m));
  // Determine the target value
  let target;
  if (kind === 'min') target = Math.min(...boxes.map(b => b.min[axis]));
  else if (kind === 'max') target = Math.max(...boxes.map(b => b.max[axis]));
  else target = (Math.min(...boxes.map(b => b.min[axis])) + Math.max(...boxes.map(b => b.max[axis]))) / 2;
  // Adjust each body's position so its bbox aligns
  for (let i = 0; i < ids.length; i++) {
    const id = ids[i];
    const body = doc.bodies.find(b => b.id === id);
    if (!body) continue;
    const box = boxes[i];
    let curRef;
    if (kind === 'min') curRef = box.min[axis];
    else if (kind === 'max') curRef = box.max[axis];
    else curRef = (box.min[axis] + box.max[axis]) / 2;
    const delta = target - curRef;
    body[axis] = (body[axis] || 0) + delta;
  }
  viewer.rebuildBodies();
  viewer.updateGizmo();
  renderProps();
  setStatus(`Aligned ${ids.length} bodies — ${spec.replace('-', ' ')}`);
}

function groupSelected(skipUndo) {
  if (doc.mode === '3d') {
    // 3D Group = boolean: positives unioned, negatives subtracted.
    // Children are stored on the group so Ungroup is reversible.
    if (typeof CSG === 'undefined') { showHint('CSG library failed to load.'); return; }
    if (!doc.multiSelectedBodies || doc.multiSelectedBodies.length < 2) {
      showHint('Shift-click 2+ bodies first, then group.');
      return;
    }
    if (!skipUndo) pushUndo();
    const ids = [...doc.multiSelectedBodies];
    const bodies = ids.map(id => doc.bodies.find(b => b.id === id)).filter(Boolean);
    const positives = bodies.filter(b => b.op !== 'subtract');
    const negatives = bodies.filter(b => b.op === 'subtract');
    if (!positives.length) { showHint('Group needs at least one positive body.'); return; }

    setStatus('Grouping…');
    let geometry;
    try {
      viewer.scene.updateMatrixWorld(true);
      // Fasteners use a simplified smooth-cylinder envelope for CSG (their
      // visual mesh has the threaded helix which is non-manifold and confuses
      // the boolean engine). Other body types use their real mesh directly.
      let result = getCSGMesh(positives[0]);
      for (let i = 1; i < positives.length; i++) result = CSG.union(result, getCSGMesh(positives[i]));
      for (const n of negatives) result = CSG.subtract(result, getCSGMesh(n));
      result.updateMatrixWorld(true);
      geometry = result.geometry.clone();
      geometry.applyMatrix4(result.matrixWorld);
      geometry.computeVertexNormals();
    } catch (err) {
      console.error('Group CSG failed:', err);
      showHint('Group failed — geometry too complex. Check console.');
      return;
    }

    // Save children as deep copies so Ungroup can fully restore them
    const children = bodies.map(b => {
      const c = JSON.parse(JSON.stringify(b));
      delete c.mesh;
      return c;
    });
    const group = {
      id: doc.nextBodyId++, type: 'group',
      children, geometry,
      op: 'add', x: 0, y: 0, z: 0,
    };
    doc.bodies = doc.bodies.filter(b => !ids.includes(b.id));
    doc.bodies.push(group);
    doc.selection = { kind: 'body', id: group.id };
    doc.multiSelectedBodies = [group.id];
    viewer.rebuildBodies();
    renderTree(); renderProps();
    setStatus(`Grouped ${children.length} bodies — ungroup to restore`);
    return;
  }
  // 2D sketch group
  if (!doc.multiSelectedSketch || doc.multiSelectedSketch.length < 2) {
    showHint('Pick 2+ shapes first — Shift-click adds shapes to the selection.');
    return;
  }
  const newGroupId = 'g' + Date.now() + '_' + Math.floor(Math.random() * 1000);
  for (const id of doc.multiSelectedSketch) {
    const ent = doc.sketch.entities.find(e => e.id === id);
    if (ent) ent.groupId = newGroupId;
  }
  sketchEng.render();
  setStatus(`Grouped ${doc.multiSelectedSketch.length} shapes`);
}
function ungroupSelected() {
  if (doc.mode === '3d') {
    // Restore the children of any selected group bodies (reverses the boolean)
    if (!doc.multiSelectedBodies?.length) { showHint('Select a group first.'); return; }
    pushUndo();
    const ids = [...doc.multiSelectedBodies];
    const newSelection = [];
    let count = 0;
    for (const id of ids) {
      const group = doc.bodies.find(b => b.id === id);
      if (!group || group.type !== 'group') continue;
      // Restore each child with a fresh ID; apply the group's translation offset
      for (const child of group.children) {
        const restored = JSON.parse(JSON.stringify(child));
        restored.id = doc.nextBodyId++;
        restored.x = (restored.x || 0) + (group.x || 0);
        restored.y = (restored.y || 0) + (group.y || 0);
        restored.z = (restored.z || 0) + (group.z || 0);
        delete restored.mesh;
        doc.bodies.push(restored);
        newSelection.push(restored.id);
      }
      doc.bodies = doc.bodies.filter(b => b.id !== id);
      count++;
    }
    if (count === 0) { showHint('Selection contains no groups.'); return; }
    doc.multiSelectedBodies = newSelection;
    doc.selection = newSelection.length ? { kind: 'body', id: newSelection[0] } : null;
    viewer.rebuildBodies();
    renderTree(); renderProps();
    setStatus(`Ungrouped ${count} group${count > 1 ? 's' : ''} — ${newSelection.length} bodies restored`);
    return;
  }
  if (!doc.multiSelectedSketch?.length) {
    showHint('Select a grouped shape first.');
    return;
  }
  const removedGroups = new Set();
  for (const id of doc.multiSelectedSketch) {
    const ent = doc.sketch.entities.find(e => e.id === id);
    if (ent && ent.groupId != null) {
      removedGroups.add(ent.groupId);
      ent.groupId = null;
    }
  }
  for (const ent of doc.sketch.entities) {
    if (ent.groupId != null && removedGroups.has(ent.groupId)) ent.groupId = null;
  }
  sketchEng.render();
  setStatus(`Ungrouped ${removedGroups.size || 0} group${removedGroups.size === 1 ? '' : 's'}`);
}

// Mirror selected 3D body across an axis plane (XY / YZ / XZ)
function mirror3DBody(planeKind) {
  if (!doc.selection || doc.selection.kind !== 'body') {
    showHint('Select a 3D body first.');
    return;
  }
  const body = doc.bodies.find(b => b.id === doc.selection.id);
  if (!body) return;
  pushUndo();
  const copy = JSON.parse(JSON.stringify(body));
  delete copy.mesh;
  copy.id = doc.nextBodyId++;
  // Flip the appropriate position component
  if (planeKind === 'yz') copy.x = -(body.x || 0);
  else if (planeKind === 'xz') copy.y = -(body.y || 0);
  else if (planeKind === 'xy') copy.z = -(body.z || 0);
  // For extrudes with a plane, also mirror the plane
  if (copy.type === 'extrude' && copy.plane) {
    const flipKey = planeKind === 'yz' ? 0 : planeKind === 'xz' ? 1 : 2;
    copy.plane.origin[flipKey] = -copy.plane.origin[flipKey];
    copy.plane.u[flipKey] = -copy.plane.u[flipKey];
    copy.plane.v[flipKey] = -copy.plane.v[flipKey];
    copy.plane.n[flipKey] = -copy.plane.n[flipKey];
  }
  doc.bodies.push(copy);
  doc.selection = { kind: 'body', id: copy.id };
  viewer?.rebuildBodies();
  renderTree(); renderProps();
  setStatus(`Mirrored across ${planeKind.toUpperCase()} plane`);
}

function combineBodies() {
  if (typeof CSG === 'undefined') {
    showHint('CSG library failed to load — keep csg.bundle.js next to mini-cad.html.');
    return;
  }
  if (!doc.bodies.length) { showHint('No bodies to combine.'); return; }
  const positives = doc.bodies.filter(b => b.op !== 'subtract');
  const negatives = doc.bodies.filter(b => b.op === 'subtract');
  if (!positives.length) { showHint('Need at least one positive solid.'); return; }
  if (positives.length === 1 && !negatives.length) { showHint('Only one positive — nothing to combine.'); return; }
  setStatus('Computing combine…');
  try {
    viewer.scene.updateMatrixWorld(true);
    let result = getCSGMesh(positives[0]);
    for (let i = 1; i < positives.length; i++) result = CSG.union(result, getCSGMesh(positives[i]));
    for (const n of negatives) result = CSG.subtract(result, getCSGMesh(n));
    // Bake world transform into geometry so position/rotation are absorbed
    result.updateMatrixWorld(true);
    const baked = result.geometry.clone();
    baked.applyMatrix4(result.matrixWorld);
    baked.computeVertexNormals();
    const combined = {
      id: doc.nextBodyId++, type: 'combined',
      geometry: baked, op: 'add',
      x: 0, y: 0, z: 0,
    };
    doc.bodies = [combined];
    doc.selection = { kind: 'body', id: combined.id };
    viewer.rebuildBodies();
    renderTree(); renderProps();
    setStatus(`Combined ${positives.length} positive${positives.length>1?'s':''}${negatives.length?` − ${negatives.length} negative${negatives.length>1?'s':''}`:''}`);
  } catch (err) {
    console.error('Combine failed:', err);
    showHint('Combine failed — geometry may be too complex. Check console.');
  }
}

function copySelection() {
  let items = [];
  let kind = null;
  if (doc.mode === '2d') {
    const ids = (doc.multiSelectedSketch?.length ? doc.multiSelectedSketch :
                (doc.selection?.kind === 'sketch' ? [doc.selection.id] : []));
    items = ids.map(id => doc.sketch.entities.find(e => e.id === id))
               .filter(Boolean)
               .map(e => JSON.parse(JSON.stringify(e)));
    kind = 'sketch';
  } else {
    const ids = (doc.multiSelectedBodies?.length ? doc.multiSelectedBodies :
                (doc.selection?.kind === 'body' ? [doc.selection.id] : []));
    items = ids.map(id => doc.bodies.find(b => b.id === id))
               .filter(Boolean)
               .map(b => { const c = JSON.parse(JSON.stringify(b)); delete c.mesh; return c; });
    kind = 'body';
  }
  if (!items.length) { showHint('Nothing selected to copy.'); return; }
  doc.clipboard = { kind, items };
  setStatus(`Copied ${items.length} item${items.length === 1 ? '' : 's'}`);
}

function pasteSelection() {
  if (!doc.clipboard?.items?.length) { showHint('Clipboard is empty. Copy something first.'); return; }
  pushUndo();
  const newIds = [];
  if (doc.clipboard.kind === 'sketch') {
    for (const item of doc.clipboard.items) {
      const ent = JSON.parse(JSON.stringify(item));
      ent.id = doc.sketch.nextId++;
      if (ent.type === 'rect') { ent.x += 5; ent.y += 5; }
      else if (ent.type === 'circle') { ent.cx += 5; ent.cy += 5; }
      else if (ent.type === 'polyline') ent.points = ent.points.map(p => ({ x: p.x + 5, y: p.y + 5 }));
      doc.sketch.entities.push(ent);
      newIds.push(ent.id);
    }
    doc.multiSelectedSketch = newIds;
    doc.selection = { kind: 'sketch', id: newIds[newIds.length - 1] };
    sketchEng.render();
  } else if (doc.clipboard.kind === 'body') {
    for (const item of doc.clipboard.items) {
      const body = JSON.parse(JSON.stringify(item));
      body.id = doc.nextBodyId++;
      body.x = (body.x || 0) + 10;
      body.z = (body.z || 0) + 10;
      doc.bodies.push(body);
      newIds.push(body.id);
    }
    doc.multiSelectedBodies = newIds;
    doc.selection = { kind: 'body', id: newIds[newIds.length - 1] };
    if (viewer) viewer.rebuildBodies();
  }
  renderTree(); renderProps();
  setStatus(`Pasted ${newIds.length} item${newIds.length === 1 ? '' : 's'}`);
}
