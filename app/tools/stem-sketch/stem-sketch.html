              const t = (i / Nc) * 2 * Math.PI;
              profilePts.push({ x: e.cx + Math.cos(t) * e.r, y: e.cy + Math.sin(t) * e.r });
            }
          } else if (e.type === 'polyline' && e.closed && e.points && e.points.length >= 4) {
            profilePts = e.points;
          }
        }
        if (profilePts) {
          const planeUChild = new THREE.Vector3(...child.plane.u);
          const planeVChild = new THREE.Vector3(...child.plane.v);
          const depth = child.height || 0;
          const zEnd = (child.op === 'subtract') ? -depth : depth;
          const viewN = new THREE.Vector3(...plane.n);
          const N = profilePts.length;
          // Outward 2D normal of segment i, dotted with view normal in world.
          const segDot = new Array(N);
          for (let i = 0; i < N; i++) {
            const a = profilePts[i];
            const b = profilePts[(i + 1) % N];
            const nx2D = (b.y - a.y);
            const ny2D = -(b.x - a.x);
            const len = Math.hypot(nx2D, ny2D) || 1;
            const nWorld = planeUChild.clone().multiplyScalar(nx2D / len)
              .add(planeVChild.clone().multiplyScalar(ny2D / len));
            segDot[i] = nWorld.dot(viewN);
          }
          for (let i = 0; i < N; i++) {
            const prev = segDot[(i - 1 + N) % N];
            const curr = segDot[i];
            // Sign change between segments (i-1) and i → vertex i is on the
            // silhouette. Strict (* < 0) skips zero-crossings exactly on
            // axis-aligned planes, which is fine: those are face-on views and
            // don't have a meaningful lateral silhouette.
            if (prev * curr >= 0) continue;
            const p = profilePts[i];
            const sw = new THREE.Vector3(p.x, p.y, 0).applyMatrix4(planeMChild);
            const ew = new THREE.Vector3(p.x, p.y, zEnd).applyMatrix4(planeMChild);
            if (parentOffset) {
              const off = new THREE.Vector3(parentOffset.x || 0, parentOffset.y || 0, parentOffset.z || 0);
              sw.add(off); ew.add(off);
            }
            const sa = sw.applyMatrix4(planeMInv);
            const sb = ew.applyMatrix4(planeMInv);
            segments.push({
              p1: { x: sa.x, y: sa.y, z: sa.z },
              p2: { x: sb.x, y: sb.y, z: sb.z },
              dz1: sa.z, dz2: sb.z,
            });
          }
        }
      }
      return;
    }
    // Fastener — render as a cylinder silhouette (top & bottom rims plus
    // two parallel side tangent lines), positioned at the bolt's world spot.
    // Without this, a screw cut into a body is invisible from a sketch on
    // another face of that body.
    if (child.type === 'fastener') {
      const spec = getFastenerSpec(child.size);
      if (!spec) return;
      const fit = child.fit || 'tight';
      const clearance = FASTENER_FIT_CLEARANCE[fit] || 0;
      const r = (spec.d / 2) + clearance;
      const lengthBolt = child.length || (spec.d * 4);
      const cx = (child.x || 0) + (parentOffset?.x || 0);
      const cy = (child.y || 0) + (parentOffset?.y || 0);
      const cz = (child.z || 0) + (parentOffset?.z || 0);
      // Bolt shaft is along the world Y axis from y=cy to y=cy+lengthBolt.
      // Bottom rim — circle in XZ at y=cy
      const N = 36;
      const ringWorld = (yLevel) => {
        const out = [];
        for (let i = 0; i < N; i++) {
          const t = (i / N) * 2 * Math.PI;
          out.push(new THREE.Vector3(cx + Math.cos(t) * r, yLevel, cz + Math.sin(t) * r));
        }
        return out;
      };
      const projWorld = (v) => {
        const s = v.clone().applyMatrix4(planeMInv);
        return { x: s.x, y: s.y, z: s.z };
      };
      const bot = ringWorld(cy).map(projWorld);
      const top = ringWorld(cy + lengthBolt).map(projWorld);
      for (let i = 0; i < N; i++) {
        const a = bot[i], b = bot[(i + 1) % N];
        segments.push({ p1: a, p2: b, dz1: a.z, dz2: b.z });
        const c = top[i], d = top[(i + 1) % N];
        segments.push({ p1: c, p2: d, dz1: c.z, dz2: d.z });
      }
      // Silhouette tangent lines along the cylinder for the current view —
      // two parallel lines marking the bolt's sides.
      const viewN = new THREE.Vector3(...plane.n);
      const axis = new THREE.Vector3(0, 1, 0);
      // Find perpendicular-to-axis direction that's also in the view plane:
      // bolt-tangent-direction = axis × viewN, normalized
      const tangent = new THREE.Vector3().crossVectors(axis, viewN);
      if (tangent.lengthSq() > 1e-6) {
        tangent.normalize().multiplyScalar(r);
        for (const sgn of [+1, -1]) {
          const sw = new THREE.Vector3(cx + sgn * tangent.x, cy, cz + sgn * tangent.z);
          const ew = new THREE.Vector3(cx + sgn * tangent.x, cy + lengthBolt, cz + sgn * tangent.z);
          const sa = projWorld(sw), sb = projWorld(ew);
          segments.push({ p1: sa, p2: sb, dz1: sa.z, dz2: sb.z });
        }
      }
      return;
    }
    // For other primitives, draw a faint bbox outline as a rough "ghost"
    if (typeof child.w === 'number' && typeof child.h === 'number' && typeof child.d === 'number') {
      const cx = (child.x || 0) + (parentOffset?.x || 0);
      const cy = (child.y || 0) + (parentOffset?.y || 0);
      const cz = (child.z || 0) + (parentOffset?.z || 0);
      const halfW = child.w / 2, halfD = child.d / 2;
      // Use child.h/2 for cube etc. (cube mesh is centered) — close enough
      const yMin = cy, yMax = cy + child.h;
      const corners = [
        new THREE.Vector3(cx - halfW, yMin, cz - halfD),
        new THREE.Vector3(cx + halfW, yMin, cz - halfD),
        new THREE.Vector3(cx + halfW, yMax, cz - halfD),
        new THREE.Vector3(cx - halfW, yMax, cz - halfD),
        new THREE.Vector3(cx - halfW, yMin, cz + halfD),
        new THREE.Vector3(cx + halfW, yMin, cz + halfD),
        new THREE.Vector3(cx + halfW, yMax, cz + halfD),
        new THREE.Vector3(cx - halfW, yMax, cz + halfD),
      ];
      const proj = corners.map(c => {
        const s = c.clone().applyMatrix4(planeMInv);
        return { x: s.x, y: s.y, z: s.z };
      });
      const ee = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
      for (const [a, b] of ee) {
        segments.push({ p1: proj[a], p2: proj[b], dz1: proj[a].z, dz2: proj[b].z });
      }
    }
  };

  for (const body of doc.bodies) {
    if (!body.mesh) continue;
    // Group bodies — render each child's silhouette explicitly (clean) instead
    // of running EdgesGeometry on the messy CSG result. Negative children get
    // skipped entirely so the 2D view shows only what physically remains.
    if (body.type === 'group' && Array.isArray(body.children)) {
      // Compute the GROUP's bbox in plane-local 2D so we can clip negative
      // children to where they actually remove material. A 2-inch cylinder
      // cut through a 1-inch sphere should only show the 1 inch that was
      // actually removed — the over-extrusion is invisible material.
      const wbb = new THREE.Box3().setFromObject(body.mesh);
      const cornersW = [
        new THREE.Vector3(wbb.min.x, wbb.min.y, wbb.min.z),
        new THREE.Vector3(wbb.max.x, wbb.min.y, wbb.min.z),
        new THREE.Vector3(wbb.max.x, wbb.max.y, wbb.min.z),
        new THREE.Vector3(wbb.min.x, wbb.max.y, wbb.min.z),
        new THREE.Vector3(wbb.min.x, wbb.min.y, wbb.max.z),
        new THREE.Vector3(wbb.max.x, wbb.min.y, wbb.max.z),
        new THREE.Vector3(wbb.max.x, wbb.max.y, wbb.max.z),
        new THREE.Vector3(wbb.min.x, wbb.max.y, wbb.max.z),
      ];
      let pMinX = Infinity, pMaxX = -Infinity, pMinY = Infinity, pMaxY = -Infinity;
      for (const c of cornersW) {
        const s = c.applyMatrix4(planeMInv);
        if (s.x < pMinX) pMinX = s.x;
        if (s.x > pMaxX) pMaxX = s.x;
        if (s.y < pMinY) pMinY = s.y;
        if (s.y > pMaxY) pMaxY = s.y;
      }
      const parentAabb = { minX: pMinX, maxX: pMaxX, minY: pMinY, maxY: pMaxY };
      // Walk the tree. For each child we render its silhouette explicitly.
      // Negative (cut) children are tagged so the SVG renderer can dash them —
      // and are clipped to the parent body's projected AABB so the
      // over-extrusion poking out of the body is hidden.
      const walk = (kids, offset, parentIsCut) => {
        for (const child of kids) {
          const childIsCut = parentIsCut || child.op === 'subtract';
          const off = {
            x: offset.x + (child.x || 0),
            y: offset.y + (child.y || 0),
            z: offset.z + (child.z || 0),
          };
          if (child.type === 'group' && Array.isArray(child.children)) {
            walk(child.children, off, childIsCut);
            continue;
          }
          const before = segments.length;
          projectChildAsStandalone(child, offset);
          if (childIsCut) {
            // Clip to parent AABB and tag as cut. Drop segments whose midpoint
            // lies outside the parent's projected silhouette — that's the
            // over-extrusion the user said shouldn't be visible.
            const kept = [];
            for (let k = before; k < segments.length; k++) {
              const s = segments[k];
              const mx = (s.p1.x + s.p2.x) / 2;
              const my = (s.p1.y + s.p2.y) / 2;
              const PAD = 0.5; // mm tolerance so segments touching the bbox edge stay
              if (mx < parentAabb.minX - PAD || mx > parentAabb.maxX + PAD ||
                  my < parentAabb.minY - PAD || my > parentAabb.maxY + PAD) continue;
              s._cut = true;
              kept.push(s);
            }
            // Replace tail of segments[] with the kept ones
            segments.length = before;
            for (const s of kept) segments.push(s);
          }
        }
      };
      walk(body.children, { x: body.x || 0, y: body.y || 0, z: body.z || 0 }, false);
      continue;
    }
    // Smooth-surface bodies have no real edges — skip EdgesGeometry entirely
    // and let the silhouette code below render a clean circle/annulus.
    const skipEdges = body.type === 'sphere' || body.type === 'torus';
    let usedEdges = false;
    if (!skipEdges) try {
      // 25° threshold — picks up real geometric edges (cube corners, step
      // edges, holes) but skips coplanar triangles created by CSG that would
      // otherwise spray fans of fake edges across the sketch view.
      const edges = new THREE.EdgesGeometry(body.mesh.geometry, 25);
      const pos = edges.attributes?.position;
      if (pos && pos.count >= 2) {
        usedEdges = true;
        const mw = body.mesh.matrixWorld;
        const va = new THREE.Vector3(), vb = new THREE.Vector3();
        // Reject very-short segments — typically tessellation artifacts on
        // curved CSG faces. 0.25 mm is well below any real feature size.
        const MIN_LEN = 0.25;
        for (let i = 0; i < pos.count; i += 2) {
          va.fromBufferAttribute(pos, i);
          vb.fromBufferAttribute(pos, i + 1);
          const p1 = projPoint(va, mw);
          const p2 = projPoint(vb, mw);
          const len2D = Math.hypot(p1.x - p2.x, p1.y - p2.y);
          if (len2D < MIN_LEN) continue;
          segments.push({ p1, p2, dz1: p1.z, dz2: p2.z });
        }
      }
      edges.dispose();
    } catch(_) {}

    // For smooth-surface bodies (sphere, torus) the orthogonal silhouette is
    // a circle (or annulus) — always render this so the silhouette stays
    // in sync with the dashed boundary circle in computeFaceBoundary.
    if (body.type === 'sphere' || body.type === 'torus') {
      const cLocal = body.mesh.position.clone().applyMatrix4(planeMInv);
      // Ellipse semi-axes from the body's w/h/d projected onto plane (u, v).
      const halfW = (body.w || 0) / 2;
      const halfH = (body.h || 0) / 2;
      const halfD = (body.d || 0) / 2;
      const uW = new THREE.Vector3(...plane.u);
      const vW = new THREE.Vector3(...plane.v);
      const rx = Math.abs(uW.x) * halfW + Math.abs(uW.y) * halfH + Math.abs(uW.z) * halfD;
      const ry = Math.abs(vW.x) * halfW + Math.abs(vW.y) * halfH + Math.abs(vW.z) * halfD;
      const N = 48;
      for (let i = 0; i < N; i++) {
        const t1 = (i / N) * 2 * Math.PI;
        const t2 = ((i + 1) / N) * 2 * Math.PI;
        const p1 = { x: cLocal.x + Math.cos(t1) * rx, y: cLocal.y + Math.sin(t1) * ry, z: cLocal.z };
        const p2 = { x: cLocal.x + Math.cos(t2) * rx, y: cLocal.y + Math.sin(t2) * ry, z: cLocal.z };
        segments.push({ p1, p2, dz1: p1.z, dz2: p2.z });
      }
      continue;
    }
    // Fallback for smooth bodies (spheres / cylinders without sharp edges):
    // project the bounding box so they still show up as a context outline.
    if (!usedEdges) {
      if (!body.mesh.geometry.boundingBox) body.mesh.geometry.computeBoundingBox();
      const bb = body.mesh.geometry.boundingBox;
      if (!bb) continue;
      const cornersLocal = [
        new THREE.Vector3(bb.min.x, bb.min.y, bb.min.z),
        new THREE.Vector3(bb.max.x, bb.min.y, bb.min.z),
        new THREE.Vector3(bb.max.x, bb.max.y, bb.min.z),
        new THREE.Vector3(bb.min.x, bb.max.y, bb.min.z),
        new THREE.Vector3(bb.min.x, bb.min.y, bb.max.z),
        new THREE.Vector3(bb.max.x, bb.min.y, bb.max.z),
        new THREE.Vector3(bb.max.x, bb.max.y, bb.max.z),
        new THREE.Vector3(bb.min.x, bb.max.y, bb.max.z),
      ];
      const proj = cornersLocal.map(c => projPoint(c, body.mesh.matrixWorld));
      const ee = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
      for (const [a, b] of ee) segments.push({ p1: proj[a], p2: proj[b], dz1: proj[a].z, dz2: proj[b].z });
    }
  }
  return segments;
}

// Snap a value to the grid spacing if grid snapping is enabled
function snapVal(v) {
  if (!doc.grid?.snap) return v;
  const s = doc.grid.spacing || 1;
  return Math.round(v / s) * s;
}

function projectRayOnAxis(ray, axisOrigin, axisDir) {
  const w = axisOrigin.clone().sub(ray.origin);
  const u = axisDir.dot(w);
  const v = ray.direction.dot(w);
  const b = axisDir.dot(ray.direction);
  const denom = 1 - b * b;
  if (Math.abs(denom) < 1e-9) return 0;
  return (b * v - u) / denom;
}

class Viewer3D {
  constructor(canvas) {
    this.canvas = canvas;
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0xffffff);

    this.camera = new THREE.PerspectiveCamera(45, 1, 0.1, 5000);
    this.target = new THREE.Vector3(0, 0, 0);
    this.spherical = new THREE.Spherical(220, 1.05, 0.85);
    this.updateCamera();

    this.renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    this.renderer.setPixelRatio(window.devicePixelRatio);
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    // lighting
    const amb = new THREE.AmbientLight(0xffffff, 0.55); this.scene.add(amb);
    const dir = new THREE.DirectionalLight(0xffffff, 0.85);
    dir.position.set(120, 220, 160);
    dir.castShadow = true;
    dir.shadow.mapSize.set(1024, 1024);
    dir.shadow.camera.left = -300; dir.shadow.camera.right = 300;
    dir.shadow.camera.top = 300; dir.shadow.camera.bottom = -300;
    this.scene.add(dir);
    const dir2 = new THREE.DirectionalLight(0xb0c5ff, 0.25);
    dir2.position.set(-150, 80, -120); this.scene.add(dir2);

    // Workplane visuals — a sized grid + border, rebuilt when doc.grid.size changes
    this.workplaneGroup = new THREE.Group();
    this.scene.add(this.workplaneGroup);
    // Ground plane that catches shadows (large, separate from the workplane visual)
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(2000, 2000),
      new THREE.ShadowMaterial({ opacity: 0.12 })
    );
    ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; this.scene.add(ground);
    this.rebuildWorkplane();

    // axes hint
    const ax = new THREE.AxesHelper(20); this.scene.add(ax);

    this.bodyGroup = new THREE.Group();
    this.scene.add(this.bodyGroup);

    this.sketchGroup = new THREE.Group();
    this.sketchGroup.position.y = 0.05; // hover above ground to avoid z-fight
    this.scene.add(this.sketchGroup);

    // Pickable region overlays (sit slightly above sketches so they hit-test first)
    this.regionGroup = new THREE.Group();
    this.scene.add(this.regionGroup);

    // Single push/pull arrow shown when one region is selected. Drag direction
    // determines outcome: dragging away from the face extrudes positive (add),
    // dragging into the body cuts (subtract — only when sketch is on a face).
    this.extrudeArrows = new THREE.Group();
    this.extrudeArrows.visible = false;
    this.scene.add(this.extrudeArrows);
    {
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(2.4, 7, 18),
        new THREE.MeshBasicMaterial({
          color: 0x4f7cff, transparent: true, opacity: 0.95, depthTest: false,
        })
      );
      cone.userData.extrudeArrow = 'pos';
      cone.renderOrder = 1100;
      const hit = new THREE.Mesh(
        new THREE.CylinderGeometry(5, 5, 14, 12),
        new THREE.MeshBasicMaterial({ visible: false, depthTest: false })
      );
      hit.userData.extrudeArrow = 'pos';
      hit.renderOrder = 1099;
      const g = new THREE.Group();
      g.add(cone); g.add(hit);
      g.userData.extrudeArrow = 'pos';
      this.extrudeArrows.add(g);
    }
    this.extrudePreview = null; // translucent body shown during drag

    // Transform gizmo (3 colored arrows) — placed at the selected body's center
    this.gizmo = createGizmo();
    this.scene.add(this.gizmo);
    this.alignWidget = null; // built on demand when alignMode is on
    this.resizeHandles = null; // built when a single primitive is selected
    this.rotateHandles = null; // 3 colored arc handles around the selected body
    this.raycaster = new THREE.Raycaster();

    this.bind();
    this.resize();
    this.loop();
  }

  updateCamera() {
    const offset = new THREE.Vector3().setFromSpherical(this.spherical);
    this.camera.position.copy(this.target).add(offset);
    this.camera.lookAt(this.target);
  }

  bind() {
    let dragKind = null, lastX = 0, lastY = 0;
    const gizmoState = { active: false, axis: null, startVals: null, axisDir: null, startT: 0, axisOrigin: null };
    const resizeState = { active: false, body: null, axis: null, sign: null, axisOrigin: null, startT: 0, startDims: null, startPos: null, uniform: false };
    const rotateState = { active: false, axis: null, plane: null, center: null, startAngle: 0, startRots: null, ids: null };
    const computeAxisAngle = (ax, local) => {
      if (ax === 'x') return Math.atan2(local.z, local.y);
      if (ax === 'y') return -Math.atan2(local.z, local.x);
      return Math.atan2(local.y, local.x);
    };
    // Direct body drag — armed on body click, activates after small mouse delta.
    // Default mode is XZ ground-plane drag; Alt held → Y-axis drag.
    const bodyDrag = {
      armed: false, active: false, mode: null, alt: false,
      ids: null, startVals: null,
      startMouse: null, startWorld: null,
      planeY: 0, axisDir: null, anchor: null, startT: 0,
    };
    // Ctrl+drag on empty space = box select
    const boxSel = { active: false, startX: 0, startY: 0, additive: false };
    const extrudeState = {
      active: false, direction: 0, region: null, sketch: null,
      origin: null, axis: null, startT: 0, length: 0,
    };
    this.extrudeState = extrudeState; // expose for tooltip handlers below
    const ndc = (e) => {
      const r = this.canvas.getBoundingClientRect();
      return new THREE.Vector2(((e.clientX - r.left) / r.width) * 2 - 1,
                               -((e.clientY - r.top) / r.height) * 2 + 1);
    };

    this.canvas.addEventListener('pointerdown', (e) => {
      // Curved-body bbox face picker — 6 clickable face overlays around the
      // body's bounding box. Click one to sketch on that side. Click empty
      // space to cancel.
      if (doc.curvedPickBody && e.button === 0) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        if (this.bboxFacePickGroup) {
          const hits = this.raycaster.intersectObjects(this.bboxFacePickGroup.children, false);
          if (hits.length > 0) {
            const meta = hits[0].object.userData;
            const body = doc.bodies.find(b => b.id === doc.curvedPickBody);
            this.clearBboxFacePicker();
            doc.curvedPickBody = null;
            doc.faceMode = false;
            this.canvas.style.cursor = '';
            if (body) finishCurvedBodySketchOnSide(body, meta.axis, meta.sign);
            return;
          }
        }
        // Click off the picker faces — cancel
        this.clearBboxFacePicker();
        doc.curvedPickBody = null;
        doc.faceMode = false;
        this.canvas.style.cursor = '';
        setStatus('Sketch on Face cancelled.');
        return;
      }
      // Face-pick mode (Sketch on Face workflow)
      if (doc.faceMode && e.button === 0) {
        this.raycaster.setFromCamera(ndc(e), this.camera);
        const hits = this.raycaster.intersectObjects(this.bodyGroup.children, false);
        if (hits.length > 0) {
          const hit = hits[0];
          const sourceBody = doc.bodies.find(b => b.id === hit.object.userData.bodyId);
          // Decide if the picked surface is FLAT or CURVED. On curved surfaces
          // a tessellated triangle's normal would produce a slanted sketch
          // plane — show the bbox 6-face picker instead.
          const isCurvedFace = isFaceOnCurvedSurface(sourceBody, hit);
          if (isCurvedFace) {
            doc.curvedPickBody = sourceBody.id;
            this.canvas.style.cursor = 'crosshair';
            this.buildBboxFacePicker(sourceBody);
            setStatus('Click any of the 6 highlighted bbox faces to sketch on that side. Click empty space to cancel.');
            return;
          }
          const normalLocal = hit.face.normal.clone();
          const normalWorld = normalLocal.transformDirection(hit.object.matrixWorld).normalize();
          const bbox = new THREE.Box3().setFromObject(hit.object);
          const bodyCenter = bbox.getCenter(new THREE.Vector3());
          const dist = bodyCenter.clone().sub(hit.point).dot(normalWorld);
          const planeOrigin = bodyCenter.clone().sub(normalWorld.clone().multiplyScalar(dist));
          const plane = planeFromFace(planeOrigin, normalWorld);

          const b = doc.bodies.find(x => x.id === id);

        renderProps();

      lastX = e.clientX; lastY = e.clientY;

      this.updateCamera();
    }, { passive: false });
    window.addEventListener('resize', () => this.resize());
  }

  resize() {
    const r = this.canvas.getBoundingClientRect();
    if (r.width === 0 || r.height === 0) return;
    this.renderer.setSize(r.width, r.height, false);
    this.camera.aspect = r.width / r.height;
    this.camera.updateProjectionMatrix();
  }

  loop() {
    this.resize();
    this.renderer.render(this.scene, this.camera);
    // Live-update engineering dimension labels for the selected body so they
    // follow camera orbit / zoom / pan continuously.
    if (doc.mode === '3d' && doc.selection?.kind === 'body') {
      const body = doc.bodies.find(b => b.id === doc.selection.id);
      if (body) showDimLabels(body);
    }
    requestAnimationFrame(() => this.loop());
  }

  rebuildBodies() {
    while (this.bodyGroup.children.length) {
      const c = this.bodyGroup.children.pop();
      c.geometry?.dispose();
      c.material?.dispose();
    }
    for (const body of doc.bodies) {
      if (body.hidden) { body.mesh = null; continue; }
      const mesh = buildBodyMesh(body);
      if (mesh) {
        body.mesh = mesh;
        mesh.userData.bodyId = body.id;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        this.bodyGroup.add(mesh);
      }
    }
    this.updateGizmo();
    this.updateRegions();
    this.updateExtrudeGizmo();
  }

  // Drag-to-extrude gizmo: when exactly one region is picked, place the push/
  // pull arrows at its centroid pointing along the sketch plane normal.
  updateExtrudeGizmo() {
    const sel = doc.selectedRegions || [];
    if (sel.length !== 1) {
      this.extrudeArrows.visible = false;
      this.clearExtrudePreview();
      hideExtrudeTooltip();
      return;
    }
    const id = sel[0];
    let region = null, sketch = null;
    for (const s of doc.sketches) {
      const r = computeSketchRegions(s).find(r => r.id === id);
      if (r) { region = r; sketch = s; break; }
    }
    if (!region) { this.extrudeArrows.visible = false; return; }
    let cu = 0, cv = 0;
    for (const p of region.points) { cu += p.x; cv += p.y; }
    cu /= region.points.length; cv /= region.points.length;
    const planeM = makePlaneMatrix(sketch.plane);
    const center = new THREE.Vector3(cu, cv, 0).applyMatrix4(planeM);
    const n = new THREE.Vector3(...sketch.plane.n).normalize();
    this.extrudeArrows.position.copy(center);
    const yAxis = new THREE.Vector3(0, 1, 0);
    const posOffset = n.clone().multiplyScalar(7);
    const posQ = new THREE.Quaternion().setFromUnitVectors(yAxis, n);
    this.extrudeArrows.children[0].position.copy(posOffset);
    this.extrudeArrows.children[0].quaternion.copy(posQ);
    this.extrudeArrows.visible = true;
    this.extrudeArrows.userData = { region, sketch, center, normal: n };
  }

  clearExtrudePreview() {
    if (!this.extrudePreview) return;
    this.scene.remove(this.extrudePreview);
    this.extrudePreview.geometry?.dispose();
    this.extrudePreview.material?.dispose();
    this.extrudePreview = null;
  }

  // Build / refresh a translucent preview of the in-progress extrude.
  // direction = +1 (push out, add) or -1 (push in, cut).
  updateExtrudePreview(length, direction) {
    this.clearExtrudePreview();
    if (Math.abs(length) < 0.001) return;
    const meta = this.extrudeArrows.userData;
    if (!meta) return;
    const shape = regionToShape(meta.region);
    if (!shape) return;
    const geo = new THREE.ExtrudeGeometry(shape, {
      depth: Math.abs(length),
      bevelEnabled: false,
      curveSegments: 32,
    });
    if (direction < 0) geo.translate(0, 0, -Math.abs(length));
    geo.applyMatrix4(makePlaneMatrix(meta.sketch.plane));
    // Cut/Add color follows the explicit toggle the user picked on the tooltip.
    const isCut = (typeof getExtrudeTooltipOp === 'function')
      ? getExtrudeTooltipOp() === 'subtract'
      : (direction < 0 && !!meta.sketch.boundary);
    const mat = new THREE.MeshBasicMaterial({
      color: isCut ? 0xff5252 : 0x4f7cff,
      transparent: true,
      opacity: isCut ? 0.45 : 0.35,
      side: THREE.DoubleSide,
      depthWrite: false,
    });
    this.extrudePreview = new THREE.Mesh(geo, mat);
    this.extrudePreview.renderOrder = 9;
    this.scene.add(this.extrudePreview);
  }

  // Rebuild the translucent pickable region overlays for every sketch.
  // Each region is a flat ShapeGeometry sitting just above its sketch plane.
  updateRegions() {
    while (this.regionGroup.children.length) {
      const c = this.regionGroup.children.pop();
      c.geometry?.dispose();
      c.material?.dispose();
    }
    for (const sketch of doc.sketches) {
      if (sketch.hidden) continue;
      const planeM = makePlaneMatrix(sketch.plane);
      const regs = computeSketchRegions(sketch);
      for (const r of regs) {
        const shape = regionToShape(r);
        if (!shape) continue;
        const geo = new THREE.ShapeGeometry(shape);
        // Push out ~0.2 along plane +n so it sits above the sketch fill (0.05)
        // and a body face it might be coincident with.
        geo.translate(0, 0, 0.2);
        geo.applyMatrix4(planeM);
        const isSelected = doc.selectedRegions?.includes(r.id);
        const mat = new THREE.MeshBasicMaterial({
          color: isSelected ? 0x2c64ff : 0x6f8cff,
          transparent: true,
          opacity: isSelected ? 0.45 : 0.16,
          side: THREE.DoubleSide,
          depthWrite: false,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.renderOrder = 8;
        // Stash area + bbox so the picker can prefer the smallest containing
        // region when several overlap (e.g., a square drawn inside a sphere's
        // circular boundary — without this, the boundary always wins).
        mesh.userData = {
          kind: 'region',
          regionId: r.id,
          sketchId: r.sketchId,
          regionArea: Math.abs(r.area || 0),
        };
        this.regionGroup.add(mesh);
      }
    }
  }

  buildAlignWidget() {
    this.clearAlignWidget();
    if (!doc.multiSelectedBodies?.length || doc.multiSelectedBodies.length < 2) return false;
    this.scene.updateMatrixWorld(true);
    const bb = new THREE.Box3();
    for (const id of doc.multiSelectedBodies) {
      const b = doc.bodies.find(x => x.id === id);
      if (b?.mesh) bb.union(new THREE.Box3().setFromObject(b.mesh));
    }
    if (bb.isEmpty()) return false;
    const min = bb.min, max = bb.max;
    const ctr = bb.getCenter(new THREE.Vector3());
    const size = bb.getSize(new THREE.Vector3());
    // Offset distance — proportional to bbox so handles read at any zoom
    const δ = Math.max(5, Math.max(size.x, size.y, size.z) * 0.12);
    const hr = Math.max(1.2, Math.max(size.x, size.y, size.z) * 0.02);

    const group = new THREE.Group();

    // Wireframe outline of the selection's combined bbox
    const helper = new THREE.Box3Helper(bb.clone(), 0x4f7cff);
    helper.material.depthTest = false;
    helper.material.transparent = true;
    helper.material.opacity = 0.85;
    helper.renderOrder = 1000;
    group.add(helper);

    const axisColors = { x: 0xe53e3e, y: 0x38a169, z: 0x3182ce };
    const handles = [
      // X axis dots — sit just below the bbox front-bottom edge, span x
      { axis: 'x', kind: 'min', position: [min.x, min.y - δ, max.z + δ] },
      { axis: 'x', kind: 'mid', position: [ctr.x, min.y - δ, max.z + δ] },
      { axis: 'x', kind: 'max', position: [max.x, min.y - δ, max.z + δ] },
      // Y axis dots — sit just left of bbox front-left edge, span y
      { axis: 'y', kind: 'min', position: [min.x - δ, min.y, max.z + δ] },
      { axis: 'y', kind: 'mid', position: [min.x - δ, ctr.y, max.z + δ] },
      { axis: 'y', kind: 'max', position: [min.x - δ, max.y, max.z + δ] },
      // Z axis dots — sit just left-and-below the bbox bottom-left edge, span z
      { axis: 'z', kind: 'min', position: [min.x - δ, min.y - δ, min.z] },
      { axis: 'z', kind: 'mid', position: [min.x - δ, min.y - δ, ctr.z] },
      { axis: 'z', kind: 'max', position: [min.x - δ, min.y - δ, max.z] },
    ];
    for (const h of handles) {
      const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(hr, 16, 12),
        new THREE.MeshBasicMaterial({ color: axisColors[h.axis], depthTest: false, transparent: true, opacity: 0.95 }),
      );
      sphere.position.set(...h.position);
      sphere.userData.alignAxis = h.axis;
      sphere.userData.alignKind = h.kind;
      sphere.renderOrder = 1001;
      group.add(sphere);

      // Faint guide line from each handle through the bbox center axis (not strictly needed — but reads as "this dot moves along this axis")
      const axisDir = h.axis === 'x' ? new THREE.Vector3(1, 0, 0)
                     : h.axis === 'y' ? new THREE.Vector3(0, 1, 0)
                     :                   new THREE.Vector3(0, 0, 1);
      // Skip the connector to keep the visual clean
    }
    this.alignWidget = group;
    this.scene.add(group);
    return true;
  }

  clearAlignWidget() {
    if (!this.alignWidget) return;
    this.scene.remove(this.alignWidget);
    this.alignWidget.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) o.material.dispose();
    });
    this.alignWidget = null;
  }

  buildRotationHandles(bbox) {
    this.clearRotationHandles();
    if (!bbox || bbox.isEmpty()) return;
    const ctr = bbox.getCenter(new THREE.Vector3());
    // Small and light — the rotation hints fade in only on hover-style use; they
    // shouldn't compete visually with the body itself.
    const arcR = 3;
    const tube = 0.22;
    const off = arcR + 1;

    // Build one slim half-arch (180°) with arrowhead cones at both ends, in its
    // local XY plane. The caller rotates the whole archGroup into the rotation
    // plane of the chosen axis.
    const buildArch = (axis, color, position, planeXform) => {
      const archGroup = new THREE.Group();
      // Lower opacity so they read as a hint rather than blocking the body
      const matOpts = { color, transparent: true, opacity: 0.55, depthTest: false };
      const torus = new THREE.Mesh(
        new THREE.TorusGeometry(arcR, tube, 10, 36, Math.PI),
        new THREE.MeshBasicMaterial(matOpts),
      );
      torus.userData.rotateAxis = axis;
      torus.renderOrder = 1003;
      archGroup.add(torus);
      // Wider transparent torus for easier picking
      const hit = new THREE.Mesh(
        new THREE.TorusGeometry(arcR, tube * 5, 6, 24, Math.PI),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0, depthTest: false }),
      );
      hit.userData.rotateAxis = axis;
      archGroup.add(hit);
      // Tiny arrowheads at both ends pointing radially outward
      const coneR = tube * 3, coneH = 1.2;
      const startCone = new THREE.Mesh(new THREE.ConeGeometry(coneR, coneH, 12), new THREE.MeshBasicMaterial(matOpts));
      startCone.position.set(arcR + coneH * 0.5, 0, 0);
      startCone.rotation.z = -Math.PI / 2;
      startCone.userData.rotateAxis = axis;
      archGroup.add(startCone);
      const endCone = new THREE.Mesh(new THREE.ConeGeometry(coneR, coneH, 12), new THREE.MeshBasicMaterial(matOpts));
      endCone.position.set(-arcR - coneH * 0.5, 0, 0);
      endCone.rotation.z = Math.PI / 2;
      endCone.userData.rotateAxis = axis;
      archGroup.add(endCone);
      planeXform(archGroup);
      archGroup.position.copy(position);
      return archGroup;
    };

    const group = new THREE.Group();
    // Each arch sits OUTSIDE the body's perimeter, centered on the rotation
    // axis line, at one of the two faces that axis exits through.
    // X arch (red) — outside the +X face (right), centered in Y/Z, in YZ plane
    group.add(buildArch('x', 0xc26b6b,
      new THREE.Vector3(bbox.max.x + off, ctr.y, ctr.z),
      (g) => { g.rotation.y = Math.PI / 2; }));
    // Y arch (green) — outside the −Y face (bottom), centered in X/Z, in XZ plane
    group.add(buildArch('y', 0x6fa882,
      new THREE.Vector3(ctr.x, bbox.min.y - off, ctr.z),
      (g) => { g.rotation.x = Math.PI / 2; }));
    // Z arch (blue) — outside the +Z face (front), centered in X/Y, in XY plane
    group.add(buildArch('z', 0x6f8fb8,
      new THREE.Vector3(ctr.x, ctr.y, bbox.max.z + off),
      (g) => { /* default XY plane */ }));

    this.rotateHandles = group;
    this.rotateHandles.userData.bodyCenter = ctr.clone();
    this.scene.add(group);
  }
  clearRotationHandles() {
    if (!this.rotateHandles) return;
    this.scene.remove(this.rotateHandles);
    this.rotateHandles.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) o.material.dispose();
    });
    this.rotateHandles = null;
  }

  rebuildWorkplane() {
    if (!this.workplaneGroup) return;
    while (this.workplaneGroup.children.length) {
      const c = this.workplaneGroup.children.pop();
      c.geometry?.dispose();
      c.material?.dispose();
    }
    const size = doc.grid.size;
    // Cap divisions so large workplanes with fine spacing don't lag
    const divisions = clamp(Math.round(size / doc.grid.spacing), 4, 200);
    const grid = new THREE.GridHelper(size, divisions, 0xc7cee0, 0xe6e8f1);
    grid.position.y = 0.001;
    this.workplaneGroup.add(grid);
    // Stronger border line at the workplane edge
    const half = size / 2;
    const borderPts = [
      new THREE.Vector3(-half, 0.002, -half),
      new THREE.Vector3( half, 0.002, -half),
      new THREE.Vector3( half, 0.002,  half),
      new THREE.Vector3(-half, 0.002,  half),
      new THREE.Vector3(-half, 0.002, -half),
    ];
    const borderGeo = new THREE.BufferGeometry().setFromPoints(borderPts);
    const border = new THREE.Line(borderGeo, new THREE.LineBasicMaterial({ color: 0x9aa0b8 }));
    this.workplaneGroup.add(border);
  }

  // Render 6 translucent clickable face overlays around the body's bbox so
  // the user can pick which side to sketch on (one for each ±X / ±Y / ±Z
  // direction). Used in place of the old Top/Front/Right modal.
  buildBboxFacePicker(body) {
    this.clearBboxFacePicker();
    if (!body || !body.mesh) return;
    this.scene.updateMatrixWorld(true);
    const bb = new THREE.Box3().setFromObject(body.mesh);
    if (bb.isEmpty()) return;
    const sz = bb.getSize(new THREE.Vector3());
    const ctr = bb.getCenter(new THREE.Vector3());
    const FUDGE = 0.05; // sit a hair outside so face is clearly outside body
    const group = new THREE.Group();
    // Wireframe bbox to anchor the eye
    const helper = new THREE.Box3Helper(bb.clone(), 0x4f7cff);
    helper.material.transparent = true;
    helper.material.opacity = 0.55;
    helper.renderOrder = 999;
    group.add(helper);
    // Label container in HTML overlay would need separate work — for now just
    // colour the faces and let the cursor show what's clickable.
    const faces = [
      { axis: 'x', sign: +1, label: 'Right', size: [sz.z, sz.y], pos: [bb.max.x + FUDGE, ctr.y, ctr.z], rot: [0, Math.PI / 2, 0] },
      { axis: 'x', sign: -1, label: 'Left',  size: [sz.z, sz.y], pos: [bb.min.x - FUDGE, ctr.y, ctr.z], rot: [0, -Math.PI / 2, 0] },
      { axis: 'y', sign: +1, label: 'Top',   size: [sz.x, sz.z], pos: [ctr.x, bb.max.y + FUDGE, ctr.z], rot: [-Math.PI / 2, 0, 0] },
      { axis: 'y', sign: -1, label: 'Bot',   size: [sz.x, sz.z], pos: [ctr.x, bb.min.y - FUDGE, ctr.z], rot: [ Math.PI / 2, 0, 0] },
      { axis: 'z', sign: +1, label: 'Front', size: [sz.x, sz.y], pos: [ctr.x, ctr.y, bb.max.z + FUDGE], rot: [0, 0, 0] },
      { axis: 'z', sign: -1, label: 'Back',  size: [sz.x, sz.y], pos: [ctr.x, ctr.y, bb.min.z - FUDGE], rot: [0, Math.PI, 0] },
    ];
    for (const f of faces) {
      const geo = new THREE.PlaneGeometry(f.size[0], f.size[1]);
      const mat = new THREE.MeshBasicMaterial({
        color: 0x4f7cff,
        transparent: true,
        opacity: 0.18,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(...f.pos);
      mesh.rotation.set(...f.rot);
      mesh.userData = { axis: f.axis, sign: f.sign, label: f.label };
      mesh.renderOrder = 998;
      group.add(mesh);
    }
    this.bboxFacePickGroup = group;
    this.scene.add(group);
  }
  clearBboxFacePicker() {
    if (this.bboxFacePickGroup) {
      this.scene.remove(this.bboxFacePickGroup);
      this.bboxFacePickGroup.traverse(o => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) o.material.dispose();
      });
      this.bboxFacePickGroup = null;
    }
  }

  buildResizeHandles() {
    // Clear old
    if (this.resizeHandles) {
      this.scene.remove(this.resizeHandles);
      this.resizeHandles.traverse(o => {
        if (o.geometry) o.geometry.dispose();
        if (o.material) o.material.dispose();
      });
      this.resizeHandles = null;
    }
    // Show only when exactly one primitive (or extrude) is selected — not groups, not multi-select
    if (!doc.selection || doc.selection.kind !== 'body') return;
    if ((doc.multiSelectedBodies?.length || 0) > 1) return;
    const body = doc.bodies.find(b => b.id === doc.selection.id);
    if (!body || !body.mesh) return;
    if (body.type === 'group' || body.type === 'combined') return;

    this.scene.updateMatrixWorld(true);
    const bb = new THREE.Box3().setFromObject(body.mesh);
    if (bb.isEmpty()) return;

    const size = bb.getSize(new THREE.Vector3());
    const ctr = bb.getCenter(new THREE.Vector3());
    // Fixed world size — controls don't scale with the body
    const hr = 1.5;
    const off = 1.5;

    const group = new THREE.Group();
    const matEdge = new THREE.LineBasicMaterial({ color: 0x4f7cff, transparent: true, opacity: 0.45 });

    // Faint bbox helper so the handles read as "edges of this body"
    const helper = new THREE.Box3Helper(bb.clone(), 0x4f7cff);
    helper.material = matEdge;
    helper.renderOrder = 999;
    group.add(helper);

    const facePoints = [
      { axis: 'x', sign: +1, pos: [bb.max.x + off, ctr.y, ctr.z] },
      { axis: 'x', sign: -1, pos: [bb.min.x - off, ctr.y, ctr.z] },
      { axis: 'y', sign: +1, pos: [ctr.x, bb.max.y + off, ctr.z] },
      { axis: 'y', sign: -1, pos: [ctr.x, bb.min.y - off, ctr.z] },
      { axis: 'z', sign: +1, pos: [ctr.x, ctr.y, bb.max.z + off] },
      { axis: 'z', sign: -1, pos: [ctr.x, ctr.y, bb.min.z - off] },
    ];
    for (const f of facePoints) {
      const handle = new THREE.Mesh(
        new THREE.SphereGeometry(hr, 16, 12),
        new THREE.MeshBasicMaterial({ color: 0x1f2540, transparent: true, opacity: 0.95 }),
      );
      handle.position.set(...f.pos);
      handle.userData.resizeAxis = f.axis;
      handle.userData.resizeSign = f.sign;
      group.add(handle);
    }

    this.resizeHandles = group;
    this.scene.add(group);
  }

  updateGizmo() {
    // Highlight all selected bodies via emissive glow
    for (const body of doc.bodies) {
      if (!body.mesh || !body.mesh.material) continue;
      const isSelected = doc.multiSelectedBodies?.includes(body.id) ||
                         (doc.selection?.kind === 'body' && doc.selection.id === body.id);
      if (body.mesh.material.emissive) {
        body.mesh.material.emissive.setHex(isSelected ? 0x4f7cff : 0x000000);
        body.mesh.material.emissiveIntensity = isSelected ? 0.35 : 0;
      }
    }
    // Build / refresh resize handles for the currently selected single primitive
    this.buildResizeHandles();
    // Position gizmo well above the top face of the selection's combined bbox so
    // it doesn't crowd the rotation arcs or resize handles.
    if (doc.selection?.kind === 'body') {
      const ids = doc.multiSelectedBodies?.length ? doc.multiSelectedBodies : [doc.selection.id];
      const meshes = ids.map(id => doc.bodies.find(b => b.id === id)?.mesh).filter(Boolean);
      if (meshes.length > 0) {
        this.scene.updateMatrixWorld(true);
        const combined = new THREE.Box3();
        for (const m of meshes) combined.union(new THREE.Box3().setFromObject(m));
        const ctr = combined.getCenter(new THREE.Vector3());
        // Fixed lift above body so the cone stays a constant offset, not body-size proportional
        this.gizmo.position.set(ctr.x, combined.max.y + 6, ctr.z);
        this.gizmo.visible = true;
        // Rotation arches removed for now — rotation is still available via
        // the property panel (X / Y / Z degree fields). buildRotationHandles
        // remains in the codebase, ready to be re-enabled when the visual is right.
        this.clearRotationHandles();
        return;
      }
    }
    this.gizmo.visible = false;
    this.clearRotationHandles();
    hideDimLabels();
  }

  updateSketchOverlay() {
    while (this.sketchGroup.children.length) {
      const c = this.sketchGroup.children.pop();
      c.geometry?.dispose();
      c.material?.dispose();
    }
    // depthTest stays ON: now that curved-body sketches sit tangent to the
    // outer surface (not through the equator), natural depth occlusion works
    // — the sketch is visible from its own side and hidden by the body when
    // the camera orbits behind. That matches what students intuitively expect.
    const matActive       = new THREE.LineBasicMaterial({ color: 0x4f7cff, transparent: true, opacity: 0.95 });
    const matInactive     = new THREE.LineBasicMaterial({ color: 0x4f7cff, transparent: true, opacity: 0.35 });
    const matConstruction = new THREE.LineDashedMaterial({ color: 0xff9a3e, dashSize: 1.5, gapSize: 0.8, transparent: true, opacity: 0.7 });

    // Build a Three.js Shape from a closed entity, in sketch (u,v) coords
    const buildClosedShape = (ent) => {
      if (ent.type === 'rect') {
        const s = new THREE.Shape();
        s.moveTo(ent.x, ent.y);
        s.lineTo(ent.x + ent.w, ent.y);
        s.lineTo(ent.x + ent.w, ent.y + ent.h);
        s.lineTo(ent.x, ent.y + ent.h);
        s.closePath();
        return s;
      }
      if (ent.type === 'circle') {
        const s = new THREE.Shape();
        s.absarc(ent.cx, ent.cy, ent.r, 0, Math.PI * 2, false);
        return s;
      }
      if (ent.type === 'polyline' && ent.closed && ent.points.length >= 3) {
        const s = new THREE.Shape();
        s.moveTo(ent.points[0].x, ent.points[0].y);
        for (let i = 1; i < ent.points.length; i++) s.lineTo(ent.points[i].x, ent.points[i].y);
        s.closePath();
        return s;
      }
      return null;
    };

    for (const sketch of doc.sketches) {
      if (sketch.hidden) continue;
      const planeM = makePlaneMatrix(sketch.plane);
      const isActive = sketch.id === doc.activeSketchId;
      const baseMat = isActive ? matActive : matInactive;
      // Tiny perpendicular offset along plane +n so fills/lines don't z-fight body faces
      const sketch2dTo3d = (sx, sy) => new THREE.Vector3(sx, sy, 0.05).applyMatrix4(planeM);
      for (const ent of sketch.entities) {
        const useMat = ent.construction ? matConstruction : baseMat;

        // Shaded fill for closed shapes
        if (!ent.construction) {
          const shape = buildClosedShape(ent);
          if (shape) {
            const fillGeo = new THREE.ShapeGeometry(shape);
            fillGeo.translate(0, 0, 0.05); // before plane transform: small +z (= +n in world)
            fillGeo.applyMatrix4(planeM);
            const fillMat = new THREE.MeshBasicMaterial({
              color: isActive ? 0x4f7cff : 0x9eb6ff,
              transparent: true,
              opacity: isActive ? 0.22 : 0.10,
              side: THREE.DoubleSide,
              depthWrite: false,
            });
            const fillMesh = new THREE.Mesh(fillGeo, fillMat);
            fillMesh.renderOrder = 5;
            this.sketchGroup.add(fillMesh);
          }
        }

        // Outline (always)
        let pts = null;
        if (ent.type === 'rect') {
          pts = [
            sketch2dTo3d(ent.x, ent.y),
            sketch2dTo3d(ent.x + ent.w, ent.y),
            sketch2dTo3d(ent.x + ent.w, ent.y + ent.h),
            sketch2dTo3d(ent.x, ent.y + ent.h),
            sketch2dTo3d(ent.x, ent.y),
          ];
        } else if (ent.type === 'circle') {
          pts = [];
          const N = 64;
          for (let i = 0; i <= N; i++) {
            const t = (i / N) * Math.PI * 2;
            pts.push(sketch2dTo3d(ent.cx + Math.cos(t) * ent.r, ent.cy + Math.sin(t) * ent.r));
          }
        } else if (ent.type === 'polyline') {
          pts = ent.points.map(p => sketch2dTo3d(p.x, p.y));
          if (ent.closed && pts.length) pts.push(pts[0].clone());
        }
        if (pts && pts.length > 1) {
          const geo = new THREE.BufferGeometry().setFromPoints(pts);
          const line = new THREE.Line(geo, useMat);
          if (ent.construction) line.computeLineDistances();
          line.renderOrder = 6;
          this.sketchGroup.add(line);
        }
      }
    }
  }
}

function buildBodyMesh(body) {
  const isNeg = body.op === 'subtract';
  const matSolid = new THREE.MeshStandardMaterial({
    color: isNeg ? 0xff7070 : 0x9eb6ff,
    roughness: 0.55, metalness: 0.05, flatShading: false,
    transparent: isNeg,
    opacity: isNeg ? 0.45 : 1.0,
  });
  // Apply Euler rotation (degrees) at the end
  const applyRotation = (m) => {
    if (!body.rotation) return;
    m.rotation.set(
      THREE.MathUtils.degToRad(body.rotation.x || 0),
      THREE.MathUtils.degToRad(body.rotation.y || 0),
      THREE.MathUtils.degToRad(body.rotation.z || 0),
    );
  };
  let geo = null, mesh = null;
  if (body.type === 'combined' || body.type === 'group') {
    mesh = new THREE.Mesh(body.geometry, matSolid);
    mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'cube') {
    const fr = body.filletRadius || 0;
    const fe = body.filletEdges || { v: true, h: true };
    const wantV = fr > 0 && fe.v !== false; // round 4 vertical edges
    const wantH = fr > 0 && fe.h !== false; // round 8 top+bottom edges
    if (wantV || wantH) {
      const w = body.w, d = body.d, h = body.h;
      const r = Math.min(fr,
        wantV ? w / 2 - 0.01 : Infinity,
        wantV ? d / 2 - 0.01 : Infinity,
        wantH ? h / 2 - 0.01 : Infinity);
      const sX = -w / 2, sY = -d / 2;
      const shape = new THREE.Shape();
      if (wantV) {
        // Rounded-rectangle profile gives the 4 vertical fillets
        shape.moveTo(sX + r, sY);
        shape.lineTo(sX + w - r, sY);
        shape.absarc(sX + w - r, sY + r, r, -Math.PI / 2, 0, false);
        shape.lineTo(sX + w, sY + d - r);
        shape.absarc(sX + w - r, sY + d - r, r, 0, Math.PI / 2, false);
        shape.lineTo(sX + r, sY + d);
        shape.absarc(sX + r, sY + d - r, r, Math.PI / 2, Math.PI, false);
        shape.lineTo(sX, sY + r);
        shape.absarc(sX + r, sY + r, r, Math.PI, 3 * Math.PI / 2, false);
      } else {
        // Sharp rectangle — only the top/bottom edges will be rounded via bevel
        shape.moveTo(sX, sY);
        shape.lineTo(sX + w, sY);
        shape.lineTo(sX + w, sY + d);
        shape.lineTo(sX, sY + d);
        shape.lineTo(sX, sY);
      }
      // Bevel goes INTO the depth (z range stays [0, depth]), so depth must
      // equal the full requested height. Bevel just rounds the front/back
      // faces inward; it doesn't add to the prism's overall length.
      geo = new THREE.ExtrudeGeometry(shape, {
        depth: h,
        bevelEnabled: wantH,
        bevelThickness: wantH ? r : 0,
        bevelSize: wantH ? r : 0,
        bevelSegments: 6,
        curveSegments: 16,
      });
      // Stand the prism up so it extrudes along world +Y, then anchor the
      // bottom at body-local y=0 by measuring the geometry's actual bbox.
      geo.rotateX(-Math.PI / 2);
      geo.computeBoundingBox();
      const minY = geo.boundingBox.min.y;
      geo.translate(0, -minY, 0);
      mesh = new THREE.Mesh(geo, matSolid);
      mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    } else {
      geo = new THREE.BoxGeometry(body.w, body.h, body.d);
      mesh = new THREE.Mesh(geo, matSolid);
      mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    }
    applyRotation(mesh);
    return mesh;
  }
  // Round primitives — bake the per-axis scale directly INTO the geometry
  // (instead of using mesh.scale) so three-csg-ts sees the actual bbox-sized
  // mesh during boolean ops. Keeps CSG cuts working and still allows stretch
  // into ovals.
  if (body.type === 'sphere') {
    geo = new THREE.SphereGeometry(0.5, 48, 32);
    geo.scale(body.w, body.h, body.d);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'cylinder') {
    geo = new THREE.CylinderGeometry(0.5, 0.5, 1, 48);
    geo.scale(body.w, body.h, body.d);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'cone') {
    geo = new THREE.ConeGeometry(0.5, 1, 48);
    geo.scale(body.w, body.h, body.d);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'torus') {
    geo = new THREE.TorusGeometry(0.5, 0.5, 24, 64);
    geo.rotateX(Math.PI / 2);
    geo.scale(body.w, body.h, body.d);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'pyramid') {
    geo = new THREE.ConeGeometry(0.5, 1, 4); // 4-sided cone = pyramid
    geo.rotateY(Math.PI / 4); // align flat sides to axes
    geo.scale(body.w, body.h, body.d);
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, (body.h / 2) + (body.y || 0), body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  // Polygon prisms + star / heart / teardrop — built from a unit profile
  // with the per-axis scale baked into the geometry (NOT mesh.scale) so
  // CSG booleans see the real bbox-sized mesh.
  if (body.type === 'hexagon' || body.type === 'pentagon' || body.type === 'octagon' ||
      body.type === 'star' || body.type === 'heart' || body.type === 'teardrop') {
    const shape = build2DProfileShape(body.type, 0.5);
    if (shape) {
      geo = new THREE.ExtrudeGeometry(shape, {
        depth: 1,
        bevelEnabled: false,
        curveSegments: 48,
      });
      // After rotateX(-π/2): profile lies on XZ, extrusion runs along +Y, so
      // local geometry occupies x∈[-0.5, 0.5], y∈[0, 1], z∈[-0.5, 0.5].
      geo.rotateX(-Math.PI / 2);
      geo.scale(body.w, body.h, body.d);
      mesh = new THREE.Mesh(geo, matSolid);
      mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
      applyRotation(mesh);
      return mesh;
    }
  }
  if (body.type === 'fastener') {
    const fgeo = buildFastenerGeometry(body);
    if (!fgeo) return null;
    // Use a steel-grey material for fasteners so they read as hardware
    const matFastener = new THREE.MeshStandardMaterial({
      color: 0x9aa3ad,
      roughness: 0.45, metalness: 0.6, flatShading: false,
    });
    mesh = new THREE.Mesh(fgeo, matFastener);
    mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'revolve') {
    const profile = (body.sketch?.entities || []).find(e => e.type === 'polyline' && !e.construction && e.points?.length >= 2);
    if (!profile) return null;
    const pts = profile.points.map(p => new THREE.Vector2(Math.max(0, p.x), p.y));
    if (pts.length < 2) return null;
    geo = new THREE.LatheGeometry(pts, body.segments || 48);
    geo.applyMatrix4(makePlaneMatrix(body.plane || GROUND_PLANE));
    geo.computeVertexNormals();
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  if (body.type === 'extrude') {
    const shape = sketchToShape(body.sketch);
    if (!shape) return null;
    geo = new THREE.ExtrudeGeometry(shape, {
      depth: body.height,
      bevelEnabled: false,
      curveSegments: 48,
    });
    // For Negative extrudes, flip extrusion direction so it goes INTO the body
    // (along plane −n) instead of outward — that's the natural "cut a hole" direction.
    if (body.op === 'subtract') geo.translate(0, 0, -body.height);
    const plane = body.plane || GROUND_PLANE;
    geo.applyMatrix4(makePlaneMatrix(plane));
    mesh = new THREE.Mesh(geo, matSolid);
    mesh.position.set(body.x || 0, body.y || 0, body.z || 0);
    applyRotation(mesh);
    return mesh;
  }
  return null;
}

// ==================================================================
// Planar arrangement (v2 region engine)
// Every sketch entity is decomposed into line segments. All pairwise
// intersections split the segments. The result is a planar graph; its
// minimal cycles (bounded faces) become pickable regions. This covers
// v1 (single closed shape, chained loops) AND the X-of-lines case
// where intersections subdivide the face.
// ==================================================================

// Decompose any entity into a list of {a, b} line segments in sketch (u,v) coords
function entityToSegments(ent) {
  const out = [];
  const push = (a, b) => {
    if (Math.hypot(a.x - b.x, a.y - b.y) < 1e-6) return;
    out.push({ a: { x: a.x, y: a.y }, b: { x: b.x, y: b.y } });
  };
  if (ent.type === 'rect' && ent.w > 0 && ent.h > 0) {
    const x = ent.x, y = ent.y, w = ent.w, h = ent.h;
    push({ x, y }, { x: x + w, y });
    push({ x: x + w, y }, { x: x + w, y: y + h });
    push({ x: x + w, y: y + h }, { x, y: y + h });
    push({ x, y: y + h }, { x, y });
  } else if (ent.type === 'circle' && ent.r > 0) {
    const N = 64;
    let prev = { x: ent.cx + ent.r, y: ent.cy };
    for (let i = 1; i <= N; i++) {
      const t = (i / N) * Math.PI * 2;
      const cur = { x: ent.cx + Math.cos(t) * ent.r, y: ent.cy + Math.sin(t) * ent.r };
      push(prev, cur);
      prev = cur;
    }
  } else if (ent.type === 'polyline' && ent.points.length >= 2) {
    for (let i = 0; i < ent.points.length - 1; i++) push(ent.points[i], ent.points[i + 1]);
    if (ent.closed) push(ent.points[ent.points.length - 1], ent.points[0]);
  }
  return out;
}

// Strict interior intersection of two segments. Returns {x, y, t, u} where
// t in [0,1] for seg1 and u in [0,1] for seg2, or null if they don't cross.
// Returns null when the crossing is at both endpoints (already a shared vertex).
function segmentIntersection(p1, p2, p3, p4) {
  const dx12 = p2.x - p1.x, dy12 = p2.y - p1.y;
  const dx34 = p4.x - p3.x, dy34 = p4.y - p3.y;
  const denom = dx12 * dy34 - dy12 * dx34;
  if (Math.abs(denom) < 1e-9) return null; // parallel / collinear
  const t = ((p3.x - p1.x) * dy34 - (p3.y - p1.y) * dx34) / denom;
  const u = ((p3.x - p1.x) * dy12 - (p3.y - p1.y) * dx12) / denom;
  const eps = 1e-5;
  if (t < -eps || t > 1 + eps || u < -eps || u > 1 + eps) return null;
  const tEnd = (t < eps || t > 1 - eps);
  const uEnd = (u < eps || u > 1 - eps);
  if (tEnd && uEnd) return null; // shared vertex, not a crossing
  return { x: p1.x + t * dx12, y: p1.y + t * dy12, t, u };
}

// Build the planar graph: nodes (deduped points) + undirected edges between them.
function buildPlanarGraph(entities, boundary) {
  const segs = [];
  for (const ent of entities) {
    if (ent.construction) continue;
    for (const s of entityToSegments(ent)) segs.push(s);
  }
  // Implicit boundary (face perimeter for sketch-on-face) joins the planar graph
  if (boundary && boundary.type === 'rect' && boundary.w > 0 && boundary.h > 0) {
    const bx = boundary.x, by = boundary.y, bw = boundary.w, bh = boundary.h;
    segs.push({ a: { x: bx,      y: by      }, b: { x: bx + bw, y: by      } });
    segs.push({ a: { x: bx + bw, y: by      }, b: { x: bx + bw, y: by + bh } });
    segs.push({ a: { x: bx + bw, y: by + bh }, b: { x: bx,      y: by + bh } });
    segs.push({ a: { x: bx,      y: by + bh }, b: { x: bx,      y: by      } });
  } else if (boundary && boundary.type === 'circle' && boundary.r > 0) {
    const N = 64;
    let prev = { x: boundary.cx + boundary.r, y: boundary.cy };
    for (let i = 1; i <= N; i++) {
      const t = (i / N) * Math.PI * 2;
      const cur = { x: boundary.cx + Math.cos(t) * boundary.r,
                    y: boundary.cy + Math.sin(t) * boundary.r };
      segs.push({ a: prev, b: cur });
      prev = cur;
    }
  } else if (boundary && boundary.type === 'ellipse' && boundary.rx > 0 && boundary.ry > 0) {
    const N = 64;
    let prev = { x: boundary.cx + boundary.rx, y: boundary.cy };
    for (let i = 1; i <= N; i++) {
      const t = (i / N) * Math.PI * 2;
      const cur = { x: boundary.cx + Math.cos(t) * boundary.rx,
                    y: boundary.cy + Math.sin(t) * boundary.ry };
      segs.push({ a: prev, b: cur });
      prev = cur;
    }
  }
  if (!segs.length) return null;
  // Find all interior intersections per segment
  const ix = segs.map(() => []);
  for (let i = 0; i < segs.length; i++) {
    for (let j = i + 1; j < segs.length; j++) {
      const r = segmentIntersection(segs[i].a, segs[i].b, segs[j].a, segs[j].b);
      if (r) {
        ix[i].push({ t: r.t, x: r.x, y: r.y });
        ix[j].push({ t: r.u, x: r.x, y: r.y });
      }
    }
  }
  // Dedupe nodes by position with a small tolerance
  const nodes = [];
  const NODE_TOL = 0.5; // mm
  const findOrAdd = (p) => {
    for (let i = 0; i < nodes.length; i++) {
      if (Math.hypot(nodes[i].x - p.x, nodes[i].y - p.y) < NODE_TOL) return i;
    }
    nodes.push({ x: p.x, y: p.y });
    return nodes.length - 1;
  };
  // Split each segment at its intersections; each piece is a graph edge
  const rawEdges = [];
  for (let i = 0; i < segs.length; i++) {
    const s = segs[i];
    const pts = [{ t: 0, x: s.a.x, y: s.a.y }, ...ix[i], { t: 1, x: s.b.x, y: s.b.y }];
    pts.sort((p1, p2) => p1.t - p2.t);
    let prev = findOrAdd(pts[0]);
    for (let k = 1; k < pts.length; k++) {
      const cur = findOrAdd(pts[k]);
      if (cur !== prev) rawEdges.push({ a: prev, b: cur });
      prev = cur;
    }
  }
  // Dedupe identical undirected edges
  const seen = new Set();
  const edges = [];
  for (const e of rawEdges) {
    const k = e.a < e.b ? `${e.a},${e.b}` : `${e.b},${e.a}`;
    if (!seen.has(k)) { seen.add(k); edges.push(e); }
  }
  return { nodes, edges };
}

// Find every bounded face in the planar graph. For each directed edge, follow
// the "next CCW edge at the next node" rule until we cycle back; collect cycles
// with positive (CCW) signed area. Outer/unbounded cycles have negative area.
function findPlanarFaces(graph) {
  if (!graph || !graph.edges.length) return [];
  const { nodes, edges } = graph;
  // Adjacency: per node, list of {to, angle} sorted ascending (CCW)
  const adj = nodes.map(() => []);
  for (const e of edges) {
    const A = nodes[e.a], B = nodes[e.b];
    adj[e.a].push({ to: e.b, angle: Math.atan2(B.y - A.y, B.x - A.x) });
    adj[e.b].push({ to: e.a, angle: Math.atan2(A.y - B.y, A.x - B.x) });
  }
  for (const list of adj) list.sort((x, y) => x.angle - y.angle);
  // Given directed edge (u → v), the next edge in a CCW face cycle is, at v,
  // the edge IMMEDIATELY CW (previous index) of the reverse direction (v → u)
  // in the CCW-sorted adjacency list.
  const nextEdge = (u, v) => {
    const back = Math.atan2(nodes[u].y - nodes[v].y, nodes[u].x - nodes[v].x);
    const list = adj[v];
    let idx = -1, bestDiff = Infinity;
    for (let i = 0; i < list.length; i++) {
      let d = Math.abs(list[i].angle - back);
      if (d > Math.PI) d = 2 * Math.PI - d;
      if (d < bestDiff) { bestDiff = d; idx = i; }
    }
    if (idx < 0) return null;
    return list[(idx - 1 + list.length) % list.length].to;
  };
  const visited = new Set();
  const faces = [];
  for (const e of edges) {
    for (const dir of [[e.a, e.b], [e.b, e.a]]) {
      if (visited.has(`${dir[0]},${dir[1]}`)) continue;
      const cycle = [dir[0]];
      let u = dir[0], v = dir[1];
      let safety = 0;
      while (safety++ < 4000) {
        const k = `${u},${v}`;
        if (visited.has(k)) break;
        visited.add(k);
        cycle.push(v);
        const nxt = nextEdge(u, v);
        if (nxt == null) break;
        u = v; v = nxt;
        if (u === dir[0] && v === dir[1]) break; // closed back to start
      }
      // Drop the duplicated last vertex if it equals the first
      if (cycle.length > 2 && cycle[0] === cycle[cycle.length - 1]) cycle.pop();
      if (cycle.length < 3) continue;
      // Signed area — positive CCW = bounded interior face; outer face is CW
      let area = 0;
      for (let i = 0; i < cycle.length; i++) {
        const p = nodes[cycle[i]], q = nodes[cycle[(i + 1) % cycle.length]];
        area += p.x * q.y - q.x * p.y;
      }
      area /= 2;
      if (area > 0.5) faces.push({ cycle, area, points: cycle.map(i => ({ x: nodes[i].x, y: nodes[i].y })) });
    }
  }
  return faces;
}

// Compute pickable closed regions for a sketch using v2 planar arrangement.
// Each bounded face of the planar graph becomes a region. Falls back gracefully
// when no faces (e.g., only construction lines).
function computeSketchRegions(sketch) {
  if (!sketch || !sketch.entities.length) return [];
  const candidates = sketch.entities.filter(e => !e.construction);
  if (!candidates.length) return [];
  const graph = buildPlanarGraph(candidates, sketch.boundary);
  const faces = findPlanarFaces(graph);
  if (!faces.length) return [];
  const regs = [];
  for (let i = 0; i < faces.length; i++) {
    const f = faces[i];
    regs.push({
      id: `s${sketch.id}-f${i}`,
      sketchId: sketch.id,
      kind: 'face',
      points: f.points,
      area: f.area,
    });
  }
  return regs;
}

// Build a THREE.Shape from a region (used both for picker overlay and extrude geometry).
function regionToShape(region) {
  if (region.kind === 'circle' && region.circle) {
    const s = new THREE.Shape();
    s.absarc(region.circle.cx, region.circle.cy, region.circle.r, 0, Math.PI * 2, false);
    return s;
  }
  if (!region.points || region.points.length < 3) return null;
  const s = new THREE.Shape();
  s.moveTo(region.points[0].x, region.points[0].y);
  for (let i = 1; i < region.points.length; i++) s.lineTo(region.points[i].x, region.points[i].y);
  s.closePath();
  return s;
}

// Convert a region into a synthetic single-entity sketch (closed) so we can
// reuse the existing extrude pipeline.
function regionToSyntheticSketch(region, sourceSketch) {
  const ent = (region.kind === 'circle' && region.circle)
    ? { id: 1, type: 'circle', cx: region.circle.cx, cy: region.circle.cy, r: region.circle.r }
    : { id: 1, type: 'polyline', closed: true, points: region.points.map(p => ({ x: p.x, y: p.y })) };
  return {
    id: sourceSketch.id,
    plane: JSON.parse(JSON.stringify(sourceSketch.plane)),
    entities: [ent],
    nextId: 2,
    name: sourceSketch.name + ' · region',
  };
}

function sketchToShape(sketch) {
  // Supports: one rectangle, one circle, one closed polyline,
  // OR a chain of open polylines (lines + arcs) that meet end-to-end into a
  // closed loop. Future: combine multiple loops with holes via THREE.Shape.holes.
  if (!sketch || !sketch.entities.length) return null;
  const candidates = sketch.entities.filter(e => !e.construction);
  if (!candidates.length) return null;
  // Prefer the largest single closed entity if one exists
  let best = null, bestArea = 0;
  for (const e of candidates) {
    const a = entityArea(e);
    if (a > bestArea) { best = e; bestArea = a; }
  }
  if (best && bestArea > 0) {
    if (best.type === 'rect') {
      const s = new THREE.Shape();
      s.moveTo(best.x, best.y);
      s.lineTo(best.x + best.w, best.y);
      s.lineTo(best.x + best.w, best.y + best.h);
      s.lineTo(best.x, best.y + best.h);
      s.closePath();
      return s;
    }
    if (best.type === 'circle') {
      const s = new THREE.Shape();
      s.absarc(best.cx, best.cy, best.r, 0, Math.PI * 2, false);
      return s;
    }
    if (best.type === 'polyline' && best.closed && best.points.length >= 3) {
      const s = new THREE.Shape();
      s.moveTo(best.points[0].x, best.points[0].y);
      for (let i = 1; i < best.points.length; i++) s.lineTo(best.points[i].x, best.points[i].y);
      s.closePath();
      return s;
    }
  }
  // No single closed entity — try to assemble open polylines into a closed loop
  const chain = chainOpenPolylinesToClosedLoop(candidates);
  if (chain && chain.length >= 3) {
    const s = new THREE.Shape();
    s.moveTo(chain[0].x, chain[0].y);
    for (let i = 1; i < chain.length; i++) s.lineTo(chain[i].x, chain[i].y);
    s.closePath();
    return s;
  }
  return null;
}

// Walk through all open polylines and try to chain them end-to-end into a
// closed loop. Forgiving endpoint tolerance, extends from both head and tail
// of the working chain, and finds the closed sub-loop with the largest area.
function chainOpenPolylinesToClosedLoop(entities) {
  const segs = [];
  for (const e of entities) {
    if (e.type === 'polyline' && !e.closed && e.points.length >= 2) {
      segs.push({ pts: e.points.map(p => ({ x: p.x, y: p.y })) });
    }
  }
  if (!segs.length) return null;
  const TOL = 2.0; // mm — generous enough for free-hand endpoints
  const d = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  let bestChain = null, bestArea = 0;
  for (let seed = 0; seed < segs.length; seed++) {
    const used = new Set([seed]);
    const chain = segs[seed].pts.slice();
    let progress = true;
    while (progress) {
      progress = false;
      // Try to extend from the tail
      const tail = chain[chain.length - 1];
      for (let i = 0; i < segs.length; i++) {
        if (used.has(i)) continue;
        const sp = segs[i].pts;
        if (d(tail, sp[0]) < TOL) {
          for (let k = 1; k < sp.length; k++) chain.push(sp[k]);
          used.add(i); progress = true; break;
        }
        if (d(tail, sp[sp.length - 1]) < TOL) {
          for (let k = sp.length - 2; k >= 0; k--) chain.push(sp[k]);
          used.add(i); progress = true; break;
        }
      }
      if (progress) continue;
      // Then try to extend from the head
      const head = chain[0];
      for (let i = 0; i < segs.length; i++) {
        if (used.has(i)) continue;
        const sp = segs[i].pts;
        if (d(head, sp[sp.length - 1]) < TOL) {
          for (let k = sp.length - 2; k >= 0; k--) chain.unshift(sp[k]);
          used.add(i); progress = true; break;
        }
        if (d(head, sp[0]) < TOL) {
          for (let k = 1; k < sp.length; k++) chain.unshift(sp[k]);
          used.add(i); progress = true; break;
        }
      }
    }
    // Did this seed yield a closed loop?
    if (chain.length >= 3 && d(chain[0], chain[chain.length - 1]) < TOL) {
      const closed = chain.slice(0, -1); // drop duplicate closing vertex
      // Shoelace area to compare against other candidate loops
      let a = 0;
      for (let i = 0; i < closed.length; i++) {
        const p = closed[i], q = closed[(i + 1) % closed.length];
        a += p.x * q.y - q.x * p.y;
      }
      const area = Math.abs(a) / 2;
      if (area > bestArea) { bestChain = closed; bestArea = area; }
    }
  }
  return bestChain;
}

function entityArea(e) {
  if (e.type === 'rect') return e.w * e.h;
  if (e.type === 'circle') return Math.PI * e.r * e.r;
  if (e.type === 'polyline') {
    if (!e.closed || e.points.length < 3) return 0;
    // Shoelace
    let a = 0;
    for (let i = 0; i < e.points.length; i++) {
      const p = e.points[i], q = e.points[(i + 1) % e.points.length];
      a += p.x * q.y - q.x * p.y;
    }
    return Math.abs(a) / 2;
  }
  return 0;
}

// ---------- 4. Bridge ----------
let sketchEng, viewer;

// ==================================================================
// Undo / redo
// Snapshots the parts of doc that represent geometry: sketches, bodies, and
// the id counters. Selection / mode / units / grid are NOT undoable. Group
// bodies serialize their CSG result so undo doesn't have to re-run the boolean.
// ==================================================================
const undoStack = [];
const redoStack = [];
const MAX_UNDO = 60;

function _serializeGeometry(g) {
  if (!g) return null;
  const out = { position: Array.from(g.attributes.position.array) };
  if (g.attributes.normal) out.normal = Array.from(g.attributes.normal.array);
  if (g.index) out.index = Array.from(g.index.array);
  return out;
}
function _deserializeGeometry(d) {
  if (!d) return null;
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(d.position, 3));
  if (d.normal) g.setAttribute('normal', new THREE.Float32BufferAttribute(d.normal, 3));
  if (d.index) g.setIndex(d.index);
  if (!d.normal) g.computeVertexNormals();
  return g;
}
function _snapshotBody(b) {
  const out = {};
  for (const k of Object.keys(b)) {
    if (k === 'mesh') continue;
    if (k === 'geometry') { out.geometry = _serializeGeometry(b.geometry); out._geomSerialized = true; continue; }
    if (k === 'children' && Array.isArray(b.children)) { out.children = b.children.map(_snapshotBody); continue; }
    try { out[k] = JSON.parse(JSON.stringify(b[k])); }
    catch (_) { /* skip unserializable */ }
  }
  return out;
}
function _restoreBody(b) {
  if (b._geomSerialized && b.geometry) {
    b.geometry = _deserializeGeometry(b.geometry);
    delete b._geomSerialized;
  }
  if (Array.isArray(b.children)) b.children = b.children.map(_restoreBody);
  delete b.mesh;
  return b;
}
function snapshotDoc() {
  return {
    sketches: JSON.parse(JSON.stringify(doc.sketches)),
    bodies:   doc.bodies.map(_snapshotBody),
    activeSketchId: doc.activeSketchId,
    nextSketchId: doc.nextSketchId,
    nextBodyId: doc.nextBodyId,
  };
}
function applySnapshot(s) {
  const restore = (b) => {
    const c = JSON.parse(JSON.stringify(b));
    if (c.geometry && !(c.geometry instanceof THREE.BufferGeometry)) {
      c.geometry = _deserializeGeometry(c.geometry);
    }
    if (Array.isArray(c.children)) c.children = c.children.map(restore);
    return c;
  };
  doc.sketches = JSON.parse(JSON.stringify(s.sketches));
  doc.bodies = s.bodies.map(restore);
  doc.activeSketchId = s.activeSketchId;
  doc.nextSketchId = s.nextSketchId;
  doc.nextBodyId = s.nextBodyId;
  doc.selection = null;
  doc.multiSelectedBodies = [];
  doc.multiSelectedSketch = [];
  doc.selectedRegions = [];
  // Hide the extrude tooltip + drag preview if anything was active when undo
  // ran — otherwise the gizmo lingers and the user thinks undo didn't work.
  if (viewer) {
    if (viewer.extrudeState) viewer.extrudeState.active = false;
    viewer.clearExtrudePreview && viewer.clearExtrudePreview();
    viewer.rebuildBodies();
    viewer.updateRegions && viewer.updateRegions();
    viewer.updateExtrudeGizmo && viewer.updateExtrudeGizmo();
    viewer.updateGizmo && viewer.updateGizmo();
  }
  hideExtrudeTooltip && hideExtrudeTooltip();
  if (sketchEng) sketchEng.render();
  renderTree(); renderProps();
}
function pushUndo() {
  try {
    undoStack.push(snapshotDoc());
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack.length = 0;
    updateUndoRedoButtons();
  } catch (err) {
    console.error('pushUndo failed:', err);
    setStatus('⚠ Undo capture failed: ' + err.message);
  }
}
function undo() {
  if (!undoStack.length) { setStatus('Nothing to undo'); return; }
  try {
    redoStack.push(snapshotDoc());
    applySnapshot(undoStack.pop());
    setStatus(`Undo (${undoStack.length} step${undoStack.length === 1 ? '' : 's'} left)`);
    updateUndoRedoButtons();
  } catch (err) {
    console.error('undo failed:', err);
    setStatus('⚠ Undo failed: ' + err.message);
  }
}
function redo() {
  if (!redoStack.length) { setStatus('Nothing to redo'); return; }
  try {
    undoStack.push(snapshotDoc());
    applySnapshot(redoStack.pop());
    setStatus(`Redo (${redoStack.length} step${redoStack.length === 1 ? '' : 's'} left)`);
    updateUndoRedoButtons();
  } catch (err) {
    console.error('redo failed:', err);
    setStatus('⚠ Redo failed: ' + err.message);
  }
}
function updateUndoRedoButtons() {
  const u = document.getElementById('undo-btn');
  const r = document.getElementById('redo-btn');
  // Visually dim when empty, but never `disabled` so a click always reaches
  // undo()/redo() and the user gets a status message instead of dead silence.
  if (u) u.style.opacity = undoStack.length ? '1' : '0.4';
  if (r) r.style.opacity = redoStack.length ? '1' : '0.4';
}

function setMode(mode) {
  doc.mode = mode;
  $('tools-2d').style.display = mode === '2d' ? '' : 'none';
  $('tools-3d').style.display = mode === '3d' ? '' : 'none';
  $('sketch-svg').classList.toggle('active', mode === '2d');
  $('three-canvas').classList.toggle('active', mode === '3d');
  // "Done" button is only visible while editing a sketch in 2D
  const back = document.getElementById('back-to-3d-btn');
  if (back) back.style.display = mode === '2d' ? '' : 'none';
  if (mode === '2d') {
    setStatus('2D Sketch — draw your part with real dimensions');
    if (viewer) {
      viewer.gizmo.visible = false;
      viewer.clearRotationHandles();
      viewer.extrudeArrows.visible = false;
      viewer.clearExtrudePreview();
    }
    hideDimLabels();
    hideExtrudeTooltip();
    if (doc.alignMode) exitAlignMode();
    sketchEng.render();
  } else {
    setStatus('3D Model — orbit, extrude, drag the gizmo to move bodies');
    if (viewer) {
      viewer.rebuildBodies();
      viewer.updateSketchOverlay();
      viewer.updateGizmo();
      viewer.resize();
    }
  }
  renderProps();
}

// ---------- Drag-to-extrude tooltip + commit (global helpers) ----------
// Sticky default — kept across openings so the user doesn't have to re-pick

let extrudeTooltipOp = 'add';
function getExtrudeTooltipOp() { return extrudeTooltipOp; }
function setExtrudeTooltipOp(op) {

  // Reflect in UI
  const tg = document.getElementById('extrude-op-toggle');

}
function showExtrudeTooltip() {

  if (!t) return;

function hideExtrudeTooltip() {

function updateExtrudeTooltipText(lengthMm, worldPos) {

  if (!t) return;

  if (inp && document.activeElement !== inp) {

  }

    const canvasRect = viewer.canvas.getBoundingClientRect();
    const v = worldPos.clone().project(viewer.camera);
    if (v.z < 1) {
      const sx = canvasRect.left + (v.x + 1) / 2 * canvasRect.width - cArea.left;
      const sy = canvasRect.top + (1 - v.y) / 2 * canvasRect.height - cArea.top;

      t.style.top  = (sy - 18) + 'px';
