// ---------- 5. Properties panel ----------
function renderGridPanel() {
  const sel = $('grid-spacing');
  const snap = $('grid-snap');
  const sizeSel = $('grid-size');
  if (!sel || !snap || !sizeSel) return;

  const spacings = doc.units === 'in'
    ? [{ v: 25.4 / 16, l: '1/16 in' }, { v: 25.4 / 8, l: '1/8 in' }, { v: 25.4 / 4, l: '1/4 in' }, { v: 25.4 / 2, l: '1/2 in' }, { v: 25.4, l: '1 in' }]
    : [{ v: 1, l: '1 mm' }, { v: 2, l: '2 mm' }, { v: 5, l: '5 mm' }, { v: 10, l: '10 mm' }, { v: 25, l: '25 mm' }];
  sel.innerHTML = spacings.map(s =>
    `<option value="${s.v}"${Math.abs(s.v - doc.grid.spacing) < 0.001 ? ' selected' : ''}>${s.l}</option>`
  ).join('');

  const sizes = doc.units === 'in'
    ? [{ v: 4 * 25.4, l: '4 in' }, { v: 8 * 25.4, l: '8 in' }, { v: 12 * 25.4, l: '12 in' }, { v: 20 * 25.4, l: '20 in' }, { v: 40 * 25.4, l: '40 in' }]
    : [{ v: 100, l: '100 mm' }, { v: 200, l: '200 mm' }, { v: 300, l: '300 mm' }, { v: 500, l: '500 mm' }, { v: 1000, l: '1000 mm' }];
  // Make sure the current size is one of the options; if not, snap to nearest preset
  const closest = sizes.reduce((best, s) => Math.abs(s.v - doc.grid.size) < Math.abs(best.v - doc.grid.size) ? s : best, sizes[0]);
  if (Math.abs(closest.v - doc.grid.size) > 0.5) doc.grid.size = closest.v;
  sizeSel.innerHTML = sizes.map(s =>
    `<option value="${s.v}"${Math.abs(s.v - doc.grid.size) < 0.5 ? ' selected' : ''}>${s.l}</option>`
  ).join('');

  snap.checked = !!doc.grid.snap;

  // Re-bind via clone-replace to drop any previous handlers
  const newSel = sel.cloneNode(true);
  sel.parentNode.replaceChild(newSel, sel);
  newSel.addEventListener('change', (e) => {
    doc.grid.spacing = parseFloat(e.target.value);
    sketchEng?.render();
    if (viewer) viewer.rebuildWorkplane();
  });
  const newSnap = snap.cloneNode(true);
  snap.parentNode.replaceChild(newSnap, snap);
  newSnap.addEventListener('change', (e) => {
    doc.grid.snap = e.target.checked;
    setStatus(`Snap to grid: ${e.target.checked ? 'on' : 'off'}`);
  });
  const newSize = sizeSel.cloneNode(true);
  sizeSel.parentNode.replaceChild(newSize, sizeSel);
  newSize.addEventListener('change', (e) => {
    doc.grid.size = parseFloat(e.target.value);
    sketchEng?.render();
    if (viewer) viewer.rebuildWorkplane();
    setStatus(`Workplane: ${fmtUL(doc.grid.size)} square`);
  });
}

function renderTree() {
  const tree = $('tree');
  let html = '';
  // List all sketches — every sketch is deletable
  for (const sketch of doc.sketches) {
    const isActiveSketch = sketch.id === doc.activeSketchId;
    const inSketchMode = doc.mode === '2d' && isActiveSketch;
    const cls = inSketchMode ? 'active' : '';
    const eye = sketch.hidden ? '◌' : '◉';
    const eyeTitle = sketch.hidden ? 'Show sketch' : 'Hide sketch';
    html += `<div class="tree-node ${cls}" data-kind="sketch" data-id="${sketch.id}">
      <button class="tree-eye" data-action="toggle-sketch" data-id="${sketch.id}" title="${eyeTitle}">${eye}</button>
      <span class="ico">📐</span> <span class="tree-label" style="${sketch.hidden ? 'opacity:0.45' : ''}">${sketch.name}</span>
      <span class="tree-count">${sketch.entities.length}</span>
      <button class="tree-del" data-action="del-sketch" data-id="${sketch.id}" title="Delete sketch">×</button></div>`;
  }
  // List all bodies
  for (const body of doc.bodies) {
    const active = doc.multiSelectedBodies?.includes(body.id) ||
                   (doc.selection?.kind === 'body' && doc.selection.id === body.id);
    let label = body.type;
    if (body.type === 'extrude') label = `Extrude (${fmtUL(body.height)})`;
    else if (body.type === 'cube') label = 'Cube';
    else if (body.type === 'sphere') label = 'Sphere';
    else if (body.type === 'cylinder') label = 'Cylinder';
    else if (body.type === 'cone') label = 'Cone';
    else if (body.type === 'torus') label = 'Torus';
    else if (body.type === 'pyramid') label = 'Pyramid';
    else if (body.type === 'hexagon') label = 'Hexagon';
    else if (body.type === 'pentagon') label = 'Pentagon';
    else if (body.type === 'octagon') label = 'Octagon';
    else if (body.type === 'star') label = 'Star';
    else if (body.type === 'heart') label = 'Heart';
    else if (body.type === 'teardrop') label = 'Teardrop';
    else if (body.type === 'combined') label = 'Combined';
    else if (body.type === 'group') label = `Group (${body.children?.length || 0})`;
    else if (body.type === 'revolve') label = 'Revolved';
    else if (body.type === 'fastener') {
      const spec = getFastenerSpec(body.size);
      label = `${spec.label} ${FASTENER_HEAD_LABELS[body.headType] || body.headType} (${fmtUL(body.length)})`;
    }
    const ico = body.type === 'extrude' ? '⇪' :
                body.type === 'fastener' ? '🔩' :
                body.type === 'revolve' ? '⟳' :
                body.type === 'sphere' ? '●' :
                body.type === 'cylinder' ? '⬭' :
                body.type === 'cone' ? '▲' :
                body.type === 'torus' ? '◯' :
                body.type === 'pyramid' ? '◭' :
                body.type === 'hexagon' ? '⬡' :
                body.type === 'pentagon' ? '⬠' :
                body.type === 'octagon' ? '⯃' :
                body.type === 'star' ? '★' :
                body.type === 'heart' ? '♥' :
                body.type === 'teardrop' ? '💧' :
                body.type === 'combined' ? '⊕' :
                body.type === 'group' ? '⊞' : '▣';
    const negTag = body.op === 'subtract' ? ' <span style="color:#e53e3e;font-size:10px">(neg)</span>' : '';
    const eye = body.hidden ? '◌' : '◉';
    const eyeTitle = body.hidden ? 'Show body' : 'Hide body';
    html += `<div class="tree-node ${active ? 'active' : ''}" data-kind="body" data-id="${body.id}">
      <button class="tree-eye" data-action="toggle-body" data-id="${body.id}" title="${eyeTitle}">${eye}</button>
      <span class="ico">${ico}</span> <span class="tree-label" style="${body.hidden ? 'opacity:0.45' : ''}">${label}${negTag}</span>
      <button class="tree-del" data-action="del-body" data-id="${body.id}" title="Delete body">×</button></div>`;
  }
  tree.innerHTML = html;
  // Per-node visibility toggles (eyeball)
  tree.querySelectorAll('.tree-eye').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      if (btn.dataset.action === 'toggle-sketch') {
        const s = doc.sketches.find(x => x.id === id);
        if (!s) return;
        s.hidden = !s.hidden;
        renderTree();
        if (sketchEng) sketchEng.render();
        if (viewer) { viewer.updateSketchOverlay(); viewer.updateRegions(); viewer.updateExtrudeGizmo(); }
      } else if (btn.dataset.action === 'toggle-body') {
        const b = doc.bodies.find(x => x.id === id);
        if (!b) return;
        b.hidden = !b.hidden;
        renderTree();
        if (viewer) viewer.rebuildBodies();
      }
    });
  });
  // Per-node delete buttons (sketches and bodies)
  tree.querySelectorAll('.tree-del').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      if (btn.dataset.action === 'del-sketch') {
        if (doc.sketches.length <= 1) {
          showHint('At least one sketch is required — clear its shapes instead.');
          return;
        }
        const s = doc.sketches.find(x => x.id === id);
        if (!s) return;
        if (s.entities.length > 0 && !confirm(`Delete "${s.name}" and its ${s.entities.length} shape${s.entities.length === 1 ? '' : 's'}?`)) return;
        pushUndo();
        doc.sketches = doc.sketches.filter(x => x.id !== id);
        if (doc.activeSketchId === id) doc.activeSketchId = doc.sketches[0].id;
        // Drop any bodies that depended on this sketch (extrudes / revolves)
        doc.bodies = doc.bodies.filter(b => !((b.type === 'extrude' || b.type === 'revolve') && b.sketch && b.sketch.id === id));
        renderTree(); renderProps();
        if (sketchEng) sketchEng.render();
        if (viewer) { viewer.rebuildBodies(); viewer.updateSketchOverlay(); }
        setStatus(`Deleted sketch "${s.name}"`);
      } else if (btn.dataset.action === 'del-body') {
        const b = doc.bodies.find(x => x.id === id);
        if (!b) return;
        pushUndo();
        doc.bodies = doc.bodies.filter(x => x.id !== id);
        if (doc.selection?.kind === 'body' && doc.selection.id === id) doc.selection = null;
        doc.multiSelectedBodies = (doc.multiSelectedBodies || []).filter(x => x !== id);
        if (viewer) { viewer.rebuildBodies(); viewer.updateGizmo(); }
        renderTree(); renderProps();
        setStatus('Deleted body');
      }
    });
  });
  tree.querySelectorAll('.tree-node').forEach(n => {
    n.addEventListener('click', () => {
      if (n.dataset.kind === 'sketch') {
        doc.activeSketchId = parseInt(n.dataset.id);
        doc.selection = null;
        doc.multiSelectedSketch = [];
        setMode('2d');
      } else {
        const id = parseInt(n.dataset.id);
        const body = doc.bodies.find(b => b.id === id);
        doc.selection = { kind: 'body', id };
        doc.multiSelectedBodies = [id];
        if (body?.bodyGroupId != null) {
          for (const b of doc.bodies) {
            if (b.bodyGroupId === body.bodyGroupId && b.id !== id) doc.multiSelectedBodies.push(b.id);
          }
        }
        if (doc.mode !== '3d') setMode('3d');
        viewer?.updateGizmo();
        renderProps();
      }
      renderTree();
    });
  });
}

function renderProps() {
  const props = $('props');
  if (!doc.selection) {
    if (doc.mode === '2d') {
      const n = doc.sketch.entities.length;
      props.innerHTML = `
        <h4>Sketch 1</h4>
        <div class="field"><label>Entities</label><div>${n} ${n === 1 ? 'shape' : 'shapes'}</div></div>
        <div class="hint">Click a shape to edit dimensions, or pick a tool above to draw a new one.</div>`;
    } else {
      props.innerHTML = `<div class="empty">Select a body or use the tools above.</div>`;
    }
    return;
  }

  if (doc.selection.kind === 'sketch') {
    const ent = doc.sketch.entities.find(e => e.id === doc.selection.id);
    if (!ent) { props.innerHTML = ''; return; }
    const u = unitLabel();
    if (ent.type === 'rect') {
      props.innerHTML = `
        <h4>Rectangle</h4>
        <div class="field"><label>X (${u})</label><input type="number" data-k="x" value="${fmtU(ent.x)}" step="0.5"/></div>
        <div class="field"><label>Y (${u})</label><input type="number" data-k="y" value="${fmtU(ent.y)}" step="0.5"/></div>
        <div class="field"><label>Width (${u})</label><input type="number" data-k="w" value="${fmtU(ent.w)}" step="0.5" min="0.01"/></div>
        <div class="field"><label>Height (${u})</label><input type="number" data-k="h" value="${fmtU(ent.h)}" step="0.5" min="0.01"/></div>
        <div class="field"><label>Construction</label><input type="checkbox" data-flag="construction" ${ent.construction ? 'checked' : ''}/></div>
        <button class="action" id="del-ent" style="margin-top:10px">Delete shape</button>`;
    } else if (ent.type === 'circle') {
      props.innerHTML = `
        <h4>Circle</h4>
        <div class="field"><label>Center X (${u})</label><input type="number" data-k="cx" value="${fmtU(ent.cx)}" step="0.5"/></div>
        <div class="field"><label>Center Y (${u})</label><input type="number" data-k="cy" value="${fmtU(ent.cy)}" step="0.5"/></div>
        <div class="field"><label>Radius (${u})</label><input type="number" data-k="r" value="${fmtU(ent.r)}" step="0.5" min="0.01"/></div>
        <div class="field"><label>Diameter</label><div>${fmtUL(ent.r * 2)}</div></div>
        <div class="field"><label>Construction</label><input type="checkbox" data-flag="construction" ${ent.construction ? 'checked' : ''}/></div>
        <button class="action" id="del-ent" style="margin-top:10px">Delete shape</button>`;
    } else if (ent.type === 'polyline') {
      let len = 0;
      for (let i = 0; i < ent.points.length - 1; i++) {
        len += Math.hypot(ent.points[i+1].x - ent.points[i].x, ent.points[i+1].y - ent.points[i].y);
      }
      if (ent.closed && ent.points.length > 1) {
        const a = ent.points[0], b = ent.points[ent.points.length - 1];
        len += Math.hypot(a.x - b.x, a.y - b.y);
      }
      props.innerHTML = `
        <h4>${ent.closed ? 'Closed polyline' : 'Polyline'}</h4>
        <div class="field"><label>Vertices</label><div>${ent.points.length}</div></div>
        <div class="field"><label>Length</label><div>${fmtUL(len)}</div></div>
        ${ent.closed ? `<div class="field"><label>Area</label><div>${fmt(doc.units === 'in' ? entityArea(ent) / (MM_PER_IN * MM_PER_IN) : entityArea(ent))} ${u}²</div></div>` : ''}
        <div class="field"><label>Construction</label><input type="checkbox" data-flag="construction" ${ent.construction ? 'checked' : ''}/></div>
        ${!ent.closed && !ent.construction ? `<div class="hint">Open polyline — close it to make it extrudable.</div>` : ''}
        <button class="action" id="del-ent" style="margin-top:10px">Delete shape</button>`;
    }
    props.querySelectorAll('input[type="number"]').forEach(inp => {
      inp.addEventListener('input', () => {
        const v = parseFloat(inp.value);
        if (!isFinite(v)) return;
        ent[inp.dataset.k] = fromUnit(v);
        sketchEng.render();
      });
    });
    props.querySelectorAll('input[type="checkbox"]').forEach(inp => {
      inp.addEventListener('change', () => {
        ent[inp.dataset.flag] = inp.checked;
        sketchEng.render();
      });
    });
    const del = $('del-ent');
    if (del) del.onclick = () => {
      doc.sketch.entities = doc.sketch.entities.filter(e => e.id !== ent.id);
      doc.selection = null;
      sketchEng.render();
      renderTree();
      renderProps();
    };
    return;
  }

  if (doc.selection.kind === 'body') {
    const body = doc.bodies.find(b => b.id === doc.selection.id);
    if (!body) { props.innerHTML = ''; return; }
    const u = unitLabel();
    const rot = body.rotation || { x: 0, y: 0, z: 0 };
    const positionFields = `
      <h4 style="margin-top:14px">Position</h4>
      <div class="field"><label>X (${u})</label><input type="number" data-k="x" value="${fmtU(body.x || 0)}" step="1"/></div>
      <div class="field"><label>Y (${u})</label><input type="number" data-k="y" value="${fmtU(body.y || 0)}" step="1"/></div>
      <div class="field"><label>Z (${u})</label><input type="number" data-k="z" value="${fmtU(body.z || 0)}" step="1"/></div>
      <h4 style="margin-top:14px">Rotation (°)</h4>
      <div class="field"><label>X axis</label><input type="number" data-rk="x" value="${fmt(rot.x)}" step="15"/></div>
      <div class="field"><label>Y axis</label><input type="number" data-rk="y" value="${fmt(rot.y)}" step="15"/></div>
      <div class="field"><label>Z axis</label><input type="number" data-rk="z" value="${fmt(rot.z)}" step="15"/></div>`;

    let dimFields = '';
    if (body.type === 'cube') {
      dimFields = `<h4>Cube</h4>
        <div class="field"><label>Width (${u})</label><input type="number" data-k="w" value="${fmtU(body.w)}" min="0.01" step="1"/></div>
        <div class="field"><label>Height (${u})</label><input type="number" data-k="h" value="${fmtU(body.h)}" min="0.01" step="1"/></div>
        <div class="field"><label>Depth (${u})</label><input type="number" data-k="d" value="${fmtU(body.d)}" min="0.01" step="1"/></div>`;
    } else if (body.type === 'sphere' || body.type === 'cylinder' || body.type === 'cone' ||
               body.type === 'pyramid' || body.type === 'torus') {
      const labelMap = {
        sphere: 'Sphere', cylinder: 'Cylinder', cone: 'Cone',
        pyramid: 'Pyramid', torus: 'Torus',
      };
      dimFields = `<h4>${labelMap[body.type]}</h4>
        <div class="field"><label>Width (${u})</label><input type="number" data-k="w" value="${fmtU(body.w)}" min="0.01" step="1"/></div>
        <div class="field"><label>Height (${u})</label><input type="number" data-k="h" value="${fmtU(body.h)}" min="0.01" step="1"/></div>
        <div class="field"><label>Depth (${u})</label><input type="number" data-k="d" value="${fmtU(body.d)}" min="0.01" step="1"/></div>`;
    } else if (body.type === 'hexagon' || body.type === 'pentagon' || body.type === 'octagon' ||
               body.type === 'star' || body.type === 'heart' || body.type === 'teardrop') {
      const labelMap = {
        hexagon: 'Hexagon', pentagon: 'Pentagon', octagon: 'Octagon',
        star: 'Star', heart: 'Heart', teardrop: 'Teardrop',
      };
      dimFields = `<h4>${labelMap[body.type]}</h4>
        <div class="field"><label>Width (${u})</label><input type="number" data-k="w" value="${fmtU(body.w)}" min="0.01" step="1"/></div>
        <div class="field"><label>Height (${u})</label><input type="number" data-k="h" value="${fmtU(body.h)}" min="0.01" step="1"/></div>
        <div class="field"><label>Depth (${u})</label><input type="number" data-k="d" value="${fmtU(body.d)}" min="0.01" step="1"/></div>`;
    } else if (body.type === 'extrude') {
      dimFields = `<h4>Extrude</h4>
        <div class="field"><label>Height (${u})</label><input type="number" data-k="height" value="${fmtU(body.height)}" min="0.01" step="0.5"/></div>
        <div class="hint">Edit the source sketch in 2D to change the profile, then come back.</div>`;
    } else if (body.type === 'fastener') {
      const spec = getFastenerSpec(body.size);
      const headOpts = FASTENER_HEAD_TYPES.map(t =>
        `<option value="${t}"${t === body.headType ? ' selected' : ''}>${FASTENER_HEAD_LABELS[t]}</option>`
      ).join('');
      const sizeOpts = FASTENER_SPECS.map(s =>
        `<option value="${s.key}"${s.key === body.size ? ' selected' : ''}>${s.label} · ${s.p.toFixed(2)} mm pitch (${s.system})</option>`
      ).join('');
      const fit = body.fit || 'tight';
      const fitOpts = `
        <option value="tight"${fit === 'tight' ? ' selected' : ''}>Tight — actual bolt size</option>
        <option value="normal"${fit === 'normal' ? ' selected' : ''}>Normal — +0.1 mm clearance</option>
        <option value="loose"${fit === 'loose' ? ' selected' : ''}>Loose — +0.25 mm clearance (FDM)</option>`;
      dimFields = `<h4>Fastener</h4>
        <div class="field"><label>Head</label><select data-k="headType">${headOpts}</select></div>
        <div class="field"><label>Thread size</label><select data-k="size">${sizeOpts}</select></div>
        <div class="field"><label>Length (${u})</label><input type="number" data-k="length" value="${fmtU(body.length)}" min="0.1" step="0.5"/></div>
        <div class="field"><label>Fit</label><select data-k="fit">${fitOpts}</select></div>
        <div class="hint">Use <b>Tight</b> for bolts that print as a solid, or <b>Loose</b> when grouping as a Negative to cut a threaded hole that fits a real bolt.</div>`;
    } else if (body.type === 'group') {
      const childList = (body.children || []).map(c => `${c.type}${c.op === 'subtract' ? ' (neg)' : ''}`).join(', ');
      // Compute the merged bbox so the user can see the group's overall
      // W × H × D — matches what every other primitive shows.
      let bboxStr = '—';
      if (body.mesh) {
        viewer && viewer.scene && viewer.scene.updateMatrixWorld(true);
        const bb = new THREE.Box3().setFromObject(body.mesh);
        if (!bb.isEmpty()) {
          const sz = bb.getSize(new THREE.Vector3());
          bboxStr = `${fmtUL(sz.x)} × ${fmtUL(sz.y)} × ${fmtUL(sz.z)}`;
        }
      }
      dimFields = `<h4>Group</h4>
        <div class="field"><label>Size (W×H×D)</label><div>${bboxStr}</div></div>
        <div class="field"><label>Bodies</label><div>${body.children?.length || 0}</div></div>
        <div class="field"><label>Contents</label><div style="font-size:11px;color:var(--ink-soft)">${childList}</div></div>
        <div class="hint"><b>Ungroup</b> (Ctrl+Shift+G) to restore the originals — negatives reappear.</div>`;
    }

    const opField = `
      <h4 style="margin-top:14px">Operation</h4>
      <div class="field"><label>Type</label>
        <select data-k="op">
          <option value="add"${body.op !== 'subtract' ? ' selected' : ''}>Positive (solid)</option>
          <option value="subtract"${body.op === 'subtract' ? ' selected' : ''}>Negative (cut-out)</option>
        </select>
      </div>
      ${body.op === 'subtract' ? '<div class="hint">Negative bodies are subtracted when you click <b>Combine</b>.</div>' : ''}`;

    props.innerHTML = dimFields + positionFields + opField + `<button class="action" id="del-body" style="margin-top:14px">Delete body</button>`;

    props.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('input', () => {
        const v = parseFloat(inp.value);
        if (!isFinite(v)) return;
        if (inp.dataset.rk) {
          // Rotation field — store in body.rotation, in degrees (no unit conversion)
          body.rotation = body.rotation || { x: 0, y: 0, z: 0 };
          body.rotation[inp.dataset.rk] = v;
        } else if (inp.dataset.k) {
          body[inp.dataset.k] = fromUnit(v);
        }
        viewer?.rebuildBodies();
      });
    });
    props.querySelectorAll('select').forEach(sel => {
      sel.addEventListener('change', () => {
        body[sel.dataset.k] = sel.value;
        viewer?.rebuildBodies();
        renderProps(); // re-render to show/hide hint
      });
    });
    const del = $('del-body');
    if (del) del.onclick = () => {
      pushUndo();
      doc.bodies = doc.bodies.filter(b => b.id !== body.id);
      doc.selection = null;
      viewer?.rebuildBodies();
      renderTree();
      renderProps();
    };
  }
}

// ---------- 6. Export ----------
// Returns the user-typed project name (for STEM Builder integration), or
// 'untitled' if blank. Used as the saved/exported filename.
function getProjectName() {
  const v = (document.getElementById('project-filename')?.value || '').trim();
  // Strip filesystem-unsafe characters but keep spaces, dashes, underscores
  return (v || 'untitled').replace(/[\\/:*?"<>|]/g, '').slice(0, 80);
}

function openExportDialog() {
  openModal({
    title: 'Export project',
    body: `<p>Pick a format. The file is named after your project name (top right).</p>
           <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
             <button class="action primary" id="exp-stl"  style="flex:1">STL — 3D model<br/><span style="opacity:0.7;font-size:11px;font-weight:400">For 3D printing</span></button>
             <button class="action"          id="exp-svg"  style="flex:1">SVG — 2D sketch<br/><span style="opacity:0.7;font-size:11px;font-weight:400">For laser cutting / vector art</span></button>
           </div>
           <div class="hint" style="margin-top:10px">Filename will be <b>${getProjectName()}</b>.{stl|svg}</div>`,
    hideOk: true,
    custom: () => {
      const close = () => $('modal-bg').classList.remove('show');
      $('exp-stl').onclick = () => { close(); exportSTL(); };
      $('exp-svg').onclick = () => { close(); exportSVG(); };
    },
  });
}

function exportSVG() {
  // Construction lines are excluded from export
  const exportable = doc.sketch.entities.filter(e => !e.construction);
  if (!exportable.length) {
    showHint('No exportable shapes — construction lines do not export.');
    return;
  }
  // bounds in mm, with margin
  let minX = +Infinity, minY = +Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const e of exportable) {
    if (e.type === 'rect') {
      minX = Math.min(minX, e.x); minY = Math.min(minY, e.y);
      maxX = Math.max(maxX, e.x + e.w); maxY = Math.max(maxY, e.y + e.h);
    } else if (e.type === 'circle') {
      minX = Math.min(minX, e.cx - e.r); minY = Math.min(minY, e.cy - e.r);
      maxX = Math.max(maxX, e.cx + e.r); maxY = Math.max(maxY, e.cy + e.r);
    } else if (e.type === 'polyline') {
      for (const p of e.points) {
        minX = Math.min(minX, p.x); minY = Math.min(minY, p.y);
        maxX = Math.max(maxX, p.x); maxY = Math.max(maxY, p.y);
      }
    }
  }
  const m = 5;
  const w = maxX - minX + 2 * m, h = maxY - minY + 2 * m;
  let body = '';
  for (const e of exportable) {
    if (e.type === 'rect') {
      body += `<rect x="${e.x - minX + m}" y="${maxY - (e.y + e.h) + m}" width="${e.w}" height="${e.h}" fill="none" stroke="black" stroke-width="0.2"/>\n`;
    } else if (e.type === 'circle') {
      body += `<circle cx="${e.cx - minX + m}" cy="${maxY - e.cy + m}" r="${e.r}" fill="none" stroke="black" stroke-width="0.2"/>\n`;
    } else if (e.type === 'polyline') {
      const pts = e.points.map(p => `${p.x - minX + m},${maxY - p.y + m}`).join(' ');
      const tag = e.closed ? 'polygon' : 'polyline';
      body += `<${tag} points="${pts}" fill="none" stroke="black" stroke-width="0.2"/>\n`;
    }
  }
  const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${w}mm" height="${h}mm" viewBox="0 0 ${w} ${h}">
${body}</svg>`;
  download(svg, getProjectName() + '.svg', 'image/svg+xml');
  setStatus('Exported sketch as SVG');
}

function exportSTL() {
  // Walk every mesh in the body group, emit ASCII STL
  if (!doc.bodies.length) {
    showHint('No 3D bodies yet — extrude a sketch or add a cube.');
    return;
  }
  let stl = 'solid mini_cad\n';
  for (const body of doc.bodies) {
    const mesh = body.mesh;
    if (!mesh) continue;
    const geo = mesh.geometry.clone();
    geo.applyMatrix4(mesh.matrixWorld);
    const pos = geo.attributes.position;
    const idx = geo.index;
    const v = new THREE.Vector3(); const a = new THREE.Vector3(); const b = new THREE.Vector3(); const c = new THREE.Vector3();
    const writeTri = (i1, i2, i3) => {
      a.fromBufferAttribute(pos, i1);
      b.fromBufferAttribute(pos, i2);
      c.fromBufferAttribute(pos, i3);
      const ab = new THREE.Vector3().subVectors(b, a);
      const ac = new THREE.Vector3().subVectors(c, a);
      const n = new THREE.Vector3().crossVectors(ab, ac).normalize();
      stl += `  facet normal ${n.x.toFixed(6)} ${n.y.toFixed(6)} ${n.z.toFixed(6)}\n    outer loop\n`;
      stl += `      vertex ${a.x.toFixed(6)} ${a.y.toFixed(6)} ${a.z.toFixed(6)}\n`;
      stl += `      vertex ${b.x.toFixed(6)} ${b.y.toFixed(6)} ${b.z.toFixed(6)}\n`;
      stl += `      vertex ${c.x.toFixed(6)} ${c.y.toFixed(6)} ${c.z.toFixed(6)}\n`;
      stl += `    endloop\n  endfacet\n`;
    };
    if (idx) {
      for (let i = 0; i < idx.count; i += 3) writeTri(idx.getX(i), idx.getX(i + 1), idx.getX(i + 2));
    } else {
      for (let i = 0; i < pos.count; i += 3) writeTri(i, i + 1, i + 2);
    }
    geo.dispose();
  }
  stl += 'endsolid mini_cad\n';
  download(stl, getProjectName() + '.stl', 'model/stl');
  setStatus('Exported part as STL');
}

function download(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ---------- Fillet a polyline corner ----------
function filletPolylineCorner(poly, idx, r) {
  const n = poly.points.length;
  if (n < 3) return false;
  const prev = poly.points[(idx - 1 + n) % n];
  const curr = poly.points[idx];
  const next = poly.points[(idx + 1) % n];
  const v1x = prev.x - curr.x, v1y = prev.y - curr.y;
  const v2x = next.x - curr.x, v2y = next.y - curr.y;
  const len1 = Math.hypot(v1x, v1y), len2 = Math.hypot(v2x, v2y);
  if (len1 < 1e-6 || len2 < 1e-6) return false;
  const u1x = v1x / len1, u1y = v1y / len1;
  const u2x = v2x / len2, u2y = v2y / len2;
  const cosA = clamp(u1x * u2x + u1y * u2y, -1, 1);
  const angle = Math.acos(cosA);
  if (angle < 0.05 || angle > Math.PI - 0.05) return false;
  const d = r / Math.tan(angle / 2);
  if (d > len1 * 0.95 || d > len2 * 0.95) return false;
  const t1 = { x: curr.x + u1x * d, y: curr.y + u1y * d };
  const t2 = { x: curr.x + u2x * d, y: curr.y + u2y * d };
  const bisx = (u1x + u2x), bisy = (u1y + u2y);
  const blen = Math.hypot(bisx, bisy);
  if (blen < 1e-6) return false;
  const ubx = bisx / blen, uby = bisy / blen;
  const cdist = r / Math.sin(angle / 2);
  const center = { x: curr.x + ubx * cdist, y: curr.y + uby * cdist };
  let a1 = Math.atan2(t1.y - center.y, t1.x - center.x);
  let a2 = Math.atan2(t2.y - center.y, t2.x - center.x);
  let span = a2 - a1;
  if (span > Math.PI) span -= 2 * Math.PI;
  if (span < -Math.PI) span += 2 * Math.PI;
  const N = 16;
  const arcPts = [];
  for (let i = 0; i <= N; i++) {
    const t = a1 + span * (i / N);
    arcPts.push({ x: center.x + Math.cos(t) * r, y: center.y + Math.sin(t) * r });
  }
  poly.points.splice(idx, 1, ...arcPts);
  return true;
}

function openFilletDialog() {
  const sel = doc.selection;
  if (!sel || sel.kind !== 'sketch') { showHint('Select a polyline first.'); return; }
  let ent = doc.sketch.entities.find(e => e.id === sel.id);
  if (!ent) return;
  // Convert rect to polyline so it can be filleted
  if (ent.type === 'rect') {
    const r2p = {
      id: ent.id, type: 'polyline', closed: true, construction: ent.construction,
      points: [
        { x: ent.x, y: ent.y },
        { x: ent.x + ent.w, y: ent.y },
        { x: ent.x + ent.w, y: ent.y + ent.h },
        { x: ent.x, y: ent.y + ent.h },
      ],
    };
    const i = doc.sketch.entities.findIndex(e => e.id === ent.id);
    doc.sketch.entities[i] = r2p;
    ent = r2p;
  }
  if (ent.type !== 'polyline') {
    showHint('Fillet works on polylines and rectangles. (Circles already have round edges.)');
    return;
  }
  const u = unitLabel();
  openModal({
    title: 'Fillet corners',
    body: `<p>Round all corners of this polyline with the given radius.</p>
           <div class="field"><label>Radius (${u})</label><input id="fil-r" type="number" value="${doc.units === 'in' ? 0.1 : 2}" min="0.01" step="0.5"/></div>`,
    onConfirm: () => {
      const v = parseFloat($('fil-r').value);
      if (!(v > 0)) return;
      pushUndo();
      const r = fromUnit(v);
      const start = ent.closed ? ent.points.length - 1 : ent.points.length - 2;
      const end = ent.closed ? 0 : 1;
      let processed = 0;
      for (let i = start; i >= end; i--) {
        if (filletPolylineCorner(ent, i, r)) processed++;
      }
      sketchEng.render(); renderProps();
      if (processed > 0) setStatus(`Filleted ${processed} corner${processed > 1 ? 's' : ''}`);
      else showHint('No corners filleted — radius too large for the geometry.');
    },
  });
}

// Build a vertex on the offset polyline at "cur", given its neighbors and a
// perpendicular distance d (positive = LEFT of the directed edge). Works by
// intersecting the two offset lines for the incoming and outgoing edges.
function offsetVertexCorner(prev, cur, next, d) {
  const e1x = cur.x - prev.x, e1y = cur.y - prev.y;
  const l1 = Math.hypot(e1x, e1y);
  if (l1 < 1e-6) return { x: cur.x, y: cur.y };
  const n1x = -e1y / l1, n1y = e1x / l1;
  const e2x = next.x - cur.x, e2y = next.y - cur.y;
  const l2 = Math.hypot(e2x, e2y);
  if (l2 < 1e-6) return { x: cur.x, y: cur.y };
  const n2x = -e2y / l2, n2y = e2x / l2;
  const P1x = prev.x + n1x * d, P1y = prev.y + n1y * d;
  const P2x = next.x + n2x * d, P2y = next.y + n2y * d;
  const denom = e1x * (-e2y) - e1y * (-e2x);
  if (Math.abs(denom) < 1e-9) return { x: cur.x + n1x * d, y: cur.y + n1y * d };
  const dx = P2x - P1x, dy = P2y - P1y;
  const t = (dx * (-e2y) - dy * (-e2x)) / denom;
  return { x: P1x + t * e1x, y: P1y + t * e1y };
}

function offsetPolyline(pts, d, closed) {
  if (pts.length < 2) return null;
  let orientation = 1;
  if (closed && pts.length >= 3) {
    let a = 0;
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i], q = pts[(i + 1) % pts.length];
      a += p.x * q.y - q.x * p.y;
    }
    orientation = a > 0 ? 1 : -1; // +1 for CCW so positive d expands outward
  }
  const offset = d * orientation;
  const n = pts.length;
  const out = [];
  for (let i = 0; i < n; i++) {
    const prev = closed ? pts[(i - 1 + n) % n] : (i === 0 ? null : pts[i - 1]);
    const cur = pts[i];
    const next = closed ? pts[(i + 1) % n] : (i === n - 1 ? null : pts[i + 1]);
    if (!prev || !next) {
      const ref = prev || next;
      const ex = cur.x - (prev ? prev.x : cur.x);
      const ey = cur.y - (prev ? prev.y : cur.y);
      const fx = (next ? next.x : cur.x) - cur.x;
      const fy = (next ? next.y : cur.y) - cur.y;
      const dxe = prev ? ex : fx;
      const dye = prev ? ey : fy;
      const len = Math.hypot(dxe, dye);
      if (len < 1e-6) { out.push({ x: cur.x, y: cur.y }); continue; }
      out.push({ x: cur.x + (-dye / len) * offset, y: cur.y + (dxe / len) * offset });
      continue;
    }
    out.push(offsetVertexCorner(prev, cur, next, offset));
  }
  return out;
}

function offsetEntity(ent, d) {
  if (ent.type === 'circle') {
    const r = ent.r + d;
    if (r <= 0.01) return null;
    return { type: 'circle', cx: ent.cx, cy: ent.cy, r, construction: ent.construction };
  }
  if (ent.type === 'rect') {
    const x = ent.x - d, y = ent.y - d;
    const w = ent.w + 2 * d, h = ent.h + 2 * d;
    if (w <= 0.01 || h <= 0.01) return null;
    return { type: 'rect', x, y, w, h, construction: ent.construction };
  }
  if (ent.type === 'polyline') {
    const pts = offsetPolyline(ent.points, d, !!ent.closed);
    if (!pts || pts.length < 2) return null;
    return { type: 'polyline', closed: !!ent.closed, points: pts, construction: ent.construction };
  }
  return null;
}

function openFillet3DDialog() {
  const sel = doc.selection;
  if (!sel || sel.kind !== 'body') {
    showHint('Select a cube first, then click Fillet.');
    return;
  }
  const body = doc.bodies.find(b => b.id === sel.id);
  if (!body) return;
  if (body.type !== 'cube') {
    showHint('3D Fillet currently rounds the edges of cube primitives only.');
    return;
  }
  const u = unitLabel();
  const fe = body.filletEdges || { v: true, h: true };
  const maxR = Math.min(body.w, body.d, body.h) / 2 - 0.01;
  const defaultR = doc.units === 'in' ? 0.1 : 2;
  openModal({
    title: 'Fillet cube edges',
    body: `<p>Round the cube's edges with the given radius. Pick which edge groups to round.</p>
           <div class="field"><label>Radius (${u})</label><input id="f3-r" type="number" value="${body.filletRadius ? toUnit(body.filletRadius).toFixed(2) : defaultR}" min="0" max="${toUnit(maxR).toFixed(2)}" step="0.1"/></div>
           <div class="field"><label><input type="checkbox" id="f3-v" ${fe.v !== false ? 'checked' : ''}/> Vertical edges (4 corners going up)</label></div>
           <div class="field"><label><input type="checkbox" id="f3-h" ${fe.h !== false ? 'checked' : ''}/> Top &amp; bottom edges (8 around the prism ends)</label></div>
           <div class="hint">Set radius to 0 — or uncheck both — to return to sharp edges. Per-individual-edge picking is on the road map.</div>`,
    onConfirm: () => {
      const v = parseFloat(document.getElementById('f3-r').value);
      if (!isFinite(v) || v < 0) return;
      const wantV = document.getElementById('f3-v').checked;
      const wantH = document.getElementById('f3-h').checked;
      pushUndo();
      body.filletRadius = (wantV || wantH) ? fromUnit(v) : 0;
      body.filletEdges = { v: wantV, h: wantH };
      if (viewer) viewer.rebuildBodies();
      renderProps();
      const label = (wantV && wantH) ? 'all edges'
        : wantV ? 'vertical edges'
        : wantH ? 'top &amp; bottom edges'
        : null;
      setStatus(label ? `Filleted ${label} to ${fmtUL(fromUnit(v))}` : 'Cleared fillet');
    },
  });
}

function openOffsetDialog() {
  const sel = doc.selection;
  if (!sel || sel.kind !== 'sketch') {
    showHint('Select a shape first, then click Offset.');
    return;
  }
  const ent = doc.sketch.entities.find(e => e.id === sel.id);
  if (!ent) return;
  const u = unitLabel();
  const defaultD = doc.units === 'in' ? 0.2 : 5;
  openModal({
    title: 'Offset shape',
    body: `<p>Make a parallel copy of the selected shape. Positive distance pushes the copy <b>outward</b> (larger); negative goes <b>inward</b> (smaller).</p>
           <div class="field"><label>Distance (${u})</label><input id="off-d" type="number" value="${defaultD}" step="0.1"/></div>
           <div class="hint">Tip: use a negative distance to make a smaller copy <i>inside</i> a closed shape — handy for hole patterns or wall thicknesses.</div>`,
    onConfirm: () => {
      const v = parseFloat(document.getElementById('off-d').value);
      if (!isFinite(v) || v === 0) return;
      pushUndo();
      const d = fromUnit(v);
      const copy = offsetEntity(ent, d);
      if (!copy) { showHint('Offset would collapse the shape — try a smaller value.'); return; }
      copy.id = doc.sketch.nextId++;
      doc.sketch.entities.push(copy);
      doc.selection = { kind: 'sketch', id: copy.id };
      sketchEng.render(); renderTree(); renderProps();
      setStatus(`Offset by ${fmtUL(Math.abs(d))} ${d > 0 ? 'outward' : 'inward'}`);
    },
  });
}

function openArrayDialog() {
  const sel = doc.selection;
  if (!sel || sel.kind !== 'sketch') { showHint('Select a 2D shape first.'); return; }
  const u = unitLabel();
  openModal({
    title: 'Array along a line',
    body: `<p>Make multiple copies of the selected shape, evenly spaced along a direction.</p>
           <div class="field"><label>Count</label><input id="arr-n" type="number" value="3" min="2" max="50" step="1"/></div>
           <div class="field"><label>Spacing X (${u})</label><input id="arr-dx" type="number" value="${doc.units === 'in' ? 1 : 25}" step="0.5"/></div>
           <div class="field"><label>Spacing Y (${u})</label><input id="arr-dy" type="number" value="0" step="0.5"/></div>`,
    onConfirm: () => {
      const n = parseInt($('arr-n').value, 10);
      const dx = fromUnit(parseFloat($('arr-dx').value) || 0);
      const dy = fromUnit(parseFloat($('arr-dy').value) || 0);
      if (!(n > 1)) return;
      const ent = doc.sketch.entities.find(e => e.id === sel.id);
      if (!ent) return;
      pushUndo();
      for (let i = 1; i < n; i++) {
        const copy = JSON.parse(JSON.stringify(ent));
        copy.id = doc.sketch.nextId++;
        if (copy.type === 'rect') { copy.x += dx * i; copy.y += dy * i; }
        else if (copy.type === 'circle') { copy.cx += dx * i; copy.cy += dy * i; }
        else if (copy.type === 'polyline') copy.points = copy.points.map(p => ({ x: p.x + dx * i, y: p.y + dy * i }));
        doc.sketch.entities.push(copy);
      }
      sketchEng.render(); renderTree(); renderProps();
      setStatus(`Created ${n - 1} more copies`);
    },
  });
}

// ---------- Modal ----------
function openModal({ title, body, onConfirm, custom, hideOk }) {
  $('modal').innerHTML = `
    <h3>${title}</h3>
    ${body}
    <div class="modal-actions">
      <button class="action" id="m-cancel">${hideOk ? 'Close' : 'Cancel'}</button>
      ${hideOk ? '' : '<button class="action primary" id="m-ok">OK</button>'}
    </div>`;
  $('modal-bg').classList.add('show');
  const close = () => $('modal-bg').classList.remove('show');
  $('m-cancel').onclick = close;
  if (!hideOk && $('m-ok')) $('m-ok').onclick = () => { onConfirm?.(); close(); };
  $('modal-bg').onclick = (e) => { if (e.target.id === 'modal-bg') close(); };
  custom?.();
}

// ---------- 7. Init ----------
function init() {
  try {
    sketchEng = new SketchEngine($('sketch-svg'));
  } catch (err) {
    console.error('SketchEngine init failed:', err);
    setStatus('2D init error: ' + err.message);
  }

  // 3D init — non-fatal if Three.js didn't load
  if (typeof THREE !== 'undefined') {
    try {
      viewer = new Viewer3D($('three-canvas'));
    } catch (err) {
      console.error('Viewer3D init failed:', err);
      setStatus('3D init error: ' + err.message + ' (2D still works)');
    }
  } else {
    console.warn('Three.js did not load. 3D mode disabled.');
    setStatus('Three.js unavailable — 3D disabled. 2D works.');
    // disable 3D-only controls
    document.querySelectorAll('#tools-3d .tool, #export-btn').forEach(b => b.disabled = true);
  }

  // "Done" button — exits the sketch editor and returns to 3D
  $('back-to-3d-btn').onclick = () => setMode('3d');
  // Undo / redo buttons
  $('undo-btn').onclick = () => undo();
  $('redo-btn').onclick = () => redo();

  // Generic action handler (works in both 2D and 3D toolbars)
  const runAction = (action) => {
    switch (action) {
      case 'extrude': extrudeCurrentSketch(); break;
      case 'copy': copySelection(); break;
      case 'paste': pasteSelection(); break;
      case 'combine': groupSelected(); break; // legacy alias
      case 'mirror-2d': openMirrorDialog(); break;
      case 'mirror-3d': openMirror3DDialog(); break;
      case 'sketch-on-face': startSketchOnFace(); break;
      case 'add-fastener': openFastenerDialog(); break;
      case 'new-sketch': openNewSketchDialog(); break;
      case 'fillet-2d': openFilletDialog(); break;
      case 'fillet-3d': openFillet3DDialog(); break;
      case 'revolve': revolveCurrentSketch(); break;
      case 'array-2d': openArrayDialog(); break;
      case 'offset-2d': openOffsetDialog(); break;
      case 'group': groupSelected(); break;
      case 'ungroup': ungroupSelected(); break;
      case 'trim':
        if (sketchEng) sketchEng.setTool('trim');
        break;
      case 'prim-menu':
        $('prim-dropdown').classList.toggle('open');
        break;
      case 'shape2d-menu':
        $('shape2d-dropdown').classList.toggle('open');
        break;
      case 'align': startAlignMode(); break;
      case 'orbit-mode': toggleOrbitMode(); break;
      case 'pan-mode': togglePanMode(); break;
    }
  };

  // 2D tools — data-tool sets tool, data-action runs an action
  document.querySelectorAll('#tools-2d .tool').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', () => {
      if (b.dataset.tool) sketchEng.setTool(b.dataset.tool);
      else if (b.dataset.action) runAction(b.dataset.action);
    });
  });

  // 3D tools
  document.querySelectorAll('#tools-3d .tool').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', (e) => {
      e.stopPropagation();
      if (b.dataset.action) runAction(b.dataset.action);
    });
  });

  // Primitive dropdown items
  document.querySelectorAll('#prim-dropdown .dropdown-menu button').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', () => {
      addPrimitive(b.dataset.prim);
      $('prim-dropdown').classList.remove('open');
    });
  });
  // 2D shape dropdown items
  document.querySelectorAll('#shape2d-dropdown .dropdown-menu button').forEach(b => {
    if (b.disabled) return;
    b.addEventListener('click', () => {
      insert2DShape(b.dataset.shape2d);
      $('shape2d-dropdown').classList.remove('open');
    });
  });
  // Close dropdowns on outside click
  document.addEventListener('click', (e) => {
    const dd = $('prim-dropdown');
    if (dd && !dd.contains(e.target)) dd.classList.remove('open');
    const dd2 = $('shape2d-dropdown');
    if (dd2 && !dd2.contains(e.target)) dd2.classList.remove('open');
  });

  // Units toggle
  document.querySelectorAll('#units-toggle button').forEach(b => {
    b.addEventListener('click', () => setUnits(b.dataset.units));
  });

  // Export — single button, popup dialog with format choice. Filename
  // input lives in the topbar so STEM Builder can use it as the saved name.
  $('export-btn').onclick = openExportDialog;
  $('new-sketch-btn').onclick = openNewSketchDialog;

  // Length / angle inputs — Enter commits a vertex at the typed distance.
  // If angle field is filled, that angle (in degrees) is used; else cursor direction.
  const commitFromInputs = () => {
    const lv = parseFloat($('length-input').value);
    const av = parseFloat($('angle-input').value);
    if (lv > 0 && sketchEng.activeLine) {
      const lenMm = fromUnit(lv);
      sketchEng.commitTypedVector(lenMm, isFinite(av) ? av : null);
      $('length-input').value = '';
      $('angle-input').value = '';
      $('length-input').blur();
      $('angle-input').blur();
    }
  };
  ['length-input', 'angle-input'].forEach(id => {
    $(id).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); commitFromInputs(); }
      else if (e.key === 'Tab' && id === 'length-input') { /* native focus to angle */ }
      else if (e.key === 'Escape') {
        e.preventDefault();
        $('length-input').value = '';
        $('angle-input').value = '';
        e.target.blur();
      }
    });
  });

  // Track Space — temporary orbit modifier in 3D
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
      doc.spaceHeld = true;
      if (doc.mode === '3d' && viewer && !doc.orbitMode) viewer.canvas.style.cursor = 'grab';
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
      doc.spaceHeld = false;
      if (doc.mode === '3d' && viewer && !doc.orbitMode) viewer.canvas.style.cursor = '';
    }
  });

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    // Auto-focus the length input when typing digits during line drawing —
    // but ONLY if no other input field is already focused. Otherwise we'd
    // hijack the user's keystrokes after they Tab into the angle field.
    if (doc.mode === '2d' && sketchEng?.activeLine && /^[0-9.]$/.test(e.key) &&
        document.activeElement?.tagName !== 'INPUT' &&
        document.activeElement?.tagName !== 'TEXTAREA') {
      const li = $('length-input');
      li.value = e.key;
      li.focus();
      try { li.setSelectionRange(li.value.length, li.value.length); } catch(_) {}
      e.preventDefault();
      return;
    }

    // Copy/paste — works in both 2D and 3D
    if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'C')) {
      copySelection(); e.preventDefault(); return;
    }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'v' || e.key === 'V')) {
      pasteSelection(); e.preventDefault(); return;
    }
    // Group / Ungroup
    if ((e.ctrlKey || e.metaKey) && (e.key === 'g' || e.key === 'G')) {
      if (e.shiftKey) ungroupSelected(); else groupSelected();
      e.preventDefault(); return;
    }
    // Undo / Redo
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey && (e.key === 'z' || e.key === 'Z')) {
      undo(); e.preventDefault(); return;
    }
    if ((e.ctrlKey || e.metaKey) && (
        (e.shiftKey && (e.key === 'z' || e.key === 'Z')) ||
        (e.key === 'y' || e.key === 'Y'))) {
      redo(); e.preventDefault(); return;
    }
    if (e.target.tagName === 'INPUT') return;
    if (doc.mode === '2d') {
      if (e.key === 'v' || e.key === 'V') sketchEng.setTool('select');
      if (e.key === 'r' || e.key === 'R') sketchEng.setTool('rect');
      if (e.key === 'c' || e.key === 'C') sketchEng.setTool('circle');
      if (e.key === 'l' || e.key === 'L') sketchEng.setTool('line');
      if (e.key === 'a' || e.key === 'A') sketchEng.setTool('arc');
      if (e.key === 'e' || e.key === 'E') sketchEng.setTool('eraser');
      if (e.key === 'g' || e.key === 'G') sketchEng.setTool('construction');
      if (e.key === 'd' || e.key === 'D') sketchEng.setTool('dimension');
      if (e.key === 'f' || e.key === 'F') fitSketchViewToBodies();
      if (e.key === 'Enter' && sketchEng.activeLine) sketchEng.finalizeLine(true);
      if (e.key === 'Escape') {
        // Commit (not discard) any segments already drawn in a polyline
        if (sketchEng.activeLine) sketchEng.finalizeLine(true);
        else if (sketchEng.activeArc) { sketchEng.activeArc = null; sketchEng.render(); setStatus('Arc cancelled'); }
        else if (sketchEng.activeDim) { sketchEng.activeDim = null; sketchEng.render(); setStatus('Dimension cancelled'); }
        else if (sketchEng.draft) { sketchEng.draft = null; sketchEng.dragMode = null; sketchEng.render(); }
      }
    }
    // Cancel face-pick mode in 3D (also clears the bbox 6-face picker if up)
    if (e.key === 'Escape' && (doc.faceMode || doc.curvedPickBody)) {
      doc.faceMode = false;
      doc.curvedPickBody = null;
      if (viewer) {
        viewer.canvas.style.cursor = '';
        viewer.clearBboxFacePicker && viewer.clearBboxFacePicker();
      }
      setStatus('Sketch on Face cancelled');
    }
    // Cancel align mode
    if (e.key === 'Escape' && doc.alignMode) {
      exitAlignMode();
      setStatus('Align cancelled');
    }
    // Cancel an in-progress drag-to-extrude (or just close the typing tooltip)
    if (e.key === 'Escape' && doc.mode === '3d') {
      const st = viewer?.extrudeState;
      const tooltipOpen = document.getElementById('extrude-tooltip')?.classList.contains('show');
      if ((st && st.active) || tooltipOpen) {
        if (st) st.active = false;
        if (viewer) viewer.clearExtrudePreview();
        hideExtrudeTooltip();
        setStatus('Extrude cancelled');
        return;
      }
    }
    // Clear region selection
    if (e.key === 'Escape' && doc.mode === '3d' && (doc.selectedRegions?.length || 0) > 0) {
      doc.selectedRegions = [];
      if (viewer) {
        viewer.updateRegions();
        viewer.updateExtrudeGizmo();
      }
      renderProps();
      setStatus('Region selection cleared');
    }
    // Esc as a universal "return to pointer" — works in 2D when the active
    // tool is anything other than select, switching back to the select tool.
    if (e.key === 'Escape' && doc.mode === '2d' && sketchEng &&
        sketchEng.tool && sketchEng.tool !== 'select' &&
        !sketchEng.activeLine && !sketchEng.activeArc && !sketchEng.draft) {
      sketchEng.setTool('select');
      setStatus('Pointer tool');
    }
    // Arrow-key nudge — moves the selected sketch shape (in 2D) or body
    // (in 3D) by one grid step. Shift = 4× step (faster). Alt + ↑/↓ in 3D
    // moves along the Y (vertical) axis instead of Z.
    if (!e.ctrlKey && !e.metaKey &&
        (e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
         e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
      // Don't hijack arrows when an input is focused
      const tag = document.activeElement?.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      const step = (doc.grid.spacing || 1) * (e.shiftKey ? 4 : 1);
      e.preventDefault();
      if (doc.mode === '2d' && doc.selection?.kind === 'sketch') {
        pushUndo();
        const ids = doc.multiSelectedSketch?.length ? doc.multiSelectedSketch : [doc.selection.id];
        let dx = 0, dy = 0;
        if (e.key === 'ArrowLeft')  dx = -step;
        if (e.key === 'ArrowRight') dx = +step;
        if (e.key === 'ArrowUp')    dy = +step;
        if (e.key === 'ArrowDown')  dy = -step;
        for (const id of ids) {
          const ent = doc.sketch.entities.find(x => x.id === id);
          if (!ent) continue;
          // Snapshot current state and feed to moveEntity
          const snap = JSON.parse(JSON.stringify(ent));
          moveEntity(ent, snap, dx, dy);
        }
        sketchEng.render(); renderProps();
        return;
      }
      if (doc.mode === '3d' && doc.selection?.kind === 'body') {
        pushUndo();
        const ids = doc.multiSelectedBodies?.length ? doc.multiSelectedBodies : [doc.selection.id];
        let dx = 0, dy = 0, dz = 0;
        if (e.altKey && (e.key === 'ArrowUp' || e.key === 'ArrowDown')) {
          // Alt + Up/Down → move on Y axis (vertical)
          dy = e.key === 'ArrowUp' ? +step : -step;
        } else {
          if (e.key === 'ArrowLeft')  dx = -step;
          if (e.key === 'ArrowRight') dx = +step;
          // Up = forward (-Z, into the screen for default view), Down = back (+Z)
          if (e.key === 'ArrowUp')    dz = -step;
          if (e.key === 'ArrowDown')  dz = +step;
        }
        for (const id of ids) {
          const b = doc.bodies.find(x => x.id === id);
          if (!b) continue;
          b.x = (b.x || 0) + dx;
          b.y = (b.y || 0) + dy;
          b.z = (b.z || 0) + dz;
        }
        viewer.rebuildBodies(); viewer.updateGizmo(); renderProps();
        return;
      }
    }
    if (e.key === 'Delete' || e.key === 'Backspace') {
      if (doc.selection?.kind === 'sketch') {
        pushUndo();
        const ids = doc.multiSelectedSketch?.length ? new Set(doc.multiSelectedSketch) : new Set([doc.selection.id]);
        doc.sketch.entities = doc.sketch.entities.filter(x => !ids.has(x.id));
        doc.selection = null;
        doc.multiSelectedSketch = [];
        sketchEng.render(); renderTree(); renderProps();
      } else if (doc.selection?.kind === 'body') {
        pushUndo();
        const ids = doc.multiSelectedBodies?.length ? new Set(doc.multiSelectedBodies) : new Set([doc.selection.id]);
        doc.bodies = doc.bodies.filter(x => !ids.has(x.id));
        doc.selection = null;
        doc.multiSelectedBodies = [];
        viewer.rebuildBodies(); renderTree(); renderProps();
      }
    }
  });

  // Initial render — open in 3D so the user lands in the modeling viewport
  setMode('3d');
  renderGridPanel();
  renderTree();
  renderProps();
  sketchEng.render();
  updateUndoRedoButtons();
  setStatus('Ready — add a primitive or click + Sketch to draw');
}

window.addEventListener('DOMContentLoaded', () => {
  try { init(); } catch (err) {
    console.error('init failed:', err);
    setStatus('Init error: ' + err.message);
    // last-resort visible message
    const sb = document.getElementById('status-msg');
    if (sb) sb.style.color = '#c0392b';
  }
});

// Surface uncaught errors in the status bar so they're visible without devtools
window.addEventListener('error', (e) => {
  console.error(e.error || e.message);
  const sb = document.getElementById('status-msg');
  if (sb) { sb.textContent = 'Error: ' + (e.message || 'see console'); sb.style.color = '#c0392b'; }
});
</script>
</body>
</html>
